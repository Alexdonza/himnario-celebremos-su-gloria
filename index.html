 en eco de tu voz;\nY con tu ayuda buscaré\nal que anda lejos y sin Dios.\n2.          Oh, gu’ame y guiaré\nen tus caminos, oh Señor,\nAl vacilante y débil pie\nque va por sendas de error.\nJaime C. Clifford, alt. MUSICA: Robert A. Schumann, 1839,\n3.     Enséñame, y enseñaré\npalabras tuyas de verdad;\nDame alimento y daré\na los hambrientos tu maná.\n4.   Oh, lléname, Señor Jesús;\nrebose tu amor en m’;\nQue fiel refleje yo tu luz,\ny glorifique sólo a ti.\n5.   Oh, úsame, mi Salvador,\nsegún tu santa voluntad;\nServirte es mi sumo honor\nahora y en la eternidad.\nAmén.\nJaime C. Clifford, alt. MUSICA: Robert A. Schumann, 1839,"},{"n":505,"t":"Demos con alegr’a","c":"Cada uno dé como propuso... porque Dios ama al dador alegre. 2 Corintios 9:7\n1.     Demos con alegr’a y no por necesidad\nAl Dios de toda gracia con gran liberalidad;\nMinistrando y supliendo,\ngratitud siempre expresando\n// Al Señor, el Creador,\ncoro: basada en el Salmo 148 y 150.\n2.   Nunca escasamente mas siempre de corazón\nY generosamente con gozo y oración;\nAyudando y ofrendando como Dios\nnos ha enseñado;\n// El nos ve y nos provee;\nsu amor es perfecta ley. //\nCoro:        Todo lo que respira, alabe a Jehová.\nTodo lo que respira, alabe a Jehová.\nAlabadle sol y luna y vosotros todos\nsus santos,\n// Alabad y bendecid el nombre de Jehová. //\ncoro: basada en el Salmo 148 y 150.                                  L.A."},{"n":506,"t":"Para siempre es su bondad","c":"1.       ÀQué podemos ofrendar?\nÀQué presente digno dar?\nDediquemos hoy a él\nbienes, vida, alma fiel;\nPara siempre es su bondad;\nal Señor magnificad.\n2.         De la nada nos formó,\ny la vida él nos dio;\nEl nos cuida en su bondad,\ny nos gu’a en la verdad;\nPara siempre es su bondad;\nal Señor magnificad.\ntrad. Donald R. Fletcher, alt. en Cantos B’blicos, 1965, México.\nEsta letra se puede cantar con la música de #560 (Roca de la eternidad)."},{"n":507,"t":"Oh, cumple tu ministerio","c":"Que prediques... que instes... redarguye, reprende y exhorta. 2 Timoteo 4:2\n1.    Oh, cumple tu ministerio en la obra del Señor;\nOh, cumple tu ministerio, trabajando con fervor.\nCoro:                  Oh, cumple tu ministerio,\nsirviendo en amor;\nOh, cumple tu ministerio\nen la obra del Señor.\n2.   Haz obra de evangelista en la mies del Salvador,\nLlevando las Buenas Nuevas\ndonde esté el pecador.\nCoro:    Oh, cumple tu ministerio,\nsirviendo en amor;\nOh, cumple tu ministerio\nen la obra del Señor.\n3.        Predica la Santa Biblia\ncon mensajes de valor,\nInstando en todo tiempo,\nproclamando con vigor.\n4.      Exhorta, pues, con paciencia,\nsiempre lleno de candor;\nEnseña doctrina sana,\ncombatiendo todo error."},{"n":508,"t":"Los Talentos","c":"El reino...es como un hombre que a sus siervos...les entregó bienes. Mateo 25:14\n1.      Todos recibieron sus talentos del Señor;\nCada siervo as’ conforme a su capacidad\nRecibió la suma exacta, lo que le tocó,\nPara ser usada, pues, según su habilidad.\nCoro:    Uno, dos, o cinco, ÀCuántos tienes tú?\nUno, dos, o cinco, Cristo te los dio.\nUsa hoy tus dones mientras puedas trabajar;\nDesarrolla tus talentos, ¡Sirve a tu Señor!\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:      Uno, dos, o cinco, ÀCuántos tienes tú?\nUno, dos, o cinco, Cristo te los dio.\nUsa hoy tus dones mientras puedas trabajar;\nDesarrolla tus talentos, ¡Sirve a tu Señor!\n(Final optativo)      ¡Sirve al Señor!\n2.      El que recibió los cinco, cinco más ganó,\nY el que dos ten’a, con sudor los duplicó.\nPero el de un talento, sólo lo enterró,\nY de su Señor reproche duro recibió.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.        MEX"},{"n":509,"t":"Ofrenda al Señor","c":"No con tristeza, ni por necesidad, porque Dios ama al dador alegre. 2 Corintios 9:7\n1.    /// Ofrenda al Señor porque él es bueno, ///\nOfrenda a su santo nombre.\n2.     /// Demos al Señor lo que es suyo, ///\nOfrenda a su santo nombre.\n3.         /// Dios ama al dador alegre, ///\nOfrenda a su santo nombre.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg.                  L.A."},{"n":510,"t":"Fiel mayordomo seré","c":"Bien, buen siervo...sobre poco has sido fiel, sobre mucho te pondré. Mateo 25:23\n1.      Vengo rendido a tus pies, Señor;\nquiero fielmente depositar\nTiempo, dinero, mi don de amor;\nofrenda grata hoy vengo a dar.\nCoro:      Todo buen don viene de Dios;\nÀCómo negarlo podré?\nFiel mayordomo de Cristo seré,\ny un d’a, ÒFiel siervoÓ, oiré.\nCoro:     Todo buen don viene de Dios;\nÀCómo negarlo podré?\nFiel mayordomo de Cristo seré,\ny un d’a, ÒFiel siervoÓ, oiré.\n2.      ÒProbadme en estoÓ, dice el Señor,\nÒy bendiciones derramaréÓ.\nFiel a mis votos de fe seré,\ntestigo digno de mi Señor.\n3.       Tú vas conmigo, no dudaré;\nen tus promesas yo confiaré.\nDe lo que es tuyo te daré,\ny almas preciosas cosecharé."},{"n":511,"t":"Gozo da servir a Cristo","c":"Me regocijé cuando vinieron los hermanos y dieron testimonio. 3 Juan v. 3\n1.               Gozo da servir a Cristo,\nen la vida diaria aqu’;\nGozo, que con alegr’a, siempre él me da a m’.\nCoro:       Gozo hay, s’, en servir a Cristo;\ngozo en el corazón.\nCada d’a él da poder, me ayuda a vencer,\ny da gozo, gozo en el corazón.\n1931. © 1931, ren. 1959 Rodeheaver, admin.. Word Music. Usado con permiso.\nCoro:       Gozo hay, s’, en servir a Cristo;\ngozo en el corazón.\nCada d’a él da poder, me ayuda a vencer,\ny da gozo, gozo en el corazón.\n2.             Gozo da servir a Cristo,\ngozo que triunfante está\nEn la pena o tristeza; Cristo en todo vence ya.\n3.             Gozo da servir a Cristo,\ngozo en la oscuridad,\nPorque tengo el secreto de la luz de la verdad.\n1931. © 1931, ren. 1959 Rodeheaver, admin.. Word Music. Usado con permiso."},{"n":512,"t":"En las aguas de la muerte","c":"Bautizándolos en el nombre del Padre, y del Hijo, y del Esp’ritu Santo. Mateo 28:19\n¥1.   En las aguas de la muerte, sumergido\nfue Jesús, mas su amor no fue\napagado por sus penas en la cruz.\nLevantóse de la tumba, sus cadenas\nquebrantó, y triunfante y victorioso\na los cielos ascendió.\n¥2.   En las aguas del bautismo hoy confieso\nyo mi fe: Jesucristo me ha salvado\ny en su amor me gozaré;\nMe bautizo en testimonio que a Jesús\nsiguiendo estoy, desde ahora para\nel mundo y el pecado muerto soy.\n¥3.   Yo que estoy crucificado, ÀCómo más\npodré pecar? Ya que soy resucitado,\nsanta vida he de llevar.\nSon las aguas del bautismo mi señal\nde salvación, y yo quiero consagrarme\nal que obró mi redención."},{"n":513,"t":"Los que somos bautizados","c":"Aqu’ hay agua; Àqué impide que yo sea bautizado? Hechos 8:36\n¥1.      Los que somos bautizados con el\nSalvador Jesús, al pecado somos muertos;\nhoy andemos en su luz; Sepultados\njuntamente somos con el Salvador\nen figura de la muerte\nque sufrió el buen Señor.\npubl. por John Wyeth, 1813, arreg. Asahel Nettleton.\nLetra © 1964 Cánticos Escogidos. Usado con permiso.\n¥2.    Si por fe con él morimos (el bautismo\nes la señal) con él ya resucitamos\npor su vida espiritual; Y no andamos\ncomo antes en caminos de pecar,\nsino en novedad de vida\nque el Señor aqu’ nos da.\n¥3.         ¡Cuán gloriosa vida ha dado\nCristo a los que él redimió! El, de muerte\na vida ahora, con poder los traspasó;\nY el bendito amor de Cristo\nnos constriñe, pues murió\npara que ya no vivamos\npara s’, más para Dios.\npubl. por John Wyeth, 1813, arreg. Asahel Nettleton.\nLetra © 1964 Cánticos Escogidos. Usado con permiso."},{"n":514,"t":"Yo viv’a en el pecado","c":"Y descendieron ambos al agua, Felipe y el eunuco, y le bautizó. Hechos 8:38\n1.               Yo viv’a en el pecado,\ny doctrinas del error\nMe guiaban, engañado, a una muerte de terror.\nSoy salvado del abismo, con Jesús al cielo voy,\n// Y confieso por bautismo\nque del mundo ya no soy. //\n2.    Tuve el corazón muy triste pues en vano,\npaz busqué, Pero a m’, Señor, dijiste:\nÒHoy descanso te daréÓ. Es la sangre que me\nsalva y en paz me guardará;\n// El Esp’ritu me sella y me santificará. //\n3.                Antes muerto en el pecado,\nya he muerto con Jesús,\nY del mundo separado, yo me juzgo por la cruz.\nEn el agua sumergido, testimonio a todos doy\n// Que en Cristo he cre’do y por él ya salvo soy. //\nARG"},{"n":515,"t":"El testimonio del bautismo","c":"Con Cristo estoy juntamente crucificado,\ny ya no vivo yo, más vive Cristo en m’;\nY lo que ahora vivo en la carne, lo vivo\nen la fe del Hijo de Dios, el cual me amó\ny se entregó a s’ mismo por m’.\nÀO no sabéis que todos los que hemos sido bautizados\nen Cristo Jesús, hemos sido bautizados en su muerte?\nAs’ también vosotros consideraos muertos al pecado,\npero vivos para Dios en Cristo Jesús, Señor nuestro.\nGálatas 2:20; Romanos 6:3, 11 (RVR)"},{"n":516,"t":"La cruz excelsa","c":"Lejos esté de m’ gloriarme, sino en la cruz de nuestro Señor. Gálatas 6:14\n¥1.        La cruz excelsa al contemplar\nDe todo cuanto estimo aqu’,\nlo más precioso es su amor.\n¥2.        No busco gloria ni honor\nsino en la cruz de mi Señor.\nLas cosas que me encantan más\nlas sacrifico por su amor.\n¥3.   De su cabeza, manos, pies,\npreciosa sangre corrió all’.\nCorona de espinas fue\n4.    El mundo entero no será\ndádiva digna de ofrecer.\nAmor tan grande y sin igual\nen cambio exige todo el ser."},{"n":517,"t":"Obediente a tu mandato","c":"Tomad, comed; esto es mi cuerpo que por vosotros es partido. 1 Corintios 11:24\n¥1.    Obediente a tu mandato participa hoy tu grey\nDe la cena, y con gozo la recibe nuestra fe;\nTu dolor en el Calvario y tu pena y gran amor\nAnunciamos en tu nombre, amant’simo Señor.\n¥2.     Recordamos la tristeza que afligió tu corazón,\nY la copa de amargura que por todo pecador\nEn el Gólgota tomaste, despreciando tu dolor;\nTe pedimos que fervientes, te sigamos con valor.\ntrad. M.N. Hutchinson, c. 1877. MUSICA:\nCharles C. Converse, 1868.\n3.         Gracias, oh Jesús,\nte damos por tu infinito amor;\nGracias mil, pues disfrutamos\ntu clemencia y tu favor.\nTuya fue la cruz, más nuestra\nes la dicha y es la paz;\nTuya sea pues la gloria,\nhoy y por la eternidad.\nAmén.\ntrad. M.N. Hutchinson, c. 1877. MUSICA:\nCharles C. Converse, 1868."},{"n":518,"t":"Rey de mi vida","c":"¥1.                   Rey de mi vida tú eres ya:\ngloria te doy, Jesús;\nNo me permitas olvidar\ntu obra en la cruenta cruz.\nCoro:\nSi olvido del Getseman’, tu sufrimiento agudo all’,\nY tu divino amor por m’, Cristo, hazme ver tu cruz.\n2.                   Por fe la tumba puedo ver\nque ya vac’a está;\nAngeles santos de poder\nfueron tu guardia allá.\nCoro:\nSi olvido del Getseman’, tu sufrimiento agudo all’,\nY tu divino amor por m’, Cristo, hazme ver tu cruz.\n3.         Yo, cual Mar’a, quien su amor\nte demostró, Jesús,\nQuiero servirte fiel, Señor,\nal recordar tu cruz.\n4.             Hazme dispuesto a llevar\nCon gozo sufriré, Señor;\nfuiste a la cruz por m’."},{"n":519,"t":"Aqu’ del pan partido tomaré","c":"Por tanto, pruébese cada uno a s’ mismo, y coma as’ del pan. 1 Corintios 11:28\n¥1.     Aqu’ del pan partido tomaré,\ny de la copa de tu comunión.\nEl nombre de mi Dios invocaré,\ngozándome en la paz de salvación.\n¥2.       La culpa del pecado m’a fue,\nmas tuya fue la sangre de la cruz.\nPor ella y tu justicia tengo, sé,\nperdón, consuelo y paz, Señor Jesús.\n3.     Nos levantamos de la cena aqu’;\nTodo se va, mas tú te quedas, s’,\ncerca, muy cerca, amado Salvador.\nEsta letra se puede cantar también con la música de #260 (Transfórmame) y 382 (Mi corazón)"},{"n":520,"t":"Hoy venimos, cual hermanos","c":"Les dio, diciendo: Esto es mi cuerpo que por vosotros es dado. Lucas 22:19\n1.        Hoy venimos, cual hermanos,\na la cena del Señor.\nAcerquémonos, cristianos,\nrespirando tierno amor.\n¥2.         En memoria de su muerte\ny la sangre que vertió,\ncelebremos el banquete\nque en su amor nos ordenó.\nestr. #4 Esteban Sywulka B., 1990. MUSICA: Isaac B. Woodbury, 1845.\n¥3.   Recordando las angustias\nque sufriera el Redentor,\ndividida está nuestra alma\nentre el gozo y el dolor.\n¥4.   Nos da vida por su muerte,\ngozo por su aflicción;\nAlabemos al Cordero\npor su eterna salvación.\nestr. #4 Esteban Sywulka B., 1990. MUSICA: Isaac B. Woodbury, 1845."},{"n":521,"t":"Llegamos a tu mesa","c":"Todas las veces que comiereis este pan y bebiereis esta copa. 1 Corintios 11:26\n1.        Llegamos a tu mesa, oh Señor,\na celebrar de nuevo tu amor;\nAmor vertido en la terrible cruz,\ncuando por m’ moriste, mi Jesús.\n2.         Oh, examina y lávame, Señor;\nyo dignamente quiero hoy tomar\nTu cena con un limpio corazón,\ncontigo y con tu pueblo en comunión.\nLETRA y MUSICA: Esteban Sywulka B., 1989.\nGUA\n© 1989 Esteban Sywulka B. Usado con permiso.\n3.   Tu cuerpo fue herido por mi bien;\ncorona de espinas en tu sien.\nTu cuerpo como el pan partido fue,\nel pan que como aqu’ con gozo y fe.\n4.     En el madero de la maldición\ntu sangre me compró la redención.\nrecuerdo en esta copa de amor.\n5.     Oh Salvador, en tu memoria es\nque el vino y pan tomamos cada vez\nHasta que vengas, y tu gran bondad\ncelebraremos por la eternidad.\nLETRA y MUSICA: Esteban Sywulka B., 1989.\nGUA\n© 1989 Esteban Sywulka B. Usado con permiso."},{"n":522,"t":"Es la cena del Señor","c":"Estando sentado con ellos a la mesa, tomó el pan y lo bendijo. Lucas 24:30\n1.    Es la cena del Señor memorial de su amor;\nRepresenta en verdad\nsu perfecta y gran bondad;\nMe recuerda de la cruz y la muerte de Jesús.\n2.       Al partir el pan aqu’, me acordaré de ti,\nDe tu cuerpo en la cruz que entregaste, oh Jesús;\n¡Cuánto te amo, oh Salvador,\npor comprarme, con amor!\natrib. a Henry R. Bishop, arreg. Benjamin Carr, 1825.\n3.    Al tomar la copa aqu’, me acordaré de ti,\nDe la sangre carmes’ que vertiste tú por m’;\nPues tu angustia y cruel dolor,\nnunca olvidaré, Señor.\n4.            Tuya, oh Cristo, la pasión;\nm’o el cielo y redención;\nQuiero dedicarme a ti, pues te diste tú por m’;\nCon amor te serviré y tu nombre alabaré.\natrib. a Henry R. Bishop, arreg. Benjamin Carr, 1825."},{"n":523,"t":"La mesa del Señor","c":"Àno es la comunión de la sangre de Jesucristo?\nEl pan que partimos, Àno es la comunión\ndel cuerpo de Cristo?\nSiendo uno solo el pan, nosotros, con ser\nmuchos, somos un cuerpo; pues todos\nparticipamos de aquel mismo pan.\nNo podéis beber la copa del Señor, y la copa\nde los demonios;\n1 Corintios 10:16, 17, 21; 11:27, 28 (RVR) 11:26 (BLA)\nNo podéis participar de la mesa del Señor,\ny de la mesa de los demonios.\nDe manera que cualquiera que comiere este\npan o bebiere esta copa del Señor indignamente,\nserá culpado del cuerpo y de la sangre del Señor.\nPor tanto, pruébese cada uno a s’ mismo, y\ncoma as’ del pan, y beba de la copa.\nPorque todas las veces que comáis este pan\ny bebáis esta copa,\nél venga.\n1 Corintios 10:16, 17, 21; 11:27, 28 (RVR) 11:26 (BLA)"},{"n":524,"t":"Hay un precioso manantial","c":"En aquel tiempo habrá un manantial abierto... para purificación. Zacar’as 13:1\nSi b (Capo 1 - La)                                                          Con reflexión\n1.        Hay un precioso manantial de sangre\nde Emanuel, que purifica a cada cual\nque se sumerge en él. Que se sumerge en él,\nque se sumerge en él. Que purifica a cada cual\nque se sumerge en él.\n2.         El malhechor se convirtió pendiente\nde una cruz; El vio la fuente y se lavó,\ncreyendo en Jesús. Creyendo en Jesús,\ncreyendo en Jesús. El vio la fuente y se lavó,\ncreyendo en Jesús.\n3.    Y yo también mi pobre ser all’ logré lavar;\nen ensalzar. Me gozo en ensalzar,\nme gozo en ensalzar.\nme gozo en ensalzar.\n4.     ¡Eterna fuente carmes’! ¡Raudal de puro\namor! Se lavará por siempre en ti\nel pueblo del Señor. El pueblo del Señor,\nel pueblo del Señor. Se lavará por siempre\nen ti el pueblo del Señor."},{"n":525,"t":"Vengan a la mesa","c":"Les dijo Jesús: Venid, comed. Juan 21:12\nCoro:                  Vengan a la mesa,\nvengan a celebrar.\nVengan con gran gozo,\nvengan a adorar.\n1.                 Cristo extiende su mano\ncon tierna invitación;\nEl nos convida a la cena\nde la conmemoración.\nCoro:                Vengan a la mesa,\nvengan a celebrar.\nVengan con gran gozo,\nvengan a adorar.\n2.              Juntos tomemos la cena\ncon gratitud al Señor\nCristo Jesús nos dio vida,\nEs nuestro gran Salvador.\n3.         Somos un Cuerpo en Cristo;\ncon su amor nos unió;\nHoy compartimos con gozo,\nhijos de un solo Dios."},{"n":526,"t":"Cristo su preciosa sangre","c":"Teniendo libertad... por la sangre de Jesucristo... acerquémonos. Hebreos 10:19, 22\n1.    Cristo su preciosa sangre en la cruz vertió;\nPor nosotros pecadores él la dio.\nCon su sangre meritoria hizo redención,\nY por eso Dios te brinda el perdón.\n2.     Es la sangre tan preciosa del buen Salvador\nSin la sangre es imposible que haya remisión;\nPor las obras no se alcanza salvación.\ntrad. Stuart E. McNair, alt., estr. #3 Felipe Blycker J. y\nOscar López M., 1989. MUSICA: Felipe Blycker J. Estr. #3 y música                GUA\n3.   Cristo invita a los perdidos al celeste hogar;\nAl hambriento él ofrece pan sin par.\nMuy preciosa es la sangre, porque me compró\nVida eterna en el cielo; ¡Gloria a Dios!\ntrad. Stuart E. McNair, alt., estr. #3 Felipe Blycker J. y\nOscar López M., 1989. MUSICA: Felipe Blycker J. Estr. #3 y música                   GUA"},{"n":527,"t":"Recordad al Señor","c":"Al Cordero, sea la alabanza, la honra, la gloria y el poder. Apocalipsis 5:13\n1.          Recordad al Señor, bendecid\nsu santo nombre; celebremos su gloria\ny amor. Fue levantado en la cruz,\ndió su vida por nosotros;\nRecordemos al Salvador Jesús.\n2.      Alabad al Señor, y cantad su santo\nnombre; celebremos su gloria y honor;\nSi no cantamos al Señor, aun las rocas\ncantar’an; Alabemos al Salvador Jesús.\nLETRA y MUSICA: Reba Rambo Gardner, 1977,\ntrad. Sonia Andrea Linares M. © 1977 Benson. Usado con permiso.\n3.          Exaltad al Señor, y honrad su santo\nnombre; celebremos su gloria con fervor;\nEn esta cena del Señor, en memoria del Cordero,\nde su sangre, su cuerpo y su amor.\n4.        Demostrad su amor, y hacedlo en su\nnombre, ante el mundo unidos en amor;\nEn testimonio de la luz, como fieles\nseguidores estrechemos los lazos del amor.\nLETRA y MUSICA: Reba Rambo Gardner, 1977,\ntrad. Sonia Andrea Linares M. © 1977 Benson. Usado con permiso."},{"n":528,"t":"Siervos de Jesús","c":"Si la trompeta diere sonido incierto, Àquién se preparará? 1 Corintios 14:8\n¥1.             Siervos de Jesús, hombres de verdad,\nGuardas del deber, somos, s’.\nLibres de maldad, ricos en bondad,\nFieles en la lid seremos, s’.\nCoro:            ¡Firmes! ¡Fuertes! Alcen la bandera,\nGrande, noble emblema del Señor. *\n¡Prontos! ¡Bravos! Pasen la consigna:\nMarchen, todos, vamos a vencer.\n* orig. deber\nLETRA y MUSICA: William F. Sherwin, 1869, es trad.\nCoro:         ¡Firmes! ¡Fuertes! Alcen la bandera,\nGrande, noble emblema del Señor. *\n¡Prontos! ¡Bravos! Pasen la consigna:\nMarchen, todos, vamos a vencer.\n2.             Nuestro Capitán es ya vencedor,\nél nos redimió por su cruz.\nGuardas del deber, él nos da poder,\ny nos guiará hasta la luz.\n¥3.              Invencibles son los que con afán\ncada d’a van al deber.\nTriunfos obtendrán y recibirán\nmagno galardón del Redentor.\n* orig. deber.\nLETRA y MUSICA: William F. Sherwin, 1869, es trad."},{"n":529,"t":"A ti, oh Señor","c":"A ti he elevado mi alma. Salmo 143:8\n// A ti, oh Señor*,\nlevantaré mi alma;\nA ti, oh, Señor*,\nlevantaré mi alma;\nDios m’o, en ti conf’o;\nno sea avergonzado,\nno se alegren de m’ mis\nenemigos. //\n*Jehová"},{"n":530,"t":"Fe la victoria es","c":"Dios... nos da la victoria por medio de nuestro Señor Jesucristo. 1 Corintios 15:57\n¥1.           Soldados del Señor Jesús,\nvalientes hoy luchad;\nConstantes, mientras haya luz las armas empuñad.\nAl enemigo combatid con fuerza y no temáis,\nPues la victoria en la lid por fe la obtendréis.\nCoro:     Fe la victoria es, (Fe la victoria es,)\nfe la victoria es; (fe la victoria es;)\nFe nuestra victoria es,\nque al mundo vencerá.\nadapt. Esteban Sywulka B. MUSICA: Ira D. Sankey, 1891.\nTrad. © 1962, ren. 1990 Lillenas Publishing Co. Usado con permiso.\nCoro:        Fe la victoria es, (Fe la victoria es,)\nfe la victoria es; (fe la victoria es;)\nFe nuestra victoria es, que al mundo vencerá.\n¥2. Con la bandera de su amor y espada de verdad\nSeguimos fiel al Salvador, quien triunfos nos dará.\nMarchamos tras los santos que luchando contra el mal\nLo derrotaron por la fe, y en gloria hoy están.\n¥3.  Al que venciere, el Señor de blanco vestirá;\nSu nombre ante el Padre Dios, Jesús confesará.\nLas alabanzas del gran Rey su pueblo cantará\nPor siglos mil, pues por la fe, victoria siempre da.\nadapt. Esteban Sywulka B. MUSICA: Ira D. Sankey, 1891.\nTrad. © 1962, ren. 1990 Lillenas Publishing Co. Usado con permiso."},{"n":531,"t":"Soldados de Dios","c":"Por lo demás, fortaleceos en el Señor y en el poder\nde su fuerza. Vest’os de toda la armadura de Dios,\npara que podáis hacer frente a las intrigas del diablo;\nPorque nuestra lucha no es contra sangre ni carne,\nsino contra principados, contra autoridades, contra\nlos gobernantes de estas tinieblas, contra esp’ritus\nde maldad en los lugares celestiales.\nPor esta causa, tomad toda la armadura de Dios,\npara que podáis resistir en el d’a malo, y después\nde haberlo logrado todo, quedar firmes.\nEfesios 6:10-15, 17-18a; Romanos 13:12-14 (RVA)\nPermaneced, pues, firmes, ceñidos con el\ncinturón de la verdad, vestidos con la coraza\nde justicia y calzados vuestros pies con la\npreparación para proclamar el evangelio de paz.\nTomad también el casco de la salvación y la espada del\nEsp’ritu, que es la palabra de Dios, orando en\ntodo tiempo.\nDespojémonos, pues, de las obras de las\ntinieblas y vistámonos con las armas de la luz.\nEfesios 6:10-15, 17-18a; Romanos 13:12-14 (RVA)\nAndemos decentemente, como de d’a; no con\nglotoner’as y borracheras, ni en pecados sexuales\ny desenfrenos, ni en peleas y envidia.\nMás bien, vest’os del Señor Jesucristo,\ny no hagáis provisión para satisfacer los\nmalos deseos de la carne.\nEfesios 6:10-15, 17-18a; Romanos 13:12-14 (RVA)"},{"n":532,"t":"¡A Combatir!","c":"Tenemos lucha contra... huestes espirituales de maldad. Efesios 6:12\nSi b (Capo 1 - La)                                                           Con vigor\n¥1.       ¡A combatir! resuena la guerrera voz\ndel buen Jesús, que hoy llamando está;\nSin desmayar seguidle siempre con valor,\ny la victoria plena os dará.\nCoro:          ¡A la batalla, oh cristiano!\ncon el escudo de la cruz;\nSé buen soldado, pues a tu lado está el pr’ncipe Jesús.\nEl con su gracia te sostiene, y con potencia sin igual\nSu brazo extiende y te defiende\nen esta lucha contra el mal.\nLETRA y MUSICA: Lelia N. Morris, 1905, trad. Enrique S. Turrall.\nCoro: ¡A la batalla, oh cristiano! con el escudo de la cruz;\nSé buen soldado, pues a tu lado está el pr’ncipe Jesús.\nEl con su gracia te sostiene, y con potencia sin igual\nSu brazo extiende y te defiende\nen esta lucha contra el mal.\n¥2.    ¡A combatir! nos llama nuestro Salvador;\nSalid, luchad con nuestro Capitán;\nEn la constante lid, seguid sin vacilar\ny venceréis las huestes de Satán.\n¥3.    Al Rey de reyes, nuestro Salvador Jesús,\nHonor y gloria todos tributad,\nPues ya los suyos gozan de su plenitud\ny pronto reinará la santidad.\nLETRA y MUSICA: Lelia N. Morris, 1905, trad. Enrique S. Turrall."},{"n":533,"t":"Estad por Cristo firmes","c":"As’ que, hermanos m’os amados, estad firmes y constantes. 1 Corintios 15:58\nSi b (Capo 1 - La)                                                       Con brillo\n¥1.   ¡Estad por Cristo firmes, soldados de la cruz!\nAlzad hoy la bandera, en nombre de Jesús.\nEs vuestra la victoria, con él por Capitán;\nPor él serán vencidas las huestes de Satán.\n¥2.    ¡Estad por Cristo firmes! os llama él a la lid;\n¡Con él, pues, a la lucha, soldados todos id!\nProbad que sois valientes,\nluchando contra el mal;\nEs fuerte el enemigo, mas Cristo es sin igual.\nJaime C. Clifford. MUSICA: George J. Webb, 1837.\n¥3.            ¡Estad por Cristo firmes!\nlas fuerzas vienen de él;\nEl brazo de los hombres es débil y es infiel.\nVest’os la armadura, velad en oración;\nDeberes y peligros demandan gran tesón.\nJaime C. Clifford. MUSICA: George J. Webb, 1837."},{"n":534,"t":"Adelante con valor","c":"Has dado... bandera que alcen por causa de la verdad. Salmo 60:4\n1.      Cual pendón hermoso despleguemos hoy\ndel soldado de Jesús.\nCoro:                ¡Adelante, adelante!\nen pos de nuestro Salvador.\nNos da gozo y paz nuestro Rey,\n¡Adelante con valor!\nCoro:             ¡Adelante, adelante!\nen pos de nuestro Salvador.\nNos da gozo y paz nuestro Rey,\n¡Adelante con valor!\n2.      En el mundo proclamemos con fervor\nesta historia de la cruz;\nBendigamos sin cesar al Redentor,\nquien nos trajo paz y luz.\n3.         En el cielo nuestro cántico será\nalabanzas a Jesús;\nNuestro corazón all’ rebosará\nde amor y gratitud."},{"n":535,"t":"¡Gloria, gloria, aleluya!","c":"En todas estas cosas somos más que vencedores. Romanos 8:37\nSi b (Capo 1 - La)                                                        Con entusiasmo\n1. Es el Dios de los ejércitos en quien yo confiaré;\ny con c’mbalos de gozo al Señor ensalzaré.\nEl despide los relámpagos, mas nunca temeré;\nél es mi Protector.\nCoro:                    ¡Gloria, gloria, aleluya!\n¡Gloria, gloria, aleluya!\n¡Gloria, gloria, aleluya!\nA Cristo doy loor.\nRoberto C. Savage, 1956. MUSICA: Melod’a americana, s. 19.\nCoro:              ¡Gloria, gloria, aleluya!\n¡Gloria, gloria, aleluya!\n¡Gloria, gloria, aleluya!\nA Cristo doy loor.\n2.       Con ejército no gana sus victorias el Señor;\nni con armas lucha contra Satanás, el Tentador.\nes lo que vencerá.\n3.       En Belén de Palestina el Señor Jesús nació,\ny después de treinta años, en la cruenta cruz murió.\nPero vive para siempre, pues la tumba ya venció;\nsu nombre alabaré.\nRoberto C. Savage, 1956. MUSICA: Melod’a americana, s. 19."},{"n":536,"t":"Resurrección","c":"Tras la noche tenebrosa\nY el rugir del vendaval,\nTiende el alba majestuosa\nCortinaje de cristal;\nY aparece un claro d’a\nSin las brumas del dolor,\nDonde el ama se extas’a\nY se goza el puro amor.\nTras la nota vespertina\nQue oprimiera el corazón.\nViene aquella matutina\nQue se alarga en fiel canción.\nArturo Borja Anderson, 1966                      GUA\nEsta letra se puede cantar con la música de #393 (A los pies).\nCual la ninfa misteriosa\nQue en su tumba se guardó,\nY en brillante mariposa\nCon el tiempo se tornó,\nTal aquel que duerme en Cristo,\nDe su sueño al despertar,\nCon ropaje nunca visto,\nLo veréis resucitar.\nY la tienda que aprisiona\nCual gusano en vil zurrón,\nCon poder se desmorona,\nÀQué es, o muerte, tu aguijón?\nArturo Borja Anderson, 1966                        GUA\nEsta letra se puede cantar con la música de #393 (A los pies)."},{"n":537,"t":"La segunda venida de Cristo","c":"Tampoco queremos, hermanos, que ignoréis acerca\nde los que duermen, para que no os entristezcáis\ncomo los otros que no tienen esperanza.\nPorque si creemos que Jesús murió\ny resucitó, as’ también traerá Dios con\nJesús a los que durmieron en él.\nPor lo cual os decimos esto en palabra del Señor:\nque nosotros que vivimos, que habremos quedado\nhasta la venida del Señor, no precederemos a los\nque durmieron.\n1 Tesalonicenses 4: 13-18. 2 Timoteo 4:7-8 (RVR)\nPorque el Señor mismo con voz de mando,\ncon voz de arcángel, y con trompeta de\nDios, descenderá del cielo; y los muertos\nen Cristo resucitarán primero.\nLuego nosotros los que vivimos, los que hayamos\nquedado, seremos arrebatados juntamente con\nellos en las nubes para recibir al Señor en el aire,\nY as’ estaremos siempre con el Señor. Por\ntanto, alentaos los unos a los otros con estas\npalabras.\n1 Tesalonicenses 4: 13-18. 2 Timoteo 4:7-8 (RVR)\nHe peleado la buena batalla, he acabado la carrera,\nhe guardado la fe.\nPor lo demás, me está guardada la corona\nde justicia, la cual me dará el Señor, juez\njusto, en aquel d’a; y no sólo a m’, sino\ntambién a todos los que aman su venida.\n1 Tesalonicenses 4: 13-18. 2 Timoteo 4:7-8 (RVR)"},{"n":538,"t":"ÀSoy yo soldado de Jesús?","c":"Velad, estad firmes en la fe; portaos varonilmente, y esforzaos. 1 Corintios 16:13\n1.   ÀSoy yo soldado de Jesús y siervo del Señor?\nNo temeré llevar su cruz,\nsufriendo por su amor.\nCoro:      Después de la batalla nos coronará,\nDios nos coronará,\nDios nos coronará;\nDespués de la batalla\nnos coronará\nEn aquella santa Sion.\ndescon., trad. H.C. Ball. MUSICA: Melod’a inglesa, s. 19.\nCoro:     Después de la batalla nos coronará,\nDios nos coronará, Dios nos coronará;\nDespués de la batalla\nnos coronará\nEn aquella santa Sion.\n2.   Lucharon otros por la fe; valiente anhelo ser.\nPor mi Señor yo pelearé,\nconfiando en su poder.\n3.   Es menester que sea fiel, que nunca vuelva atrás,\nQue siga siempre en pos de él,\ny me guiará en paz.\ndescon., trad. H.C. Ball. MUSICA: Melod’a inglesa, s. 19."},{"n":539,"t":"Firmes y adelante","c":"Pelea la buena batalla de la fe. 1 Timoteo 6:12\n1.          Firmes y adelante, huestes de la fe,\nsin temor alguno, que Jesús nos ve.\nJefe soberano, Cristo al frente va,\ny la regia enseña tremolando está.\nCoro:        Firmes y adelante, huestes de la fe,\nSin temor alguno, que Jesús nos ve. (Amén)\n2.        Al sagrado nombre de nuestro Adalid,\nTiembla el enemigo y huye de la lid.\nNuestra es la victoria, dad a Dios loor;\nY óigalo el averno lleno de pavor.\nArthur S. Sullivan, 1871, contramelod’a F.B.J..\nCoro:       Firmes y adelante, huestes de la fe,\nSin temor alguno, que Jesús nos ve. (Amén)\n3.         Muévese potente la Iglesia de Dios;\nDe los ya gloriosos marchamos en pos;\nSomos sólo un cuerpo, y uno es el Señor,\nUna la esperanza, y uno nuestro amor.\n4.        Tronos y coronas pueden perecer;\nDe Jesús la Iglesia constante ha de ser;\nNada en contra suya prevalecerá,\nPorque la promesa nunca faltará.\nArthur S. Sullivan, 1871, contramelod’a F.B.J.."},{"n":540,"t":"Sale a la lucha","c":"1.         Sale a la lucha el Salvador,\ncorona a conquistar;\nSu insignia luce por doquier,\nflamante al frente va;\n2.         Su cáliz Àquién lo beberá\ntriunfando del dolor?\nAquel que lleva aqu’ su cruz\ndel Cristo es seguidor.\nReginald Heber, 1827\ntrad. G. P. Simmonds\nEsta letra se puede cantar con la música de #36 (Oh Dios)."},{"n":541,"t":"A la victoria Jesús nos llama","c":"En el mundo tendréis aflicción; pero confiad, he vencido al mundo. Juan 16:33\n1.       A la victoria Jesús nos llama,\nva con nosotros el Capitán;\n// Marchemos, pues, a combatir\na los ejércitos de Satán. //\n2.        A la victoria Jesús nos llama,\nnos llama a todos los de su grey;\n// Hay que triunfar contra el mal,\nque con nosotros va nuestro Rey. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. Roberto C. Savage.       GUA\n3.    A la victoria Jesús nos llama,\nsin detenernos, sin ir atrás,\n// Hasta triunfar, hasta vencer\nlas fieras huestes de Satanás. //\n4.    A la victoria Jesús nos llama,\nya los clarines sonando están,\n// Pues al vencer contra el mal,\nlos mismos cielos se alegrarán. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. Roberto C. Savage."},{"n":542,"t":"Cristo nuestro Jefe","c":"Yo soy el Alfa y la Omega... el Todopoderoso. Apocalipsis 1:8\n1.      Cristo, nuestro Jefe, nos lleva a la lid;\nNunca temeremos si él nos dice, ÒIdÓ.\nAún su justa causa se suele ignorar,\nmas le seguiremos fiel.\nCoro:          Adelante es la orden del Señor;\nAdelante vamos sin temor.\nÒAdelanteÓ canta ya su grey;\nCoro:        Adelante es la orden del Señor;\nAdelante vamos sin temor.\nÒAdelanteÓ canta ya su grey;\n2.       Nuestro estandarte luce por doquier,\nCon poder y gloria siempre se ha de ver.\nCristo nuestro Jefe al mundo ya venció\nY le seguiremos fiel.\n3.         La furiosa lucha larga no será,\nY a los vencedores nos congregará,\nDonde cantaremos un himno triunfal;\nS’, le seguiremos fiel."},{"n":543,"t":"Ya Cristo viene","c":"Ciertamente vengo en breve. Amén; sí, ven, Señor Jesús. Apocalipsis 22:20\n1.         Ya Cristo viene, lo prometió;\nCumplido el tiempo vendrá otra vez.\nLos corazones se turban hoy;\nCreed en Dios, confiad en él.\nCoro:     // “¡Jesús amado, ven pronto, ven!”\nClamaba Juan, y yo también; //\n2.      El mundo en crisis se encuentra hoy;\nPleitos y guerras, señales son.\nFalsos maestros abundan hoy;\nEl Salvador pronto vendrá.\nLETRA y MUSICA: Alejandro M. Montes, 1975, arreg. F.B.J.                    BOL"},{"n":544,"t":"La venida de Cristo","c":"Cuando estas cosas comiencen a suceder...vuestra redención está cerca. Lucas 21:28\n1.                   La venida de Cristo se acerca;\nPronto viene su Iglesia a buscar.\nNo durmamos, estemos alerta;\n¡Vigilad, vigilad, vigilad!\nCoro:                 Pronto viene Jesús y nos lleva\nA la hermosa mansión celestial.\nPronto viene Jesús por su Iglesia;\nNos iremos con él a morar.\n2.              Ya queremos que Cristo nos lleve\nA los cielos con él a morar.\nNo seamos jamás negligentes;\n¡Trabajad, trabajad, trabajad!                                                                   PAN\nCoro:     Pronto viene Jesús y nos lleva\nA la hermosa mansión celestial.\nPronto viene Jesús por su Iglesia;\nNos iremos con él a morar.\n3.       Arreglemos, estemos a cuentas\nCon Jesús, el Cordero de Dios.\nDel que ofende tengamos clemencia;\n¡Perdonad, perdonad, perdonad!\n4.      Perdonando, Jesús nos perdona,\nY nos lleva con él a reinar.\nGanaremos también la corona;\n¡Vigilad, trabajad, perdonad!"},{"n":545,"t":"Viene otra vez","c":"Entonces verán al Hijo del Hombre que vendrá en una nube. Lucas 21:27\nSi b (Capo 1 - La)                                                                   Con gozo\n1. Notas alegres cantad, Y con fervor proclamad\nEsta gloriosa verdad: Cristo muy pronto vendrá.\nCoro:            Viene otra vez, viene otra vez,\nTal vez al amanecer, O tal vez al anochecer.\nViene otra vez, viene otra vez,\nDía glorioso será para mí; Al mundo viene otra vez.\n2.       Pena y dolor pasarán, Y se regocijarán\nTodos los que en Cristo están,\nCuando regrese el Señor.\nLETRA y MUSICA: John W. Peterson, 1957, trad.\nRoberto C. Savage. © 1957, ren. 1985 John W. Peterson. Usado con permiso."},{"n":546,"t":"Un día Cristo volverá","c":"Este mismo Jesús... vendrá como le habéis visto ir al cielo. Hechos 1:11\n1.     Un día Cristo volverá; Es la promesa del Señor;\nTal como fue así vendrá,\nY su pueblo ha de ver al Salvador.\nCoro:           Muy pronto, sí, Jesús vendrá,\ny alegre le verá su pueblo.\n¡Velad! ¡Orad! el Rey vendrá,\nlos suyos arrebatará.        (arrebatará.)\n2.               Los mensajeros del Señor\nAnuncian que Jesús vendrá; Señales hay alrededor;\nEl vendrá y a los suyos llevará.\nLydia Kamekeha Liliuokalani Kalakaua, 1878, arreg. Thoro Harris, 1916.\nCoro:           Muy pronto, sí, Jesús vendrá,\ny alegre le verá su pueblo.\n¡Velad! ¡Orad! el Rey vendrá,\nlos suyos arrebatará.        (arrebatará.)\n3.             En busca de su grey vendrá,\nCon toda gloria y honor; Su Iglesia esperando está,\nY aclamará con gozo a su Señor.\n4.              ¡Oh bienvenido, Rey Jesús!\nTus hijos te esperan ya;\nMuy pronto han de ver la luz\nY gozar en tu presencia siempre allá.\nLydia Kamekeha Liliuokalani Kalakaua, 1878, arreg. Thoro Harris, 1916."},{"n":547,"t":"El cielo y la tierra pasarán","c":"El cielo y la tierra pasarán, pero mis palabras no pasarán. Mateo 24:35\nCoro:    El cielo y la tierra pasarán, sí, pasarán;\nEl cielo y la tierra pasarán, sí, pasarán;\nEl cielo y la tierra pasarán, sí, pasarán;\nPero mis palabras no, no pasarán.\n(Contramelodía) // El cielo y la tierra pasarán; //\nPero mis palabras no, no pasarán.\n1.       Nadie sabe la hora cuando él vendrá;\nDe repente con gloria Cristo llegará.\n¡Mirad! ¡Mirad! ¡Mirad!\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:      El cielo y la tierra pasarán, sí, pasarán;\nEl cielo y la tierra pasarán, sí, pasarán;\nEl cielo y la tierra pasarán, sí, pasarán;\nPero mis palabras no, no pasarán.\n(Contramelodía) // El cielo y la tierra pasarán; //\nPero mis palabras no, no pasarán.\n2.       Cristo como un hombre pronto a viajar,\nEntregó a sus siervos toda autoridad.\n¡Velad! ¡Velad! ¡Velad!\n3.               Con poder y con gloria aparecerá,\nY los suyos al cielo Cristo llevará.\n¡Orad! ¡Orad! ¡Orad!\nMEX\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":548,"t":"El Rey ya viene","c":"El que da testimonio dice: Ciertamente vengo en breve. Apocalipsis 22:20\nSi b (capo 1 - La)                                                                     Con vigor\n¡Oh, el Rey ya viene,\nel Rey ya viene!\nSonará la gran trompeta,\ny su rostro yo veré;\n¡Oh, el Rey ya viene,\nel Rey ya viene!\n¡Gloria a Dios!\n¡El viene por mí!\nLETRA y MUSICA: William y Gloria Gaither, 1970,\ntrad. Sid D. Guillén, alt. © 1970 William J. Gaither. Usado con permiso."},{"n":549,"t":"La mañana gloriosa","c":"Aguardando la manifestación gloriosa de nuestro gran Dios y Salvador. Tito 2:13\n1.                Cuán gloriosa será la mañana,\ncuando venga Jesús el Salvador;\nLos creyentes unidos como hermanos,\nbienvenida daremos al Señor.\nCoro:       No habrá necesidad de la luz el resplandor,\nni el sol dará su luz, ni tampoco su calor;\nAllí llanto no habrá, ni tristeza, ni dolor,\nPorque entonces Jesús el Rey del cielo\npara siempre será Consolador.\nL.A.\nCoro: No habrá necesidad de la luz el resplandor,\nni el sol dará su luz, ni tampoco su calor;\nAllí llanto no habrá, ni tristeza, ni dolor,\nPorque entonces Jesús el Rey del cielo\npara siempre será Consolador.\n2.            Esperamos la mañana gloriosa\npara dar la bienvenida al Dios de amor,\nDonde todo será color de rosa\nen la santa fragancia del Señor.\n3.                    El cristiano fiel y verdadero\ny también el obrero de valor\nY la Iglesia, esposa del Cordero,\nestarán en los brazos del Señor.                                                                  L.A."},{"n":550,"t":"Con las nubes viene Cristo","c":"He aquí que viene con las nubes, y todo ojo le verá. Apocalipsis 1:7\nSi b (Capo 1 - La)                                                                Con ánimo\n1.             Con las nubes viene Cristo,\nel que en la cruz murió;\nSantos miles le alaban, quien la muerte conquistó.\n¡Aleluya! ¡Aleluya! Sobre todo ya triunfó.\n2.    Todos le verán, glorioso, ataviado en majestad,\nY los que le rechazaron en su incredulidad\nCon gran llanto,\ncon gran llanto al Mesías mirarán.\nSywulka B. MUSICA: Henry T. Smart, 1867. Trad. © 1992 Celebremos/Libros\n3.   En su cuerpo ya glorioso las heridas llevará,\nQue su excelso sacrificio en la cruz recordarán,\nY con gozo,\ny con gozo su Iglesia las verá.\n4.   Toda la creación se postre a tus pies para adorar;\nDe poder, dominio y gloria, Cristo, eres digno ya.\n¡Aleluya! ¡Aleluya!\n¡Oh, ven pronto a reinar!\nSywulka B. MUSICA: Henry T. Smart, 1867. Trad. © 1992 Celebremos/Libros"},{"n":551,"t":"Cuando anuncie el arcángel","c":"Porque el Señor mismo... con voz de arcángel... descenderá del cielo. 1 Tesalonicenses 4:16\n1.              Cuando anuncie el arcángel\nque más tiempo no habrá\nY aclare esplendoroso el día final;\nCuando todos los salvados se congreguen ante Dios,\nEntre ellos yo también tendré lugar.\nCoro:            /// Cuando allá se pase lista, ///\nA mi nombre yo feliz responderé.\n(Cuando allá se pase lista, yo estaré,\ncuando allá se pase lista, yo estaré,\ncuando allá se pase lista,\na mi nombre yo feliz responderé.)\nLETRA y MUSICA:       James M. Black, 1893, es trad.\nCoro:         /// Cuando allá se pase lista, ///\nA mi nombre yo feliz responderé.\n(Cuando allá se pase lista, yo estaré,\ncuando allá se pase lista, yo estaré,\ncuando allá se pase lista,\na mi nombre yo feliz responderé.)\n2.                  Resucitarán gloriosos\nlos que han muerto en Jesús,\nLas delicias del Paraíso a gozar,\nY triunfantes entrarán en las mansiones de la luz;\nPara mí, también habrá un dulce hogar.\nLETRA y MUSICA:   James M. Black, 1893, es trad.\nCoro:          /// Cuando allá se pase lista, ///\nA mi nombre yo feliz responderé.\n(Cuando allá se pase lista, yo estaré,\ncuando allá se pase lista, yo estaré,\ncuando allá se pase lista,\na mi nombre yo feliz responderé.)\n3.   Trabajemos para Cristo anunciando su amor,\nMientras dure nuestra vida terrenal,\nY al fin de la jornada, con los salvos por Jesús,\nEntraremos en la patria celestial.\nLETRA y MUSICA:   James M. Black, 1893, es trad."},{"n":552,"t":"El poder del Espíritu","c":"El Dios de paz que resucitó... a nuestro Señor... os haga aptos. Hebreos 13:20-21\nSi el poder del Espíritu que a Cristo levantó\nmora en mí, (mora en mí),\nmora en mí (mora en mí).\nSi el poder del Espíritu que a Cristo levantó\nmora en mí (mora en mí),\nmora en mí (mora en mí),\nVivificará mi cuerpo el Espíritu de Dios.\n(el Espíritu de Dios, de Dios).\nVivificará mi cuerpo el Espíritu de Dios.\n(el Espíritu de Dios).\nCompositor descon., Mexico, s. 20, arreg. F.B.J. Arreg."},{"n":553,"t":"Muy cercano está el día","c":"Cercano está el día de Jehová sobre todas las naciones. Abdías v. 15\n1.                Muy cercano está el día\ncuando volverá Jesús,\nCon la majestad y gloria que le dio su Padre Dios;\nDe sus santos rodeados en la nube bajará;\nYa de Cristo es el reinado y el pecado quitará.\nCoro:           Ven, Señor Jesús, ven pronto,\nclaman todos con ardor;\n“He aquí yo vengo presto, presto”, dice el Salvador.\nVida Cristiana, 1939. MUSICA: Philip P. Bliss, 1874.                 L.A.\nCoro:           Ven, Señor Jesús, ven pronto,\nclaman todos con ardor;\n“He aquí yo vengo presto, presto”, dice el Salvador.\n2.      Su venida, victoriosa, librará la humanidad\nDe Satán, autor inicuo de su gran calamidad;\nCesarán todos los males por el reino de Jesús;\n¡Alegraos, oh mortales! ¡Ved el triunfo de su cruz!\n3.     ¡Cuánto anhelan y desean la venida de Jesús\nLos creyentes redimidos por la obra de su cruz!\n“Ven y siéntate conmigo en mi trono”, el Rey dirá:\n“Has sufrido y has vencido; de mi gloria goza ya”.\nVida Cristiana, 1939. MUSICA: Philip P. Bliss, 1874."},{"n":554,"t":"Cristo viene otra vez","c":"He aquí que viene con las nubes, y todo ojo le verá. Apocalipsis 1:7\nCanon a 3 voces\n1.        Es mi Salvador eterno,\nCristo viene otra vez;\n Es mi Salvador eterno,\nCristo viene otra vez.\n Viene, viene, viene otra vez.\nKenneth R. Hanna. MUSICA: En The Diapason, 1860, arreg.\nGerald S. Henderson. Arreg. © 1986 Word Music. Usado con permiso.\n2.   Con el son de la trompeta,\nCristo viene otra vez;\nCon el son de la trompeta,\nCristo viene otra vez.\nViene, viene, viene otra vez.\n3.     Y seremos como él es,\nCristo viene otra vez;\nY seremos como él es,\nCristo viene otra vez.\nViene, viene, viene otra vez.\nKenneth R. Hanna. MUSICA: En The Diapason, 1860, arreg.\nGerald S. Henderson. Arreg. © 1986 Word Music. Usado con permiso."},{"n":555,"t":"Le Veremos","c":"Seremos semejantes a él, porque le veremos tal como él es. 1 Juan 3:2\n1.      Los cielos se abren con gloria indecible;\nLos astros aplauden en triunfante fulgor.\nDestellan las nubes luz indescriptible,\nY en gran majestad desciende el Señor.\nCoro:        ¡Vendrá Jesucristo y le veremos\ncara a cara en toda su gloria!\n¡Vendrá Jesucristo y le veremos\ncara a cara a Jesús, el Rey y Señor!\nLETRA y MUSICA: Dottie Rambo, 1980, trad. S. A.\nLinares M. y Esteban Sywulka B. © 1980 Benson. Usado con permiso.\nCoro:             ¡Vendrá Jesucristo y le veremos\ncara a cara en toda su gloria!\n¡Vendrá Jesucristo y le veremos\ncara a cara a Jesús, el Rey y Señor!\n( Final optativo) Juntos con el Señor, el gran Salvador.\n2.           Brillante esplendor rodeará su venida;\nEn ese instante Cristo nos reunirá.\nVeremos su rostro y nos llevará.\n3.       Con son de trompeta y gran voz de mando\nLos muertos en Cristo ya resucitarán;\nY los que vivimos, también transformados,\ncon él gozaremos vida eternal.\nLETRA y MUSICA: Dottie Rambo, 1980, trad. S. A. Linares M. y Esteban Sywulka B. © 1980 Benson. Usado con permiso."},{"n":556,"t":"En presencia estar de Cristo","c":"Ahora vemos por espejo... mas entonces veremos cara a cara. 1 Corintios 13:12\n•1.              En presencia estar de Cristo,\nver su rostro, ¡qué será,\nCuando al fin en pleno gozo\nCoro:            Cara a cara espero verle,\nmás allá del cielo azul;\nCara a cara en plena gloria he de ver a mi Jesús.\n2.                      Sólo tras oscuro velo\nhoy lo puedo aquí mirar,\nMás ya pronto viene el día\nque su gloria ha de mostrar.\nCoro:            Cara a cara espero verle,\nmás allá del cielo azul;\nCara a cara en plena gloria he de ver a mi Jesús.\n3.                 ¡Cuánto gozo habrá con Cristo\ncuando no haya más dolor,\nCuando cesen los peligros y\nya estemos en su amor!\n•4.                     Cara a cara,\n¡cuán glorioso ha de ser así vivir!\n¡Ver el rostro de quien quiso\nnuestras almas redimir!"},{"n":557,"t":"Yo sólo espero ese día","c":"Luego nosotros los que vivimos...seremos arrebatados... con ellos. 1 Tesalonicenses 4:17\n•1.   Yo sólo espero ese día cuando Cristo volverá,\nYo sólo espero ese día cuando Cristo reinará.\nAfán y todo trabajo para mí terminarán;\n// Cuando Cristo venga a su reino me llevará.//\n2.           Ya no me importa que el mundo\nme desprecie por doquier;\nYa no soy más de este mundo,\nsoy del reino celestial.\nYo sólo espero ese día cuando me levantaré\n// De la tumba fría con un cuerpo ya inmortal.//\n•3.     Entonces allí triunfante y victorioso estaré;\nA mi Señor Jesucristo cara a cara le veré.\nAllí no habrá más tristezas, ni aflicciones para mí;\n// Con los redimidos al Cordero alabaré. //\nL.A."},{"n":558,"t":"Pudiera bien ser","c":"Debéis vosotros andar en santa y piadosa manera de vivir. 2 Pedro 3:11\nSi b (Capo 1 - La)                                                               Con resolución\n1.     Pudiera bien ser cuando el día amanezca\nY el sol otra vez en el cielo aparezca\nQue al mundo ya resplandeciente\nde gloria, Jesús por los suyos vendrá.\nCoro:\n¿Cuándo, oh buen Salvador, Oiremos la grata canción?\n“¡Aleluya! ¡Cristo viene!\n¡Aleluya! Amén. ¡Aleluya! Amén”.\n2.    También puede ser que, cual orbe de día,\nFlamee la tarde o la noche sombría\nEn luz eternal, porque al mundo con gloria\nJesús por los suyos vendrá.\nCoro:\n¿Cuándo, oh buen Salvador, Oiremos la grata canción?\n“¡Aleluya! ¡Cristo viene!\n¡Aleluya! Amén. ¡Aleluya! Amén”.\n3.    Los santos del cielo descienden y cantan\nCon ángeles mil que al Señor acompañan,\nPues ya con poder, majestad y gran gloria\nJesús por los suyos vendrá.\n4.      Del mundo salir ¡Oh qué gozo sería!\nSin lágrimas, muerte, temor o agonía;\nAsí puede ser, pues al mundo con gloria\nJesús por los suyos vendrá."},{"n":559,"t":"Yo podré reconocerle","c":"Yo soy...el que vivo, y estuve muerto; mas he aquí que vivo por los siglos. Apocalipsis 1:17-18\n1. Cuando al fin se termine aquí mi vida terrenal,\nY el río oscuro tenga que cruzar,\nEn la otra ribera al Salvador conoceré;\nSu sonrisa bienvenida me dará.\nCoro: Yo podré reconocerle; (Yo podré reconocerle;)\nSus heridas allí contemplaré.\nBien podré (Bien podré) reconocerle\nCuando a Cristo en la gloria le veré.\nJohn R. Sweney, 1897. Trad. © 1978 Casa Bautista de Publicaciones. Usado con permiso.\nCoro:   Yo podré reconocerle; (Yo podré reconocerle;)\nSus heridas allí contemplaré.\nBien podré (Bien podré) reconocerle\nCuando a Cristo en la gloria le veré.\n2.    ¡Oh qué gozo será vivir allí con el Señor,\nY su rostro y hermosura contemplar!\nCon los santos gozosos en perfecta comunión\nLe adoraré por la eternidad.\n3.   Por los bellos portales me conducirá Jesús;\nNo habrá pecado, ni ningún dolor;\nGozaré con los suyos alabanzas entonar,\nMas primero quiero ver a mi Señor.\nJohn R. Sweney, 1897. Trad. © 1978 Casa Bautista de Publicaciones. Usado con permiso."},{"n":560,"t":"Roca de la eternidad","c":"Sé tú mi roca fuerte, y fortaleza para salvarme. Salmo 31:2\nSi b (Capo 1 - La)                                                            Con fervor\n1.    Roca de la eternidad, fuiste abierta tú por mí;\nSé mi escondedero fiel; sólo encuentro paz en ti,\nRico, limpio manantial, en el cual lavado fui.\n2. Aunque sea siempre fiel, aunque llore sin cesar,\nDel pecado no podré justificación lograr;\nSólo en ti teniendo fe, deuda tal podré pagar.\n3.    Mientras haya de vivir, y al instante de expirar,\nCuando vaya a responder en tu augusto tribunal,\nSé mi escondedero fiel, Roca de la eternidad."},{"n":561,"t":"El Señor de los cielos","c":"Has puesto tu gloria sobre los cielos. Salmo 8:1\n1.    Es Señor de los cielos, la tierra y el mar,\nde todo es Creador;\nEl Señor es del tiempo y la eternidad\ny de todo será el Señor.\nTe adoro y te alabo, mi Rey;\nTe adoro y te alabo, mi Rey;\nDe mi vida tú eres Señor,\nY Señor de señores serás.\n2.    Es el Rey de la historia, y la creación,\nRey soberano, triunfal;\nEs el Rey de la gloria, sublime, eternal,\nY el Rey de los reyes será.\nTe adoro y te alabo, mi Rey;\nTe adoro y te alabo, mi Rey;\nDe mi vida tú eres Señor,\nY el Rey de los reyes serás."},{"n":562,"t":"Soneto al Crucificado","c":"No me mueve, mi Dios, para quererte\nel cielo que me tienes prometido,\nni me mueve el infierno tan temido\npara dejar por eso de ofenderte.\nTú me mueves, Señor; muéveme el verte\nclavado en una cruz y escarnecido;\nmuéveme ver tu cuerpo tan herido;\nmuévenme tus afrentas y tu muerte.\nAtribuido a Miguel de Guevara, s. 17\nMuéveme, al fin, tu amor, y en tal manera,\nque aunque no hubiera cielo, yo te amara,\ny aunque no hubiera infierno, te temiera.\nNo me tienes que dar porque te quiera,\npues aunque lo que espero no esperara,\nlo mismo que te quiero te quisiera.\nAtribuido a Miguel de Guevara, s. 17"},{"n":563,"t":"La nueva Jerusalén","c":"Y me mostró la gran ciudad santa de Jerusalén. Apocalipsis 21:10\n1.              Hay un río que fluye sin cesar\nen la nueva Jerusalén;\nQue me habla de eterno bienestar\nen la nueva Jerusalén. Celeste es el manantial,\nPristino cual el cristal en la gran Ciudad de Dios.\n2.           Hay un árbol de vida sin igual\nen la nueva Jerusalén;\nCada mes da su fruto a raudal\nen la nueva Jerusalén. Sus hojas dan sanidad,\nA pueblos Dios da bondad en la gran Ciudad de Dios.\nBrasil, trad. Oscar López M. MUSICA: Melodía waiwai, arreg.\n3.            No tendremos la luna ni el sol\nen la nueva Jerusalén;\nMas la gloria de Dios en arrebol,\nen la nueva Jerusalén. Dolor no habrá allá,\nTampoco enfermedad en la gran Ciudad de Dios.\n4.             El Cordero un Libro tiene allí\nen la nueva Jerusalén;\nen la nueva Jerusalén. Inscrito mi nombre está,\nY nadie lo borrará en la gran Ciudad de Dios.\nBRA\nBrasil, trad. Oscar López M. MUSICA: Melodía waiwai, arreg."},{"n":564,"t":"Más allá del sol","c":"1.        Aunque en esta vida no tengo riquezas,\nSé que allá en la gloria tengo una mansión;\nCual alma perdida entre las pobrezas,\nDe mí, Jesucristo tuvo compasión.\nCoro:         // Más allá del sol, más allá del sol,\nYo tengo un hogar, hogar, bello hogar,\nmás allá del sol. //\nLETRA y MUSICA: Emiliano Ponce, 1940, arreg. Roberto C. Savage, alt.\n© 1950 División Interamericana. Usado con permiso.               MEX\nCoro:      // Más allá del sol, más allá del sol,\nYo tengo un hogar, hogar, bello hogar,\nmás allá del sol. //\n2.       Así por el mundo yo voy caminando,\nDe pruebas rodeado y de tentación;\nPero a mi lado viene, consolando,\n3.      A los pueblos todos del linaje humano\nCristo quiere darles plena salvación;\nTambién una casa para cada hermano\nFue a prepararles a la Santa Sion.\nLETRA y MUSICA: Emiliano Ponce, 1940, arreg. Roberto C. Savage, alt.     MEX\n© 1950 División Interamericana. Usado con permiso."},{"n":565,"t":"Bellas Mansiones","c":"Voy allá a prepararles un lugar. Juan 14:2 (NVI)\n1.      Mansión gloriosa tengo yo en el cielo,\nToda tristeza cambiará en consuelo,\nY en dulce canto el dolor y afán.\nCoro:   Bellas mansiones hay allá en la gloria;\nTendré en la mía el gozo sin par.\nSuenan las notas de la grata victoria;\nVoy pues con gozo a mi dulce hogar.\nLETRA y MUSICA: Ira F. Stanphill, 1949, trad. Francisco Liévano.\nCoro:   Bellas mansiones hay allá en la gloria;\nTendré en la mía el gozo sin par.\nSuenan las notas de la grata victoria;\nVoy pues con gozo a mi dulce hogar.\n2.       En este mundo predomina el llanto,\nSomos sujetos al dolor fatal.\nMás en el cielo cesará el quebranto\nY por los siglos nunca habrá más mal.\n3.      Amigo mío, cuánto anhelo yo verte\nLibre de penas y de turbación.\nA Jesucristo debes ya entregarte;\nTendrás también una bella mansión.\nLETRA y MUSICA: Ira F. Stanphill, 1949, trad. Francisco Liévano."},{"n":566,"t":"No se turbe vuestro corazón","c":"No se turbe vuestro corazón; creéis en Dios, creed también en mí. Juan 14:1\n//No se turbe vuestro corazón,//\nEn la casa de mi Padre muchas moradas hay;\nEn la casa de mi Padre muchas moradas hay.\nCreéis en Dios,\ncreed también en mí, Voy pues a preparar lugar\nPara vosotros, para vosotros, Un lugar para vosotros.\n//No se turbe vuestro corazón,//\nEn la casa de mi Padre muchas moradas hay;\nEn la casa de mi Padre muchas moradas hay.\nHON"},{"n":567,"t":"En la mansión do Cristo está","c":"No tiene necesidad de sol... porque el Cordero es su lumbrera. Apocalipsis 21:23\n•1.            En la mansión do Cristo está,\nallí no habrá tribulación,\nNingún dolor, ningún pesar,\nque me quebrante el corazón.\nCoro:            Allí no habrá tribulación,\nningún pesar, ningún dolor;\nFeliz será mi corazón en la presencia del Señor.\n2.                    Yo gozo cada día aquí\nsu protección y gran amor,\nPero es mejor estar allí\nen la presencia del Señor.\nCoro:            Allí no habrá tribulación,\nningún pesar, ningún dolor;\nFeliz será mi corazón en la presencia del Señor.\n•3.              Perfecto amor encontraré\ncon el Señor en su mansión;\nPerfecta paz allí tendré,\ncon mi Jesús en comunión.\n•4.                    Entonces, sí, yo gozaré\nde toda la felicidad,\nY ya con Cristo estaré\npor toda la eternidad."},{"n":568,"t":"Cuando mis luchas terminen","c":"Cuando él se manifieste, seremos semejantes a él. 1 Juan 3:2\n1.      Cuando mis luchas terminen aquí\nY ya seguro en los cielos esté,\nCuando al Señor yo contemple allí,\n¡Gloria por siempre será para mí!\nCoro:              ¡Esa será (¡Esa será)\ngloria sin fin, (gloria sin fin,)\nGloria sin fin, (Gloria sin fin,)\ngloria sin fin! (gloria sin fin!)\nCuando por gracia su faz pueda ver,\n* ¡Gloria por siempre por mí ha de ser!\nLETRA y MUSICA: Charles H. Gabriel, 1900, trad. Vicente Mendoza, alt.\nCoro:                      ¡Esa será (¡Esa será)\n/// gloria sin fin, (gloria sin fin,) //\nCuando por gracia su faz pueda ver,\n* ¡Gloria por siempre por mí ha de ser!\n•2.             Cuando por gracia yo pueda tener\nEn sus mansiones morada de paz,\nCuando por siempre su faz pueda ver,\n¡Gloria por siempre será para mí!\n•3.                 Gozo infinito será contemplar\nA los salvados que allí estarán,\nMas la presencia de Cristo gozar,\n¡Gloria por siempre será para mí!\n* Opt. Gloria sin fin para mi ha de ser\nLETRA y MUSICA: Charles H. Gabriel, 1900, trad. Vicente Mendoza, alt."},{"n":569,"t":"Victoria sobre la muerte","c":"Sabemos que si nuestra casa terrenal, esta tienda\ntemporal, se deshace, tenemos un edificio de parte\nde Dios, una casa no hecha de manos, eterna en\nlos cielos.\nAsí vivimos, confiando siempre y\ncomprendiendo que durante nuestra estancia\nen el cuerpo peregrinamos ausentes del Señor.\nPues confiamos y consideramos mejor estar\nausentes del cuerpo, y estar presentes delante\ndel Señor.\n2 Corintios 5:1, 6, 8, 9; Filipenses 3:21a; 1 Juan 3:2; 1 Corintios 15:20, 51-54, 57 (RVA)\nPor lo tanto, estemos presentes o ausentes,\nnuestro anhelo es serle agradables.\nEl transformará nuestro cuerpo de humillación\npara que tenga la misma forma de su cuerpo de\ngloria, según la operación de su poder.\nAmados, ahora somos hijos de Dios,\ny aún no se ha manifestado lo que seremos.\nPero sabemos que cuando él sea manifestado,\nseremos semejantes a él, porque le veremos\ntal como él es.\n2 Corintios 5:1, 6, 8, 9; Filipenses 3:21a; 1 Juan 3:2; 1 Corintios 15:20, 51-54, 57 (RVA)\nPero ahora, Cristo sí ha resucitado de entre\nlos muertos, como primicias de los que\ndurmieron.\nHe aquí, os digo un misterio: No todos dormiremos,\npero todos seremos transformados\nEn un instante, en un abrir y cerrar de ojos,\na la trompeta final.\nPorque sonará la trompeta, y los muertos serán\nresucitados sin corrupción; y nosotros seremos\ntransformados.\n2 Corintios 5:1, 6, 8, 9; Filipenses 3:21a; 1 Juan 3:2; 1 Corintios 15:20, 51-54, 57 (RVA)\nPorque es necesario que esto corruptible\nsea vestido de incorrupción, y que esto\nmortal sea vestido de inmortalidad.\nY cuando esto corruptible se vista de incorrupción\ny esto mortal se vista de inmortalidad, entonces\nse cumplirá la palabra que está escrita: ¡Sorbida\nes la muerte en victoria!\nPero gracias a Dios, quien nos da la victoria\npor medio de nuestro Señor Jesucristo.\n2 Corintios 5:1, 6, 8, 9; Filipenses 3:21a; 1 Juan 3:2; 1 Corintios 15:20, 51-54, 57 (RVA)"},{"n":570,"t":"Alabanzas dad a Cristo","c":"En tu presencia hay plenitud de gozo, delicias... para siempre. Salmo 16:11\nSi b (Capo 1 - La)                                                              Con ánimo\n1.    Alabanzas dad a Cristo, ensalzad al Redentor;\nTributadle, santos todos, grande gloria y loor.\nCoro:            Cuando estemos en gloria,\n(Cuando estemos en gloria,)\nEn presencia de nuestro Redentor,\n(en presencia de nuestro Redentor,)\nA una voz la historia\n(a una voz la historia)\nDiremos del gran Vencedor.\n(del gran, del gran Vencedor).\nCoro:        Cuando estemos en gloria,\n(Cuando estemos en gloria,)\nEn presencia de nuestro Redentor,\n(en presencia de nuestro Redentor,)\nA una voz la historia (a una voz la historia)\nDiremos del gran Vencedor. (del gran, del gran Vencedor).\n2.                 La victoria es segura\na las huestes del Señor;\n¡Oh, pelead con la mirada puesta en el Protector!\n3.      ¡Adelante en la lucha, oh soldados de la fe!\nPor su gracia triunfaremos,\n¡gloria a Cristo, nuestro Rey!"},{"n":571,"t":"REFLEXION:","c":"¡Oh, Cristo, Rey de reyes! Eres el Señor de la his-\ntoria. Por tu Palabra entiendo que todo lo que sucede\nforma parte de tu plan soberano, el cual culminará en\ntu triunfo, para alabanza de tu gloria.\nAntes sentía miedo al pensar en el futuro; pero\nahora que soy tuyo, gozo de paz y seguridad. Sé que\nal dejar esta vida terrenal, iré a estar contigo.\nAnhelo el día cuando vendrás para llevar a tu\nIglesia. Resucitarás a los creyentes que murieron y\ntransformarás a los vivos. Participaremos de tu victo-\nria cuando regreses a la tierra para establecer tu reino\nde paz y justicia.\nTú, Señor, me has librado del terrible castigo del\ninfierno y me has preparado un hogar eterno en la\nrefulgente ciudad celestial. Esta bendita esperanza\nme inspira a una vida de servicio y santidad.\nNo logro comprender totalmente el glorioso futuro\nque me espera, pero sé que te veré y gozaré de tu pre-\nsencia. Así como lo haré en aquel día, uno hoy mi voz\nal gran coro de los redimidos para celebrar tu gloria."},{"n":572,"t":"Cristo me ama","c":"Como el Padre me ha amado, as’ también yo os he amado. Juan 15:9\n1.    Cristo me ama, me ama a m’, su Palabra dice as’;\nNiños pueden ir a él, quien es nuestro amigo fiel.\nCoro:      S’, Cristo me ama; s’, Cristo me ama;\nS’, Cristo me ama; la Biblia dice as’.\n2.    Cristo me ama, él murió, y la gloria nos abrió;\nMis pecados borrará, me dará la entrada allá.\n3. Cristo me ama, es verdad, y me cuida en su bondad;\nCuando muera, bien lo sé, que al cielo yo iré."},{"n":573,"t":"Jesús me ama","c":"Tomó un niño, y lo puso junto a él. Lucas 9:47 (NVI)\n1.    Jesús me ama, vino a salvarme, Jesús me ama,\nmurió por m’; Por eso canto siempre,\nÒEl me ama, Jesús me ama, mi SalvadorÓ.\n2.      Yo era preso del vil pecado, yo era preso,\nmas me libró; Por eso canto siempre,\nÒEl me ama, Jesús me ama, mi SalvadorÓ.\n3.   Lo que merezco es el castigo, lo que merezco,\nJesús pagó; Por eso canto siempre,\nÒEl me ama, Jesús me ama, mi SalvadorÓ.\n4.        Ahora entrego mi vida y alma,\nahora entrego todo al Señor;\nPor eso canto siempre,\nÒEl me ama, Jesús me ama, mi SalvadorÓ."},{"n":574,"t":"Cristo me ama, esto sé","c":"Dejad a los niños venir...porque de los tales es el reino de los cielos. Mateo 19:14\nCanon a 5 voces\nÀ Cristo me ama, esto sé,\n¡ Y a la cruz, él mismo fue.\nÂ Su sangre dio, del pecado me libró,\nÃ Su sangre dio, del pecado me libró,\nÄ Y mi vida transformó.\nalemana. Letra © 1977 Musical Ministries, admin. Majesty Music. Usado con permiso."},{"n":575,"t":"Gozo me da la Palabra leer","c":"Fueron halladas tus palabras, y yo las com’; y...me fue por gozo. Jerem’as 15:16\n1.           Gozo me da la Palabra leer;\ncosas preciosas all’ puedo ver,\nY sobre todo, que el gran Redentor\nes de los niños el tierno Pastor.\nCoro:        Con alegr’a yo cantaré\nal Redentor, tierno Pastor,\nQue en el Calvario por m’ murió,\ns’, s’, por m’ murió.\nLETRA y MUSICA: Philip P. Bliss, 1874, es trad.\nCoro:        Con alegr’a yo cantaré\nal Redentor, tierno Pastor,\nQue en el Calvario por m’ murió,\ns’, s’, por m’ murió.\n2.      Me ama Jesús, pues por m’ él murió,\ny de su amor a los niños habló:\nÒDejad que vengan los niños a m’,\npara salvarlos mi sangre vert’Ó.\n3.      Si alguien pregunta que cómo lo sé;\nÒBusca a Jesús, pecadorÓ, le diré;\nÒPor su Palabra, que tienes aqu’,\npuedes saber que te ama a tiÓ.\nLETRA y MUSICA: Philip P. Bliss, 1874, es trad."},{"n":576,"t":"Dejad a los niños que vengan","c":"Dejad a los niños venir a m’, y no se los impidáis. Marcos 10:14\n1.         Ò¡Dejad a los niños que vengan!Ó\nles dijo el buen Salvador;\nCon manos de suma ternura los bendijo con amor.\n2.            Sus dones están aún latentes,\nbotones que quieren brotar;\nEsperan la luz de nosotros y el apoyo del hogar.\n3.               Mostremos ahora a ellos\nque todos poseen valor;\nJesús afirmó, ÒDe los tales es el reino del SeñorÓ.\nLETRA y MUSICA: Barbara Mink, 1987. © 1987 Barbara Mink. Usado con permiso."},{"n":577,"t":"Jesús bendice a los niños","c":"Fue al pie de unas palmeras.\nLas turbas silenciosas que no sienten fatiga,\ny olvidadas del pan, escuchan de los labios de Jesús\naltas cosas y ante el hondo misterio pensativas están...\nUnos niños levantan sus caritas de rosas;\nde los ojos divinos les atrae el imán;\nacercarse quisieran, más las manos rugosas\nde los viejos apóstoles se oponen a su afán.\nLuis Felipe Contardo, s. 20, alt.\nY Jesús dijo entonces; Ñ Dejadles, Ñ\ny risueños a Cristo presentaron los niños pequeños;\nÑDejadles que a m’ vengan e imitad su candor,\nsi queréis formar parte de mi reino bendito.\nEn seguida inclinóse hasta el más pequeñito,\ny lo besó, lo mismo que se besa una flor....\nLuis Felipe Contardo, s. 20, alt."},{"n":578,"t":"Acuérdate","c":"Acuérdate de tu Creador en los d’as de tu juventud. Eclesiastés 12:1\nAcuérdate de tu Creador\nen los d’as de tu juventud;\nAcuérdate de tu Creador en los d’as de tu juventud,\nCon calma\nAntes que vengan los d’as malos,\nY lleguen los años de los cuales digas:\nÒNo tengo en ellos contentamiento,\nNo tengo en ellos contentamientoÓ.\nCon alegr’a\nAcuérdate de tu Creador\nen los d’as de tu juventud;\nAcuérdate de tu Creador en los d’as de tu juventud.\nen Cánticos nuevos de la Biblia. Usado con permiso."},{"n":579,"t":"Corazones siempre alegres","c":"Te haré entender, y te enseñaré el camino en que debes andar. Salmo 32:8\n1. Corazones siempre alegres, rebosando gratitud,\nSomos los que a Dios amamos,\nredimida juventud.\nCoro:         Siempre alegres vamos todos,\nllenos de felicidad;\nHermos’simo el camino hacia la eternidad.\nHermos’simo el camino hacia la eternidad.\n2.   Dios nos gu’a de la mano, nos ampara su poder;\nEs su brazo poderoso\nque nos quiere defender.\ntrad. Conrado Ihlow. MUSICA: Victor Riveros S., 1973.            L.A.\n© 1973 Casa Bautista de Publicaciones. Usado con permiso.\nCoro:        Siempre alegres vamos todos,\nllenos de felicidad;\nHermos’simo el camino hacia la eternidad.\nHermos’simo el camino hacia la eternidad.\n3.              Si nos viera desmayados\nen nuestra debilidad,\nCon su gracia nos anima,\nnos levanta su bondad.\n4.             En sus fuerzas llevaremos\naun con gozo nuestra cruz;\nLuego con él cantaremos\nen la gloria de su luz.\ntrad. Conrado Ihlow. MUSICA: Victor Riveros S., 1973.\n© 1973 Casa Bautista de Publicaciones. Usado con permiso."},{"n":580,"t":"Quinceañera Feliz","c":"Añadid a vuestra fe virtud; a la virtud conocimiento. 2 Pedro 1:5\nEstrofa:     Quince años Dios te concede\nen este mundo vivir\nY guardarte siempre quiere, oh quinceañera feliz;\nDale a Cristo la gloria por tu feliz existir,\nNunca desprecies su gracia;\nquiérele siempre servir.\nCoro:         Gózate hoy, quinceañera feliz;\ndale al Señor tu vida y corazón;\nY vivirás bajo su fiel protección,\nY en cada paso que das tú tendrás gran bendición."},{"n":581,"t":"Oración de un joven","c":"Lo que soy y lo que puedo yo lo debo a mi Señor\nY a sus pies postrado quedo, asombrado de su amor.\nLejos, pues de m’ gloriarme, ni de bienes ni de talento.\nNo me es dado el ensalzarme sino en el madero cruento.\nTodo es tuyo, oh Dios m’o, nada puede en m’ valer,\nDueño eres de mi albedr’o, toma, s’, mi entero ser.\nArturo Borja A., 1966\nGUA"},{"n":582,"t":"Proclamad, juventud redimida","c":"Sigue la justicia, la fe, el amor y la paz. 2 Timoteo 2:22\nCon energ’a\n1.       Proclamad, juventud redimida,\nel glorioso evangelio de amor,\nque transforma del hombre la vida,\nproveyéndole vida mejor.\nProclamad las verdades gloriosas,\nlevantando hasta el cielo la voz;\n// Proclamad las verdades hermosas\nQue descienden del trono de Dios. //\nLETRA y MUSICA: Alfredo Colom M., 1966, arreg.\n2.        ¡Adelante con Cristo, adelante! ¡Adelante,\nfebril juventud! Caminad victoriosa y triunfante,\nproclamando a los hombres salud.\nLevantad la bandera imponente,\n// En el Norte, en el Sur y el Oriente,\nPues la hora del triunfo sonó. //\n3.        ¡Juventud fervorosa, adelante! ¡Adelante\ncon Cristo Jesús! Caminemos en marcha triunfante,\ndando al mundo irredento la luz, esa luz redentora\nque alumbra, que irradia con gran plenitud,\n// Que destruye la horrenda penumbra,\n¡Adelante, febril juventud! //\nLETRA y MUSICA: Alfredo Colom M., 1966, arreg.                  GUA"},{"n":583,"t":"Dios m’o eres tú","c":"Dios, Dios m’o eres tú; de madrugada te buscaré. Salmo 63:1\n// Dios, Dios m’o eres tú;\nde madrugada te buscaré; //\n// Mi alma tiene sed de ti,\ny mi carne te anhela,\nEn tierra seca y árida\ndonde aguas no hay. (no hay.) //\nCompositor descon., Latinoamérica, s. 20, arreg. F.B.J. Arreg."},{"n":584,"t":"La Juventud","c":"Acuérdate de tu Creador en los d’as de tu juventud...\nSé ejemplo de los creyentes en palabra, conducta,\namor, esp’ritu, fe y pureza...\nOcúpate en la lectura, la exhortación y la enseñanza.\nHuye también de las pasiones juveniles, y sigue la\njusticia, la fe, el amor y la paz, con los que de\ncorazón limpio invocan al Señor.\nEclesiastés 12:1a; 1 Timoteo 4:12b, 13b; 2 Timoteo 2:22 (RVR)"},{"n":585,"t":"La Reina Ester","c":"ÀY quién sabe si para esta hora has llegado al reino? Ester 4:14\nSi b m/ Si b (Capo 1 - La m/La)                                                               Con intensidad\n1.                El rey persa, buscando otra reina,\nescogió a la huérfana, Ester;\nFiel jud’a, doncella muy risueña,\nCoro:          Del Señor puedo ver la providencia,\ncada d’a me gu’a en su amor;\nMe pregunto ahora: ÒÀY quién sabe\nsi por esto aqu’ me trajo Dios?Ó\n2.      Su buen padre adoptivo, Mardoqueo,\nconfrontó el complot del cruel Amán,\nQuien odió con vehemencia al hebreo;\nacabar con la raza fue su afán.                                                                              GUA\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:    Del Señor puedo ver la providencia,\ncada d’a me gu’a en su amor;\nMe pregunto ahora: ÒÀY quién sabe\nsi por esto aqu’ me trajo Dios?Ó\n3.        Ayunaron tres d’as los hebreos;\nfue su parte en el atrevido plan;\nDijo Ester ante el trono de Asuero:\nÒSi yo muero, que muera; Dios sabráÓ.\n4.        El malvado Amán fue a la horca\ny el pueblo jud’o se salvó;\nMardoqueo del rey obtuvo honra,\ny Ester gran ejemplo nos dejó.\nRodolfo Mendieta, 1982, alt. MUSICA: Felipe Blycker J., 1985.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":586,"t":"Hacedores del bien","c":"Pero habla tú lo que está de acuerdo con la sana\ndoctrina; que los hombres mayores sean sobrios,\nserios y prudentes, sanos en la fe, en el amor y\nen la perseverancia.\nAsimismo, que las mujeres mayores sean reverentes\nen conducta, no calumniadoras ni esclavas del\nmucho vino, maestras de lo bueno,\nDe manera que encaminen en la prudencia\na las mujeres jóvenes: a que amen a sus maridos\ny a sus hijos,\nTito 2:1-4, 5b-7a; Gálatas 6:7, 9, 10 (RVA)\nPara que la palabra de Dios no sea desacreditada.\nExhorta asimismo a los jóvenes a que sean prudentes,\nmostrándote en todo como ejemplo de buenas obras.\nNo os engañéis; Dios no puede ser burlado.\nTodo lo que el hombre siembre, eso mismo\ncosechará.\nNo nos cansemos, pues, de hacer el bien; porque\na su tiempo cosecharemos, si no desmayamos.\nPor lo tanto, mientras tengamos oportunidad,\nhagamos el bien a todos, y en especial a los de\nTito 2:1-4, 5b-7a; Gálatas 6:7, 9, 10 (RVA)"},{"n":587,"t":"Henos en tus huestes, Señor","c":"El SE„OR tu Dios está en medio de ti, guerrero victorioso. Sofon’as 3:17 (BLA)\n1.      ÀQuién está en las huestes del buen Salvador,\nPronto a dedicarse fiel a su Señor?\nÀQuién abandonando su falaz vivir\nQuiere acá servir y aun con él sufrir?\nCoro:     Por tu rica gracia, (por tu rica gracia,)\npor tu gran amor, (por tu gran amor,)\nHenos en tus huestes, junto a ti, Señor.\n2.         No ambicionamos gloria ni poder,\nMas queremos ya tu voluntad hacer;\nQuien tu perdurable gracia llega a ver,\nVése constreñido de tu parte a ser.\nEsta letra se puede cantar también con la música de #43 (Nuestra fortaleza).\nCoro:    Por tu rica gracia, (por tu rica gracia,)\npor tu gran amor, (por tu gran amor,)\nHenos en tus huestes, junto a ti, Señor.\n3.        No con oro o plata, oh Jesús, Señor;\nTú nos redimiste con divino amor;\nCon tu propia sangre, ¡santa libación!\nFue que tú efectuaste nuestra redención.\n4.       La batalla dura siempre habrá de ser;\nEnemigos fuertes hemos de tener,\nMas omnipotente es nuestro Capitán;\nHa vencido ya las fuerzas de Satán.\nEsta letra se puede cantar también con la música de #43 (Nuestra fortaleza)."},{"n":588,"t":"El varón próspero","c":"Mas el Señor estaba con José, y fue varón próspero. Génesis 39:2\n1.    /// Más Jehová estaba con José, ///\ny fue varón próspero.\n2.    /// Su bendición estaba con José, ///\ny fue varón próspero.\n3.    /// No pecar’a contra Dios, José, ///\ny fue varón próspero.\n4.        Más Jehová estaba con José,\nSu bendición estaba con José,\nNo pecar’a contra Dios, José,\ny fue varón próspero.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia . Usado con permiso.   GUA"},{"n":589,"t":"Dicha grande es la del hombre","c":"Bienaventurado el varón que no anduvo en consejo de malos. Salmo 1:1\n1.         Dicha grande es la del hombre\ncuyas sendas rectas son;\nNo anda con los pecadores,\nen actuar de perversión.\nA los malos consejeros deja,\nporque teme el mal;\nHuye de la burladora gente imp’a e inmoral.\n2.    Antes, en la ley divina cifra su mayor placer,\nMeditando noche y d’a en su divinal saber;\nEste, como el árbol verde,\nbien regado y en sazón,\nFrutos abundantes rinde y\nhojas que perennes son.\n3.         El prospera en lo que emprende\ny le sale todo bien;\nMas funestos resultados los imp’os siempre ven;\nPorque Dios la senda mira\npor la cual los suyos van;\nOtra es la de los imp’os: al infierno bajarán.\nMEX"},{"n":590,"t":"Las mujeres cristianas","c":"Alábenla en las puertas sus hechos. Proverbios 31:31\n1.    Las mujeres cristianas trabajan con amor,\ncon paciencia y con fe;\nMejorar el hogar sólo buscan,\nimplorando de Dios el poder.\nCoro:                Nuestra fe (Nuestra fe)\ntriunfará, (triunfará,)\nExpresada en trabajo tenaz;\nEl amor (El amor) unirá (unirá)\nNuestras almas en grato solaz.\nCoro:   Nuestra fe (Nuestra fe) triunfará, (triunfará,)\nExpresada en trabajo tenaz;\nEl amor (El amor) unirá (unirá)\nNuestras almas en grato solaz.\n2.          Con tesoros de amor en el alma,\ncon potencia incansable en el bien,\nHalle gracia divina y sea sabia\ncada madre al cumplir su deber.\n3.         Extendidos los brazos formemos,\nde constancia y valor, noble unión;\nTrabajando y cantando elevemos\nnuestro ser, el hogar, la nación.\n(Capo 1 - Mi m/Mi)                                                                                                       Con calma\nCoro:           Dios nuestro Padre, te loamos por tu amor;\nDios poderoso, pedimos protección;\nDios soberano, dir’genos, Señor,\nHasta llegar a tu celestial mansión.\n3.                ÒTu puebloÓ, Rut dijo, Òmi pueblo será,\nA donde tú fueres contigo iré;\nTu Dios seguiré, y me amparará;\nNo más a los ’dolos adoraré\".\n4.                      La joven humilde a Booz acudió,\nY como pariente él la redimió;\nGUA\nY de la pareja, David descendió.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":592,"t":"Perfecto Amor","c":"Por esto dejará...a su padre y a su madre, y se unirá a su mujer. Efesios 5:31\n1.    Perfecto amor, que al hombre es transcendente,\nConcede a éstos, Dios, tu bendición,\nQue su amor perdure eternamente,\nNo dos, sino uno en perfecta unión.\n2.       Vida perfecta, que de tu abundancia\nDemuestren caridad y gran valor,\nDulce esperanza, fe y perseverancia;\nQue en tiempo adverso vivan sin temor.\n3.        Concédeles tu gozo en la tristeza,\nY en el afán tu gracia eficaz;\nCuando se abaten, dales tu promesa\nDe aquel celeste hogar de amor y paz.\nJoseph Barnby, 1889. Trad. © 1962 Cánticos Escogidos. Usado con permiso."},{"n":593,"t":"Dios bendiga las almas unidas","c":"Y dijo...Dios: No es bueno que el hombre esté sólo; le haré ayuda idónea. Génesis 2:18\n1.       Dios bendiga las almas unidas\npor los lazos de amor sacrosanto,\nY las guarde de todo quebranto\nen un mundo de espinas y error.\nQue el hogar que a formarse comienza\ncon la unión de estos dos corazones,\nGoce siempre de mil bendiciones\nal amparo del Dios de Israel.\nARG"},{"n":594,"t":"Oración de matrimonio","c":"Si Dios nos ha amado as’, debemos también amarnos unos a otros. 1 Juan 4:11\nSi b (Capo 1 - La)                                                         Con ternura\n1.      Padre eterno, hoy humildemente,\nTe dirigimos nuestra oración;\nTú que trasciendes al entendimiento,\nUne a estas almas en tu bendición.\n2.    Tú, de la vida inspirador supremo,\nSella este pacto con tu santo amor;\nY en tus promesas y en tu compañ’a\nVivan tus hijos sin ningún temor.\n3.         Ante las pruebas dales valent’a,\nY aquella fe que vence al vendaval;\nSea la luz de cada nuevo d’a\nAurora plena de felicidad.\n4.   Padre, que en este hogar, que hoy se forma,\nArda inefable el fuego de tu amor;\nEsta unión, por ti santificada,\nFiel se consagre siempre a ti, Señor. Amén."},{"n":595,"t":"La familia b’blica","c":"Esposas, estad sujetas a vuestros\nesposos, como conviene en el Señor.\nEsposos, amad a vuestras\nesposas y no os amarguéis contra ellas.\nHijos, obedeced a vuestros padres\nen todo, porque esto es agradable en el Señor.\nPadres, no irritéis a vuestros\nhijos, para que no se desanimen.\nColosenses 3:18-21 (RVA)"},{"n":596,"t":"La familia cristiana","c":"Bend’gate Jehová... y veas a los hijos de tus hijos. Salmo 128:5-6\n(Capo 1 - Mi m/Sol)\n1.              Dios ordenó la familia,\nbendijo a los padres e hijos,\nY en su omnisciencia divina les dio leyes para guiarlos.\nCoro:             Sujetaos unos a otros\nen fraterno y santo amor,\nMutuamente sirviéndoos en el temor del Señor.\n2.              A vuestros propios esposos,\ncasadas, estad, pues, sujetas,\nComo si fuese a Cristo, sumisas y muy respetuosas.\nFelipe Blycker J., 1980. MUSICA: Felipe Blycker J., 1980.                  GUA\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:          Sujetaos unos a otros\nen fraterno y santo amor,\nMutuamente sirviéndoos en el temor del Señor.\n3. Amad a vuestras esposas, maridos, amad sin medida,\nCual Cristo amó a la Iglesia,\npor ella entregando su vida.\n4. Obedeced a los padres, hijitos, pues eso es justo;\nMandato es con promesa, hacedlo al Padre con gusto.\n5. Padres, criad a los hijos con calma y sin provocarlos,\nEn disciplina cristiana,\nconfiando que Dios va a cuidarlos.\nFelipe Blycker J., 1980. MUSICA: Felipe Blycker J., 1980.                GUA\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":597,"t":"Un feliz hogar","c":"Yo sé que mandará a sus hijos... que guarden el camino de Jehová. Génesis 18:19\n1.       Gran felicidad se goza en el hogar\ndonde el amor es dulce cual la miel;\nPorque Cristo tiene el primer lugar\ndonde cada familiar le sigue fiel.\nCoro:           Danos un feliz hogar,\nlleno de tu santo amor.\nCristo, reina en nuestro hogar,\ny en mi corazón, Señor.\nCoro:         Danos un feliz hogar,\nlleno de tu santo amor.\nCristo, reina en nuestro hogar,\ny en mi corazón, Señor.\n2.        Padres, a sus hijos deben educar,\nexplicando los preceptos del Señor;\nEn la corrección no deben provocar\nira en los hijos sino el amor.\n3.      Hijos, a sus padres deben respetar,\nsiempre obedientes y con gratitud;\nEl vivir as’ produce bienestar,\nlargos d’as de alegr’a y salud."},{"n":598,"t":"Cuando las bases","c":"Pero yo y mi casa serviremos al Señor. Josué 24:15\n1.      Cuando las bases de este mundo tiemblan\nY el mal corrompe nuestra sociedad,\nNuestras plegarias hacia ti se elevan\nPor la familia, por la humanidad.\nCoro:      Nuestros hogares guarda, Señor;\nHaz que proclamen tu verdad y tu amor.\n2.        Haz que los lazos que en amor estrecha\nSuaves y tiernos, pero firmes sean;\nNada los pueda nunca quebrantar.\nLetra © 1962 Ediciones La Aurora. Usado con permiso\nCoro:     Nuestros hogares guarda, Señor;\nHaz que proclamen tu verdad y tu amor.\n3.      Los padres cr’en con temor sus hijos,\nSin irritarlos, en amor y fe;\nSean los hijos siempre agradecidos;\nNunca se aparten de tu santa ley.\n4.      Que ni el dinero ni el placer se tornen\nEn falsa meta del moderno hogar;\nBusque servirte y ofrecer sus dones\nA un mundo lleno de necesidad.\nLetra © 1962 Ediciones La Aurora. Usado con permiso"},{"n":599,"t":"Danos un bello hogar","c":"Trayendo a la memoria la fe no fingida... la cual habitó... en tu madre. 2 Timoteo 1:5\n1.             Danos un bello hogar:\ndonde la Biblia nos gu’e fiel,\nDonde tu amor bienestar nos dé,\ndonde en ti todos tengan fe.\n// ¡Danos un bello hogar! //\n2.            Danos un bello hogar:\ndonde el padre es fuerte y fiel,\ny su ejemplo se pueda ver,\ndonde tu amor reine en nuestro ser.\n// ¡Danos un bello hogar! //\nLETRA y MUSICA: B. B. McKinney, 1949, trad. Guillermo Blair, alt.\nTrad. © 1978 Broadman Press. Usado con permiso.\n3.         Danos un bello hogar:\ndonde la madre con devoción\nSepa mostrarnos tu compasión,\
