 ya pasó, y todo nuevo se tornó;\nAqu’ cual peregrino es, hogar con Dios tendrá después.\nL.A."},{"n":288,"t":"El camino romano","c":"Por cuanto todos pecaron, todos pecaron,\nY están destituidos de la gloria de Dios;\nPor cuanto todos pecaron, todos pecaron\nY están destituidos de la gloria de Dios.\nPorque la paga del pecado es muerte,\nMas la dádiva de Dios es vida,\nVida eterna en Cristo, Cristo Jesús Señor nuestro.\nPorque con el corazón,\ncon el corazón, se cree para justicia,\nMas con la boca se confiesa, la boca se confiesa,\nPara salvación. Para salvación.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":289,"t":"Oh, la sangre de Cristo","c":"Lávame, y seré más blanco que la nieve. Salmo 51:7\nOh, la sangre de Cristo,\nOh, la sangre de Cristo,\nOh, la sangre de Cristo de culpa me lavó.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":290,"t":"Cristo habita en mi corazón","c":"Que habite Cristo por la fe en vuestros corazones. Efesios 3:17\n1.              Cristo habita en mi corazón;\nR’o divino es su inundación;\nPor ello paz y amor m’os son; Cristo habita en m’.\n2.            Cristo conmigo, hermoso el don;\nHoras pasamos en conversación;\nFelicidad me da su comunión; Cristo habita en m’.\n3.       Quiero que Cristo controle mi ser;\nQuiero que el mundo su amor pueda ver.\nQuiero que él sea mi sumo placer; Cristo habita en m’.\nARG\nLETRA y MUSICA: Brus del Monte, 1970, alt. © 1970 Bruce W. Woodman. Usado con permiso."},{"n":291,"t":"Dios muestra su amor","c":"Mas Dios muestra su amor para con nosotros. Romanos 5:8\n// Mas Dios muestra su amor para con nosotros\nEn que siendo aún pecadores, Cristo murió por nosotros. //\nHON\n292.                        Hay un solo Dios\nHay un solo Dios, y un solo mediador entre Dios y los hombres. 1 Timoteo 2:5\nPorque hay un solo Dios, y un solo mediador\nEntre Dios y los hombres, Jesucristo el Redentor,\nQuien se dio a s’ mismo en rescate al pecador.\nVen, amigo, y acepta al Salvador.\n© 1972 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":293,"t":"Oh, bondad tan infinita","c":"¡Cuán grande es tu bondad... para los que te temen! Salmo 31:19\n1.                ¡Oh, bondad tan infinita,\nHacia el mundo pecador,\nDios, en Cristo revelando\nSu eternal y santo amor!\nCoro:            Es Jesús (Es Jesús)\nPara m’, (para m’,)\nSólo en él (sólo en él)\nHallaré (hallaré) La divina plenitud.\nCoro:   Es Jesús (Es Jesús) Para m’, (para m’,)\nSólo en él (sólo en él)\nHallaré (hallaré) La divina plenitud.\n2.                Como el vasto firmamento,\nComo el insondable mar,\nEs la gracia salvadora\nQue Jesús al alma da.\n3.               Aunque fueran tus pecados\nRojos como el carmes’,\nEn el r’o del Calvario\nHay limpieza para ti."},{"n":294,"t":"Cuán profundo es tu amor","c":"De comprender... la profundidad... del amor de Cristo. Efesios 3:18-19\n1.                Cuán profundo es tu amor,\n(Cuán profundo es tu amor,)\nno lo puedo comprender;\n(no lo puedo comprender;)\nAlto es para m’, (Alto es para m’,) ¡Cuán inmenso es!\nCoro: ¡Cuán profundo es tu amor, Dios de los cielos!\nMás profundo que el mar\nes tu gran amor; Alto es, (Alto es,)\ninmenso es, (inmenso es,)\nprofundo es (profundo es) tu gran amor.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arrg. F.B.J.                 L.A.\nCoro: ¡Cuán profundo es tu amor, Dios de los cielos!\nMás profundo que el mar\nes tu gran amor; Alto es, (Alto es,)\ninmenso es, (inmenso es,)\nprofundo es (profundo es) tu gran amor.\n2.     Siendo yo pecador, (Siendo yo pecador,)\nte humillaste, Dios, por m’;\n(te humillaste, Dios, por m’;)\nLo hiciste en amor, (Lo hiciste en amor)\n¡Cuán inmenso es!\n3. Viendo la inmensidad (Viendo la inmensidad)\ny el poder de tu amor, (y el poder de tu amor,)\nSólo puedo decir: (Sólo puedo decir:)\n¡Cuán inmenso es!\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arrg. F.B.J.              L.A."},{"n":295,"t":"Dios al mundo amó","c":"De tal manera amó Dios al mundo, que ha dado a su Hijo. Juan 3:16\nDios al mundo amó; a su Hijo dio\npara que todo aquel que cree en él\nNo se pierda, mas tenga vida eterna.\n(Contramelod’a:)\nDios al mundo amó; a su Hijo dio\nPara que todo aquel que cree en él\nVida eterna, vida eterna.\n© 1979, arreg.1983 Maranatha Music. Usado con permiso."},{"n":296,"t":"Nuestro Dios nos salvó","c":"Nos salvó... por su misericordia. Tito 3:5\nNuestro Dios nos salvó, no por obras\nQue nosotros hubiéramos hecho,\nSino por su misericordia\nNos lavó y nos regeneró.\nNuestro Dios nos salvó, no por obras\nQue nosotros hubiéramos hecho,\nSino por su misericordia\nPor su Esp’ritu nos renovó.\nNuestro Dios nos salvó por su gracia,\nNuestro Dios nos salvó por su amor."},{"n":297,"t":"A ti me vuelvo","c":"A ti me vuelvo, gran Señor que alzaste\na costa de tu sangre y de tu vida\ny adonde él nos perdió nos recobraste;\nA ti, Pastor bendito, que buscaste\nde las cien ovejuelas la perdida,\nhallándola del lobo perseguida,\nsobre tus hombros santos te la echaste.\nMiguel de Cervantes Saavedra, s. 16\nESP"},{"n":298,"t":"ÀQué me puede dar perdón?","c":"Sin derramamiento de sangre no se hace remisión. Hebreos 9:22\n1.            ÀQué me puede dar perdón?\nSólo de Jesús la sangre;\nÀY un nuevo corazón? Sólo de Jesús la sangre.\nCoro:                   Precioso es el raudal\nQue limpia todo mal;\nNo hay otro manantial,\nSólo de Jesús la sangre.\n2.   Fue el rescate eficaz, sólo de Jesús la sangre;\nTrajo santidad y paz, sólo de Jesús la sangre.\nLETRA y MUSICA: Robert Lowry, 1876, trad. H.W. Cragin.\nCoro:              Precioso es el raudal\nQue limpia todo mal;\nNo hay otro manantial,\nSólo de Jesús la sangre.\n3.     Veo para mi salud, sólo de Jesús la sangre;\nTiene de sanar virtud, sólo de Jesús la sangre.\n4.               Cantaré junto a sus pies,\nSólo de Jesús la sangre;\nEl Cordero digno es, sólo de Jesús la sangre.\nLETRA y MUSICA: Robert Lowry, 1876, trad. H.W. Cragin."},{"n":299,"t":"Por fe contemplo redención","c":"Mas el justo por su fe vivirá. Habacuc 2:4\n1.            Por fe contemplo redención,\nJesús nos da la salvación; su vida dio por m’.\nCoro:               La fuente sin igual hallé,\nDe vida y luz el manantial;\n¡Oh, gloria a Dios, me limpia a m’,\nMe limpia a m’, me limpia a m’!\n2.             Mi vida entrego a mi Jesús;\nLas dudas él quitó;\nLETRA y MUSICA: Phoebe Palmer Knapp, 1873, trad. H.C. Ball.\nCoro:              La fuente sin igual hallé,\nDe vida y luz el manantial;\n¡Oh, gloria a Dios, me limpia a m’,\nMe limpia a m’, me limpia a m’!\n3.               ¡Cuán inefable gozo es\nSaber que salvo soy!\n4.          ¡Oh, gracia excelsa de mi Dios!\nProfundo es el amor de mi Jesús, divina luz,\nCordero Redentor.\nLETRA y MUSICA: Phoebe Palmer Knapp, 1873, trad. H.C. Ball."},{"n":300,"t":"Sublime Gracia","c":"Siendo justificados...mediante la redención que es en Cristo Jesús. Romanos 3:24\n1.         Sublime gracia del Señor\nQue un infeliz salvó;\nFui ciego mas hoy miro yo,\nPerdido y él me halló.\n2.      Su gracia me enseñó a temer;\nMis dudas ahuyentó;\n¡Oh cuán precioso fue a mi ser\nCuando él me transformó!\n1790, trad. Cristóbal E. Morales. MUSICA: Melod’a americana en\nVirginia Harmony, 1831, arreg.Edwin O. Excell, 1900, alt.\n3.       En los peligros o aflicción\nQue yo he tenido aqu’,\nSu gracia siempre me libró\nY me guiará feliz.\n4.   Y cuando en Sion por siglos mil\nBrillando esté cual sol,\nYo cantaré por siempre all’\nSu amor que me salvó.\n1790, trad. Cristóbal E. Morales. MUSICA: Melod’a americana en\nVirginia Harmony, 1831, arreg.Edwin O. Excell, 1900, alt."},{"n":301,"t":"ÀSabes dónde hay una fuente?","c":"1.           ÀSabes dónde hay una fuente\nPura de divino amor,\nCuyas aguas celestiales manan\ncon ferviente ardor?\nEsta fuente inagotable, de eficacia y de valor\nEs el Redentor bendito, el precioso Salvador.\nCoro:             Es Jesús la viva fuente,\ndonde he apagado yo\nEsa sed que consum’a mi cuitado corazón.\nIsabel Lawrence, 1893\nBasada en una poes’a de Philip Bliss, 1874.\nEsta letra se puede cantar con la música de #553 (Muy cercano).\nCoro:             Es Jesús la viva fuente,\ndonde he apagado yo\nEsa sed que consum’a mi cuitado corazón.\n2. Esa fuente siempre pura, nunca su cristal perdió;\nY sus aguas refrescantes se te ofrecen, pecador.\nSi sediento y fatigado a Jesús, la fuente, vas,\nSatisfecho y aliviado al momento quedarás.\n3. ¡Oh! recibe pues su oferta, no rechaces, no, su amor;\nDile: ÒDe esas aguas dame, y sabré su gran valorÓ.\nSin dinero, y sin precio, se te ofrece el grato don:\nVida eterna, paz y gozo, de tus culpas el perdón.\nIsabel Lawrence, 1893\nBasada en una poes’a de Philip Bliss, 1874.\nEsta letra se puede cantar con la música de #553 (Muy cercano)."},{"n":302,"t":"Sin Cristo yo no tengo nada","c":"Si alguno está en Cristo, nueva criatura es. 2 Corintios 5:17\n1.               Sin Cristo yo no tengo nada;\nSin Cristo no hay salvación;\nSin Cristo yo voy por la vida como barco sin timón.\nCoro:      ¡Cristo, oh Cristo! Si has o’do su voz,\nVen, acéptale hoy.\n¡Oh Cristo, oh Cristo! con él seguro estoy.\n2.              Sin Cristo mi alma está muerta;\nSin Cristo esclavo yo soy;\nSin Cristo no hay esperanza, mas con él yo salvo soy.\nLETRA y MUSICA: Mylon L. LeFevre, 1963, trad. Tony Arango, alt.\n© 1963 LeFevre Sing Publishing. Usado con permiso."},{"n":303,"t":"ÀSabes tú de Cristo?","c":"Y esta es la vida eterna: que te conozcan a ti. Juan 17:3\nSi b (Capo 1 - La)                                                         Con emoción\n1.                  ÀVives cansado y triste?\nÀEs grande tu aflicción?\nÀTu inquietud persiste?\nÀBuscas feliz protección?\nCoro:    ÀSabes tú de Cristo? (ÀSabes tú?)\nÀLe conoces ya? (ÀLe conoces ya?)\nEn su amor (en su amor) bendito\nSalvación y poder te dará. (te dará.)\nLETRA y MUSICA: W. F. Lakey y V. B. Ellis, 1957, trad. Honorato Reza.\n© 1957, ren. 1985 Lillenas Publishing Co.. Usado con permiso.\nCoro:       ÀSabes tú de Cristo? (ÀSabes tú?)\nÀLe conoces ya? (ÀLe conoces ya?)\nEn su amor (en su amor) bendito\nSalvación y poder te dará. (te dará.)\n2.             ÀA quién te acercas, dime,\nCuando te acosa el mal?\nY cuando tu alma gime, ÀQuién es tu paz eternal?\n3.                 En tus desilusiones,\nTu llanto enjugará;\nEn rudas tentaciones, Tu ruego contestará.\nLETRA y MUSICA: W. F. Lakey y V. B. Ellis, 1957, trad. Honorato Reza.\n© 1957, ren. 1985 Lillenas Publishing Co.. Usado con permiso."},{"n":304,"t":"ÀHas hallado en Cristo?","c":"1.      ÀHas hallado en Cristo tu buen Salvador?\nÀEres salvo por la sangre de Jesús?\nÀPor la fe descansas en el Redentor?\nÀEres salvo por la sangre de Jesús?\nCoro:     Lávame, (Lávame,) lávame, (lávame,)\nEn tu sangre, Cordero de Dios, (de Dios,)\nY con alma limpia me presentaré ante tu tribunal de luz.\n2.       ÀVives siempre al lado de tu Salvador?\nÀEres salvo por la sangre de Jesús?\nÀDel pecado eres siempre vencedor?\nÀEres salvo por la sangre de Jesús?\nLETRA y MUSICA: Elisha A. Hoffman, 1878, trad. H. W. Cragin.\nCoro:     Lávame, (Lávame,) lávame, (lávame,)\nEn tu sangre, Cordero de Dios, (de Dios,)\nY con alma limpia me presentaré ante tu tribunal de luz.\n3.        ÀCuando él viniere te encontrarás\nYa lavado en la sangre de Jesús?\nÀPara su venida preparado estás,\nYa lavado en la sangre de Jesús?\n4.        Si perdón y paz deseas, pecador,\nTu refugio es la sangre de Jesús.\nSi librarte quieres de eternal dolor,\nOh, acude a la sangre de Jesús.\nLETRA y MUSICA: Elisha A. Hoffman, 1878, trad. H. W. Cragin."},{"n":305,"t":"Ven a los pies de Jesús","c":"Y ellas, acercándose, abrazaron sus pies, y le adoraron. Mateo 28:9\n1. Ven a los pies de Jesús; Ven, no desprecies su cruz.\nVen por la senda de luz,\n// Por la senda de luz que es tan sólo Jesús,\nquien tomando su cruz, te brindó salvación;\nMira al Monte de Sion. //\n2.     Oye la voz del Señor; Mira su inmenso dolor.\nPiensa en que Dios es amor,\n// En que Dios es amor; Sufrió intenso dolor\nPor hacerte el favor de brindarte salud\nEn su gran plenitud. //\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.\n3. Vuelve tus ojos a Dios; Vuelve, escucha su voz.\nY ya no más serán dos,\n// Uno solo con Dios, uno solo con Dios;\nVen y busca veloz aquel bello pa’s\n4.    Abrele tu corazón a quien te ofrece perdón,\nQuien con su crucifixión\n// Consumó redención, ofreciendo el perdón\ny la consolación, pues él quiso morir\npara hacernos vivir. //\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.\nDIOS TE DICE EN LA BIBLIA:\n1. Yo he venido para que tengan vida, y la tengan en\nabundancia. Juan 20:10.\n2. Pero vuestras iniquidades han hecho división entre\nvosotros y vuestro Dios. Isa’as 59:2.\n3. La paga del pecado es muerte. Romanos 6:23.\n4. Mas Dios muestra su amor para con nosotros, en que\nsiendo aún pecadores, Cristo murió por nosotros. Rom.5:8.\n5. Cree en el Señor Jesucristo y serás salvo. Hechos 16:31.\n6. Porque por gracia sois salvos por medio de la fe; y esto\nno de vosotros, pues es don de Dios; no por obras, para\nque nadie se glor’e. Efesios 2:8-9.\n7. Porque cuando éramos enemigos, fuimos reconciliados\ncon Dios por la muerte de su Hijo. Romanos 5:10.\n8. El que cree en el Hijo tiene vida eterna. Juan 3:36.\nTU DECISION:\nSi quieres la vida feliz y eterna, Dios sólo te pide que creas\nen Jesucristo como tu único Salvador personal. Hoy mismo\nlo puedes hacer. Dile a Dios estas palabras:\nDios mio, soy un triste pecador, condenado a muerte eterna.\nPongo toda mi fe en Jesucristo que murió en la cruz en mi lugar y\nperdona todos mis pecados. Hoy recibo a tu Hijo como mi único y\npersonal Salvador. Sé que mis obras no me salvan. Ahora soy salvo\ny feliz eternamente, todo esto es un regalo que tú me das. Te doy\nlas gracias Padre mio, por medio de Cristo mi único mediador.\nVe hoy mismo a una iglesia evangélica y cuéntaselo al\npastor y a los l’deres. Ellos te dirán qué hacer para crecer en\ntu nueva vida cristiana."},{"n":307,"t":"Nuestra vida acabará","c":"Por poco me persuades a ser cristiano. Hechos 26:28\n¥1.     Nuestra vida acabará, cual las hojas caerá,\nCual el haz se ligará: busca a Dios.\nVuela cada d’a veloz y volando da su voz:\n\"Ven a dar tu cuenta a Dios\". Busca a Dios.\nCoro:          Busca a Dios, (Busca a Dios,)\nbusca a Dios; (busca a Dios;)\nEntre tanto tengas tiempo, busca a Dios. (busca a Dios.)\nSi te atreves a esperar, Dios la puerta cerrará\nY dirá, ÒEs tarde yaÓ. Busca a Dios.\nLETRA y MUSICA: William J. Kirkpatrick, s. 19, trad. Enrique S. Turrall.\nCoro:         // Busca a Dios, (Busca a Dios,) //\nEntre tanto tengas tiempo, busca a Dios. (busca a Dios.)\nSi te atreves a esperar, Dios la puerta cerrará\nY dirá, ÒEs tarde yaÓ. Busca a Dios.\n2. Pierde el hombre su vigor, se marchita cual la flor,\nSe disipa cual vapor: busca a Dios.\nComo el r’o aprisa va hasta entrar al vasto mar,\nVas as’ a la eternidad: busca a Dios.\n¥3. Clama a Dios de corazón con sincera contrición;\nPor Jesús Dios da perdón: busca a Dios.\nSi no escuchas al Señor, si desprecias su perdón,\nTe acarreas perdición: busca a Dios.\nLETRA y MUSICA: William J. Kirkpatrick, s. 19, trad. Enrique S. Turrall."},{"n":308,"t":"Tal como soy","c":"El que por m’ entrare, será salvo. Juan 10:9\n¥1.      Tal como soy, de pecador,\nSin más confianza que tu amor,\nYa que me llamas, acud’;\nCordero de Dios, heme aqu’.\n2.     Tal como soy, buscando paz\nEn mi desgracia y mal tenaz,\nConflicto grande siento en m’;\nCordero de Dios, heme aqu’.\n3.     Tal como soy, me acogerás;\nPerdón, alivio me darás,\nPues tu promesa ya cre’;\nCordero de Dios, heme aqu’.\n¥4.   Tal como soy, tu compasión\nVencido ha toda oposición;\nYa pertenezco sólo a ti;\nCordero de Dios, heme aqu’."},{"n":309,"t":"Toma de la fuente de agua viva","c":"El que bebiere del agua que yo le daré, no tendrá sed jamás. Juan 4:14\n¥1.     Vagué sediento en el pecado abrumador,\nY nada a mi alma dio satisfacción;\nMas cuando fui a la cruz de\nCristo el Salvador,\nAgua abundante halló mi corazón.\nCoro:       Toma de la fuente de agua viva,\nfuente eternal, agua del raudal;\nToma de la fuente de agua viva,\nfuente de agua viva celestial.\nLETRA y MUSICA: John W. Peterson, 1950, trad. Aarón Espinoza.\n© 1950 ren. 1978 John W. Peterson. Usado con permiso.\nCoro:        Toma de la fuente de agua viva,\nfuente eternal, agua del raudal;\nToma de la fuente de agua viva,\nfuente de agua viva celestial.\n¥2.   ¡Oh cuán dulce raudal de Dios brotando está!\nFelicidad y gozo me brindó.\nEn gloria, gracia y bendición mi vida irá;\npor eso ¡Aleluya! canto yo.\n3.    Oh pecador Àpor qué a Jesús no vienes hoy\ny as’ su agua de vida aceptar?\nEl dice, ÒFuente de agua eterna y libre soy;\nLETRA y MUSICA: John W. Peterson, 1950, trad. Aarón Espinoza.\n© 1950 ren. 1978 John W. Peterson. Usado con permiso."},{"n":310,"t":"Pecador, ven a Cristo Jesús","c":"Si alguno tiene sed, venga a m’ y beba. Juan 7:37\n¥1.          Pecador, ven a Cristo Jesús,\ny feliz para siempre serás,\nQue si tú le quisieres tener,\nal divino Señor hallarás.\nCoro:   // Ven a él, (pecador,) ven a él, (pecador,)\nQue te espera tu buen Salvador. //\n¥2.          Si cual hijo que necio pecó,\nvas buscando a sus pies compasión,\nTierno Padre en Jesús hallarás,\ny tendrás en sus brazos perdón.\nESP\nCoro:   // Ven a él, (pecador,) ven a él, (pecador,)\nQue te espera tu buen Salvador. //\n3.          Si en pecado te sientes morir,\nél será tu Doctor celestial,\nY hallarás en su sangre también\nmedicina que cure tu mal.\n4.          Ovejuela que huyó del redil,\n¡he aqu’ tu benigno Señor!\nY en los hombros llevada serás\nde tan dulce y amante Pastor."},{"n":311,"t":"ÀQuieres ser salvo?","c":"En quien tenemos redención por su sangre. Colosenses 1:14\nSi b (Capo 1 - La)                                                         Con firmeza\n¥1.      ÀQuieres ser salvo de toda maldad?\nTan sólo hay poder en mi Jesús.\nÀQuieres vivir y gozar santidad?\nTan sólo hay poder en Jesús.\nCoro:         Hay poder, (hay poder,) poder,\nsin igual poder en Jesús (en Jesús)\nquien murió; (quien murió;)\nHay poder, (hay poder,) poder,\nsin igual poder en la sangre que él vertió.\nLETRA y MUSICA: Lewis E. Jones, 1899, trad. D. A. Mata.\nCoro:         Hay poder, (hay poder,) poder,\nsin igual poder en Jesús (en Jesús)\nquien murió; (quien murió;)\nHay poder, (hay poder,) poder,\nsin igual poder en la sangre que él vertió.\n2.      ÀQuieres ser libre de orgullo y pasión?\nTan sólo hay poder en mi Jesús.\nÀQuieres vencer toda cruel tentación?\nTan sólo hay poder en Jesús.\n¥3.       ÀQuieres servir a tu Rey y Señor?\nTan sólo hay poder en mi Jesús.\nVen, y ser salvo podrás en su amor;\nTan sólo hay poder en Jesús.\nLETRA y MUSICA: Lewis E. Jones, 1899, trad. D. A. Mata."},{"n":312,"t":"A Jesucristo ven sin tardar","c":"Al que a m’ viene, no le echo fuera. Juan 6:37\nSi b (Capo 1 - La)                                                          Con fervor\n¥1.         A Jesucristo ven sin tardar,\nQue entre nosotros hoy él está,\nY te convida con dulce afán,\nTierno diciendo: ÒVenÓ.\nCoro:    ¡Oh cuán grata nuestra reunión\nCuando allá, Señor, en tu mansión,\nContigo estemos en comunión\nGozando eterno bien!\nLETRA y MUSICA: George F. Root, 1870, trad. Juan B. Cabrera.\nCoro:    ¡Oh cuán grata nuestra reunión\nCuando allá, Señor, en tu mansión,\nContigo estemos en comunión\nGozando eterno bien!\n2.      Piensa que él sólo puede colmar\nTu triste pecho de gozo y paz,\nY porque anhela tu bienestar,\nVuelve a decirte: ÒVenÓ.\n¥3.      Su voz escucha sin vacilar,\nY grato acepta lo que hoy te da;\nTal vez mañana no habrá lugar;\nNo te detengas, ven.\nLETRA y MUSICA: George F. Root, 1870, trad. Juan B. Cabrera."},{"n":313,"t":"Ven amigo a Jesús","c":"Por lo cual puede... salvar... a los que por él se acercan a Dios. Hebreos 7:25\n1.      Ven amigo a Jesús, pues él murió por ti;\nRecibirás la luz que quiere darte a ti.\nAbre tu corazón y dulce paz tendrás.\nCoro:           D’a fatal vendrá cuando\nno habrá lugar;\nMás gracia ya no habrá,\npues despreciaste hoy;\nAcepta, pecador, la salvación de Dios.\nLETRA y MUSICA: Juan M. Isáis, 1960. © 1960 Juan M. Isáis. Usado con permiso.   MEX\nCoro:           D’a fatal vendrá cuando\nno habrá lugar;\nMás gracia ya no habrá,\npues despreciaste hoy;\nAcepta, pecador, la salvación de Dios.\n2.               Las manos del Señor\nse abren hoy para ti;\nVen y conf’a en él, y serás muy feliz.\nTus cuitas pon en Dios,\npues él las llevará;\nQuitará tu pesar por su consolación.\nMEX\nLETRA y MUSICA: Juan M. Isáis, 1960. © 1960 Juan M. Isáis. Usado con permiso."},{"n":314,"t":"Vida nueva encontré","c":"Dios... nos dio vida juntamente con Cristo. Efesios 2:4-5\n1.    // Ya mi vida se la debo a Jesús, porque él\nMurió en la cruz por m’. //\nCoro: // Vida nueva encontré en la cruz de Jesús\nPorque Cristo mi deuda pagó. //\n2.   // Yo me rindo a los pies de Jesús mi Señor,\nPorque fui un infiel pecador. //\n3.    // Pecador, el Santo Esp’ritu te llama a ti;\nVen a Cristo y salvo serás. //\nLETRA y MUSICA: Adán A. Calderón, 1956. arreg. F. B. J.          L.A."},{"n":315,"t":"Visión Pastoral","c":"ÀNo deja las noventa y nueve y va por los montes a buscar? Mateo 18:12\n1.        Eran cien ovejas las de su rebaño;\nEran cien ovejas que amante cuidó,\nPero una tarde al contarlas todas,\nLe faltaba una, le faltaba una y triste lloró.\nLas noventa y nueve dejó en el aprisco,\nY por la montaña a buscarla fue;\nUngió sus heridas, la cargó en sus hombros\ny al redil volvió.\nMEX\nLETRA y MUSICA: Juan Romero, 1969, arreg. F. B. J. © 1969 Juan Romero. Usado con permiso.\n2.    Esta antigua historia vuelve a repetirse;\nHay aún ovejas que errabundas van;\nCon el alma rota van por los collados,\nTemblando de fr’o, vagando en el mundo,\nsin Dios y sin luz. Pero todav’a\nexisten pastores que por la montaña\na buscarlas van,\nY cuando las hallan, las traen al camino,\nAl camino bueno, la verdad y vida\nque es Cristo el Señor.\nMEX\nLETRA y MUSICA: Juan Romero, 1969, arreg. F. B. J. © 1969 Juan Romero. Usado con permiso.\n3.      Si tú eres un alma que sufre angustia\nDe sentirse sola en cruel lobreguez,\nHoy te traigo nuevas, nuevas de gran gozo;\nEs el evangelio que salva y redime\ny te da la luz.\nSea en la montaña o en la cumbre agreste,\nYa fuera en el valle o en abismo cruel,\nCristo el buen Pastor quiere en pastos verdes\nConfortar tu alma, vendar tus heridas\ny darte la paz.\nMEX\nLETRA y MUSICA: Juan Romero, 1969, arreg. F. B. J. © 1969 Juan Romero. Usado con permiso."},{"n":316,"t":"Con voz benigna","c":"El Maestro está aqu’ y te llama. Juan 11:28\nSi b (Capo 1 - La)                                                         Con seguridad\n1.      Con voz benigna te llama Jesús:\ninvitación de puro amor.\nÀPor qué le dejas en vano llamar?\nÀSordo serás, pecador?\nCoro:          Hoy te convida, hoy te convida;\nVoz bendecida,\nbenigna conv’date hoy.\nCoro:        Hoy te convida, hoy te convida;\nVoz bendecida,\nbenigna conv’date hoy.\n2.           A los cansados convida Jesús;\ncon compasión mira el dolor.\nTráele tu carga, te bendecirá;\nte ayudará el Señor.\n3.             Siempre aguardando\ncontempla a Jesús:\n¡Tanto esperar, con tanto amor!\nHasta sus plantas ven, m’sero, y trae\ntu tentación, tu dolor."},{"n":317,"t":"Oh, Señor, rec’beme cual soy","c":"Dios, ten piedad de m’, pecador. Lucas 18:13 (BLA)\n1.         Oh Señor, rec’beme cual soy,\nya no más, ya no quiero pecar.\nDel pecado me quiero apartar;\nJustifica mi ser, dame tu dulce paz\ny tu gran bendición.\n2.         Oh Señor, toma mi corazón\ny hazlo tuyo por la eternidad.\nLléname de tu santa bondad,\nY en mi alma tú pon una nueva canción\nde paz y dulce amor.\nMEX\nLETRA y MUSICA: Juan M. Isáis, 1958. © 1958 Juan M. Isáis. Usado con permiso.\n3.     Pecador, tú que vagas sin Dios,\nven ahora y acepta al Señor.\nEl te quiere impartir su perdón;\nEl te quiere salvar, él te quiere ayudar;\nhoy acepta el perdón.\nMEX\nLETRA y MUSICA: Juan M. Isáis, 1958. © 1958 Juan M. Isáis. Usado con permiso."},{"n":318,"t":"A los sedientos, venid","c":"A todos los sedientos: Venid a las aguas. Isa’as 55:1\n1.         A los sedientos, venid a las aguas,\nY los cansados, venid con valor;\nHay una fuente preciosa de vida\nQue satisface del alma el clamor.\nCoro:     Aguas tendrá el que vive sediento;\nR’os habrá en el secadal;\nBusca al Señor mientras puedes hallarlo;\nClama a él y salvado serás.\nCoro:     Aguas tendrá el que vive sediento;\nR’os habrá en el secadal;\nBusca al Señor mientras puedes hallarlo;\nClama a él y salvado serás.\n2.       ÀVives atado a los goces del mundo?\nÀVives cansado de tanto vagar?\nÀHay en tu ser un anhelo profundo?\nVen a Jesús; él te quiere salvar.\n3.       A los creyentes se ofrece la gracia\nQue satisface de toda ansiedad,\nQue capacita, que limpia, que sacia:\nSanta promesa de toda verdad."},{"n":319,"t":"El agua viva","c":"Vino una mujer de Samaria a sacar agua; y Jesús\nle dijo: Dame de beber. Pues sus disc’pulos\nhab’an ido a la ciudad a comprar de comer.\njud’o, me pides a m’ de beber, que soy mujer\nsamaritana? Porque jud’os y samaritanos no\nse tratan entre s’.\nRespondió Jesús y le dijo: Si conocieras el don\nde Dios, y quién es el que te dice: Dame de\nbeber, tú le pedir’as, y él te dar’a agua viva.\nJuan 4:7-10, 13-15, 41-42 (RVR)\nCualquiera que bebiere de esta agua, volverá a\ntener sed; mas el que bebiere del agua que yo le\ndaré, no tendrá sed jamás; sino que el agua que yo\nle daré será en él una fuente de agua que salte\npara vida eterna.\ntenga yo sed, ni venga aqu’ a sacarla.\nY creyeron muchos más por la palabra de\nél, y dec’an a la mujer:\nYa no creemos solamente por tu dicho, porque nosotros\nmismos hemos o’do, y sabemos que verdaderamente\néste es el Salvador del mundo, el Cristo.\nJuan 4:7-10, 13-15, 41-42 (RVR)"},{"n":320,"t":"Cual la mar hermosa","c":"1.         Cual la mar hermosa es la paz de Dios,\nfuerte y gloriosa, es eterna paz,\ngrande y perfecta, premio de la cruz,\nfruto del Calvario, obra de Jesús.\nCoro:             Descansando en Cristo\nsiempre paz tendré;\nen Jehová confiando, nada temeré.\n2.         En el gran refugio de la paz de Dios,\nNunca hay molestias, es perfecta paz;\nNunca negra duda, pena ni pesar,\nVejaciones crueles, pueden acosar.\nFrances Havergal, 1874, es trad.\nEsta letra se puede cantar con la música de # 346 (Del amor divino).\nCoro:           Descansando en Cristo\nsiempre paz tendré;\nen Jehová confiando, nada temeré.\n3.         Toda nuestra vida cuidará Jesús;\nCristo nunca cambia, él es nuestra paz;\nFuertes y seguros en el Salvador,\nsiempre moraremos en su grande amor.\n4.       Oh Señor amado, tú nos das quietud,\nde ti recibimos celestial salud;\nhaznos conocerte, te amaremos más;\nsé tú nuestro dueño, Pr’ncipe de paz.\nFrances Havergal, 1874, es trad.\nEsta letra se puede cantar con la música de # 346 (Del amor divino)."},{"n":321,"t":"Paz con Dios","c":"1.           Paz con Dios, busqué ganarla\ncon febril solicitud,\nMas mis obras meritorias no me dieron la salud.\nCoro:           ¡Oh, qué paz Jesús me da!\nPaz que antes ignoré;\nTodo nuevo se tornó, desde que su paz hallé.\n2.               Lleno estaba yo de dudas,\ntemeroso de morir,\nHoy en paz, mañana triste con temor del porvenir.\nLETRA y MUSICA: Francis A. Blackmer, 1886, trad. Stuart E. McNair.\nCoro:            ¡Oh, qué paz Jesús me da!\nPaz que antes ignoré;\nTodo nuevo se tornó, desde que su paz hallé.\n3.                Al final en desespero,\nÒYa no puedoÓ, dije yo;\nY del cielo o’ respuesta,\nÒTodo hecho ya quedóÓ.\n4.              De mis obras despojado,\nvi la obra de Jesús;\nSupe que la paz fue hecha\npor su sangre en la cruz.\nLETRA y MUSICA: Francis A. Blackmer, 1886, trad. Stuart E. McNair."},{"n":322,"t":"Años mi alma en vanidad vivió","c":"Anunciamos que de estas vanidades os convirtáis al Dios vivo. Hechos 14:15\n1.            Años mi alma en vanidad vivió,\nIgnorando a quien por m’ sufrió\nY que en el Calvario sucumbió el Salvador.\nCoro:       Mi alma all’ divina gracia halló;\nDios all’ perdón y paz me dio;\nDel pecado all’ me libertó el Salvador.\n2.           Por la Biblia miro que pequé,\nY su ley divina quebranté;\nal Salvador.\nCoro:        Mi alma all’ divina gracia halló;\nDios all’ perdón y paz me dio;\nDel pecado all’ me libertó el Salvador.\n3.          Toda mi alma a Cristo ya entregué;\nHoy le quiero y sirvo como a Rey;\nPor los siglos siempre cantaré al Salvador.\n4.        En la cruz su amor Dios demostró,\nY de gracia al hombre revistió\nCuando por nosotros se entregó el Salvador."},{"n":323,"t":"Lejos de mi Padre Dios","c":"Por quien...tenemos entrada por la fe... y nos gloriamos en la esperanza. Romanos 5:2\n1.    Lejos de mi Padre Dios, por Jesús fui hallado;\nPor su gracia y por su amor fui por él salvado.\nCoro:      En Jesús, mi Señor, sea mi gloria eterna;\nEl me amó y me salvó por su gracia tierna.\n2.    En Jesús, mi Salvador, pongo mi confianza;\nToda mi necesidad suple en abundancia.\n3.       Cerca de mi buen Pastor vivo cada d’a;\nToda gracia en su Señor halla el alma m’a."},{"n":324,"t":"Jamás, Jamás","c":"Vuestros pecados os han sido perdonados. 1 Juan 2:12\nSi b (Capo 1 - La)                                                                   Con certidumbre\nJamás, jamás\nmis pecados contará;\nPerdonados por siempre,\ny ante mi mente\nNunca más los ha de mencionar.\nJamás oiré de los d’as de maldad;\nCristo me ha redimido\nY ha dado al olvido mi pecar.\n© 1941 Salvationist Publ. & Supplies Ltd. Usado con permiso."},{"n":325,"t":"En el monte Calvario","c":"325.      En el monte Calvario\n1.           En el monte Calvario se vio una cruz,\nEmblema de afrenta y dolor.\nY yo aprecio esa cruz, do murió mi Jesús\nPor salvar al más vil pecador.\nCoro:          ¡Cuánto estimo la cruz de Jesús!\nEn sus triunfos mi gloria será.\nY algún d’a en vez de una cruz,\nGeorge Bennard, 1913, trad. S.D. Athans, alt.\nEsta letra se puede cantar con la musica del # 326 (La hermosa visión).\nCoro:      ¡Cuánto estimo la cruz de Jesús!\nEn sus triunfos mi gloria será.\nY algún d’a en vez de una cruz,\n2.      En la cruz do su sangre Jesús derramó,\nHermosura contemplo en visión,\nPues en ella el Cordero inmolado murió\nPara darme pureza y perdón.\n3.       Seguiré a Jesús, tomaré hoy mi cruz,\nLos desprecios con él sufriré;\nY algún d’a feliz, con los santos en luz,\nPara siempre su gloria tendré.\nGeorge Bennard, 1913, trad. S.D. Athans, alt.\nEsta letra se puede cantar con la musica del # 326 (La hermosa visión)."},{"n":326,"t":"La hermosa visión de la cruz","c":"Haciendo la paz mediante la sangre de su cruz. Colosenses 1: 20\nSi b (Capo 1-la)                                                          Con sentimiento\n1.       Largos años vagué por el valle del mal,\nSin consuelo, sin fe, sin amor;\nY la sombra fatal de la senda que hollé\npuso en mi alma la hiel del dolor.\nCoro:        A mis pies el infierno se abrió,\n(infierno se abrió, )\nY clamé con el alma a Jesús;\nY al instante la escena cambió\n(la escena cambió)\nen la hermosa visión de la cruz.\nCoro:         A mis pies el infierno se abrió,\n(infierno se abrió, )\nY clamé con el alma a Jesús;\nY al instante la escena cambió (la escena cambió)\nen la hermosa visión de la cruz.\n2.   Desde entonces, por él, ya no soy lo que fui,\nUna sombra sin Dios y sin ley;\nMe constriñe el amor de mi Rey.\n3.      Peregrino que vais por el valle del mal,\nVuestra senda sólo es de dolor;\nEsa carga fatal que en el alma lleváis,\nVen y ponla a los pies del Señor.\nGUA"},{"n":327,"t":"Hallé un buen amigo","c":"En todo tiempo ama el amigo, y es como un hermano en tiempo de angustia. Proverbios 17:17\n1.     Hallé un buen amigo, mi amado Salvador;\nContaré lo que ha hecho él por m’;\nHallándome perdido e indigno pecador,\nMe salvó y ya me guarda para s’.\nMe salva del pecado, me guarda de Satán,\nPromete estar conmigo hasta el fin. (¡Aleluya!)\nEl consuela mi tristeza, me quita todo afán;\n¡Grandes cosas Cristo ha hecho para m’!\n2.       Jesús jamás me falta; jamás me dejará;\nEs mi fuerte y poderoso Protector.\nDel mundo yo me aparto y de la vanidad\nPara consagrar mi vida a mi Señor.\nSi el mundo me persigue, si sufro tentación,\nConfiado en Cristo puedo resistir. (¡Aleluya!)\n¡Grandes cosas Cristo ha hecho para m’!\n3.     Yo sé que Jesucristo muy pronto volverá,\nY entre tanto me prepara un lugar\nEn casa de su Padre, mansión de luz y paz,\nLlegando a la gloria, con él yo estaré;\nContemplaré su rostro siempre all’. (¡Aleluya!)\nCon los santos redimidos gozoso cantaré:\n¡Grandes cosas Cristo ha hecho para m’!"},{"n":328,"t":"Solamente en Cristo","c":"No hay otro nombre bajo el cielo...en que podamos ser salvos. Hechos 4:12\n1.      Solamente en Cristo, solamente en él,\nNo hay otro nombre dado a los hombres;\nSolamente en Cristo,\nsolamente en él.\n2.       En San Juan catorce y el verso seis,\nDice Jesús, ÒSoy la verdad,\nSoy el camino, también la vida;\nNadie viene al Padre\nsino por m’Ó."},{"n":329,"t":"Fuente de la vida eterna","c":"1.              Fuente de la vida eterna\ny de toda bendición,\nEnsalzar tu gracia tierna debe cada corazón.\nTu piedad inagotable, abundante en perdonar,\nUnico Ser adorable, gloria a ti debemos dar.\n2.              De los cánticos celestes\nte quisiéramos cantar,\nEntonados por las huestes que lograste rescatar.\nAlmas que a buscar viniste, porque les tuviste amor;\nDe ellas te compadeciste con tiern’simo favor.\n3.             Toma nuestros corazones,\nllénalos de tu verdad,\nDe tu Esp’ritu los dones, y de toda santidad.\nGu’anos en obediencia humildad y puro amor;\nNos ampare tu presencia, oh bendito Salvador."},{"n":330,"t":"Hay una senda","c":"Sus caminos son caminos deleitosos, y todas sus veredas paz. Proverbios 3:17\n¥1.   Hay una senda que el mundo no conoce;\nHay una senda que yo pude encontrar;\nEn Cristo tengo la salvación de mi alma;\nCristo es la senda que me puede salvar.\nEn Cristo tengo la salvación de mi alma;\nCristo es la senda que me puede salvar.\nMEX\nLETRA : Tomás estrada, c. 1955, MUSICA: Melod’a Mexicana s. 20,\n¥2.        Las amistades y todos mis parientes\nFueron las gentes que yo relacioné;\nMe aborrecieron por causa de su nombre\nCuando supieron que a Cristo me entregué;\nMe aborrecieron por causa de su nombre\nCuando supieron *que a Cristo me entregué.\n3.         Y aquel camino de tantos sufrimientos,\nAquel camino que el cielo me trazó,\nFue transformado en aquel feliz momento\nCuando mi Cristo a m’ me rescató;\nFue transformado en aquel feliz momento\nCuando mi Cristo al cielo me llamó.\n* orig. que yo me bauticé.\nMEX\nLETRA : Tomás estrada, c. 1955, MUSICA: Melod’a Mexicana s. 20,"},{"n":331,"t":"El encuentro con Jesús","c":"Y halló a Felipe, y le dijo: S’gueme. Juan 1:43\n1. Con Jesús un d’a me encontré y le expuse mi condición,\nY a pesar de mi transgresión, Jesucristo me dio el perdón.\nCoro: Ese encuentro con Jesús Nunca lo podré olvidar;\nPor sentirme tan feliz, Jamás yo lo podré abandonar.\n2. Esa paz que yo encontré, que consuela mi corazón,\nNunca la experimenté por mi triste anterior situación.\n¥3.           Voy cantando ya por doquier\nQue Jesús me libró del mal; a gran precio él me compró.\n¡Gloria a Dios por el don celestial!"},{"n":332,"t":"Me salvó, me perdonó","c":"Invoqué en mi angustia a Jehová, y él me oyó. Jonás 2:2\n1.      Vagaba por el mundo sin fe, sin esperanza,\nNo sabiendo que hab’a un Salvador,\nQue, por librar mi alma de muerte y pecado,\nEn el Calvario murió el Buen Pastor.\nCoro:           // Me salvó, me perdonó,\nCoro original:   // Soy feliz, yo soy feliz,\nDesde que Cristo me redimió. //\n2.        Cuando desalentado estoy en esta vida,\nCon el alma imploro al Salvador,\nPidiéndole me mande del cielo su consuelo\nPara poder aguantar el cruel dolor.                                                                           L.A.\nCoro:           // Me salvó, me perdonó,\nCoro original:   // Soy feliz, yo soy feliz,\nDesde que Cristo me redimió. //\n3.      Eres, Jesús, el lirio que perfumó mi vida;\nMe libraste de toda iniquidad;\nPusiste en mi boca un canto de alabanza;\nEs mi anhelo cumplir tu voluntad.\n4. Cerca de ti, oh Cristo, andar yo siempre quiero;\nMe ampara tu sacrosanto amor;\nSin ti la vida es triste, muy llena de amarguras,\nPero tú eres mi gran consolador."},{"n":333,"t":"Hay un nombre en la gloria","c":"Regocijaos de que vuestros nombres están escritos en los cielos. Lucas 10:20\nSi b (Capo 1 - La)                                                            Con energ’a\n1. Una vez perdido viv’a yo Lejos y vagante en error;\nMas la voz de Cristo me alcanzó;\nMe llamó con tierno amor.\nCoro:    Hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nY los ángeles cantan la historia,\nÒSalvo es el pecadorÓ. (pecador.)\nOh hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nTodos mis pecados ya son perdonados,\n¡Gloria al Señor!\nLETRA y MUSICA: C. Austin Miles, 1910, trad. J. Arturo Savage, alt.\nTrad. © 1947 Rodeheaver, admin. Word Music. Usado con permiso.\nCoro:    Hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nY los ángeles cantan la historia,\nÒSalvo es el pecadorÓ. (pecador.)\nOh hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nTodos mis pecados ya son perdonados,\n¡Gloria al Señor!\n2.        En la Biblia dice que salvo soy;\nPor la gracia me redimió;\nYa por fe en su nombre a la gloria voy,\nDesde que me rescató.\nLETRA y MUSICA: C. Austin Miles, 1910, trad. J. Arturo Savage, alt.\nTrad. © 1947 Rodeheaver, admin. Word Music. Usado con permiso.\nCoro:    Hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nY los ángeles cantan la historia,\nÒSalvo es el pecadorÓ. (pecador.)\nOh hay un nombre escrito en la gloria;\nM’o es, (m’o es,) s’, m’o es; (m’o es;)\nTodos mis pecados ya son perdonados,\n¡Gloria al Señor!\n3.           Cantos de alegr’a elevo hoy\na mi Rey y buen Salvador;\nTodos mis talentos a Cristo doy,\nque me use por su amor.\nLETRA y MUSICA: C. Austin Miles, 1910, trad. J. Arturo Savage, alt.\nTrad. © 1947 Rodeheaver, admin. Word Music. Usado con permiso."},{"n":334,"t":"Cuán bueno es Dios","c":"Toda buena dádiva y todo don perfecto desciende de lo alto. Santiago 1:17\n1.    Cuán bueno es Dios, cuán bueno es Dios,\nCuán bueno es Dios, su amor me dio.\n2.           Es siempre fiel, es siempre fiel,\nEs siempre fiel, no me dejará.\n3.              Me cuidará, me cuidará,\nMe cuidará, es mi buen Pastor.\n4.                      Le serviré, le serviré,\nLe serviré, viviré por él."},{"n":335,"t":"Salvos por gracia","c":"Dios, que es rico en misericordia, por su gran amor con\nque nos amó,\nAun estando nosotros muertos en pecados, nos dio\nvida juntamente con Cristo (por gracia sois salvos),\nEn quien tenemos redención por su sangre, el perdón de\npecados según las riquezas de su gracia,...no por obras,\npara que nadie se glor’e.\nY en ningún otro hay salvación; porque no hay otro\nnombre bajo el cielo, dado a los hombres, en que\npodamos ser salvos.\nEfesios 2:4, 5; 1:7; 2:9; Hechos 4:12 (RVR)"},{"n":336,"t":"Mi culpa él llevó","c":"Cristo fue ofrecido una sola vez para llevar los pecados de muchos. Hebreos 9:28\n¥1.          Cansado y triste vine al Salvador;\nEterna dicha hallé en su amor; Mi culpa él llevó.\nCoro:        Mi culpa él llevó, mi culpa él llevó;\nAlegre siempre cantaré.\nAl Señor gozoso alabaré, porque él me salvó.\n2.             Borrados todos mis pecados son;\nA él feliz elevo mi canción; mi culpa él llevó.\nLETRA y MUSICA: Margaret Jenkins Harris, 1903, trad. H.C. Ball.\nCoro:        Mi culpa él llevó, mi culpa él llevó;\nAlegre siempre cantaré.\nAl Señor gozoso alabaré, porque él me salvó.\n¥3.        Ya vivo libre de condenación;\nSu dulce paz tengo en mi corazón; mi culpa él llevó.\n4.             Si vienes hoy a Cristo, pecador,\ntu culpa llevará, tu culpa llevará;\nPerdon tendrás si acudes al Señor; tu culpa llevará.\nUltimo coro: Tu culpa llevará, tu culpa llevará,\ny limpiará tu corazón;\nY dirás feliz en tu canción: ÒMi culpa él llevóÓ.\nLETRA y MUSICA: Margaret Jenkins Harris, 1903, trad. H.C. Ball."},{"n":337,"t":"El vino a mi corazón","c":"Este misterio... Cristo en vosotros, la esperanza de gloria. Colosenses 1:27\n1.           Cuan glorioso es el cambio\noperado en mi ser,\nViniendo a mi vida el Señor;\nHay en mi alma una paz que yo ansiaba tener,\nCoro:             El vino a mi corazón,\nél vino a mi corazón.\nSoy feliz con la vida que Cristo me dio;\nEl vino a mi corazón.\nCoro: El vino a mi corazón, él vino a mi corazón.\nSoy feliz con la vida que Cristo me dio;\nEl vino a mi corazón.\n¥2.   Ya no voy por la senda que el mal me trazó,\nMis pecados pasados Jesús los borró;\nEl vino a mi corazón.\n¥3.   Ni una sombra de duda oscurece su amor,\nAmor que me trajo el perdón;\nEl vino a mi corazón."},{"n":338,"t":"A su nombre gloria","c":"Al que nos amó, y nos lavó... sea gloria e imperio por los siglos. Apocalipsis 1:5-6\n1.      Junto a la cruz, do murió el Salvador\nPor mis pecados, clamé con fervor;\n¡Qué maravilla! Jesús me salvó.\n¡A su nombre gloria!\nCoro:             ¡A su nombre gloria!\n¡A su nombre gloria!\n¡Qué maravilla! Jesús me salvó.\n¡A su nombre gloria!\nCoro:         ¡A su nombre gloria!\n¡A su nombre gloria!\n¡Qué maravilla! Jesús me salvó.\n¡A su nombre gloria!\n2.        Junto a la cruz recib’ el perdón;\nLimpio en su sangre es mi corazón;\nLlena es mi alma de gozo y paz:\n¡A su nombre gloria!\n¥3.      Ven sin tardar a la cruz, pecador;\nAll’ te espera Jesús, Salvador.\nAll’ de Dios hallarás el amor:\n¡A su nombre gloria!"},{"n":339,"t":"Comprado con sangre por Cristo","c":"En quien tenemos redención por su sangre, el perdón de pecados. Efesios 1:7\n1.        Comprado con sangre por Cristo,\nCon gozo al cielo yo voy;\nLibrado por gracia infinita, ya sé que su hijo yo soy.\nCoro:                Lo sé, (Lo sé,) lo sé, (lo sé,)\nComprado con sangre yo soy;\nLo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.\n2.                 Soy libre de pena y culpa;\nsu gozo él me hace sentir;\nEl llena de gracia mi alma; con él es tan dulce vivir.\nCoro:               Lo sé, (Lo sé,) lo sé, (lo sé,)\nComprado con sangre yo soy;\nLo sé, (Lo sé,) lo sé, (lo sé,) con Cristo al cielo yo voy.\n3.            En Cristo yo siempre medito,\nY nunca le puedo olvidar;\nCallar sus favores no quiero; voy siempre a Jesús alabar.\n4.              Yo sé que me espera corona,\nJesús Salvador en el cielo; mi alma con él estará."},{"n":340,"t":"Escogido fui de Dios","c":"Nos escogió en él antes de la fundación del mundo. Efesios 1:4\n1.        Escogido fui de Dios en el Amado;\nEn lugares celestiales su bendición me dio.\nAntes de la creación el plan fue hecho\nPor su santa voluntad.\nCoro:            Escondido en Cristo estoy,\nnadie me apartará,\nY las fuerzas de este mundo no me podrán dañar.\nVivo y ando en esta vida con seguridad,\nPorque me escogió mi Dios.\nCoro: Escondido en Cristo estoy, nadie me apartará,\nY las fuerzas de este mundo no me podrán dañar.\nVivo y ando en esta vida con seguridad,\nPorque me escogió mi Dios.\n2.      Tengo un sello que el Esp’ritu me ha dado\nCuando mi confianza puse sólo en mi Salvador,\nPrenda que el Señor me dio de vida eterna;\nEscogido fui de Dios.\n3.        Me escogió para alabanza de su gloria,\nY sentóme en las alturas con Cristo mi Señor.\nGrande fue la admiración al ver su gracia,\nCuando me escogió mi Dios."},{"n":341,"t":"Vida Eterna","c":"Este es el testimonio: que Dios nos ha dado vida eterna. 1 Juan 5:11\nDios nos ha dado vida eterna;\ny esta vida está en su Hijo.\nDios nos ha dado vida eterna;\ny esta vida está en su Hijo.\nEl que tiene al Hijo,\ntiene la vida;\nEl que no tiene al Hijo de Dios\nNo tiene la vida.\nDios nos ha dado vida eterna;\ny esta vida está en su Hijo.\nDios nos ha dado vida eterna;\ny esta vida está en su Hijo.\n© 1985 Philip W. Blycker en Cánticos nuevos de la B’blia. Usado con permiso."},{"n":342,"t":"Un gran Salvador es Jesús","c":"En Dios está mi salvación y mi gloria. Salmo 62:7\n1.       Un gran Salvador es Jesús el Señor,\nUn gran Salvador para m’.\nProtege mi vida de todo temor, refugio me ofrece aqu’.\nCoro:      Protege mi alma de todo temor,\nMis dudas quitó y yo sé que su amor\n// feliz protección me dará, //\n2.       Un gran Salvador es Jesús el Señor,\nMe guarda y sostiene feliz en su amor,\n© 1955, ren. 1983 Lillenas Publishing Co. Usado con permiso.\nCoro:       Protege mi alma de todo temor,\nMis dudas quitó y yo sé que su amor\n// feliz protección me dará, //\n3.          Raudales de gracia recibo de él,\nraudales de paz y virtud;\nSu Esp’ritu inunda del todo mi ser,\nde gozo, sin par plenitud.\n4.      Al ser transportado en las nubes feliz,\ncon gloria mi Dios a encontrar,\nSu amor infinito, su gracia sin fin,\nmis labios habrán de alabar."},{"n":343,"t":"Yo te bendigo","c":"Bienaventurados todos los que conf’an en él. Isa’as 30:18\n1.     Yo te bendigo, oh mi Redentor,\ntú, la confianza de mi corazón;\nYa que sufriste por mi condición,\nQuita mis penas, quita mi temor.\n2.     Tú eres Rey de gracia y perdón;\nomnipotente reinas por doquier;\nSeñor Jesús, domina nuestro ser;\ntu luz alumbre siempre el corazón.\n3.     Eres la vida, nuestra inspiración;\nen ti descansa todo mi querer;\nSosténnos siempre por tu gran poder,\ny en la prueba danos protección.\n4.      Tu providencia guarda del azar\nen esta corta vida terrenal;\nOtra esperanza no hay para el mortal;\ntus fuerzas siempre nos harán triunfar.\nAmén."},{"n":344,"t":"Yo sé a quién he cre’do","c":"Porque yo sé a quién he cre’do. 2 Timoteo 1:12\n1.         No sé por qué la gracia del Señor\na m’ un d’a me alcanzó,\nNi sé por qué obró la salvación\nen un indigno como yo.\nCoro:          Mas yo sé a quién he cre’do,\ny es poderoso para guardarme\nSeguro hasta el d’a en que venga él por m’.\n2.         No sé por qué la gracia del Señor\nen m’ él quiso demostrar,\nNi sé por qué cuando era pecador\npor m’ su vida vino a dar.\nCoro:          Mas yo sé a quién he cre’do,\ny es poderoso para guardarme\nSeguro hasta el d’a en que venga él por m’.\n3.           No sé cómo es que su Esp’ritu\nconvence al hombre de su error,\nNi cómo obra en el corazón\ncreando fe en el Señor.\n4.        No sé cuándo el Señor regresará,\nDe noche o al amanecer,\nNi sé si por la muerte he de pasar\nO vivo subiré con él."},{"n":345,"t":"Mi fe descansa en Jesús","c":"Los que hemos cre’do entramos en el reposo. Hebreos 4:3\n1.    Mi fe descansa en Jesús, y en su redención;\nConfiando solamente en él, obtengo salvación.\nCoro:    No necesito obra hacer, ni rito observar;\nMe basta que Jesús murió; murió en mi lugar.\n2.        Su obra suficiente es, mi pena él pagó;\nSu sangre cubre mi maldad, pues él me redimió.\n3.      Yo nada puedo agregar, descanso sólo en él;\nSeguridad perfecta da por su promesa fiel."},{"n":346,"t":"Del amor divino","c":"ÀQuién nos separará del amor de Cristo? Romanos 8:35\n1.       Del amor divino, Àquién me apartará?\nEscondido en Cristo, Àquién me tocará?\nSi Dios justifica, Àquién condenará?\nCristo por m’ aboga, Àquién me acusará?\nCoro:            A los que a Dios aman,\ntodo ayuda a bien;\nEsto es mi consuelo, esto es mi sostén.\nCoro:             A los que a Dios aman,\ntodo ayuda a bien;\nEsto es mi consuelo, esto es mi sostén.\n2.         Todo lo que pasa en mi vida aqu’\nobra para bien, pues cuida él de m’.\nEn mis pruebas duras, Dios me es siempre fiel.\nÀPor qué, pues, las dudas? yo descanso en él.\n3.       Plagas hay y muerte en mi alrededor;\nOrdenó mi suerte el que es Dios de amor.\nNi una sola flecha me podrá dañar;\nMientras no permita, no me alcanzará."},{"n":347,"t":"Bajo sus alas","c":"Con sus plumas te cubrirá, y debajo de sus alas estarás seguro. Salmo 91:4\n1.             Bajo sus alas habito seguro,\nen densa noche y en cruel tempestad;\nConfiar yo puedo, pues sé que él me guarda;\nMe ha rescatado su inmensa bondad.\nCoro:            Seguro estoy, seguro estoy,\nÀQuién de Jesús me separa?\nSeguro estoy en su gran amor;\nSalvo y seguro él me guarda.\nIra D. Sankey, 1896. Trad.© 1955, ren. 1983 Lillenas Publishing Co. Usado con permiso.\nCoro:           Seguro estoy, seguro estoy,\nÀQuién de Jesús me separa?\nSeguro estoy en su gran amor;\nSalvo y seguro él me guarda.\n2.         Bajo sus alas refugio encuentro,\nEn la tristeza, dolor y aflicción;\nCuando temores y pruebas me asaltan,\nCristo me cubre con su protección.\n3.       Bajo sus alas hay gozo inefable;\nPaz y certeza me da mi Señor.\nNo puede mal ni enemigo vencerme;\nSalvo y seguro estoy en su amor.\nIra D. Sankey, 1896. Trad.© 1955, ren. 1983 Lillenas Publishing Co. Usado con permiso."},{"n":348,"t":"Pues si vivimos","c":"Pues si vivimos, para el Señor vivimos. Romanos 14:8\nPues si vivimos, para él vivimos,\nY si morimos, para él morimos.\nSea que vivamos, o que muramos,\nSomos del Señor, somos del Señor.\nSea que vivamos, o que muramos,\nSomos del Señor, somos del Señor.\nMEX"},{"n":349,"t":"Del santo amor de Cristo","c":"Conservaos en el amor de Dios. Judas v. 21\n1. Del santo amor de Cristo que no tendrá su igual,\nDe su divina gracia, sublime y eternal,\nDe su misericordia, inmensa como el mar\nY cual los cielos alta, con gozo he de cantar.\nCoro: El amor de mi Señor grande y dulce es más y más;\n(El amor de mi Señor grande y dulce es más y más;)\nRico e inefable, nada es comparable al amor de mi Jesús.\n2.     Cuando él vivió en el mundo la gente lo siguió,\nSus penas y angustias en él depositó;\nEntonces, bondadoso, su amor brotó en raudal\nIncontenible, inmenso, venciendo todo mal.\nLETRA y MUSICA: Lelia N. Morris, 1912, trad. Vicente Mendoza, alt.\nCoro: El amor de mi Señor grande y dulce es más y más;\n(El amor de mi Señor grande y dulce es más y más;)\nRico e inefable, nada es comparable al amor de mi Jesús.\n3.    El puso en las pupilas del ciego nueva luz,\nY dio a sus seguidores la gloria de su ser\nAl impartir su gracia, su Esp’ritu y poder.\n4.    Su amor, por las edades del mundo, es el fanal\nque marca esplendoroso la senda celestial,\nY el paso de los años lo hará más dulce y más\nPrecioso al darle al alma su incomparable paz.\nLETRA y MUSICA: Lelia N. Morris, 1912, trad. Vicente Mendoza, alt."},{"n":350,"t":"Conf’o en Jesús","c":"En Jehová Dios de Israel puso su esperanza. 2 Reyes 18:5\n1.                Conf’o en Jesús,\nel que por m’ murió,\nY que por mis pecados en la cruz pagó.\nCoro:       Por m’ (Por m’) murió, (murió,)\ny vive hoy; (por m’ él vive, vive hoy;)\nPor toda la eternidad loor le doy.\n2.              No hay mérito en m’,\nindigno pecador;\nLETRA y MUSICA: Norman J. Clayton, 1945, trad. Cornelio Rivera G.\n© 1945, ren. 1973 Norman Clayton Pub. Co., admin. Word Music. Usado con permiso.\nCoro:        Por m’ (Por m’) murió, (murió,)\ny vive hoy; (por m’ él vive, vive hoy;)\nPor toda la eternidad loor le doy.\n3.                 Jesús en gloria está;\npor m’ aboga all’;\nSus manos traspasadas muestra él por m’.\n4.                 Su gracia me mostró;\nY en su obra en la cruz descansaré.\nLETRA y MUSICA: Norman J. Clayton, 1945, trad. Cornelio Rivera G.\n© 1945, ren. 1973 Norman Clayton Pub. Co., admin. Word Music. Usado con permiso."},{"n":351,"t":"Amarte sólo a ti, Señor","c":"El que me ama, será amado por mi Padre. Juan 14:21\n1.              Amarte sólo a ti, Señor,\namarte sólo a ti, Señor,\namarte sólo a ti, Señor, y hacer tu voluntad;\nSeguir tu caminar, Señor,\nseguir sin desmayar, Señor,\nseguir hasta el final, Señor, y no mirar atrás.\nSeguir tu caminar, Señor,\nseguir sin desmayar, Señor,\nseguir hasta el final, Señor, y no mirar atrás.\n2.           Confiar tan sólo en ti, Señor,\nconfiar tan sólo en ti, Señor,\nconfiar tan sólo en ti,Señor,\ny hacer tu voluntad;\nSeguir tu caminar, Señor,\nseguir sin desmayar, Señor,\nseguir hasta el final, Señor, y no mirar atrás.\nSeguir tu caminar, Señor,\nseguir sin desmayar, Señor,\nseguir hasta el final, Señor, y no mirar atrás."},{"n":352,"t":"Ya pertenezco a Cristo","c":"Para presentaros santos y sin mancha e irreprensibles delante de él. Colosenses 1:22\n1.      Cristo el Señor me ama por siempre,\nVence el pecado,\ncuida del mal, ya pertenezco a él.\nCoro:   Ya pertenezco a Cristo, él pertenece a m’,\nNo sólo por el tiempo aqu’,\nmás por la eternidad.\nLETRA y MUSICA: Norman J. Clayton , 1938,\ntrad. J. Arturo Savage. © 1938 y 1943, ren. 1966 y 1971\nNorman Clayton Pub. Co., admin. Word Music. Usado con permiso.\nCoro:   Ya pertenezco a Cristo, él pertenece a m’,\nNo sólo por el tiempo aqu’,\nmás por la eternidad.\n2.       Cristo bajó del cielo a buscarme;\ncubierto de pecado encontróme:\nMe levantó de vergŸenzas mil,\nya pertenezco a él.\n3.      Gozo indecible inunda mi alma.\nYa libertado estoy y mi vida\nLlena está de felicidad;\nya pertenezco a él.\nLETRA y MUSICA: Norman J. Clayton , 1938,\ntrad. J. Arturo Savage. © 1938 y 1943, ren. 1966 y 1971\nNorman Clayton Pub. Co., admin. Word Music. Usado con permiso."},{"n":353,"t":"Un mandamiento nuevo","c":"Un mandamiento nuevo os doy: Que os améis unos a otros. Juan 13:34\n1.     Un mandamiento nuevo os doy:\nQue os améis unos a otros.\nUn mandamiento nuevo os doy:\nQue os améis unos a otros.\n// Como yo os he amado,\ncomo yo os he amado,\nQue os améis también vosotros. //\nL.A.\n2.             Amémonos de corazón,\nno de labios solamente.\nAmémonos de corazón, no de labios solamente.\n// Para cuando Cristo venga,\npara cuando Cristo venga\nnos encuentre bien unidos. //\n3.                 Y ÀCómo puedo yo orar\nresentido con mi hermano?\nY ÀCómo puedo yo orar resentido con mi hermano?\n// Dios no escucha la oración,\nDios no escucha la oración\nsi no estoy reconciliado. //\nL.A."},{"n":354,"t":"El amor permanecerá","c":"El mayor de ellos es el amor. 1 Corintios 13:13\n1.              Si yo hablase en lenguas\nY no tengo amor,\nSoy metal que resuena; Vengo a ser sin valor.\nCoro:             Permanecen la fe,\nEl mayor de los tres.\nEl amor siempre es; todo se acabará,\nPero éste permanecerá.\n© 1982 Casa Bautista de Publicaciones. Usado con permiso.\nCoro:             Permanecen la fe,\nEl mayor de los tres.\nEl amor siempre es; todo se acabará,\nPero éste permanecerá.\n2.                El amor es sufrido;\nNo se irrita, es benigno.\nNunca busca lo suyo; ¡oh, excelso camino!\n3.              Sigue, pues, este amor;\nNunca dejes de amar;\nLograrás as’ a Dios con tu vida agradar.\n© 1982 Casa Bautista de Publicaciones. Usado con permiso."},{"n":355,"t":"La gente de nuestro tiempo","c":"Y ante todo, tened entre vosotros ferviente amor. 1 Pedro 4:8\n1.            La gente de nuestro tiempo\nno sabe lo que es el amor,\nQue vive perdiendo el tiempo,\nbuscando y sin encontrar.\nCoro:     Amor (amor, amor) es entregarse\nEn alma y cuerpo a la humanidad;\nVivir (vivir, vivir) siempre sirviendo,\nSin que tú esperes algo para ti.\nLETRA y MUSICA: Jorge Clark Ram’rez, 1975, arreg. Elena Cortés de Guzman, alt.        MEX\n© 1975 Casa Bautista de Publicaciones. Usado con permiso.\nCoro:     Amor (amor, amor) es entregarse\nEn alma y cuerpo a la humanidad;\nVivir (vivir, vivir) siempre sirviendo,\nSin que tú esperes algo para ti.\n2.           En Cristo yo he encontrado\nejemplo de paz y de amor.\nme cuenta de su gran amor.\n3.         Y siempre debes hablar que\nen Cristo s’ hay salvación,\nLlevando el grato mensaje\nde muerte y resurrección.\nLETRA y MUSICA: Jorge Clark Ram’rez, 1975, arreg. Elena Cortés de Guzman, alt.       MEX\n© 1975 Casa Bautista de Publicaciones. Usado con permiso."},{"n":356,"t":"Mi Paz","c":"Justificados, pues, por la fe, tenemos paz para con Dios. Romanos 5:1\n1.              Mi paz te doy a ti,\nEs la paz que el mundo no da,\nEs la paz que el mundo no entiende.\nPara ti, rec’bela, mi paz te doy a ti.\n2.             Mi amor te doy a ti,\nEs amor que el mundo no da,\nEs amor que el mundo no entiende.\nPara ti, rec’belo, mi amor te doy a ti.\nLETRA y MUSICA: Keith Routledge, 1975, es trad.\n© 1975 Sovereign Music U.K. Usado con permiso."},{"n":357,"t":"Amor, Amor","c":"Tenemos gran gozo y consolación en tu amor. Filemón v. 7\nCanon a 4 voces\n①   Amor, amor, amor, amor;\n②   Cristo dice, ÒDebes amarÓ.\n➂   Ama a tu vecino como a tu hermano.\n➃   Dios es amor.\nLETRA y MUSICA: Autor y compositor descon., s. 20, es trad."},{"n":358,"t":"Somos uno en esp’ritu","c":"En esto conocerán todos que sois mis disc’pulos, si tuviereis amor. Juan 13:35\nPara un permiso en retroproyector,\nver pie de página\nLETRA y MUSICA: Peter Scholtes, 1966, trad. Federico J. Pagura, alt.\n© 1966 F.E.L. admin. Lorenz Publications. Usado con permiso"},{"n":359,"t":"El gozo del Señor","c":"No os entristezcáis, porque el gozo del Señor es vuestra fuerza. Nehem’as 8:10\n1.       // El gozo del Señor mi fortaleza es, //\nSu gozo sin medida él me da.\n2.     // Si tienes ese gozo puedes tú cantar, //\nSu gozo sin medida él me da.\n3.    // Me da del agua viva; sed no tengo más;\nSu gozo sin medida él me da. //\nof the Lord/Cherry Blossom Music Pub. Co., admin. Sparrow Corp. Usado con permiso."},{"n":360,"t":"Canten con alegr’a","c":"A él clamé con mi boca, y fue exaltado con mi lengua. Salmo 66:17\n1.          Canten con alegr’a las alabanzas\nde Cristo el Rey; Anden en los caminos\nque nos mostrara su augusta grey.\nVivan los redimidos en las\nvictorias del Vencedor;\nPara que todos juntos veamos las glorias del Redentor.\n2.       Cristo es la luz del mundo, y el que\nle sigue, la luz tendrá; Cristo es el pan\nde vida, y el que de él come no morirá.\nCristo es la fuente viva, y el que de él bebe\nno tendrá sed; Y si queréis la vida,\nid a la fuente y all’ bebed.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage.   GUA\n3.     Cristo es, de las ovejas que él redimiera,\nsu Buen Pastor; Vino para salvarlas,\npero sufriendo cruento dolor. Y al derramar\nsu sangre en el madero de aquella cruz,\nVida, paz y esperanza, y eterna\ngloria nos dio Jesús.\n4.      Ahora ya no estoy triste sino que vivo\nsiempre feliz, con la dulce esperanza\nde que algún d’a iré al pa’s, ese pa’s\namado donde moradas fue a preparar\nCristo, el Pastor Eterno, que a sus\novejas vino a salvar.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage.     GUA"},{"n":361,"t":"Grande gozo hay en mi alma","c":"Y se regocijó con toda su casa de haber cre’do a Dios. Hechos 16:34\n1.    Grande gozo hay en mi alma hoy, pues Jesús\nconmigo está, y su paz, que ya gozando\nestoy, por siempre durará.\nCoro:          Grande gozo, ¡Cuán hermoso!\n(Grande gozo para m’, ¡Cuán hermoso con Jesús!)\nPaso todo el tiempo bien feliz; (bien feliz)\nPorque veo de Cristo la sonriente faz,\nGrande gozo siento en m’.\n2.            Hay un canto en mi alma hoy,\nMelod’as a mi Rey; en su amor feliz\ny libre soy, y salvo por la fe.\nCoro:          Grande gozo, ¡Cuán hermoso!\n(Grande gozo para m’, ¡Cuán hermoso con Jesús!)\nPaso todo el tiempo bien feliz; (bien feliz)\nPorque veo de Cristo la sonriente faz,\nGrande gozo siento en m’.\n3. Paz divina hay en mi alma hoy, porque Cristo\nme salvó; las cadenas rotas ya están;\nJesús me libertó.\n4.   Gratitud hay en mi alma hoy, y alabanzas\na Jesús; por su gracia a la gloria voy,\ngozándome en la luz."},{"n":362,"t":"Solo no estoy","c":"Cobrad ánimo... y trabajad; porque yo estoy con vosotros. Hageo 2:4\nSolo no estoy, Jesús está a mi lado,\nAmigo fiel que no me dejará. Solo no estoy;\nEn tempestad o en calma\nAunque la tempestad me azote,\nY el mundo me desprecie,\nNo temeré llevar la cruz,\nPues me gu’a con su amor.\nAs’ camino con pleno gozo;\nSolo no estoy, Jesús conmigo está.\nLETRA y MUSICA: John W. Peterson, 1955, trad. Leslie Thompson.\n© 1955, ren. 1983 John W. Peterson. Usado con permiso."},{"n":363,"t":"Oh mi santo Dios","c":"Mas Jehová me ha sido por refugio. Salmo 94:22\n1.                 Oh mi santo Dios,\nCoro            En tu seno, oh Dios,\nSiempre me cuidarás y tu paz eternal me darás.\n2.                 La serenidad\nQue en Dios encontré cada d’a alienta mi fe.\n3.                   Si muriera hoy,\nAl celeste hogar yo ir’a con Dios a morar."},{"n":364,"t":"Jehová es mi Pastor","c":"Jehová es mi pastor; nada me faltará. Salmo 23:1\n1.    Jehová es mi Pastor, me apacienta con amor,\nEn sus pastos delicados paceré;\nDescansando sin temor al abrigo del Señor,\nDe las aguas de reposo beberé.\nCoro:             El Señor me pastorea,\nnada aqu’ me faltará;\nJunto a él caminaré, en su brazo confiaré,\nNada del amor de Dios me apartará.\ntrad. Enrique S. Turrall. MUSICA: George F. Root, 1891.\nCoro: El Señor me pastorea, nada aqu’ me faltará;\nJunto a él caminaré, en su brazo confiaré,\nNada del amor de Dios me apartará.\n2.   Mi Pastor me guardará, siempre me confortará,\nPor las sendas de justicia me guiará;\nEn el tiempo de dolor me será Consolador;\nEn mi corazón su paz infundirá.\n3.     ¡Oh, tan fiel es mi Pastor! Tan constante\nes en su amor que mi copa rebosando\nsiempre está; Cuando en valle oscuro esté,\nMal ninguno temeré;\nA la casa de mi Dios iré a morar.\ntrad. Enrique S. Turrall. MUSICA: George F. Root, 1891."},{"n":365,"t":"Los que esperan en Jehová","c":"Los que esperan a Jehová tendrán nuevas fuerzas. Isa’as 40:31\n¥1.          Los que esperan en Jehová*\nNuevas fuerzas poseerán;\nCaminando sin descansar, nunca se fatigarán.\nCoro:          // Cual las águilas alzarán,\nCon el poder de Cristo el Rey,\nFuertes alas para volar, los que esperan en Jehová*. //\n(Opt. *el Señor)\n¥2.              En los brazos de mi Jesús,\nHay lugar de consuelo y luz;\nEl nos brinda su gozo y paz en el sitio de solaz."},{"n":366,"t":"En Jesucristo","c":"Y el mismo Señor de paz os dé siempre paz en toda manera. 2 Tesalonicenses 3:16\n¥1.        En Jesucristo se halla la paz;\nEn horas negras de tempestad\nTienen las almas dulce solaz,\nGrato consuelo, felicidad.\nCoro:      Gloria cantemos al Redentor\nQue por nosotros quiso morir;\nY que la gracia del Salvador\nSiempre dirija nuestro vivir.\nCoro:    Gloria cantemos al Redentor\nQue por nosotros quiso morir;\nY que la gracia del Salvador\nSiempre dirija nuestro vivir.\n¥2.      En nuestras luchas, en el dolor,\nEn tristes horas de tentación,\nCalma le infunde, santo vigor,\nNuevos alientos al corazón.\n¥3.       Cuando en la lucha falta la fe\nY el alma vese desfallecer,\nCristo nos dice: ÒSiempre os daré\nGracia divina, santo poderÓ."},{"n":367,"t":"Confiado Estoy","c":"En paz me... dormiré; porque sólo tú, Señor, me haces vivir confiado. Salmo 4:8\n1.         Se oculta el sol; La noche cerca está\nY el d’a que se fue no volverá jamás;\nY yo seguro dormiré, sabiendo que mi Dios\nMe velará también.\nCoro:           Confiado estoy en mi Señor;\nLibra mi alma de temor;\nLe obedec’; Me rescató y con sus alas me cubrió.\nConfiado estoy en mi Señor;\nEl es mi gu’a y pastor; Sé que mi vida cuidará\nY que hasta el fin me guardará.\nESP\nLETRA y MUSICA: Jordi Roig, 1976, arreg. F.B. J. Usado con permiso del autor.\nCoro:         Confiado estoy en mi Señor;\nLibra mi alma de temor;\nLe obedec’; Me rescató y con sus alas me cubrió.\nConfiado estoy en mi Señor; El es mi gu’a y pastor;\nSé que mi vida cuidará y que hasta el fin me guardará.\n2.            Igual que hoy más d’as pasarán,\nY algunos que, tal vez, el sol no lucirá.\nSé bien que Dios conmigo está,\nY aquel que espera en él, en paz descansará.\n3.         Pensando estoy que triste debe ser\nVivir sin su calor, vivir sin entender\nQue al fin la vida acabará y verás que andar\nsin Dios es sólo vanidad.\nESP\nLETRA y MUSICA: Jordi Roig, 1976, arreg. F.B. J. Usado con permiso del autor."},{"n":368,"t":"D’a en d’a","c":"Bendito el Señor; cada d’a nos colma de beneficios. Salmo 68:19\n1.     D’a en d’a Cristo está conmigo;\nMe consuela en medio del dolor,\nPues confiando en su poder eterno,\nNo me afano, ni me da temor.\nSobrepuja todo entendimiento\nEn su amor tan grande e infinito\nSiempre me dará lo que es mejor.\n2.    D’a en d’a Cristo me acompaña\nY me brinda dulce comunión.\nTodos mis cuidados él los lleva;\nA él le entrego mi alma y corazón.\nNo hay medida del amor supremo\nDe mi bondadoso y fiel Pastor.\nEl me suple lo que necesito,\nPues el pan de vida es mi Señor.\n3.       Oh Señor, ayúdame este d’a\nA vivir de tal manera aqu’\nQue tu nombre esté glorificado,\nPues anhelo honrarte sólo a ti.\nCon la diestra de tu gran justicia\nMe sustentas en la turbación.\nTus promesas son sostén y gu’a;\nSiempre en ellas hay consolación."},{"n":369,"t":"Cuando Cristo vino","c":"Y le dijo: Levántate, vete; tu fe te ha salvado. Lucas 17:19\n1.         Cuando Cristo vino a mi corazón,\nSu paz y su amor alejaron de m’\nLas dudas, las sombras y el temor.\nCoro:    Mi vida comenzó cuando el Señor llegó,\nY hoy puedo cantar yo de su amor.\nY hoy puedo cantar yo de su amor.\n2.      Hoy quiero que Cristo te transforme a ti,\nQue cambie tu vida también;\nOh, piensa en la cruz donde murió por ti\nY ábrele ya tu corazón."},{"n":370,"t":"La paz con Dios","c":"Justificados, pues, por la fe, tenemos\npaz para con Dios por medio de nuestro\nSeñor Jesucristo.\nEn él tenemos libertad y acceso\na Dios con confianza, por medio\nde la fe en él.\nRomanos 5:1; Efesios 3:12 (RVR)"},{"n":371,"t":"Cuán dulce es confiar","c":"Guarda misericordia y juicio, y en tu Dios conf’a siempre. Oseas 12:6\n1.      ¡Cuán dulce es confiar en Cristo\nY entregarse todo a él,\nEsperar en sus promesas,\nY en sus sendas serle fiel!\nCoro:          Jesucristo, Jesucristo,\nYa tu amor probaste en m’;\nJesucristo, Jesucristo,\nSiempre confiaré en ti.\nCoro:        Jesucristo, Jesucristo,\nYa tu amor probaste en m’;\nJesucristo, Jesucristo,\nSiempre confiaré en ti.\n2.       Dulce s’ es confiar en Cristo\nY cumplir su voluntad,\nNo dudando su palabra,\nQue es la luz y la verdad.\n3.      Siempre en ti confiar yo quiero,\nEn la vida y en la muerte\nProtección me dé tu amor."},{"n":372,"t":"Jesús me pastorea","c":"Yo soy el buen pastor; y conozco mis ovejas. Juan 10:14\nCanon a dos voces\nÀ Jesús me pastorea,\nCamino yo con él;\n¡ Con él, con él,\nCamino yo con él."},{"n":373,"t":"Estoy Bien","c":"1.            De paz inundada mi senda esté\nO cúbrala un mar de aflicción,\nCualquiera que sea mi suerte, diré:\nÒEstoy bien, tengo paz, ¡Gloria a Dios!Ó\nCoro:             Estoy bien, (Estoy bien,)\n¡Gloria a Dios! (¡Gloria a Dios!)\nTengo paz en mi ser, ¡Gloria a Dios!\n2.        Ya venga la prueba o me tiente Satán,\nNo amengua mi fe ni mi amor;\nPues Cristo comprende mis luchas, mi afán,\nY su sangre obrará en mi favor.\nCoro:          Estoy bien, (Estoy bien,)\n¡Gloria a Dios! (¡Gloria a Dios!)\nTengo paz en mi ser, ¡Gloria a Dios!\n3.       Feliz yo me siento al saber que Jesús\nLibróme de yugo opresor;\nQuitó mi pecado, clavólo en la cruz;\nGloria demos al buen Salvador.\n4.         La fe tornaráse en feliz realidad\nAl irse la niebla veloz;\nDesciende Jesús con su gran majestad,\n¡Aleluya, estoy bien con mi Dios!"},{"n":374,"t":"Sigo confiando en Jesús","c":"En el Señor he confiado. Salmo 11:1\nSigo confiando en Jesús mi Salvador;\nSigo confiando en Jesús, no tendré temor;\nSi vienen pruebas y afán puedo cantar;\nSigo confiando en Jesús, nunca faltará.\nEs amigo fiel, Tan fiel para m’,\nMe ayudará Hasta el fin.\nSi vienen pruebas y afán puedo cantar;\nSigo confiando en Jesús, nunca faltará."},{"n":375,"t":"Siempre conmigo está","c":"El permanece en nosotros, por el Esp’ritu que nos ha dado. 1 Juan 3:24\nSi b (Capo 1 - La)                                                 Con certidumbre\n1.     He visto el fúlgido rayo, y o’do el trueno rugir;\nLas olas con su estallido quer’anme destruir;\nO’ la voz de mi Cristo, calmó la cruel tempestad;\nPues prometió no dejarme; siempre conmigo está.\nCoro:          No me desamparará, ni me dejará,\nPues prometió no dejarme; él conmigo está.\nNo me desamparará, ni me dejará,\nPues prometió no dejarme; siempre conmigo está.\nadapt. Comité de Celebremos. MUSICA: Melod’a americana, s. 19.\nCoro:          No me desamparará, ni me dejará,\nPues prometió no dejarme; él conmigo está.\nNo me desamparará, ni me dejará,\nPues prometió no dejarme; siempre conmigo está.\n2. Mundanas nubes me envuelven, y tentaciones también;\nAnte Jesús se disuelven, Jesús es mi sostén;\nMe guarda en todo peligro, su protección él me da;\nPues prometió no dejarme; siempre conmigo está.\n3. Por m’ murió en el Monte, por m’ su sangre vertió,\nPor m’ abrió esa fuente que libertad me dio.\nMe espera allá en la gloria, sentado en gran majestad;\nY desde allá me promete siempre conmigo estar.\nadapt. Comité de Celebremos. MUSICA: Melod’a americana, s. 19."},{"n":376,"t":"Confiad en Jehová","c":"Porque en Jehová el Señor está la fortaleza de los siglos. Isa’as 26:4\nTú guardarás en completa paz\nA aquel cuyo pensamiento\nEn ti persevera, en ti persevera;\nPorque en ti ha confiado.\nConfiad en Jehová perpetuamente\nPorque en Jehová el Señor está\nConfiad en Jehová.\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":377,"t":"Descanso en ti","c":"En ti nos apoyamos y en tu nombre vamos 2 Crónicas 14:11 (RVA)\n1.     Descanso en ti, mi Defensor y Escudo,\nPues en la lid contigo a salvo estoy;\n// En tu poder a combatir acudo;\nDescanso en ti, y en tu nombre voy. //\n2.      Oh Salvador, voy en tu santo nombre,\nTu nombre amado, digno de loor,\n// Justicia, paz y redención del hombre,\nRey de la gloria y Pr’ncipe de amor.//\nJean Sibelius, 1899, arreg. en The Hymnal, 1933. Arreg. © 1933, ren. 1961\nJunta Presbiteriana de Educación Cristiana. Trad. © 1969 Ediciones Certeza. Usado con permiso.\n3.    Por fe yo voy, sintiendo mi flaqueza,\nMás en tu gracia apoyado estoy;\n// En tu poder está mi fortaleza;\nDescanso en ti, y en tu nombre voy. //\n4.   Descansaré contigo al fin en gloria,\nEntrando por portales de esplendor.\n// Tuya es la lucha, tuya la victoria,\nY la alabanza a ti será, Señor. //\nAmén\nJean Sibelius, 1899, arreg. en The Hymnal, 1933. Arreg. © 1933, ren. 1961\nJunta Presbiteriana de Educación Cristiana. Trad. © 1969 Ediciones Certeza. Usado con permiso."},{"n":378,"t":"Noble Sostén","c":"[El Señor] sostiene a los justos. Salmo 37:17\n1.         Noble sostén de la esperanza m’a,\nFuente bendita de la vida eterna,\nTan sólo el alma que en tus fuerzas f’a\nTiene paz, tiene paz.\nCoro:             Mi sostén es Jesús,\nNunca en la lucha desmayar podré;\nNunca en la lucha desmayar podré.\n2.       Yo soy muy débil, pero en ti soy fuerte;\nNunca en la lucha desmayar podré;\nSi tu estás conmigo, ni a la misma muerte\nTemeré, temeré.\nLETRA y MUSICA: Autor y compositor descon., México, s. 20, arreg. F.B.J.                MEX\nCoro:            Mi sostén es Jesús,\nNunca en la lucha desmayar podré;\nNunca en la lucha desmayar podré.\n3.         Dura es la lucha, dif’cil la tarea,\nMas tú me dotas de tu gran poder;\nDe vencer, de vencer.\nUltimo coro:          Alelú, alelú,\nnunca en la lucha desmayar podré;\nAlelú, aleluya,\nnunca en la lucha desmayar podré.\nLETRA y MUSICA: Autor y compositor descon., México, s. 20, arreg. F.B.J."},{"n":379,"t":"An’mate y esfuérzate","c":"Esfuérzate, sé valiente y actúa... Dios... estará contigo. 1 Crónicas 28:20 (RVA)\nCoro:          An’mate y esfuérzate,\nY manos a la obra,\nAn’mate y esfuérzate; y manos a la obra.\n1.               David dijo a su hijo:\nÒNo temas, ni desmayes\nPorque Jehová mi Dios estará contigoÓ.\n2.               ÒEl no te dejará\nNi te desampará\nHasta que acabes toda la obra de DiosÓ.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":380,"t":"L’mpiame, Señor","c":"El es fiel y justo para... limpiarnos de toda maldad. 1 Juan l:9\n1.    L’mpiame, Señor, de toda mi maldad;\nBorra mi pecado, dame santidad.\nQuiero por tu sangre el perdón gozar;\nL’mpiame, Señor, para adorar.\n2.    L’mpiame, Señor, de toda mi maldad;\nSé que no busqué hacer tu voluntad.\nTe confieso, Cristo, que rebelde fui;\nL’brame, Señor; acudo a ti.\n3.     L’brame, Señor, tu voz escucharé;\nCon humilde corazón te seguiré.\nEn sinceridad te quiero alabar;\nLibre estoy, Señor, para adorar."},{"n":381,"t":"Tú me perdonas, Señor","c":"De una misma boca proceden bendición y\nmaldición. Hermanos m’os, esto no debe ser as’.\nPorque donde hay celos y contención,\nall’ hay perturbación y toda obra perversa.\nSometeos, pues, a Dios; resistid al diablo, y huirá\nde vosotros.\nAcercaos a Dios, y él se acercará a vosotros.\nPecadores, limpiad las manos; y vosotros\nlos de doble ánimo, purificad vuestros corazones.\nSantiago 3:10, 16; 4:7, 8; 1 Juan 1:7, 9; 2:1; Salmo 139:23, 24 (RVR)\nSi andamos en luz, como él está en luz,\ntenemos comunión unos con otros,\nY la sangre de Jesucristo su Hijo nos limpia de\ntodo pecado.\nSi confesamos nuestros pecados, él es fiel\ny justo para perdonar nuestros pecados,\ny limpiarnos de toda maldad.\nHijitos m’os, estas cosas os escribo para que no\npequéis;\nSantiago 3:10, 16; 4:7, 8; 1 Juan 1:7, 9; 2:1; Salmo 139:23, 24 (RVR)\nY si alguno hubiere pecado, abogado\ntenemos para con el Padre, a Jesucristo el\njusto.\nExam’name, oh Dios, y conoce mi corazón;\nPruébame y conoce mis pensamientos;\nY ve si hay en m’ camino de perversidad,\ny gu’ame en el camino eterno.\nSantiago 3:10, 16; 4:7, 8; 1 Juan 1:7, 9; 2:1; Salmo 139:23, 24 (RVR)"},{"n":382,"t":"Mi corazón, oh examina hoy","c":"Exam’name, oh Dios, y conoce mi corazón. Salmo 139:23\n¥1.      Mi corazón, oh examina hoy;\nMis pensamientos prueba, oh Señor.\nVe si en m’ perversidades hay;\nPor sendas rectas gu’ame por tu amor.\n2.    L’mpiame, Dios, de toda mi maldad;\nAviva hoy mi errante corazón.\nQuiero andar contigo en santidad;\nLlena mi vida de tu bendición.\nE. de Fuller, #2 Comité de Celebremos. MUSICA: Melod’a maori, es arreg."},{"n":383,"t":"Si fui motivo de dolor","c":"Si confesamos nuestros pecados, él es fiel... para perdonar. 1 Juan 1:9\n¥1.        Si fui motivo de dolor, oh Cristo,\nSi por mi causa el débil tropezó,\nSi en tus pisadas caminar no quise,\nPerdón te ruego, mi Señor y Dios.\nCoro:    Escucha, oh Dios, mi confesión humilde\nY l’brame de tentación sutil;\nOh, guarda siempre mi alma en tu rebaño;\nPerdón te ruego, mi Señor y Dios.\nCoro:    Escucha, oh Dios, mi confesión humilde\nY l’brame de tentación sutil;\nOh, guarda siempre mi alma en tu rebaño;\nPerdón te ruego, mi Señor y Dios.\n¥2.        Si vana y fútil mi palabra ha sido,\nSi al que sufr’a, en su dolor dejé,\nSi sólo agrado m’o he buscado,\nPerdón te ruego, mi Señor y Dios.\n¥3.      Si por la vida quise andar sin penas,\nTranquilo, libre y sin luchar por ti,\nCuando anhelabas verme en la lucha,\nPerdón te ruego, mi Señor y Dios."},{"n":384,"t":"Haz lo que quieras","c":"Tú eres nuestro padre; nosotros barro... obra de tus manos somos. Isa’as 64:8\n¥1.   Haz lo que quieras de m’, Señor;\nTú el Alfarero, yo el barro soy;\nDócil y humilde anhelo ser;\nCúmplase siempre en m’ tu querer.\n2.    Haz lo que quieras de m’, Señor;\nM’rame y prueba mi corazón;\nLávame y quita toda maldad\nPara que tuyo sea en verdad.\n3.    Haz lo que quieras de m’, Señor;\nCura mis llagas y mi dolor;\nTuyo es, oh Cristo, todo poder;\nTu mano extiende y sana mi ser.\n¥4.   Haz lo que quieras de m’, Señor;\nDel Paracleto dame la unción;\nDueño absoluto sé de mi ser;\nQue el mundo a Cristo\npueda en m’ ver."},{"n":385,"t":"Perdón","c":"El Señor... grande en misericordia, que perdona la iniquidad. Números 14:18\nJehová tardo para la ira;\nJehová grande en misericordia;\nQue perdona la iniquidad,\nQue perdona la rebelión;\nPerdona ahora la iniquidad,\nPerdona ahora la gran rebelión\nDe este pueblo, según la grandeza\nDe tu divina misericordia.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":386,"t":"Cristo es mi dulce Salvador","c":"Te glorificaré, oh Señor, porque me has exaltado. Salmo 30:1\n¥1.        Cristo es mi dulce Salvador,\nMostróme su infinito amor muriendo en dura cruz.\nCuando estoy triste encuentro en él\nConsolador y amigo fiel;\nConsolador, amigo fiel, es Jesús.\n¥2.         Cristo es mi dulce Salvador;\nsu sangre me compró;\nCon sus heridas y dolor, perfecta paz me dio.\nDicha inmortal allá tendré, con Cristo siempre reinaré;\nDicha inmortal allá tendré con Jesús.\nLETRA y MUSICA: Will L. Thompson, 1904, trad. S.D. Athans.\n¥3. Cristo es mi dulce Salvador, mi eterno Redentor;\n¡Oh! nunca yo podré pagar la deuda de su amor.\nLe seguiré, pues, en la luz;\nno temeré llevar su cruz;\nNo temeré llevar la cruz de Jesús.\n4. Cristo es mi dulce Salvador, por él salvado soy,\nGloria inmortal allá tendré,\ncon Cristo siempre reinaré;\nGloria inmortal allá tendré con Jesús.\nLETRA y MUSICA: Will L. Thompson, 1904, trad. S.D. Athans."},{"n":387,"t":"Dulce Comunión","c":"El eterno Dios es tu refugio, y acá abajo los brazos eternos. Deuteronomio 33:27\n¥1.         Dulce comunión la que gozo ya\nEn los brazos de mi Salvador;\n¡Qué gran bendición en su paz me da!\n¡Oh! yo siento en m’ su tierno amor.\nCoro:      Libre, salvo, del pecado y del temor;\nLibre, salvo, en los brazos de mi Salvador.\n(Libre de penas, salvo de dudas, del pecado\ny del temor; Libre de penas, salvo de dudas,\nen los brazos de mi Salvador.)\nCoro:       Libre, salvo, del pecado y del temor;\nLibre, salvo, en los brazos de mi Salvador.\n(Libre de penas, salvo de dudas, del pecado\ny del temor; Libre de penas, salvo de dudas,\nen los brazos de mi Salvador.)\n2.      ¡Cuán dulce es vivir, cuán dulce es gozar!\nEn los brazos de mi Salvador;\nAll’ quiero ir y con él morar,\nSiendo objeto de su tierno amor.\n¥3.        No hay que temer, ni que desconfiar,\nEn los brazos de mi Salvador;\nPor su gran poder él me guardará\nDe los lazos del engañador."},{"n":388,"t":"Hay Momentos","c":"Pienso que ni aun en el mundo cabr’an los libros. Juan 21:25\nHay momentos que las palabras no me alcanzan\nPara decirte lo que siento por ti, mi buen Jesús.\nHay momentos que las palabras no me alcanzan\nPara decirte lo que siento por ti, mi buen Jesús.\nYo te agradezco por todo lo que has hecho,\nPor todo lo que haces, y todo lo que harás.\nYo te agradezco por todo lo que has hecho,\nPor todo lo que haces, y todo lo que harás.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s.20, arreg. F.B.J.          L.A."},{"n":389,"t":"Amarte es lo mejor","c":"Amarás al Señor tu Dios con todo tu corazón. Mateo 22:37\n1.            Amarte, Dios, es lo mejor\nque puedo hacer;\nA tu amor yo quiero siempre responder.\nQuiero amarte más, quiero amarte más;\nAmarte, Dios, es lo mejor que puedo hacer.\n2.            Servirte, Dios, es lo mejor\nque puedo hacer;\nA tu amor yo quiero siempre responder.\nQuiero servirte más, quiero servirte más;\nServirte, Dios, es lo mejor\nque puedo hacer.\nLETRA y MUSICA: Mark Pendergrass, 1977, alt.,\ntrad. Esteban Sywulka B. © 1977 Sparrow Song/ Cherry River\nMusic Publ. Co./Candle Co. Music, admin. Sparrow Corp. Usado con permiso."},{"n":390,"t":"Cristo vive en m’","c":"Estando muertos... os dio vida juntamente con él. Colosenses 2:13\nCon Cristo he sido juntamente\ncrucificado, crucificado;\nY ya no vivo yo,\nsino que Cristo vive en m’.\nLo que ahora vivo en la carne,\nlo vivo por la fe en el Hijo de Dios\nQuien me amó y se entregó\na s’ mismo por m’,\nQuien me amó y se entregó\na s’ mismo por m’.\nCHI\n© 1983 Casa Bautista de Publicaciones. Usado con permiso."},{"n":391,"t":"Ciertamente el bien de Dios","c":"Ciertamente el bien y la misericordia me seguirán todos los d’as. Salmo 23:6\n1.              Yo fui peregrino errabundo;\nen la garras del mal me envolv’.\nMas Cristo apartóme del mundo\nY por siempre mi alma le di.\nCoro:               Ciertamente el bien\ny la compasión
