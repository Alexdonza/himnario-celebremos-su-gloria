de Dios,\nHasta el fin, hasta el fin me seguirán.\nCiertamente el bien y la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\ntrad. Magdalena S. Cantú. MUSICA: John W. Peterson y Alfred Smith, 1958.\nCoro:              Ciertamente el bien\ny la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\nCiertamente el bien y la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\n2.            Jesús mi alma triste conforta;\nNuevas fuerzas a diario tendré.\nSu fuente de paz no se agota,\nen su hogar celestial moraré.\ntrad. Magdalena S. Cantú. MUSICA: John W. Peterson y Alfred Smith, 1958.\n3.            Si ando en el valle de sombra,\nVa conmigo mi buen Salvador.\nSi tú quieres que él te proteja,\nHoy recibe su gracia y amor.\nCoro:                Ciertamente el bien\ny la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\nCiertamente el bien y la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\nY en la casa de Dios moraré por siempre;\nY comeré de la mesa de Jehová.\nCiertamente el bien y la compasión de Dios,\nHasta el fin, hasta el fin me seguirán.\ntrad. Magdalena S. Cantú. MUSICA: John W. Peterson y Alfred Smith, 1958."},{"n":392,"t":"Comunión con Cristo","c":"Lo que hemos visto y o’do lo anunciamos\ntambién a vosotros, para que vosotros\ntambién tengáis comunión con nosotros.\nY nuestra comunión es con el Padre\ny con su Hijo Jesucristo.\nSi decimos que tenemos comunión con él y andamos\nen tinieblas, mentimos y no practicamos la verdad.\nPermaneced en él para que, cuando\naparezca, tengamos confianza y no nos\navergoncemos delante de él, en su venida.\n1 Juan 1:3, 6; 2:28; 3:2, 3; 1 Corintios 13:12, 13; 1:9 (RVA)\nAmados, ahora somos hijos de Dios, y aún\nno se ha manifestado lo que seremos.\nPero sabemos que cuando él sea\nmanifestado, seremos semejantes a él,\nporque le veremos tal como él es.\nY todo aquel que tiene esta esperanza en él,\nse purifica a s’ mismo, como él también es puro.\nAhora vemos oscuramente por medio de un\nespejo, pero entonces veremos cara a cara.\n1 Juan 1:3, 6; 2:28; 3:2, 3; 1 Corintios 13:12, 13; 1:9 (RVA)\nAhora conozco en parte, pero entonces conoceré\nplenamente, as’ como fui conocido.\nY ahora permanecen la fe, la esperanza\ny el amor, estos tres;\nPero el mayor de ellos es el amor.\nFiel es Dios, por medio de quien\nfuisteis llamados a la comunión de\nsu Hijo Jesucristo, nuestro Señor.\n1 Juan 1:3, 6; 2:28; 3:2, 3; 1 Corintios 13:12, 13; 1:9 (RVA)"},{"n":393,"t":"A los pies de Jesucristo","c":"¥1.           A los pies de Jesucristo\nes el sitio aqu’ mejor,\nEscuchando cual Mar’a las palabras de su amor.\nA los pies de Jesucristo, gozaré su comunión,\nPues su mano fiel y tierna me ha provisto protección.\n¥2.                A los pies de Jesucristo,\nhallo tierna compasión;\nEl quitó ya mis afanes, y me dio su bendición.\nPuedo yo decirle a Cristo mis cuidados y temor,\nY con él tendrá mi alma gozo, paz, eterno amor.\n3.                A los pies de Jesucristo,\nyo tendré su bendición;\nEn sus ojos hay dulzura, y en su seno protección.\n¡Qué feliz es el momento\nque yo paso junto a ti!\nY anhelo el encuentro cuando vengas tú por m’."},{"n":394,"t":"Cuando andamos con Dios","c":"Os ruego que andéis como es digno de la vocación con que fuisteis llamados. Efesios 4:1\n¥1.               Cuando andamos con Dios,\nescuchando su voz,\nNuestra senda florida será;\nCumpliremos su ley\nporque es nuestro Rey,\nY su amor siempre nos guiará.\nCoro:          Obedecer, y confiar en Jesús,\nEs la senda marcada para andar en la luz.\ncoro Vicente Mendoza. MUSICA: Daniel B. Towner, 1887.\nCoro:          Obedecer, y confiar en Jesús,\nEs la senda marcada para andar en la luz.\n¥2.              Cuando Cristo murió\nnuestro llanto enjugó;\nProclamarle debemos doquier;\nGozarán del amor del bendito Señor\nLos que humildes le entregan su ser.\n3.               No podremos probar\nsus delicias sin par\nSi seguimos mundano el placer;\nDisfrutamos su amor y divino favor\nAl ser fieles en obedecer.\ncoro Vicente Mendoza. MUSICA: Daniel B. Towner, 1887."},{"n":395,"t":"Oh Cristo, yo te amo","c":"Señor, tú sabes que te amo. Juan 21:15\n¥1.   ¡Oh Cristo! yo te amo, que m’o eres sé;\nYa todo pecado por ti dejaré.\n¡Oh Cristo precioso! por ti salvo soy;\nJesús, si te amaba yo te amo más hoy.\n2.      Me amaste primero y as’ te amo a ti,\nPues sobre el Calvario moriste por m’;\nPor lo que sufriste, mi vida te doy;\nJesús, si te amaba yo te amo más hoy.\ntrad. G.P. Simmonds. MUSICA: Adoniram J. Gordon, 1876.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso.\n3.     Y mientras que viva en este vaivén,\nEn la hora final de la muerte también,\nYo te amaré siempre; cantándote estoy,\nÒJesús, si te amaba yo te amo más hoyÓ.\n¥4.   Al fin en tu gloria por gracia entraré\nY all’ con los santos loor te daré;\nPor siglos eternos a cantarte voy,\nÒJesús, si te amaba yo te amo más hoyÓ.\ntrad. G.P. Simmonds. MUSICA: Adoniram J. Gordon, 1876.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso."},{"n":396,"t":"Oh, Cristo m’o, Rey de mi alma","c":"A fin de que seamos para alabanza de su gloria. Efesios 1:12\nSi b (Capo 1 - La)                                                     Con emoción\n1.        Oh Cristo m’o, Rey de mi alma,\nSalvásteme del mal con gracia sin igual\nPor tu preciosa sangre pur’sima;\nNinguna mancha ya me contamina.\nCoro:     Tanto me amaste, que te ofreciste,\nSacrificándote sobre una cruz\nPara mi redención con tanto amor;\nSé que te amo, Cristo mi Salvador.\nLETRA y MUSICA: Guillermo Gillam, 1947, alt.\nCOL\n© 1947. Usado con permiso de Mary Gillam.\nCoro:    Tanto me amaste, que te ofreciste,\nSacrificándote sobre una cruz\nPara mi redención con tanto amor;\nSé que te amo, Cristo mi Salvador.\n2.       Cuando iba errante, tú me buscaste,\nNo me dejaste perder el alma;\nPor plena gracia compraste mi salud,\nY me impartiste tu santa virtud.\nLETRA y MUSICA: Guillermo Gillam, 1947, alt.\nCOL\n© 1947. Usado con permiso de Mary Gillam."},{"n":397,"t":"En mis angustias","c":"Al Señor busqué en el d’a de mi angustia. Salmo 77:2\n1.          En mis angustias me ayuda Jesús;\nSobre mi alma derrama su luz;\nTodos los d’as consuelo me da;\nCada momento conmigo está.\nCoro:    Cada momento me guardas, Señor,\nCada momento en gracia y amor;\nVida abundante yo tengo en ti;\nCada momento tú vives en m’.\nCOL\nCoro:   Cada momento me guardas, Señor,\nCada momento en gracia y amor;\nVida abundante yo tengo en ti;\nCada momento tú vives en m’.\n2.      Yo acudo al trono de gracia con fe;\nOye mi voz, y mis lágrimas ve\nCristo Jesús en el cielo, y all’,\nCada momento se acuerda de m’.\n3.      Cristo es mi Roca, mi Libertador;\nEs mi Escudo, mi gran Defensor;\nEl a mi lado en las luchas está\nCada momento, y ayuda me da."},{"n":398,"t":"Pacientemente","c":"(RESPUESTA MUSICAL)\n(Mujeres)                Pacientemente le esperé;\n(Varones)                       Me oyó, me oyó.\n(Mujeres)              Del hoyo de la destrucción\n(Varones)                      Me sacó, me sacó.\n(Otras posibilidades:)\n(M.)              En firme peña me asentó;\n(V.)                      Roca es, Roca es.\n(M.)              Mis pasos Dios enderezó;\n(V.)                 Rectos son, rectos son.\n(M.)             Un nuevo cántico me dio;\n(V.)                      Cantaré, cantaré.\n(M.)          Doy alabanza a nuestro Dios;\n(V.)                ¡Gloria a él, gloria a él!"},{"n":399,"t":"Un canto de alabanza","c":"Al SE„OR esperé pacientemente, y él se\ninclinó a m’ y oyó mi clamor.\nMe sacó del hoyo de la destrucción,\ndel lodo cenagoso; asentó mis pies\nsobre roca, y afirmó mis pasos.\n#398\nPuso en mi boca un cántico nuevo, un\ncanto de alabanza a nuestro Dios; muchos\nverán esto y temerán, y confiarán en el SE„OR.\nSalmo 40:1-5, 8-10, 16 (BLA)\nCuán bienaventurado es el hombre\nque ha puesto en el SE„OR su confianza,\ny no se ha vuelto a los soberbios ni a los\nque caen en falsedad.         #398\nMuchas son, SE„OR, Dios m’o, las maravillas\nque tú has hecho, y muchos tus designios para\ncon nosotros;\nNadie hay que se compare contigo;\nsi los anunciara, y hablara de ellos, no\npodr’an ser enumerados.        #398\nSalmo 40:1-5, 8-10, 16 (BLA)\nMe deleito en hacer tu voluntad, Dios\nm’o; tu ley está dentro de mi corazón.\nHe proclamado buenas nuevas\nde justicia en la gran congregación;\n#398\nHe aqu’, no refrenaré mis labios, oh SE„OR,\ntú lo sabes.\nNo he escondido tu justicia dentro de mi\ncorazón; he proclamado tu fidelidad y\ntu salvación;         #398\nSalmo 40:1-5, 8-10, 16 (BLA)\nNo he ocultado a la gran congregación tu\nmisericordia y tu verdad.\nRegoc’jense y alégrense en ti todos los\nque te buscan; que digan continuamente:\n¡Engrandecido sea el SE„OR! los que aman\ntu salvación.         #398\nSalmo 40:1-5, 8-10, 16 (BLA)"},{"n":400,"t":"Quiero cantar una linda canción","c":"Cantad a Jehová, vosotros sus santos. Salmo 30:4\n1.      Quiero cantar una linda canción\nDe un hombre que me transformó,\nQuiero cantar una linda canción\nDe aquel que mi vida cambió.\nEs mi amigo Jesús, es mi amigo Jesús,\nEl es Dios, él es Rey, es amor y verdad.\nSólo en él encontré esa paz que busqué,\nSólo en él encontré la felicidad.\nL.A.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J.\n2.       Cuando Jesús a mi vida llegó\nEsa paz y ese gozo me dio;\nQuiero que sepas que tú también\nPuedes gozar siempre de su amor.\nSi creyeres en él, si confiares también,\nSu amor te dará, y con él vivirás.\nComo yo, cantarás esta linda canción\nY amor llevarás a la humanidad.\nL.A.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J."},{"n":401,"t":"Mi pensamiento eres tú, Señor","c":"¡Cuán preciosos me son, oh Dios, tus pensamientos! Salmo 139:17\nPorque tú eres mi buen pastor,\nme alimentas con tu amor,\nY tu Palabra me da vigor,\nseguro estoy;\nPorque tú eres mi buen pastor,\nme alimentas con tu amor,\nY tu Palabra me da vigor,\nseguro estoy."},{"n":402,"t":"La vid y los pámpanos","c":"Yo soy la vid verdadera, y mi Padre es el labrador. Juan 15:1\n1.       Yo soy la vid y mi Padre el Labrador,\nVosotros pámpanos, dice el Salvador.\nEstad en m’ (estad en m’) Y yo en ti (y yo en ti)\nY fruto llevaréis; Porque sin m’(porque sin m’)\nNada podéis (nada podéis) hacer jamás.\nDios nos ha puesto los frutos a llevar\nQue permanezcan como un testimonio a él.\n2.         El que estuviere en la vid le limpiará,\nPara que frutos abunden más y más.\nLuego pedid (luego pedid) Sin desmayar (sin desmayar)\nTodo lo que deseáis; El Dios de amor (el Dios de amor)\nA quien amáis (a quien amáis) os lo dará.\nGlorificado as’ mi Padre es en que llevéis\nmucho fruto y seáis siempre fiel.\n3.        Por mis palabras vosotros limpios sois;\nCon el amor de mi Padre amo yo.\nDejad mi amor (dejad mi amor)\nSiempre brillar (siempre brillar)\nCon todo su fulgor; Grato será (grato será)\nObedecer (obedecer) mi voluntad.\nTodo mi gozo en vosotros estará\nY vuestro gozo con fruto cumplido será."},{"n":403,"t":"Oh Dios, revélame tu voluntad","c":"Enséñame a hacer tu voluntad, porque tú eres mi Dios. Salmo 143:10\n1.          Oh Dios, revélame tu voluntad;\nPor donde debo andar, qué pasos he de dar,\npara poder gozar tu voluntad.\n2.        Imprime en m’, Señor, tu voluntad;\nPon en mi corazón seguridad.\nTu voz anhelo o’r haciéndome sentir\nEl ansia de cumplir tu voluntad.\n3.        He de aceptar, Señor, tu voluntad\nEn tiempos de dolor y adversidad;\nEn medio de aflicción, en prueba y tentación,\nQue sea mi porción tu voluntad.\n4.        Quiero probar, Señor, tu voluntad,\nY el gran poder sentir de tu verdad.\nPor fe deseo andar, tu plenitud tomar,\nY en todo tiempo amar tu voluntad.\n5.       Cúmplase en m’, Señor, tu voluntad;\nConf’o en tu poder y gran bondad.\nRindo mi ser a ti, que viva Cristo en m’,\nHe de cumplir as’ tu voluntad.\nAmén."},{"n":404,"t":"Oh deja que el Señor","c":"Echa sobre Jehová tu carga, y él te sustentará. Salmo 55:22\n1.              Oh deja que el Señor\nte envuelva* con su Esp’ritu de amor,\nSatisfaga hoy tu alma y corazón.\nEntrégale lo que te impida\nen tu caminar con Dios\nY tu vida llenará de bendición.\nCoro:      Cristo, oh Cristo, llénanos, Señor.\nCristo, oh Cristo, llénanos, Señor.\n* te gu’e o te llene\nLETRA y MUSICA: John Wimber, 1979, es trad. © 1979 Mercy Song. Usado con permiso.\nCoro:   Cristo, oh Cristo, llénanos, Señor.\nCristo, oh Cristo, llénanos, Señor.\n2.       Alzamos nuestra voz con gozo,\nAlabando al Señor;\nCon dulzura le entregamos\nnuestro ser.\nEntrega toda tu tristeza\nen el nombre de Jesús\ny abundante vida\nhoy tendrás en él.\nLETRA y MUSICA: John Wimber, 1979, es trad. © 1979 Mercy Song. Usado con permiso."},{"n":405,"t":"Cuán dulce el nombre de Jesús","c":"Y llamarás su nombre JESUS. Mateo 1:21\n1.     ¡Cuán dulce el nombre de Jesús\nEs para el hombre fiel!\nConsuelo, paz, vigor, salud\nEncuentra siempre en él.\n2.        Al pecho herido fuerzas da,\nY calma al corazón;\nAl alma hambrienta es cual maná,\nY alivia su aflicción.\n3.   Tan dulce nombre es para m’,\nDe dones plenitud;\nRaudal que nunca exhausto vi\nDe gracia y de salud.\n4.   Jesús, mi amigo y mi sostén,\nBendito Salvador,\nAcepta mi loor.\n5.   Si es pobre ahora mi cantar,\nCuando en la gloria esté\nY allá te pueda contemplar,\nMejor te alabaré."},{"n":406,"t":"Si dejas tú que Dios te gu’e","c":"Gu’ame por la senda de tus mandamientos. Salmo 119:35\n1.             Si dejas tú que Dios te gu’e,\nconfiando solamente en él,\nEn tus angustias y conflictos\ntendrás su ayuda grande y fiel.\nEl inmutable amor de Dios roca eterna y firme es.\n2.        Espera en Dios pacientemente,\ncon gozo en tu corazón;\nCon gratitud acepta siempre\ndel cielo toda bendición.\nDios quiere siempre lo mejor para los hijos de su amor.\nLETRA y MUSICA: Georg Neumark, 1641, trad. Adolfo Robleto, alt.\n3.     En la oración fiel permanece;\nsé obediente a su ley;\nSu protección Dios te ofrece,\nen sus promesas pon tu fe.\nJehová no olvida nunca al fiel,\nni al justo que conf’a en él. Amén\nLETRA y MUSICA: Georg Neumark, 1641, trad. Adolfo Robleto, alt."},{"n":407,"t":"Me gu’a él","c":"Enséñame, oh Señor, tu camino, y gu’ame por senda de rectitud. Salmo 27:11\n¥1.          Me gu’a él, con cuánto amor\nme gu’a siempre mi Señor;\nEn todo tiempo puedo ver con cuánto amor me gu’a él.\nCoro:           Me gu’a él, me gu’a él\nCon cuánto amor me gu’a él;\nNo abrigo dudas ni temor,\nPues me conduce el buen Pastor.\n¥2.            En el abismo del dolor\nO donde intenso brilla el sol,\nEn dulce paz o en lucha cruel,\nCon gran bondad me gu’a él.\nCoro:        Me gu’a él, me gu’a él\nCon cuánto amor me gu’a él;\nNo abrigo dudas ni temor,\nPues me conduce el buen Pastor.\n3.        La mano quiero yo tomar\nDe Cristo y nunca vacilar,\nCumpliendo con fidelidad\nsu sabia y santa voluntad.\n¥4.        Y la carrera al terminar,\nEl alba eterna al vislumbrar,\nNo habrá ni dudas ni temor,\nPues me guiará mi buen Pastor."},{"n":408,"t":"Cristo es Gu’a de mi vida","c":"Jehová solo le guió. Deuteronomio 32:12\n1.            Cristo es Gu’a de mi vida,\nya no hay nada que temer;\nNunca puedo yo dudarle,\npues me sabe defender.\nPaz, consuelo y vida eterna\npor la fe yo tengo en él,\n// Y con él ya nada temo\nporque Cristo es Gu’a fiel. //\n2.            Cristo es Gu’a de mi vida,\nlibre estoy de todo afán;\nEn las pruebas me da gracia, es de mi alma el vivo Pan.\nSi de sed estoy sufriendo, si mi paso lento va,\n// El prepara fuente viva\nque mi ser refrescará. //\n3.              Cristo es Gu’a de mi vida,\n¡oh qué plenitud de amor!\nEn su hogar celeste ofrece dar descanso el Salvador.\nCuando de este mundo parta,\nviviré con él, yo sé:\n// ÒJesucristo fue mi gu’aÓ, por los siglos cantaré. //"},{"n":409,"t":"Cristo mi camino guió","c":"Mas ahora... andad como hijos de luz. Efesios 5:8\n1.                   Un d’a el mundo dejaré;\na la dorada playa iré;\nLlegando al cielo cantaré,\nÒCristo mi camino guióÓ.\nCoro:             Cristo mi camino guió;\npaso a paso me llevó.\nAl final de la jornada,\na los ángeles diré, ÒCristo mi camino guióÓ.\nLETRA y MUSICA: John W. Peterson, 1954, trad. Magdalena S. Cantú.\n© 1954, ren. 1982 trad. © 1966 John W. Peterson. Usado con permiso.\nCoro:              Cristo mi camino guió;\npaso a paso me llevó.\nAl final de la jornada,\na los ángeles diré, ÒCristo mi camino guióÓ.\n2.             Y desde el cielo al revisar\na mi terrestre caminar,\nSeguro estoy que he de probar:\nCristo mi camino guió.\n3.              Mi senda aqu’ enderezó;\nlas sombras negras me quitó;\nCristo mi camino guió.\nLETRA y MUSICA: John W. Peterson, 1954, trad. Magdalena S. Cantú.\n© 1954, ren. 1982 trad. © 1966 John W. Peterson. Usado con permiso."},{"n":410,"t":"Que mi vida entera esté","c":"Los que te aman, sean como el sol cuando sale en su fuerza. Jueces 5:31\n1. Que mi vida entera esté consagrada a ti, Señor;\nQue a mis manos pueda guiar el impulso de tu amor.\n2. Que mis pies tan sólo en pos de lo santo puedan ir,\nY que a ti, Señor, mi voz se complazca en bendecir.\n3.    Que mi tiempo todo esté consagrado a tu loor,\nQue mis labios al hablar, hablen sólo de tu amor.\n4. Toma ¡oh Dios! mi voluntad, y hazla tuya, nada más;\nToma, s’, mi corazón; por tu trono lo tendrás.\n5. Toma tú mi amor, que hoy a tus pies vengo a poner;\nToma todo lo que soy; todo tuyo quiero ser.\ntrad. Vicente Mendoza; coro opt. Oscar López M., 1989. MUSICA: William J. Kirkpatrick, 1903.\nCoro:\nLávame en tu sangre, Salvador, (mi Salvador),\nL’mpiame de toda mi maldad. (de mi maldad).\nTraigo a ti mi vida, para ser, Señor,\nTuya por la eternidad.\n(Coro: versión optativa)\nQuiero entregarme a ti, Señor, (a ti, Señor),\nQuiero siempre andar en santidad. (en santidad).\nTraigo a ti mi vida, para ser, Señor,\nTuya por la eternidad.\ntrad. Vicente Mendoza; coro opt. Oscar López M., 1989. MUSICA: William J. Kirkpatrick, 1903."},{"n":411,"t":"Caut’vame, Señor","c":"El que pierde su vida por causa de m’, la hallará. Mateo 10:39\n1.           Caut’vame, Señor, y libre en ti seré;\nAnhelo ser un vencedor,\nrindiéndome a tus pies.\nNo puedo ya confiar tan sólo en mi poder;\nEn ti yo quiero descansar, y fuerte habré de ser.\n2.          Mi débil corazón vacila sin cesar,\nY es como nave sin timón en turbulento mar.\nConcédele, Señor, perfecta libertad;\nEnvuélvele en tu santo amor, y libre as’ será.\n3.             Sin fuerzas para amar\ny as’ mejor vivir;\nTú solo puedes inspirar el gozo de servir.\nQuisiera desplegar mis alas, oh Señor,\nMas sólo lo podré lograr\nal soplo de tu amor.\n4.   Caut’vame, Señor, que en ti mi voluntad\nTendrá un bautismo de vigor,\nfirmeza y santidad.\nPodrá la tentación mi vida sacudir;\nNo habrá más cierta protección\nque la que encuentre en ti."},{"n":412,"t":"Oh yo quiero andar con Cristo","c":"Ciertamente el obedecer es mejor que los sacrificios. 1 Samuel 15:22\n1.           ¡Oh! yo quiero andar con Cristo;\nquiero o’r su tierna voz,\nMeditar en su palabra,\nsiempre andar de él en pos.\nConsagrar a él mi vida, cumplir fiel su voluntad,\nY algún d’a con mi Cristo, gozaré la claridad.\nCoro:            ¡Oh, yo quiero andar con Cristo!\n¡Oh, yo quiero vivir con Cristo!\n¡Oh, yo quiero morir con Cristo!\nQuiero serle un testigo fiel.\nLETRA y MUSICA: Charles F. Weigle, 1902, trad. H.C. Ball, alt.\nCoro:         ¡Oh, yo quiero andar con Cristo!\n¡Oh, yo quiero vivir con Cristo!\n¡Oh, yo quiero morir con Cristo!\nQuiero serle un testigo fiel.\n2.            ¡Oh! yo quiero andar con Cristo;\nél vivió en santidad; En la Biblia yo lo leo,\ny yo sé que es la verdad.\nCristo era santo en todo, el Cordero de la cruz;\nQuiero ser un fiel cristiano, seguidor de mi Jesús.\n3. ¡Oh! yo quiero andar con Cristo; de mi senda es la luz;\nDejaré el perverso mundo; cargaré aqu’ mi cruz.\nEste mundo nada ofrece; Cristo ofrece salvación,\nY es mi dulce esperanza gozar vida eterna en Sion.\nLETRA y MUSICA: Charles F. Weigle, 1902, trad. H.C. Ball, alt."},{"n":413,"t":"He decidido seguir a Cristo","c":"Y luego los llamó; y... le siguieron. Marcos 1:20\n1.          He decidido seguir a Cristo,\n// He decidido seguir a Cristo, //\nNo vuelvo atrás, no vuelvo atrás.\n2.            La vida vieja la he dejado,\n// La vida vieja la he dejado, //\nNo vuelvo atrás, no vuelvo atrás.\n3.       El Rey de gloria me ha transformado,\n// El Rey de gloria me ha transformado, //\nNo vuelvo atrás, no vuelvo atrás."},{"n":414,"t":"Oh Cristo, anhelo agradarte","c":"El hacer tu voluntad, Dios m’o, me ha agradado. Salmo 40:8\nOh Cristo m’o, yo anhelo agradarte,\nTú que has hecho tanto para m’;\nHaz que mi vida sea rendida,\nLimpia y santa, consagrada a ti.\nTe necesito, yo soy tan débil;\nMas con tu ayuda puedo vencer;\nOh Cristo m’o, yo anhelo agradarte,\nTú que has hecho tanto para m’.\nLETRA y MUSICA: Wilda de Savage, 1949.                                  ECU"},{"n":415,"t":"Busca primero el reino de Dios","c":"Mas buscad primeramente el reino de Dios y su justicia. Mateo 6:33\n¥Busca primero el reino de Dios\nY su justicia perfecta,\nY lo demás añadido será; Alelú, aleluya.\n(Contramelod’a)\nAleluya, aleluya, aleluya, alelú, aleluya."},{"n":416,"t":"Cristo fiel te quiero ser","c":"Como lo habéis aprendido de Epafras... un fiel ministro de Cristo. Colosenses 1:7\n¥1.               Cristo, fiel te quiero ser,\nDame el poder, dame el poder;\nYo contigo quiero andar,\nSin vacilar, sin vacilar.\nCoro:               En tus pasos quiero seguir,\nCerca de ti, cerca de ti;\nY si encuentro pruebas aqu’,\nDame confianza en ti.\n2.                  Con Jesús yo quiero hablar,\nSólo con él, sólo con él;\nPaz y gozo yo tendré,\nAl serle fiel, al serle fiel.\nLETRA y MUSICA: J. O. Hillyer, 1936, es trad.\nCoro:     En tus pasos quiero seguir,\nCerca de ti, cerca de ti;\nY si encuentro pruebas aqu’,\nDame confianza en ti.\n¥3.       Dame ardiente corazón,\nLleno de amor, lleno de amor;\nY tu Esp’ritu, Señor,\nComo Guiador, como Guiador.\n¥4.        Cada d’a quiero cumplir\nTu voluntad, tu voluntad,\nY servirte a ti, Señor,\nEn humildad, en humildad.\nLETRA y MUSICA: J. O. Hillyer, 1936, es trad."},{"n":417,"t":"Sed puros y santos","c":"Santos seréis, porque santo soy yo Jehová vuestro Dios. Lev’tico 19:2\n¥1.     Sed puros y santos, mirad al Señor;\nPermaneced fieles siempre en oración;\nLeed la Palabra del buen Salvador;\nSocorred al débil, mostrad compasión.\n2.       Sed puros y santos, andad en la luz;\nOrad en secreto, respuesta vendrá;\nSu Esp’ritu Santo revela a Jesús,\nY su semejanza en nosotros pondrá.\n¥3.    Sed puros y santos, Jesús nos guiará;\nSeguid su camino, y en él confiad;\nEn paz o en pena, la calma dará\nQuien nos ha salvado de nuestra maldad."},{"n":418,"t":"Señor, tú me llamas","c":"Hacer justicia, y amar misericordia, y humillarte ante tu Dios. Miqueas 6:8\n1.        Señor, tú me llamas por mi nombre\ndesde lejos; Por mi nombre cada d’a tú\nme llamas. Señor, tú me ofreces una vida\nsanta y limpia; Una vida sin pecado,\nsin maldad.\nCoro:          Señor, nada tengo para darte;\nSolamente te ofrezco\nSeñor, hazme hoy un siervo útil que anuncie\nel mensaje, el mensaje de la cruz.\nLETRA y MUSICA: Rubén Giménez, 1978.\nARG\n© 1978 Casa Bautista de Publicaciones. Usado con permiso.\n2.       Señor, tú me llamas por mi nombre\ndesde lejos; Por mi nombre\ncada d’a tú me llamas.\nSeñor, yo acudo a tu llamado\na cada instante, pues mi gozo\nes servirte más y más.\nCoro:\nSeñor, nada tengo para darte; Solamente te ofrezco\nSeñor, hazme hoy un siervo útil que anuncie\nel mensaje, el mensaje de la cruz.\n3. (Coda)\nSeñor, tú me llamas por mi nombre desde lejos;\nPor mi nombre cada d’a tú me llamas.\nLETRA y MUSICA: Rubén Giménez, 1978.                           ARG\n© 1978 Casa Bautista de Publicaciones. Usado con permiso."},{"n":419,"t":"Un vaso nuevo","c":"Como el barro en las manos del alfarero, as’ sois vosotros. Jerem’as 18:6\nYo quiero ser, Señor amado,\nComo el barro en manos del alfarero;\nToma mi vida y hazla tuya;\nYo quiero ser, yo quiero ser\nun vaso nuevo.\nL.A.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. E.S.B."},{"n":420,"t":"Te vengo a decir","c":"Amarás a... Dios de todo tu corazón... y con todas tus fuerzas. Deuteronomio 6:5\n1.      Te vengo a decir, te vengo a decir,\noh mi Salvador, que yo te amo a ti,\nque yo te amo a ti, con el corazón.\nTe vengo a decir, te vengo a decir\ntoda la verdad; Te quiero, Señor,\nte amo, Señor, con el corazón.\nCoro:    Yo quiero cantar, yo quiero cantar\nde gozo y de paz; Yo quiero llorar,\nyo quiero llorar de felicidad.\n// Te vengo a decir, // toda la verdad;\nTe quiero, Señor, te amo, Señor,\ncon el corazón.\nLETRA y MUSICA: Juan M. Isáis, 1965, arreg. en\nPsalter Hymnal, 1988, alt. © 1979 Juan M. Isáis. Usado con permiso.\nCoro:    Yo quiero cantar, yo quiero cantar\nde gozo y de paz; Yo quiero llorar,\nyo quiero llorar de felicidad.\n// Te vengo a decir, // toda la verdad;\nTe quiero, Señor, te amo, Señor,\ncon el corazón.\n2.       Te quiero seguir, te quiero seguir,\noh mi Salvador, y darte mi ser,\ny darte mi ser, mi Amigo, mi Dios.\nTe quiero servir, te quiero servir,\ntodo lo que soy; rec’belo, Dios.\nLETRA y MUSICA: Juan M. Isáis, 1965, arreg. en\nPsalter Hymnal, 1988, alt. © 1979 Juan M. Isáis. Usado con permiso."},{"n":421,"t":"Con mis labios","c":"Con labios de júbilo te alabará mi boca. Salmo 63:5\nCon mis labios y mi vida\nTe alabo, Señor, te alabo, Señor.\nCon mis labios y mi vida\nTe alabo, bendito Señor.\nPorque tú has sido\nprecioso para m’,\nprecioso para m’, precioso para m’;\nPorque tú has sido precioso para m’,\nTe alabo, bendito Señor.\ndescon., Latinoamérica, s. 20, arreg. Esteban Sywulka B.                             L.A."},{"n":422,"t":"Que el sentir de Jesucristo","c":"Haya, pues, en vosotros este sentir que hubo también en Cristo Jesús. Filipenses 2:5\n1.           Que el sentir de Jesucristo\ntodo el tiempo esté en m’;\nQue su amor mi gu’a sea\nen lo que hago aqu’.\nQue yo pueda su Palabra d’a en d’a atesorar;\nY as’ en m’ su imagen se haga reflejar.\nRosa Bolaños de Arce. MUSICA: James Mountain, 1876.\n2.             Que la paz de Dios mi Padre\nreine en mi corazón;\nPara que a los afligidos dé consolación.\nQue el amor de Jesucristo,\nmás profundo que la mar,\nSea el móvil que me impulse siempre a triunfar.\n3.     Que yo siga la carrera con paciencia y valor,\nQue refleje su belleza al buscar al pecador,\nY que vean no al siervo, sino a su Señor.\nRosa Bolaños de Arce. MUSICA: James Mountain, 1876."},{"n":423,"t":"Hazme un instrumento","c":"Seguid la paz con todos, y la santidad. Hebreos 12:14\n1.    Hazme un instrumento de tu paz;\ndonde haya odio lleve tu amor,\nDonde haya heridas lleve tu perdón,\ndonde haya dudas, fe en ti.\n2.    Hazme un instrumento de tu paz;\nQue lleve tu esperanza por doquier;\nDonde hay tinieblas, lleve yo tu luz,\nDonde hay tristeza, gozo en ti.\n3.      Maestro, yo quisiera aprender\nA no ser consolado sino consolar,\nSer comprendido sino comprender,\nSer amado, tanto como amar.\n4.    Hazme un instrumento de tu paz;\nPues tu perdón disfruto al perdonar;\nTu bendición recibo yo al dar,\nY vivo al morir en ti."},{"n":424,"t":"Dejo el mundo y sigo a Cristo","c":"Y se levantó y le siguió. Mateo 9:9\n¥1.              Dejo el mundo, y sigo a Cristo,\nporque el mundo pasará,\nMas su amor, amor bendito,\npor los siglos durará.\nCoro:                ¡Oh, qué gran misericordia!\n¡Oh, de amor, sublime don!\n¡Plenitud de vida eterna,\nprenda viva de perdón!\n¥2.         Dejo el mundo, y sigo a Cristo;\npaz y gozo en él tendré,\nY al mirar que va conmigo yo feliz caminaré.\nCoro:    ¡Oh, qué gran misericordia!\n¡Oh, de amor, sublime don!\n¡Plenitud de vida eterna,\nprenda viva de perdón!\n¥3.     Dejo el mundo, y sigo a Cristo;\nsu sonrisa quiero ver\nComo luz que mi camino\nhaga aqu’ resplandecer.\n¥4.     Dejo el mundo, y sigo a Cristo,\nacogiéndome a su cruz,\nY después iré a verle\ncara a cara en plena luz."},{"n":425,"t":"Bendito el Señor","c":"Bendecid ahora al Señor vuestro Dios. 1 Crónicas 29:20\n¥Bendito el Señor por su poder,\nbendito el Señor por su amor.\nBendito el Señor por su poder,\nbendito el Señor por su amor.\nTe alabamos, Señor, con sinceridad,\nNos rendimos a ti con integridad.\nTe alabamos, Señor, con sinceridad,\nNos rendimos a ti\ncon integridad."},{"n":426,"t":"Tú has venido a la orilla","c":"Boga mar adentro, y echad vuestras redes para pescar. Lucas 5:4\nPara un permiso en retroproyector,\nver pie de página\nLETRA y MUSICA: Cesáreo Gabaráin, 1979, arreg. Skinner Chávez-Melo.                ESP\n© 1979 Cesáreo Gabaráin, admin. OCP Publications. Usado con permiso."},{"n":427,"t":"Dios cuidará de ti","c":"Echando toda vuestra ansiedad sobre él, porque él tiene cuidado de vosotros. 1 Pedro 5:7\nSi b (Capo 1 - La)                                                                   Con ánimo\n1.   En tus afanes y en tu dolor, Dios cuidará de ti;\nBajo las alas de su amor, Dios cuidará de ti.\nCoro:    Dios cuidará de ti, y por doquier contigo irá;\nDios cuidará de ti, nada te faltará.\n2.     Si desfalleces en tu labor, Dios cuidará de ti;\nSi ves peligros en derredor, Dios cuidará de ti.\n3. Nunca en la prueba sucumbirás, Dios cuidará de ti,\nEn su regazo te apoyarás, Dios cuidará de ti.\nCoro:         ¡Vencedor! (Yo soy) ¡Vencedor!\nYo en Cristo he confiado, mi fe está en Dios;\n¡Vencedor! (Yo soy) ¡Vencedor!\nS’, ahora yo soy más que vencedor (vencedor).\n¥2.               En el mundo agitado,\nDe la multitud rodeado,\nNadie ve mi soledad y llanto, Señor;\nMas en cada hora oscura,\nTu Esp’ritu asegura\nQue contigo yo soy más que vencedor.\nLETRA y MUSICA: Andraé Crouch, 1971, trad. Frank Gonzales, alt.\n© 1971 Manna Music. Usado con permiso.\nCoro:         ¡Vencedor! (Yo soy) ¡Vencedor!\nYo en Cristo he confiado, mi fe está en Dios;\n¡Vencedor! (Yo soy) ¡Vencedor!\nS’, ahora yo soy más que vencedor (vencedor).\n¥3.           Gracias doy por las victorias;\nGracias doy por las derrotas.\nA Dios gracias por el duelo abrumador.\nA través de los problemas\nVeo sus misericordias,\nY en todo yo soy más que vencedor.\nLETRA y MUSICA: Andraé Crouch, 1971, trad. Frank Gonzales, alt.\n© 1971 Manna Music. Usado con permiso."},{"n":429,"t":"Yo no quiero pecar","c":"Todo aquel que es nacido de Dios, no practica el pecado. 1 Juan 3:9\n¥1.    Yo no quiero pecar, yo no quiero errar;\nOfender a mi Dios, yo no quiero jamás.\nQuiero andar en la luz que me da mi Jesús;\nMás no quiero pecar contra Dios.\n¥2.      Santamente vivir es la vida mejor;\nEs la vida que agrada y deleita al Señor;\nSantamente vivir es la vida mejor,\nEs la vida que agrada al Señor.\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.                GUA"},{"n":430,"t":"Entenderemos","c":"Por tanto, no seáis insensatos, sino entendidos. Efesios 5:17\n1.         Cuando tentado, yo he deseado\nSaber por qué hay muchos aqu’\nQue andan sin pruebas y sin cuidado\nMientras el mal me asecha a m’.\nCoro:          Entenderemos nuestras angustias,\nEntenderemos nuestro pesar;\nHermano m’o, nunca desmayes,\nTodo en el cielo se ha de aclarar.\nCoro:       Entenderemos nuestras angustias,\nEntenderemos nuestro pesar;\nHermano m’o, nunca desmayes,\nTodo en el cielo se ha de aclarar.\n2.       ÒHasta la muerteÓ, dijo el Maestro,\nÒSerás tú fiel y trabajarás;\nTodo tu afán habrás de dejarlo,\nCuando al celeste hogar entrarásÓ.\n3.          Cuando vendrá Jesús de la gloria,\nTodos al cielo nos llevará;\nCuando le veamos en aquel d’a,\nLo entenderemos, s’, más allá."},{"n":431,"t":"Tentado, no cedas","c":"Dios... no os dejará ser tentados más de lo que podéis resistir. 1 Corintios 10:13\n¥1.        Tentado, no cedas, ceder es pecar;\nMejor es con Cristo luchar y triunfar.\n¡Valor, pues cristiano! domina tu mal,\nDios puede librarte de asalto mortal.\nCoro:            En Jesús, pues conf’a;\nen sus brazos tu alma\nHallará dulce calma; él te hará vencedor.\nLETRA y MUSICA: Horatio R. Palmer, 1868, trad. T. M. Westrup, alt.\nCoro:             En Jesús, pues conf’a;\nen sus brazos tu alma\nHallará dulce calma; él te hará vencedor.\n¥2.           Evita el pecado, procura agradar\nA Dios, a quien debes por siempre ensalzar.\nNo manches tus labios; gobierna tu voz;\nTu corazón guarda de ofensas a Dios.\n¥3.           Fiel a la Palabra y enérgico sé;\nEn Cristo tu amigo pon toda tu fe.\nSé siempre honesto; de Dios es tu ser.\nCorona te espera, y vas a vencer.\nLETRA y MUSICA: Horatio R. Palmer, 1868, trad. T. M. Westrup, alt."},{"n":432,"t":"Firme Estaré","c":"Dios m’o, fortaleza m’a, en él confiaré. 2 Samuel 22:3\n¥1.       Cristo guarda siempre, puedo en él\nconfiar; No me deja nunca,\npuedo en él confiar, pues, cual la Roca\neterna de los siglos, Firme estaré.\nCoro: ¡Nada, no, nada me ha de mover! (¡No , nada!)\n¡Nada, no, nada me ha de mover! Pues, cual la Roca\neterna de los siglos, Firme estaré.\n2.         Fuerte es Jesucristo, puedo en él\nconfiar; Todo me ha provisto,\npuedo en él confiar, pues, cual la Roca\neterna de los siglos, Firme estaré.\nCoro: ¡Nada, no, nada me ha de mover! (¡No , nada!)\n¡Nada, no, nada me ha de mover! Pues, cual la Roca\neterna de los siglos, Firme estaré.\n¥3.        En la noche oscura, puedo en él\nconfiar; Mi alma está segura,\npuedo en él confiar, pues, cual la Roca\neterna de los siglos, Firme estaré.\n4.      Muchos me abandonan, puedo en él\nconfiar; Otros me engañan,\npuedo en él confiar, pues, cual la Roca\neterna de los siglos, Firme estaré."},{"n":433,"t":"Después de la tormenta","c":"Y levantándose, reprendió al viento...y cesó el viento. Marcos 4:39\n1.                 Después de la tormenta\nviene la calma, viene la paz;\nSi a Cristo, de rodillas, tú se la pides, él te la da.\nNo importa que legiones\ndel enemigo te hagan sufrir,\n// Si al nombre de mi Cristo,\nsagrado nombre, tendrán que huir. //\nP.R.\n¥2.                La noche más oscura\ntiene su aurora, tiene su albor;\nNo importa que el pecado\nte haya manchado con su maldad,\n// Pues Cristo te perdona y te corona de santidad. //\n¥3. Jesús hoy nos invita con voz bendita a ir a él;\nSu paz nos asegura en prueba dura; es siempre fiel.\nCon Cristo triunfaremos\ny en él tenemos buen General;\n// Marchemos victoriosos,\nsiempre gozosos, hasta el final. //\nP.R."},{"n":434,"t":"Victoria en Cristo","c":"Y esta es la victoria que ha vencido al mundo, nuestra fe. 1 Juan 5:4\n1. O’ bendita historia de Jesús quien de su gloria,\nAl Calvario decidió venir para salvarme a m’.\nSu sangre derramada se aplicó feliz a mi alma;\nMe dio victoria sin igual cuando me arrepent’.\nCoro: Ya tengo la victoria, pues Cristo me salva.\nBuscóme y compróme con su divino amor.\nMe imparte de su gloria,\nsu paz inunda mi alma;\nVictoria me concedió cuando por m’ murió.\nLETRA y MUSICA: E.M. Bartlett, 1939, alt., trad. Honorato Reza.\n© 1939, ren. 1967 Stamps Baxter Music, admin. Benson. Usado con permiso.\nCoro: Ya tengo la victoria, pues Cristo me salva.\nBuscóme y compróme con su divino amor.\nMe imparte de su gloria, su paz inunda mi alma;\nVictoria me concedió cuando por m’ murió.\n2.     O’ que en amor tierno, él sanó a los enfermos;\nA los cojos los mandó correr, al ciego lo hizo ver.\nEntonces suplicante le ped’ al Cristo amante,\nLe diera a mi alma la salud y fe para vencer.\n3. O’ que allá en la gloria, hay mansiones de victoria,\nQue su santa mano preparó para los que él salvó.\nEspero unir mi canto al del grupo sacrosanto\nQue victorioso rendirá tributo al Redentor.\nLETRA y MUSICA: E.M. Bartlett, 1939, alt., trad. Honorato Reza.\n© 1939, ren. 1967 Stamps Baxter Music, admin. Benson. Usado con permiso."},{"n":435,"t":"Débil Soy","c":"Mientras hablaban... Jesús mismo se acercó, y caminaba con ellos. Lucas 24:15\nSi b (Capo 1 - La)                                                                  Con reflexión\n1.                   Débil soy; tu fuerza es tal\nque me guardarás del mal;\nSatisfecho estoy, oh s’,\nal andar, Señor, junto a ti.\nCoro:        A tu lado andar, Señor,\nesta es mi oración;\nCada d’a en tu amor siempre guárdame, Salvador.\n2.                 En la prueba y dolor\ncu’dame, oh Buen Señor;\nY al fin en tu mansión gozaré de tu comunión."},{"n":436,"t":"¡Bendiciones, cuántas tienes!","c":"Bendice, alma m’a, a Jehová, y no olvides ninguno de sus beneficios. Salmo 103:2\n¥1.     Cuando combatido por la adversidad\nCreas ya perdida tu felicidad,\nMira lo que el cielo para ti guardó;\nCuenta las riquezas que el Señor te dio.\nCoro:       ¡Bendiciones, cuántas tienes ya!\nBendiciones, Dios te manda más;\nBendiciones, te sorprenderás\nCuando veas lo que Dios por ti hará.\nCoro:      ¡Bendiciones, cuántas tienes ya!\nBendiciones, Dios te manda más;\nBendiciones, te sorprenderás\nCuando veas lo que Dios por ti hará.\n¥2.       ÀAndas agobiado por algún pesar?\nÀDuro te parece amarga cruz llevar?\nCuenta las promesas del Señor Jesús,\nY de las tinieblas nacerá la luz.\n¥3.       Cuando de otros veas la prosperidad\nY tus pies claudiquen tras de su maldad,\nCuenta las riquezas que tendrás por fe\nDonde el oro es polvo que hollará tu pie."},{"n":437,"t":"Yo quiero vencer","c":"A Dios gracias, el cual nos lleva siempre en triunfo en Cristo Jesús. 2 Corintios 2:14\n¥1.     Yo quiero vencer, yo quiero triunfar\npor fe en mi Cristo; Yo quiero obtener,\nyo quiero alcanzar corona en el cielo.\nQuiero obedecer, fiel siempre servir\na mi Salvador; // Yo quiero vencer,\nyo quiero triunfar por fe en mi Señor. //\nLETRA y MUSICA: J. J. Ram’rez y J. A. Savage, 1966.                VEN\n© 1966 J. Arturo Savage. Usado con permiso.\n2.      Anhelo ir en pos, muy cerca de Dios\npor toda mi vida; Y ante su altar\nans’o llevar otra alma perdida.\n¡Qué dicha será ver siempre la faz\nde mi Redentor! // Yo quiero vencer,\ny corresponder a su gran amor. //\n¥3.     Por fe en mi Jesús hoy vivo en la luz\nque lleva al cielo; No habré de temer,\npues Cristo ha de ser mi eterno consuelo.\nYo quiero sentir placer de servir\ncon abnegación; // Yo quiero triunfar\ny siempre morar allá en su mansión. //\nLETRA y MUSICA: J. J. Ram’rez y J. A. Savage, 1966.            VEN\n© 1966 J. Arturo Savage. Usado con permiso."},{"n":438,"t":"Su gracia es mayor","c":"¥1.    Su gracia es mayor si las cargas aumentan;\nSu fuerza es mayor si la prueba es más cruel;\nSi es grande la lucha mayor es su gracia,\nSi más son las penas, mayor es su paz.\nCoro:    Su amor no termina, su gracia no acaba,\nUn l’mite no hay al poder del Señor,\nPues de sus inmensas riquezas en gloria,\nabunda su gracia, abunda su amor.\n¥2.         Si nuestros recursos se han agotado,\nsi fuerzas nos faltan para terminar,\nSi al punto ya estamos de desesperarnos,\nel tiempo ha llegado en que Dios puede obrar.\n© 1941, ren. 1969, trad. © 1955, ren. 1983 Lillenas Publishing Co. Usado con permiso."},{"n":439,"t":"En este mundo de misterio","c":"Señor, en este mundo de misterio\nCuya causa no podemos conocer,\nVemos la humildad de los pequeños\nY los grandes su gloria enaltecer.\nEl joven llevando pan y peces,\nEl mozo que de cerca lo segu’a,\nSin llevar la gloria de sus creces.\nC.R.\nArcadio Hidalgo Sánchez, 1981\nOh Señor, Àpor qué tanto silencio?\nÀPor qué no llevan ninguna gloria?\nÀPor qué ni sus nombres aparecen\nEn el gran escenario de la historia?\nNo te afanes por la vida pasajera,\nNi del cruel olvido tengas pena,\nQue las glorias de este mundo son ficticias\nY las glorias venideras son eternas.\nC.R.\nArcadio Hidalgo Sánchez, 1981"},{"n":440,"t":"Pon tus ojos en Cristo","c":"El cual, sindo el resplandor de su gloria. Hebreos 1:3\nPon tus ojos en Cristo,\nTan lleno de gracia y amor,\nY lo terrenal sin valor será\nA la luz del glorioso Señor.\nLETRA y MUSICA: Helen Howarth Lemmel, 1922, trad. Carlos P. Denyer."},{"n":441,"t":"Jehová-jireh","c":"Y llamó Abraham el nombre de aquel lugar, Jehová proveerá. Génesis 22:14\n// Jehová-jireh es mi Proveedor,\nSu gracia es suficiente para m’, para m’. //\nMis necesidades suplirá\nconforme a sus riquezas en gloria.\nA sus ángeles manda\nque cuiden de m’;\nSu gracia es suficiente para m’, para m’,\nSu gracia es suficiente para m’.\n© 1974 Catacombs Productions. Usado con permiso."},{"n":442,"t":"El conoce mi camino","c":"Mas él conoce mi camino; me probará, y saldré como oro. Job 23:10\n¥1.           /// Mas él conoce mi camino, ///\n¡Viva mi Redentor!\n¥2.     /// Me probará y saldré como oro, ///\n¡Viva mi Redentor!\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":443,"t":"El Señor es bueno","c":"Jehová es bueno, fortaleza en el d’a de la angustia. Nahum 1:7\n¥// El Señor* es bueno, fortaleza en\nel d’a de angustia. //\n// El Señor es bueno, y conoce\na los que en él conf’an. //\n// El Señor es bueno, fortaleza en\nel d’a de angustia. //\n*Jehová\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":444,"t":"Hasta Entonces","c":"Tus ojos verán al Rey en su hermosura. Isa’as 33:17\nSi b (Capo 1 - La)                                                                     Con certidumbre\n1.          Mi corazón cantando está de Cristo\nCuando me acuerdo de su gran amor.\nAunque la vida está atribulada\nEspero un d’a ver al Salvador.\nCoro:      Más hasta entonces seguiré cantando,\nCantando de Jesús y de su amor;\nHasta aquel d’a cuando en plena gloria\nVeré la faz de mi Señor.\nLETRA y MUSICA: Stuart Hamblen, 1958, trad. Timoteo Anderson C.\n© 1958 Stuart Hamblen. Usado con permiso.\nCoro:    Más hasta entonces seguiré cantando,\nCantando de Jesús y de su amor;\nHasta aquel d’a cuando en plena gloria\nVeré la faz de mi Señor.\n2.       El pobre mundo irá pronto al olvido,\nTan pasajera es la vida aqu’;\nPor tal engaño y pena no me afano\nPorque en la gloria a Cristo le veré.\n3.          Gran alegr’a es la del redimido\nAl ser librado al fin de su dolor;\nNo habrá más muerte, lágrimas, tristeza\nEn la presencia eterna del Señor.\nLETRA y MUSICA: Stuart Hamblen, 1958, trad. Timoteo Anderson C.\n© 1958 Stuart Hamblen. Usado con permiso."},{"n":445,"t":"Triunfo en las pruebas","c":"Pues tengo por cierto que las aflicciones\ndel tiempo presente no son comparables\ncon la gloria venidera que en nosotros ha\nde manifestarse.\nY sabemos que a los que aman a Dios, todas\nlas cosas les ayudan a bien, esto es, a los que\nconforme a su propósito son llamados.\nÀQué, pues, diremos a esto? Si Dios es por\nnosotros, Àquién contra nosotros?\nRomanos 8:18, 28, 31, 37; 1 Pedro 1:6, 7 (RVR)\nAntes, en todas estas cosas somos más\nque vencedores por medio de aquel que\nnos amó.\nVosotros os alegráis, aunque ahora por un\npoco de tiempo, si es necesario, tengáis que\nser afligidos en diversas pruebas,\nPara que sometida a prueba vuestra fe,\nmucho más preciosa que el oro, el cual\naunque perecedero se prueba con fuego,\nsea hallada en alabanza, gloria y honra\ncuando sea manifestado Jesucristo.\nRomanos 8:18, 28, 31, 37; 1 Pedro 1:6, 7 (RVR)"},{"n":446,"t":"Regocijad","c":"Regocijaos en el Señor siempre. Filipenses 4:4\nCanon a 2 voces\nÀ // *¡Regocijad en el Señor!\nOs digo: *¡Regocijad! //\n¡ // *¡Regocijad! Os digo: *¡Regocijad! //\n* Opt. Regocijaos"},{"n":447,"t":"Dad Gracias","c":"He aprendido a contentarme, cualquiera que sea mi situación. Filipenses 4:11\n// Dad gracias, de todo corazón;\nDad gracias al Dios sant’simo;\nDad gracias porque a su Hijo Jesucristo nos dio. //\n// Y ahora diga el débil, ÒFuerte soyÓ,\nDiga el pobre, ÒRico soyÓ,\nPor lo que hizo el Señor por m’. //\n(Se puede entonar todo el canto dos veces)\n(Después de la última vez)\nDad gracias.\nLETRA y MUSICA: Henry Smith, 1978, trad. CANZION Producciones,\nLori Black y Marcela Arboleda M. © 1978 IntegrityÕs Hosanna. Usado con permiso."},{"n":448,"t":"La Iglesia sin mancha","c":"Una iglesia gloriosa, que no tuviese mancha ni arruga. Efesios 5:27\nSi b (Capo 1 - La)                                                                Con vigor\n¥1.         ÀQuiénes son los que han venido?\nÀHacia dónde marcharán?\nDe pureza van vestidos, ropas blancas llevan ya.\nCoro: // Es la Iglesia fiel, sin mancha ni arruga,\nque el Salvador redimió. //\n2.            ÀPuedes escuchar los cantos\nque conmueven todo ser?\nEs el grupo de los santos que al Cordero quieren ver.\nLETRA y MUSICA: Ralph E. Hudson, 1894, trad. Honorato Reza.\nTrad. © 1962, ren. 1990 Lillenas Publishing Co. Usado con permiso.\nCoro: // Es la Iglesia fiel, sin mancha ni arruga,\nque el Salvador redimió. //\n3.               No te asusten las tristezas,\nnunca cedas ante el mal.\nTriunfarás en tus pobrezas, tendrás gozo celestial.\n¥4.              El pendón de tu alabanza\ndebes hoy enarbolar;\nEn tu Rey pon tu esperanza y él victoria te dará.\nLETRA y MUSICA: Ralph E. Hudson, 1894, trad. Honorato Reza.\nTrad. © 1962, ren. 1990 Lillenas Publishing Co. Usado con permiso."},{"n":449,"t":"Mi Iglesia querida","c":"Vosotros, pues, sois el cuerpo de Cristo. 1 Corintios 12:27\nSi b (Capo 1 - La)                                                                    Con ánimo\n1.                    Una iglesia prefiere mi alma,\nuna iglesia que aviva mi fe;\nHallo en ella la paz y la calma\nque en el mundo busqué y no hallé.\nCoro:\nOh, ven, ven, ven, ven,ven a gozar\nentre hermanos, oh ven a adorar al Señor.\nHallarás fortaleza y consuelo\na los pies de tu buen Salvador.\n¥2.                    Siempre da su mensaje consuelo\na las almas que buscan a Dios;\nPorque quiere que vayan al cielo,\ndel divino Maestro en pos.                                                                                  GUA\nCoro:\nOh, ven, ven, ven, ven,ven a gozar\nentre hermanos, oh ven a adorar al Señor.\nHallarás fortaleza y consuelo\na los pies de tu buen Salvador.\n¥3.                      Cuán alegres resuenan sus cantos,\nporque son de su fe la expresión;\nSon el grito triunfal de los santos,\nun mensaje de amor y perdón.\n*4. Hoy celebra esta iglesia querida otro año de vida por fe;\ny victoria en su nombre le dé.\n*Esta estrofa es especialmente apropiada para aniversarios.                                                                          GUA"},{"n":450,"t":"De la Iglesia el fundamento","c":"He aqu’ que yo he puesto en Sion por fundamento una piedra. Isa’as 28:16\n¥1. De la Iglesia el fundamento es Jesús el Salvador;\nPor la obra de su gracia le dio vida su Señor;\nPara hacerla esposa suya de los cielos descendió,\nY su sangre por limpiarla en la cruz él derramó.\n¥2. De entre todas las naciones escogida en variedad,\nA través de las edades se presenta en unidad;\nEn diversidad de pueblos sólo tiene un Señor,\nUna fe y un nacimiento, un constante y puro amor.\n¥3. Ella alaba sólo un nombre, sigue una sola luz;\nGuarda una esperanza y su gloria es una cruz.\nPor el celo que la anima, de las almas corre en pos,\nY ambiciona por la gracia conducirlas hacia Dios.\n4.   A través de sufrimientos, de fatigas y dolor,\nEl glorioso d’a espera en que vuelva su Señor;\nConsumada su carrera, ya sin mancha estará;\nA las Bodas del Cordero victoriosa entrará."},{"n":451,"t":"Iglesia de Cristo","c":"Linaje escogido, real sacerdocio, nación santa, pueblo (de) Dios. 1 Pedro 2:9\n1.        Iglesia de Cristo, reanima tu amor,\nY espera velando a tu augusto Señor;\nJesús el Esposo, vestido de honor,\nViniendo se anuncia con fuerte clamor.\n2.         Si falta en algunos el santo fervor,\nVelad, compañeros, velad sin temor,\nQue está con nosotros el Consolador.\n3.        Quien sigue la senda del vil pecador,\nSe entrega en los brazos de un sueño traidor;\nMas para los siervos del buen Salvador,\nVelar esperando es su anhelo mejor.\na J. Michael Haydn, s. 18, en Sacred Melodies, de William Gardiner, 1815."},{"n":452,"t":"Cristo y su Iglesia","c":"Vosotros sois el cuerpo de Cristo, y miembros suyos\nindividualmente, y además, él es la cabeza del cuerpo,\nque es la iglesia.\nAun todas las cosas las sometió Dios bajo sus pies y le\npuso a él por cabeza sobre todas las cosas para la iglesia,\naquel que todo lo llena en todo.\nEn él también vosotros, habiendo o’do la palabra de\nverdad, el evangelio de vuestra salvación, y habiendo\ncre’do en él, fuisteis sellados con el Esp’ritu Santo.\n1 Corintios 12:27; Colosenses 1:18a; Efesios 1:22, 23, 13 (RVA)"},{"n":453,"t":"En la Iglesia","c":"Cristo amó a la iglesia, y se entregó a s’ mismo por ella. Efesios 5:25\nSi b (Capo 1 - La)                                                            Con gozo\n1.           En la Iglesia la gloria es para él,\npara él, para él;\nEn la Iglesia la gloria es para él\nahora y por la eternidad.\nCoro:     Para él (para él), para él (para él),\npara él (para él), para él (para él).\nEn la Iglesia la gloria es para él\nahora y por la eternidad.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J.          L.A.\n2.      En mi vida la gloria es para él,\npara él, para él;\nEn mi vida la gloria es para él\nahora y por la eternidad.\nCoro:   Para él (para él), para él (para él),\npara él (para él), para él (para él).\nEn mi vida la gloria es para él\nahora y por la eternidad.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J.             L.A."},{"n":454,"t":"Ardan nuestros corazones","c":"1.     ¡Ardan nuestros corazones\nadorando al Salvador,\nY en amor ferviente unidos,\nbusquen paz en el Señor!\nDe su cuerpo somos miembros,\nde su luz reflejo fiel:\nEntre hermanos es Maestro,\nsuyos somos, nuestro es él.\nEsta letra se puede cantar con la música de #216 (Aleluya) y #286 (Oh, Señor).\n2.   Oh, Amor, tú has ordenado\nque arda nuestro corazón;\nVivifica nuestras almas,\nl’bralas de confusión.\n¡Prende tú la llama viva\ndel amor que as’ unirá\nA los hijos que ha engendrado\nnuestro Padre celestial!\nEsta letra se puede cantar con la música de #216 (Aleluya) y #286 (Oh, Señor)."},{"n":455,"t":"Dios de gracia, Dios de gloria","c":"Vest’os de toda la armadura de Dios, para que podáis estar firmes. Efesios 6:11\n¥1.           Dios de gracia, Dios de gloria,\ndanos presto tu poder;\nA tu amada Iglesia adorna con un nuevo florecer.\nDanos luz y valent’a\nen la hora del deber, (del deber,)\nen la hora del deber.\n2.           Hoy las fuerzas del maligno\nnos acosan sin cesar;\nDe temor y duda, Cristo puede al alma resguardar.\nDanos luz y valent’a\npara nunca desmayar, (desmayar,)\npara nunca desmayar.\n3.               Nuestros odios inhumanos\ncura con tu inmenso amor;\nL’branos de goces vanos, sin conciencia o sin valor.\nDanos luz y valent’a\nfrente a toda tentación, (tentación,)\nfrente a toda tentación.\n4.               Gu’anos por las más altas\nrutas de la santidad,\nProclamando para el alma verdadera libertad.\nDanos luz y valent’a\ny firmeza en tu verdad, (tu verdad,)\ny firmeza en tu verdad."},{"n":456,"t":"Hoy por los santos","c":"Teniendo en derredor nuestro tan grande nube de testigos. Hebreos 12:1\n1.    Hoy, por los santos que descansan ya,\nDespués de confesarte por la fe,\nTu nombre, oh Cristo, hemos de alabar,\n¡Aleluya! ¡Aleluya!\n2.     Tú fuiste amparo, roca y defensor;\nEn la batalla, recio Capitán;\nTu luz venció las sombras del temor.\n¡Aleluya! ¡Aleluya!\nMúsica © 1962 Ediciones La Aurora. © 1906 Oxford University Press. Usado con permiso.\n¥3.        Oh bendecida y santa comunión\nDe los que aún luchan o en la gloria están;\nUn solo cuerpo, porque tuyos son.\n¡Aleluya! ¡Aleluya!\n4.           Y cuando ruda la batalla es,\nDel cielo se oye un cántico triunfal;\nSe afirma el brazo, vence al fin la fe:\n¡Aleluya! ¡Aleluya!\n¥5.        La aurora eterna ya despuntará;\nLas huestes fieles llegarán al Rey,\nCantando alegres a la Trinidad:\n¡Aleluya! ¡Aleluya!        (Amén.)\nMúsica © 1962 Ediciones La Aurora. © 1906 Oxford University Press. Usado con permiso."},{"n":457,"t":"La familia de Dios","c":"En esto conocerán todos que sois mis disc’pulos, si tuviereis amor. Juan 13:35\nSoy feliz porque soy\nde la familia de Dios;\nMe lavó en la sangre mi Salvador.\nHeredero con Cristo,\nhijo soy por su amor;\nSoy feliz en la familia, la familia de Dios.\nWilliam J. Gaither, 1970, © 1970 y arreg. 1971 William J. Gaither. Usado con permiso."},{"n":458,"t":"Un solo cuerpo","c":"Todos los miembros del cuerpo, siendo muchos, son un solo cuerpo. 1 Corintios 12:12\n1.    /// Todos somos miembros de un solo cuerpo; ///\nSiendo muchos somos uno en Jesús.\n2.     /// Todos fuimos bautizados en un cuerpo; ///\nTodos por el Santo Esp’ritu de Dios.\n3.      /// Del Esp’ritu sed llenos, mis hermanos; ///\nPara hacer la buena voluntad de Dios.\n4.    /// Y por todo demos gracias siempre al Padre; ///\nAlabando y cantando al Señor.\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":459,"t":"REFLEXION:","c":"Señor, tú me has puesto en una familia muy\nespecial, donde encuentro el amor y el\napoyo de hermanos. Me has colocado en un\nmaravilloso cuerpo en el cual cada miembro\ncontribuye para beneficio de los demás.\nMe has hecho parte de un nuevo pueblo que\ntraspasa las barreras de raza, cultura y nivel\nsocial. Es tu Iglesia, y ¡cuánto te agradezco\nel inmenso privilegio de ser parte de ella!\nTe reconozco como Jefe y Cabeza de la iglesia.\nSé que te agradamos al reunirnos para\nestudiar tu Palabra y alabar tu nombre.\nTe honramos al participar de tu mesa.\nde tu amor en nuestro servicio también te com-\nplacen. Te gozas cuando cumplimos tu mandato\nde proclamar el evangelio y hacer disc’pulos.\nEspero el d’a gozoso cuando presentarás a tu\nIglesia perfecta, sin mancha ni arruga.\nMientras tanto, ¡qué hermoso es unir mi voz a\ncánticos espirituales!"},{"n":460,"t":"Amémonos, Hermanos","c":"Que nos amemos unos a otros. 2 Juan v. 5\n1.             Amémonos, hermanos,\ncon tierno y puro amor;\nUn solo cuerpo somos,\ny nuestro Padre es Dios.\nAmémonos, hermanos,\nlo quiere el Salvador,\nQuien su preciosa sangre por todos derramó.\n2.                Amémonos, hermanos,\nen dulce comunión,\nY paz, afecto y gracia, dará el Consolador.\nAmémonos, hermanos,\ny en nuestra santa unión\nNo existan asperezas ni discordante voz.\n3.                 Amémonos, hermanos,\ny al mundo pecador\nMostremos cómo viven, los que son del Señor.\nAmémonos, hermanos,\ncon todo el corazón;\nLo ordena el Dios y Padre; su ley es ley de amor."},{"n":461,"t":"Somos uno en Cristo","c":"Un cuerpo, y un Esp’ritu, como fuisteis... llamados en una misma esperanza. Efesios 4:4\nSomos uno en Cristo,\nsomos uno,\nsomos uno, uno solo.\nSomos uno en Cristo,\nsomos uno, somos uno, uno solo.\nUn solo Dios,\nun solo Señor,\nuna sola fe,\nun solo amor,\nUn solo bautismo,\nun solo Esp’ritu, Y ese es el Consolador.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J.          L.A."},{"n":462,"t":"Unidos en Cristo","c":"Porque de la manera que en un cuerpo\ntenemos muchos miembros, pero no todos\nlos miembros tienen la misma función,\nAs’ nosotros, siendo muchos, somos un\ncuerpo en Cristo, y todos miembros los\nunos de los otros.\nDe manera que, teniendo diferentes dones,\nsegún la gracia que nos es dada,\nRomanos 12:4-10; Salmo 133:1 (RVR)\nSi el de profec’a, úsese conforme a la\nmedida de la fe;\nO si de servicio, en servir; o el que enseña,\nen la enseñanza;\nEl que exhorta, en la exhortación; el que\nreparte, con liberalidad;\nEl que preside, con solicitud; el que hace\nmisericordia, con alegr’a.\nRomanos 12:4-10; Salmo 133:1 (RVR)\nEl amor sea sin fingimiento. Aborreced lo\nmalo, seguid lo bueno.\nAmaos los unos a los otros con amor fraternal;\nen cuanto a honra, prefiriéndoos los unos a los\notros.\n¡Mirad cuán bueno y cuán delicioso es\nhabitar los hermanos juntos en armon’a!\nRomanos 12:4-10; Salmo 133:1 (RVR)"},{"n":463,"t":"Miren qué bueno","c":"Permanezca el amor fraternal. Hebreos 13:1\nOpt. Canon a tres voces\nÀ       // ¡Miren qué bueno,\nqué bueno es! //\nMiren qué bueno es cuando\nlos creyentes están juntos,\nEs como aceite bueno\nderramado sobre Aarón.\n¡       // ¡Miren qué bueno, qué bueno es! //\nMiren qué bueno es cuando\nlos creyentes están juntos,\nSe parece al roc’o sobre\nlos montes de Sion.\n®           // ¡Miren qué bueno, qué bueno es! //\nMiren qué bueno es cuando\nlos creyentes están juntos,\nPorque el Señor nos manda\nvida eterna y bendición.\nSe puede cantar como Canon a tres voces, al no repetir la primera frase."},{"n":464,"t":"Nuevas Alegres","c":"También a nosotros se nos ha anunciado la buena nueva. Hebreos 4:2\n¥1.      Nuevas alegres para decirles\ntengo ahora y estas son:\nQue mis pecados son perdonados,\ny con Jesús tendré galardón.\nY que también aún queda lugar\nen el palacio celestial\nPara aquellos los que quisieren\n2.           Goces mundanos ya he dejado,\nNo quiero más tan falso placer;\nPaz prometieron, más engañaron;\nno me pudieron satisfacer.\nMás bien estoy con mi Salvador;\nal cielo voy por su favor;\nCristo me gu’a todos los d’as en su amor y verdad.\n3.         Ya no me importa lo que dijeron\nlos enemigos de mi Señor.\nEl me ha buscado y me ha salvado;\nvoy a la gloria, reino de amor.\nSiempre yo tengo luchas aqu’;\ndulce descanso tengo all’;\n¡Oh, qué gran gozo para mi alma\ncuando me llame el Señor!"},{"n":465,"t":"No te dé temor","c":"Nos ha dado Dios esp’ritu... de poder, de amor y de dominio propio. 2 Timoteo 1:7\n¥1.       No te dé temor hablar por Cristo;\nHaz que brille en ti su luz;\nAl que te salvó confiesa siempre;\nTodo debes a Jesús.\nCoro: // No te dé temor, // nunca, nunca, nunca;\nEs tu amante Salvador; nunca, pues, te dé temor.\n¥2.       No te dé temor hacer por Cristo\ncuanto de tu parte está;\nObra con amor, con fe y constancia;\ntus trabajos premiará.\nCoro: // No te dé temor, // nunca, nunca, nunca;\nEs tu amante Salvador; nunca, pues, te dé temor\n¥3.         No te dé temor sufrir por Cristo\nlos reproches, o el dolor;\nSufre con amor tus pruebas todas,\ncual sufrió tu Salvador.\n4.         No te dé temor morir por Cristo,\nv’a, verdad y vida es él;\nEl te llevará con su ternura a su célico vergel."},{"n":467,"t":"Recibiréis Poder","c":"Recibiréis poder... y me seréis testigos. Hechos 1:8\nRecibiréis poder, recibiréis poder\nCuando haya venido sobre vosotros\nel Esp’ritu de Dios,\nCuando haya venido sobre vosotros\nel Esp’ritu de Dios,\nY testificaréis y testificaréis\nEn Jerusalén, Judea también,\nSamaria y hasta el final.\nEn Jerusalén, Judea también,\nSamaria y hasta el final."},{"n":468,"t":"Grato es decir la historia","c":"Venid... y contaré lo que ha hecho a mi alma. Salmo 66:16\n1.      Grato es decir la historia del celestial favor,\nDe Cristo y de su gloria, de Cristo y de su amor;\nMe agrada referirla, pues sé que es la verdad;\nY nada satisface cual ella, mi ansiedad.\nCoro:           ¡Cuán bella es esa historia!\nSerá la antigua historia de Cristo y de su amor.\nCoro:          ¡Cuán bella es esa historia!\nSerá la antigua historia de Cristo y de su amor.\n2.     Grato es decir la historia que brilla cual fanal,\nY en glorias y portentos no reconoce igual;\nMe agrada referirla, pues me hace mucho bien;\nPor eso a ti deseo dec’rtela también.\n3. Grato es decir la historia que antigua, sin vejez,\nParece al repetirla más dulce cada vez;\nMe agrada referirla, pues hay quien nunca oyó\nQue para hacerle salvo el buen Jesús murió."},{"n":469,"t":"En el nombre del Señor Jesús","c":"ÀQué Dios como tú, que perdona la maldad, y olvida el pecado? Miqueas 7:18\n1.            En el nombre del Señor Jesús,\nDios me perdonó, y renac’, Y el amor que recib’,\nQuiero compartirlo contigo aqu’.\nCoro: Dijo: Libremente te di mi amor, Libremente dá.\nVé en mi nombre y porque tú crees,\nOtros también creerán.\n2.             En su nombre, él nos da poder\nEn el cielo, tierra y doquier, Y el poder que recib’,\nQuiero compartirlo contigo aqu’.\nLETRA y MUSICA: Carol Owens, 1972, trad. Manuel Jaramillo.\n© 1972 Bud John Songs, Inc., admin. C.M.I. Usado con permiso.\n2.   Todo el mundo nos ha de escuchar\nhablando del Salvador;\nViviremos con la santidad\nque Dios nos manda tener.\n¡Qué gozo nos dará!\n¡Cuánta felicidad!\npregonando su paz.\nVida nueva tenemos ya,\notros la deben tener;\nVamos, todos llenos de fe\nsu amor a demostrar."},{"n":471,"t":"Los que con lágrimas","c":"Los que sembraron con lágrimas, con regocijo segarán. Salmo 126:5\n1.         Los que con lágrimas sembraron,\ncon regocijo segarán;\nDonde sus lágrimas regaron,\nhermosas plantas crecerán.\nCoro:        // Andando irán, (Andando irán,)\nLlorando irán, (llorando irán,) Pero felices volverán. //\n2.           Trayendo al hombro sus gavillas,\ny en la garganta una canción;\nNo se perdieron las semillas,\nmas dieron fruto en bendición."},{"n":472,"t":"Anhelo trabajar por el Señor","c":"Para lo cual también trabajo, luchando según la potencia de él. Colosenses 1:29\n1.            Anhelo trabajar por el Señor;\nconfiando en su Palabra y en su amor,\nQuiero yo cantar y orar,\ny ocupado siempre estar en la viña del Señor.\nCoro:                  Trabajar y orar,\n(Trabajar y orar, trabajar y orar;)\nen la viña, en la viña del Señor; (del Señor;)\nen la viña del Señor.\nLETRA y MUSICA: Isaiah Baltzell, 1880, trad. Pedro Grado Valdés.\nCoro: Trabajar y orar, (Trabajar y orar, trabajar y orar;)\nen la viña, en la viña del Señor; (del Señor;)\nen la viña del Señor.\n2.             Anhelo cada d’a trabajar,\ny esclavos del pecado libertar,\nConducirlos a Jesús, nuestro Gu’a, nuestra Luz,\nen la viña del Señor.\n3.             Anhelo ser obrero de valor,\nconfiando en el poder del Salvador;\nEl que quiera trabajar hallará también lugar\nen la viña del Señor.\nLETRA y MUSICA: Isaiah Baltzell, 1880, trad. Pedro Grado Valdés."},{"n":473,"t":"El mundo hoy","c":"Para que...resplandecéis como luminares en el mundo. Filipenses 2:15\n1.         El mundo hoy se encuentra en agon’a,\npecado y dolor;\nCon guerras, odios y envidias sufre\nsin Dios y sin amor, sin amor, sin amor.\nCoro:        Tenemos Buenas Nuevas para darles\nde Jesús el Salvador;\nCon hechos y palabras demostremos\n2. Al mundo afligido el Evangelio con gozo proclamad;\nCual luminares en un siglo oscuro,\na Cristo levantad, levantad, levantad."},{"n":474,"t":"Ved los millones","c":"Toda potestad me es dada en el cielo y en la tierra. Mateo 28:18\n1.       Ved los millones que entre las tinieblas\nViven, perdidos, sin un Salvador.\nÀQuién, quién irá las nuevas proclamando\nQue por Jesús Dios salva al pecador?\nCoro:           Todo poder mi Dios me dio,\ny a mis siervos mando yo:\nÒId al mundo y proclamad el Evangelio,\ny estoy con vosotros siempreÓ.\nLETRA y MUSICA: James McGranahan, 1886, trad. H.M.W.\nCoro:          Todo poder mi Dios me dio,\ny a mis siervos mando yo:\nÒId al mundo y proclamad el Evangelio,\ny estoy con vosotros siempreÓ.\n2.       ÒA m’ venidÓ la voz divina llama;\nClamad ÒvenidÓ en nombre de Jesús.\nPara salvarnos de la muerte eterna\nSu vida él ofreció en la dura cruz.\n3.       Que venga pronto el d’a tan glorioso,\nen que los redimidos se unirán\nEn coro excelso, santo y jubiloso;\neternamente gloria a Dios darán.\nLETRA y MUSICA: James McGranahan, 1886, trad. H.M.W."},{"n":475,"t":"Hasta lo último","c":"Seréis testigos en Jerusalén, en toda Judea, en Samaria, y hasta lo último. Hechos 1:8b\nHasta lo último, hasta lo último,\nhasta lo último iremos.\nHasta lo último, hasta lo último\ncon Cristo nuestro Salvador.\nCon el poder del Esp’ritu\nen el pueblo del Señor,\nSeguiremos el perfecto plan de Dios.\nHasta lo último, hasta lo último,\ncon Cristo nuestro Salvador."},{"n":476,"t":"La gran comisión","c":"Por tanto, id, y haced disc’pulos a\ntodas las naciones, bautizándolos\nen el nombre del Padre, y del Hijo,\ny del Esp’ritu Santo;\nEnseñándoles que guarden\ntodas las cosas que os he\nmandado; y he aqu’ yo estoy\ncon vosotros todos los d’as,\nhasta el fin del mundo. Amén.\nMateo 28:18b-20 (RVR)"},{"n":477,"t":"Mensajeros del Maestro","c":"Me he propuesto predicar el evangelio donde Cristo no era conocido. Romanos 15:20 (NVI)\nSi b (Capo 1 - La)                                                 Con amplitud\n1.    Mensajeros del Maestro, anunciad al corazón\nDe Jesús la Buena Nueva, que nos brinda salvación.\nDe la cumbre de los montes, en los valles y en el mar,\nPor doquier el Evangelio prestos id a declarar.\n2. En los antros del pecado y en los sitios de aflicción,\nProclamad la paz de Cristo que traerá consolación.\nPredicad a los cautivos su gloriosa libertad;\nAl cansado y al ca’do Buenas Nuevas anunciad.\nMEX"},{"n":478,"t":"La paz os dejo","c":"Vino y anunció las buenas nuevas de paz. Efesios 2:17\nCanon a 4 voces\nÀ La paz os dejo, mi paz os doy,\n¡ No como el mundo da;\nÂ Id pues y proclamad:\nÃ Dios nos da paz.\n© 1971 ChoristerÕs Guild en ÒLettersÓ. Usado con permiso."},{"n":479,"t":"Heme Aqu’","c":"Entonces respond’ yo: Heme aqu’, env’ame a m’. Isa’as 6:8\nHeme aqu’, yo iré, Señor;\nheme aqu’, yo iré, Señor.\nEnv’ame a m’,\nque dispuesto estoy;\nLlevaré tu gloria\na las naciones.\nLETRA y MUSICA: Marcos Witt, 1990, arreg. F.B.J.              MEX\n© 1990 CANZION Producciones, admin.Word Music. Usado con permiso."},{"n":480,"t":"A prisa Iglesia","c":"Y nosotros también os anunciamos el evangelio de aquella promesa. Hechos 13:32\nSi b (Capo 1 - La)                                                           Con vigor\n1.       ¡A prisa, Iglesia! tu Señor espera;\nal mundo entero di que Dios es luz,\nQue el Creador no quiere que se pierda\nuna sola alma, lejos de Jesús.\nCoro:      Nuevas proclama de gozo y paz,\nNuevas de Cristo, salud y libertad.\n2.        Ve cuántos miles yacen retenidos\nPor el pecado en lóbrega prisión;\nNo saben de aquel que ha sufrido\nEn vida y cruz por darles redención.\nCoro:      Nuevas proclama de gozo y paz,\nNuevas de Cristo, salud y libertad.\n3.      A todo pueblo y raza, fiel, proclama\nQue Dios, en quien existen, es amor;\nQue él bajó para salvar sus almas;\nPor darles vida, muerte él sufrió.\n4.       Tus hijos da, que lleven su palabra,\nY con tus bienes hazlos proseguir.\nPor ellos tu alma en oración derrama,\nQue todo, Cristo te ha de retribuir."},{"n":481,"t":"Todo aquel que invocare","c":"Hagan disc’pulos de todas las naciones. Mateo 28:19 (NVI)\nCoro: Todo aquel que invocare el nombre del Señor,\nTodo aquel que invocare el nombre del Señor,\nSalvo será. Salvo será.\nY Àqué harán los que aún no le conocen?\n1.            Y Àcómo podrán invocar si aún no han cre’do?\nY Àcómo creerán, si no han o’do?\n2. Y Àcómo oirán, sin haber, sin haber quien les predique?\nY Àquién predicará, si no enviamos?\n// *América abre sus ojos porque Dios tiene poder, //\n(Ultimo coro:)\nPara salvar, para salvar A todo aquel que aún no le conoce.\n* España, Colombia, México, etc."},{"n":482,"t":"Oh qué amigo nos es Cristo","c":"482.      Oh qué amigo nos es Cristo\nPor nada estéis afanosos, sino sean conocidas vuestras peticiones. Filipenses 4:6\n¥1. ¡Oh qué amigo nos es Cristo! El llevó nuestro dolor;\nEl nos manda que llevemos todo a Dios en oración.\nÀVive el hombre desprovisto de paz, gozo y santo amor?\nEsto es porque no llevamos todo a Dios en oración.\n¥2. ÀAndas débil y cargado de cuidados y temor?\nA Jesús, refugio eterno, dile todo en oración.\nÀTe desprecian tus amigos?\nCuéntaselo en oración;\nEn sus brazos de amor tierno,\npaz tendrá tu corazón.\n¥3.             Jesucristo es nuestro Amigo:\nde esto prueba nos mostró,\nPues a redimirnos vino; por nosotros se humanó.\nEl castigo de su pueblo en su muerte él sufrió;\nCristo es un Amigo eterno;\nsólo en él conf’o yo."},{"n":483,"t":"Deléitate asimismo en el Señor","c":"Deléitate asimismo en Jehová. Salmo 37:4\n¥Deléitate asimismo en el Señor,*\nDeléitate asimismo en el Señor,*\nY él te concederá\nlas peticiones de tu corazón;\nConf’a en él, y él hará.\nY él te concederá\nlas peticiones de tu corazón;\nConf’a en él, y él hará.\n* Opt. Jehová"},{"n":484,"t":"Gracias, Señor","c":"De d’a, mandará el Señor su misericordia;\nY de noche, su canción estará conmigo,\nClamaré al Dios alt’simo, al Dios que me\nfavorece.\nAl anochecer, al amanecer y al mediod’a\noraré y clamaré; y él oirá mi voz.\nSalmo 42:8*; 57:2; 55:17; 19:14*; 139:17; 138:1a, 3 (RVA)\nSean gratos los dichos de mi boca y la meditación\nde mi corazón delante de ti, oh Señor, Roca m’a\ny Redentor m’o.\n¡Cuán preciosos me son, oh Dios, tus\npensamientos!\n¡Cuán grande es la suma de ellos!\nTe doy gracias con todo mi corazón; el d’a\nque clamé, me respondiste; mucho valor\ninfundiste a mi alma.\nSalmo 42:8*; 57:2; 55:17; 19:14*; 139:17; 138:1a, 3 (RVA)"},{"n":485,"t":"A solas al huerto yo voy","c":"Me llevó a la casa del banquete, y su bandera sobre m’ fue amor. Cantares 2:4\n1.          A solas al huerto yo voy,\nCuando duerme aún la floresta;\nY en quietud y paz con Jesús estoy\nOyendo absorto all’ su voz.\nCoro:   El conmigo está, puedo o’r su voz,\nMe asegura de su amor;\nTan preciosa es nuestra comunión,\nA solas con mi Señor.\nLETRA y MUSICA: C. Austin Miles, 1912,\ntrad. Vicente Mendoza, alt.\nCoro:   El conmigo está, puedo o’r su voz,\nMe asegura de su amor;\nTan preciosa es nuestra comunión,\nA solas con mi Señor.\n2.        Tan dulce es la voz del Señor,\nque las aves guardan silencio;\nY tan sólo se oye su voz de amor,\nque inmensa paz al alma da.\n3.            Me encanta a solas estar\ncon mi Cristo allá en el huerto,\nMas me manda ir para compartir\nlas buenas nuevas de su amor.\nLETRA y MUSICA: C. Austin Miles, 1912,\ntrad. Vicente Mendoza, alt."},{"n":486,"t":"Oh Señor, de mañana oirás","c":"Yo a ti he clamado, oh Señor, y de mañana mi oración se presentará. Salmo 88:13\n// Oh Señor, de mañana oirás mi voz,\nDe mañana me presentaré delante de ti, y esperaré. //\nPorque tú no eres un Dios\nque se complace en la maldad;\nel malo no habitará junto a ti.\nOh Señor, de mañana oirás mi voz,\nDe mañana me presentaré delante de ti, y esperaré.*\n*Final opcional: Se puede repetir las últimas cinco\npalabras disminuyendo en volumen cada vez."},{"n":487,"t":"Cristo, queremos dar gracias","c":"En él confió mi corazón, y...se gozó. Salmo 28:7\n¥1.     /// Cristo, queremos dar gracias; ///\nDar gracias por tu gran bondad.\n¥2.      /// Cristo, queremos servirte; ///\nServirte por tu gran bondad.\n¥3.     /// Cristo, sabemos que vienes; ///\nE iremos contigo a tu hogar."},{"n":488,"t":"Gracias, oh Señor","c":"Oh Señor, oye mi oración, escucha mis ruegos. Salmo 143:1\n¥Gracias, oh Señor,\npor escucharnos hoy,\npor tu presencia acá,\npor darnos tu paz.\nAmén."},{"n":489,"t":"Abre mis ojos","c":"Los de limpio corazón... verán a Dios. Mateo 5:8\n¥Abre mis ojos,\nquiero ver a Cristo;\nSentir su presencia,\ndecir que le amo;\nAbre mi o’do;\nayúdame a o’rte;\nAbre mis ojos,\nquiero ver a Cristo."},{"n":490,"t":"Dilo a Cristo","c":"Velad y orad, para que no entréis en tentación. Marcos 14:38\n1.    Cuando estés cansado y abatido,dilo a Cristo,\ndilo a Cristo; Si te sientes débil,\nconfundido, dilo a Cristo el Señor.\nCoro #1:        Dilo a Cristo, dilo a Cristo,\nél es tu amigo más fiel;\nNo hay otro amigo como Cristo, dilo tan sólo a él.\n2.    Cuando estés de tentación cercado, mira a\nCristo, mira a Cristo; Cuando rujan\nhuestes de pecado, mira a Cristo el Señor.\nCoro #2:     Mira a Cristo, mira a Cristo, él es\ntu amigo más fiel; No hay otro amigo\ncomo Cristo, dilo tan sólo a él.\n3.   Cuando llegue la final jornada, f’a en Cristo,\nf’a en Cristo; Te dará al cielo franca\nentrada, f’a en Cristo el Señor.\nCoro #3: F’a en Cristo, f’a en Cristo, él es\ntu amigo más fiel; No hay otro amigo\ncomo Cristo, dilo tan sólo a él."},{"n":491,"t":"Padre nuestro celestial","c":"Lo que Dios creó... se toma con acción de gracias. 1 Timoteo 4:4\nPadre nuestro celestial,\nDios inmenso de bondad,\nTú nos mandas que pidamos\nbendición por nuestro pan.\nTú nos mandas que pidamos\nbendición por nuestro pan."},{"n":492,"t":"Gracias damos, Señor","c":"Les diste pan del cielo en su hambre, y en su sed... aguas. Nehem’as 9:15\nGracias damos, Señor, por el pan,\ngracias damos, Señor, por el pan;\nPor el pan espiritual,\nque alimenta a cada cual,\ny también por el pan material.\nL.A.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J."},{"n":493,"t":"Dulce Oración","c":"Me invocará, y yo le responderé. Salmo 91:15\n1.    Dulce oración, dulce oración,\nde toda influencia mundanal\nelevas tú mi corazón,\nal tierno Padre celestial.\n¡Oh, cuántas veces tuve en ti\nauxilio en ruda tentación,\ny cuántos bienes recib’,\nmediante ti, dulce oración!\n2.   Dulce oración, dulce oración, al trono excelso\nde bondad tú llevarás mi petición\na Dios que escucha con piedad.\nPor fe espero recibir la gran divina\nbendición, y siempre a mi Señor\nservir por tu virtud, dulce oración.\n3.     Dulce oración, dulce oración, que aliento\ny gozo al alma das, en esta tierra\nde aflicción consuelo siempre me serás.\nHasta el momento en que veré a Cristo\nen célica mansión, entonces me despediré,\nfeliz, de ti, dulce oración."},{"n":494,"t":"Abba Padre","c":"Habéis recibido el esp’ritu de adopción, por el cual clamamos: ¡Abba, Padre! Romanos 8:15\nEstamos aqu’ *cantando juntos como familia,\nUnidos dando alabanzas al Rey de reyes,\nCantando: Ò¡Abba Padre, digno eres tú!Ó\nÒ¡Abba Padre, digno eres tú!Ó\n*Otras posibilidades: orando juntos... leyendo juntos...\nLETRA : Steve Hampton, 1978.\n© 1978, 1985 Scripture in song, admin, IntegrityÕs Hosanna. Usado con permiso."},{"n":495,"t":"Por estos alimentos, Dios","c":"Contentos con lo que tenéis ahora; porque él dijo: No te desampararé. Hebreos 13:5\nCanon a 4 voces\nÀ         Por estos a-\n¡         limentos, Dios,\nÂ         te damos gra-\nÃ         cias hoy."},{"n":496,"t":"ÀHas o’do, Señor?","c":"Amo al Señor, pues ha o’do mi voz y mis súplicas. Salmo 116:1\n1.     ÀHas o’do, Señor, mis oraciones?\nÀPor ventura has o’do mi clamor?\nPues derrama tus ricas bendiciones;\ndame fe y alegr’a, oh Señor.\nNo pretendo riquezas con polilla\ncual los bienes terrenos que se van;\n//Quiero, s’, que me des sabidur’a,\nas’ como le diste a San Juan. //\nLETRA Y MUSICA: Alfredo Colom M., 1953, alt. arreg. Roberto C. Savage.       GUA\n2.      No pretendo, Señor, cosas terrenas;\nno pretendo, mi Dios, más que tu amor;\nQue me enseñes las cosas que son buenas,\nque edifican, dan vida y dan valor.\nYo no dudo, Señor, que tú has o’do\nmis humildes querellas, mi oración;\n// No lo dudo, Señor, porque he cre’do\nque me has dado tu amor y tu perdón. //\nLETRA Y MUSICA: Alfredo Colom M., 1953, alt. arreg. Roberto C. Savage.\nGUA\n3.      Yo ya sé que tú quieres corazones\nhumillados, sin sombras de maldad;\nTú no quieres orgullos ni pasiones;\nquieres fe, mansedumbre, paz, bondad.\n¡Oh, Señor! tu piedad es infinita;\n// Aqu’ estoy a tus pies, Padre bendito,\nno permitas que vuelva yo a caer. //\nLETRA Y MUSICA: Alfredo Colom M., 1953, alt. arreg. Roberto C. Savage.\nGUA\n4.   Yo no quiero seguir la vieja historia\ny caer, pues me has dado tu perdón,\nY espero estar contigo en gloria,\ndisfrutando de eterno galardón.\nSi contestas, mi Dios, mis peticiones,\nno caeré otra vez dentro del mal;\n// Y yo sé que allá en las mansiones\nme veré en tu reino celestial. //\nLETRA Y MUSICA: Alfredo Colom M., 1953, alt. arreg. Roberto C. Savage.     GUA"},{"n":497,"t":"Av’vanos, Señor","c":"Oh Señor, aviva tu obra en medio de los tiempos. Habacuc 3:2\nAv’vanos, Señor,\ncon nueva bendición;\nInflama el fuego de tu amor\nen cada corazón.\ntrad. E. S. Turrall. MUSICA: William H. Doane, 1875."},{"n":498,"t":"Yo te sirvo","c":"S’rvele con corazón perfecto y con ánimo voluntario. 1 Crónicas 28:9\n1.             Yo te sirvo porque te amo;\ntú me has dado salvación.\nNo era nada y me buscaste, y me diste tu perdón.\nCoro:             Vidas hechas pedazos,\nCorazones tristes, quebrantados,\nEn ti encuentran vida por tu muerte en la cruz.\n2.                Yo te sirvo porque me amaste;\npues te diste, oh Dios, por m’.\nTu bajaste a este mundo,\ny sufriste aqu’ por m’.\ntrad. Sid D. Guillén, alt., estr. #2 Felipe Blycker J., 1989. MUSICA:\nWilliam J. Gaither, 1969. © 1969 William J. Gaither. Usado con permiso."},{"n":499,"t":"Obreros para la mies 499","c":"Recorr’a Jesús todas las ciudades y aldeas, enseñando\nen las sinagogas de ellos, y predicando el evangelio\ndel reino, y sanando toda enfermedad y toda dolencia\nen el pueblo.\nY al ver las multitudes, tuvo compasión de ellas;\nporque estaban desamparadas y dispersas como\novejas que no tienen pastor.\nEntonces dijo a sus disc’pulos: A la verdad la mies es\nmucha, mas los obreros pocos.\nRogad, pues, al Señor de la mies, que env’e\nobreros a su mies.\nMateo 9:35-38 (RVR)"},{"n":500,"t":"A servir a Cristo","c":"Yo estoy contigo... por dondequiera que fueres. Génesis 28:15\n1.        A servir a Cristo sin temor iré,\nDonde él dirija mi inseguro pie;\nSin su compañ’a todo es turbación,\nMas si él me gu’a no tendré temor.\nCoro:   Con Jesús por doquier, sin temor iré,\nSi Jesús me gu’a nada temeré.\nestr. #3 Helen C. Dixon, 1915, es trad. MUSICA: Daniel B. Towner, 1887.\nCoro:     Con Jesús por doquier, sin temor iré,\nSi Jesús me gu’a nada temeré.\n2.       Con Jesús por gu’a dondequiera voy;\nCaminando en pos de él seguro estoy.\nY aunque padre y madre me hayan de faltar,\nJesucristo nunca me abandonará.\n3.      Dondequiera con Jesús, en tierra y mar,\nQuiero ser su fiel testigo sin cesar,\nY si por desierto mi camino va,\nUn seguro albergue mi Jesús será.\nestr. #3 Helen C. Dixon, 1915, es trad. MUSICA: Daniel B. Towner, 1887."},{"n":501,"t":"Solamente Temed","c":"Solamente temed a Jehová y servidle de verdad. 1 Samuel 12:24\n(ritmo de tango)\nSolamente temed a Jehová,\nsolamente temed a Jehová;\ny servidle de verdad,\ny servidle de verdad\ncon todo vuestro corazón,\ncon todo vuestro corazón.\nSolamente temed a Jehová,\nsolamente temed a Jehová;\npues considerad cuan grandes cosas\nha hecho por nosotros Jehová.\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":502,"t":"Sed fieles, hermanos","c":"Se requiere... que cada uno sea hallado fiel. 1 Corintios 4:2\n1.              Sed fieles, hermanos,\nluchando por nuestro Dios;\nEn su ministerio, soldados del Evangelio.\nFervientes sembrad, las almas ganad,\nes tiempo de trabajar;\nlas huestes del mal venced.\nCoro:             Sed fieles, hermanos,\nluchando por nuestro Dios;\nEn su ministerio, soldados del Evangelio.\n2.       Alzad la Palabra con ánimo y valor;\nCon fe predicadla, espada es de victoria.\nConstantes orad, gozosos obrad,\ncorona Dios os dará;\nAl mundo sin Dios sed la sal y la luz,\nmirando al Señor Jesús."},{"n":503,"t":"Despertad, Despertad","c":"Despiértate, tú que duermes, y levántate de los muertos. Efesios 5:14\n1.    ¡Despertad, despertad, oh cristianos!\nvuestro sueño funesto dejad,\nQue el cruel enemigo os acecha,\ny cautivos os quiere llevar.\n¡Despertad! las tinieblas pasaron;\nde la noche no sois hijos ya,\nQue lo sois de la luz y del d’a,\nY tenéis el deber de luchar.\nESP\n2.   Despertad y bruñid vuestras armas;\nvuestros lomos ceñid de verdad,\nY calzad vuestros pies aprestados\ncon el grato evangelio de paz.\nBasta ya de profundas tinieblas,\nbasta ya de pereza mortal;\nRevestid, revestid vuestro pecho\nde la cota de fe y caridad.\n3.     La gloriosa armadura de Cristo\nacudid con anhelo a tomar;\nNo temáis, pues el dardo enemigo\nno la puede romper ni pasar.\n¡Oh cristianos, antorcha del mundo!\nde esperanza el yelmo tomad;\nEmbrazad de la fe el escudo\ny sin miedo corred a luchar.\nESP\n4.   No temáis, pues de Dios revestidos,\nÀQué enemigo venceros podrá,\nSi tomáis por espada la Biblia,\nEn la cruz hallaréis la bandera,\nen Jesús hallaréis Capitán;\nEn el cielo obtendréis la corona:\n¡A luchar, a luchar, a luchar!\nESP"},{"n":504,"t":"Oh, háblame y hablaré","c":"Oh Señor, oye mi oración, escucha mis ruegos. Salmo 143:1\n1.        Oh, háblame y hablaré,\nSeñor,
