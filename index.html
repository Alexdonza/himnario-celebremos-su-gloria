<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebremos su Gloria — Himnario</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #13131f;
    --surface2: #1c1c2e;
    --border: #2a2a42;
    --accent: #c4a35a;
    --accent2: #e8c97a;
    --text: #e8e6f0;
    --text-muted: #8884a8;
    --text-dim: #5a5878;
    --overlay-bg: rgba(8, 6, 18, 0.97);
    --font-display: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    --font-body: 'Georgia', 'Times New Roman', serif;
    --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar h1 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: normal;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  #search-wrap {
    flex: 1;
    position: relative;
    max-width: 420px;
  }
  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 36px 7px 12px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }
  #search-icon {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none; font-size: 0.9rem;
  }
  #num-input-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  #num-input-wrap label { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
  #num-input {
    width: 64px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 8px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.875rem;
    outline: none;
    text-align: center;
  }
  #num-input:focus { border-color: var(--accent); }
  .topbtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    padding: 7px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: var(--font-ui);
    display: flex; align-items: center; gap: 5px;
  }
  .topbtn:hover { border-color: var(--accent); color: var(--accent); }
  .topbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(196,163,90,0.08); }
  #count-badge {
    font-size: 0.7rem; color: var(--text-dim);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 2px 8px;
    white-space: nowrap;
  }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 280px;
    min-width: 200px;
    max-width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    resize: horizontal;
    overflow: auto;
  }
  #sidebar-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 0;
  }
  #sidebar-list::-webkit-scrollbar { width: 5px; }
  #sidebar-list::-webkit-scrollbar-track { background: transparent; }
  #sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .hymn-item {
    padding: 10px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.1s;
    display: flex;
    gap: 10px;
    align-items: baseline;
  }
  .hymn-item:hover { background: var(--surface2); }
  .hymn-item.selected {
    background: rgba(196,163,90,0.1);
    border-left-color: var(--accent);
  }
  .hymn-num {
    font-size: 0.7rem;
    color: var(--accent);
    font-family: var(--font-ui);
    font-weight: 600;
    min-width: 28px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .hymn-title-list {
    font-size: 0.83rem;
    color: var(--text);
    line-height: 1.35;
    font-family: var(--font-display);
  }
  .hymn-item.selected .hymn-title-list { color: var(--accent2); }
  .no-results {
    padding: 24px 16px;
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
    font-style: italic;
  }

  /* ── VIEWER ── */
  #viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Viewer toolbar */
  #viewer-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #hymn-nav-num {
    font-family: var(--font-display);
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: bold;
    min-width: 32px;
  }
  #hymn-nav-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .navbtn {
    background: none; border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted);
    width: 30px; height: 30px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: all 0.15s;
  }
  .navbtn:hover { border-color: var(--accent); color: var(--accent); }
  .navbtn:disabled { opacity: 0.3; cursor: default; }

  /* Font size control */
  #font-controls {
    display: flex; align-items: center; gap: 4px;
    border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
  }
  .fontbtn {
    background: var(--surface2); border: none; color: var(--text-muted);
    padding: 4px 8px; cursor: pointer; font-size: 0.8rem;
    transition: all 0.15s;
  }
  .fontbtn:hover { background: var(--border); color: var(--text); }
  #font-size-label {
    padding: 4px 6px; font-size: 0.75rem; color: var(--text-dim);
    background: var(--surface2); white-space: nowrap; font-family: var(--font-ui);
    min-width: 36px; text-align: center;
  }

  /* Viewer content */
  #viewer-content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  #viewer-content::-webkit-scrollbar { width: 6px; }
  #viewer-content::-webkit-scrollbar-track { background: transparent; }
  #viewer-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  
  #hymn-display { max-width: 680px; margin: 0 auto; }
  .hymn-header {
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .hymn-number-display {
    font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em;
    font-family: var(--font-ui); font-weight: 700; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hymn-title-display {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--text);
    line-height: 1.2;
    font-weight: normal;
  }
  .hymn-text {
    font-family: var(--font-display);
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }
  .verse-section { margin-bottom: 20px; }
  .verse-label {
    font-size: 0.65rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-family: var(--font-ui);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .verse-text {
    font-family: var(--font-display);
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    padding-left: 8px;
    border-left: 2px solid var(--border);
  }
  .coro-section { margin-bottom: 20px; }
  .coro-label {
    font-size: 0.65rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-family: var(--font-ui);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .coro-text {
    font-family: var(--font-display);
    line-height: 1.85;
    color: var(--accent2);
    white-space: pre-wrap;
    padding-left: 8px;
    border-left: 2px solid var(--accent);
    font-style: italic;
  }

  #placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: var(--text-dim);
    font-family: var(--font-display);
  }
  #placeholder .cross { font-size: 3rem; color: var(--border); }
  #placeholder p { font-size: 1rem; font-style: italic; }

  /* ── OVERLAY (broadcast) ── */
  #overlay {
    position: fixed; inset: 0;
    background: var(--overlay-bg);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  #overlay.active { display: flex; }
  
  /* Overlay toolbar */
  #overlay-toolbar {
    background: rgba(19,19,31,0.95);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }
  #overlay.hide-controls #overlay-toolbar { opacity: 0; pointer-events: none; }
  #overlay-title-bar {
    font-family: var(--font-display);
    font-size: 0.9rem;
    color: var(--accent);
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .obtn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted);
    padding: 6px 12px; cursor: pointer; font-size: 0.8rem;
    white-space: nowrap; transition: all 0.15s; font-family: var(--font-ui);
    display: flex; align-items: center; gap: 5px;
  }
  .obtn:hover { border-color: var(--accent); color: var(--accent); }
  .obtn.danger:hover { border-color: #e05050; color: #e05050; }
  #overlay-font-size { display: flex; align-items: center; gap: 4px; }
  .ofontbtn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-muted);
    width: 26px; height: 26px; cursor: pointer; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ofontbtn:hover { border-color: var(--accent); color: var(--accent); }
  #overlay-font-label {
    font-size: 0.75rem; color: var(--text-dim); min-width: 38px; text-align: center;
    font-family: var(--font-ui);
  }

  /* Overlay stage */
  #overlay-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }
  #overlay-verse-label {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    opacity: 0.8;
  }
  #overlay-text {
    font-family: var(--font-display);
    font-size: 2.2rem;
    line-height: 1.65;
    color: #f0edf8;
    text-align: center;
    white-space: pre-wrap;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: opacity 0.2s;
    max-width: 900px;
  }
  #overlay-text.fade { opacity: 0; }
  #overlay-hymn-footer {
    position: absolute;
    bottom: 24px;
    font-family: var(--font-display);
    font-size: 0.85rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.02em;
  }

  /* Overlay navigation row */
  #overlay-nav {
    background: rgba(19,19,31,0.95);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }
  #overlay.hide-controls #overlay-nav { opacity: 0; pointer-events: none; }
  .overlay-section-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted);
    padding: 6px 12px; cursor: pointer; font-size: 0.78rem;
    font-family: var(--font-ui); transition: all 0.15s;
    white-space: nowrap;
  }
  .overlay-section-btn:hover { border-color: var(--accent); color: var(--accent); }
  .overlay-section-btn.current { border-color: var(--accent); color: var(--accent); background: rgba(196,163,90,0.1); }
  .overlay-section-btn.coro-btn { color: var(--accent2); }
  .overlay-section-btn.coro-btn.current { border-color: var(--accent2); background: rgba(232,201,122,0.08); }
  #overlay-sections-scroll {
    flex: 1; overflow-x: auto; display: flex; gap: 6px;
    scrollbar-width: none;
  }
  #overlay-sections-scroll::-webkit-scrollbar { display: none; }
  #overlay-big-prev, #overlay-big-next {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted);
    padding: 6px 14px; cursor: pointer; font-size: 1rem;
    transition: all 0.15s; flex-shrink: 0;
  }
  #overlay-big-prev:hover, #overlay-big-next:hover {
    border-color: var(--accent); color: var(--accent);
  }
  #overlay-big-prev:disabled, #overlay-big-next:disabled { opacity: 0.3; cursor: default; }

  /* Fullscreen hint */
  #fs-hint {
    position: fixed; bottom: 80px; right: 24px;
    background: rgba(19,19,31,0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.72rem; color: var(--text-dim);
    pointer-events: none;
    opacity: 1; transition: opacity 1s;
    z-index: 200;
  }
  #fs-hint.gone { opacity: 0; }

  /* Resizer */
  #resizer {
    width: 4px; background: var(--border); cursor: col-resize;
    flex-shrink: 0; transition: background 0.15s;
  }
  #resizer:hover { background: var(--accent); }

  @media (max-width: 600px) {
    #sidebar { width: 100%; max-width: none; display: none; }
    #sidebar.open { display: flex; position: absolute; z-index: 50; height: 100%; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <h1>✟ Celebremos su Gloria</h1>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Buscar himno..." autocomplete="off" spellcheck="false">
    <span id="search-icon">🔍</span>
  </div>
  <div id="num-input-wrap">
    <label for="num-input">Nº</label>
    <input id="num-input" type="number" min="1" max="700" placeholder="—">
  </div>
  <button class="topbtn" id="btn-overlay" title="Abrir presentación">
    ▶ Presentar
  </button>
  <button class="topbtn" id="btn-fullscreen" title="Pantalla completa">⛶ Pantalla completa</button>
  <span id="count-badge">641 himnos</span>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar">
    <div id="sidebar-list"></div>
  </div>
  <div id="resizer"></div>
  <div id="viewer">
    <div id="viewer-toolbar">
      <button class="navbtn" id="btn-prev-hymn" title="Himno anterior">‹</button>
      <span id="hymn-nav-num"></span>
      <span id="hymn-nav-title"></span>
      <div id="font-controls">
        <button class="fontbtn" id="fc-down">A−</button>
        <span id="font-size-label">100%</span>
        <button class="fontbtn" id="fc-up">A+</button>
      </div>
      <button class="navbtn" id="btn-next-hymn" title="Himno siguiente">›</button>
    </div>
    <div id="viewer-content">
      <div id="placeholder">
        <div class="cross">✟</div>
        <p>Selecciona un himno para leer</p>
      </div>
      <div id="hymn-display" style="display:none"></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="overlay-toolbar">
    <span id="overlay-title-bar"></span>
    <div id="overlay-font-size">
      <button class="ofontbtn" id="of-down">−</button>
      <span id="overlay-font-label">2.2rem</span>
      <button class="ofontbtn" id="of-up">+</button>
    </div>
    <button class="obtn" id="overlay-toggle-controls" title="Mostrar/ocultar controles (H)">👁 Ocultar</button>
    <button class="obtn" id="overlay-fullscreen" title="Pantalla completa (F)">⛶ Pantalla completa</button>
    <button class="obtn danger" id="btn-close-overlay">✕ Cerrar</button>
  </div>
  <div id="overlay-stage">
    <div id="overlay-verse-label"></div>
    <div id="overlay-text"></div>
    <div id="overlay-hymn-footer"></div>
  </div>
  <div id="overlay-nav">
    <button id="overlay-big-prev">‹</button>
    <div id="overlay-sections-scroll"></div>
    <button id="overlay-big-next">›</button>
  </div>
</div>

<div id="fs-hint">Presiona F para pantalla completa</div>

<script>
const HYMNS = [{"n":1,"t":"Celebremos","c":"¡Celebremos! Celebremos la gloria de Dios porque él es\nel Creador. Unamos nuestra voz a la de las huestes\ncelestiales que cantaron a Dios en el comienzo de la\ncreación:\nAlababan todas las estrellas del alba, y se regocijaban\ntodos los hijos de Dios. Job 38:7\n(RVR)\nEl salmista hace eco a esa alabanza al contemplar\nAlabad a Dios en su santuario; alabadle en la magnifi-\ncencia de su firmamento. Salmo 150:1\n(RVR)\nCelebremos la gracia de Dios porque el nos ha enviado\nun Salvador. Unamos nuestra voz a la de los ángeles\nque aquella maravillosa noche en Belén cantaron:\n¡Gloria a Dios en las alturas!   Lucas 2:14a (RVR)\nCelebremos la Palabra de Dios, que es la espada del\nEsp’ritu, porque ella es nuestro alimento y al cantarla\nnos trae mutua edificación:\nenseñándoos y exhortándoos unos a otros en toda\nsabidur’a, cantando con gracia en vuestros corazones\nal Señor con salmos e himnos y cánticos espirituales.\nColosenses 3:16 (RVR)\nUn d’a estaremos en la presencia de Dios, junto con toda\nsu Iglesia. Entonces, con instrumentos musicales y cánti-\nco nuevo, proclamaremos:\nDigno eres...porque tú fuiste inmolado, y con tu san-\ngre nos has redimido para Dios, de todo linaje y\nlengua y pueblo y nación. Apocalipsis 5:9\n(RVR)\n¡Celebremos! ¡¡Celebremos su gloria!!"},{"n":2,"t":"Celebremos su gloria","c":"2.                             Celebremos su gloria\nCantad entre las gentes su gloria. 1 Crónicas 16:24\n1.                      Celebremos su gloria con gran gozo,\nAlabemos su grandeza;\nDios eterno es todopoderoso;\nNuestro escudo y fortaleza.\nCoro                            ¡Celebremos y adoremos,\nAlabemos y cantemos\nMuy gozosos, oh hermanos,\nAl Señor, a nuestro Dios!\n2.                    Celebremos su gloria indecible,\nElevemos nuestro canto;\nAdoremos con corazón sensible\nAl Señor tres veces santo.\nCoro                            ¡Celebremos y adoremos,\nAlabemos y cantemos\nMuy gozosos, oh hermanos,\nAl Señor, a nuestro Dios!\n3.                    Celebremos su gloria jubilosos,\nCristo reina, soberano;\nPor su gracia nos gu’a victoriosos\nCon su poderosa mano.\n4.                  Celebremos su gloria exaltada;\nJesucristo pronto viene\na llevarnos, su Iglesia transformada\nA la Gloria para siempre."},{"n":3,"t":"Santo, santo, grande eterno Dios","c":"3.      Santo, santo, grande eterno Dios\nVenid, adoremos... delante del Señor nuestro Hacedor.          Salmo 95:6\n1.        ¡Santo, santo, grande, eterno Dios!\nCon alegr’a hoy te alabamos,\nRey de reyes, grande Capitán,\nTodopoderoso Guerrero.\nHonor y gloria, luz y dominio,\nTributaremos todos a ti.\nCoro:           ¡Santo, santo, eres tú, Señor!\n¡Dios de las batallas, glorioso!\nCoro:          ¡Santo, santo, eres tú, Señor!\n¡Dios de las batallas, glorioso!\n2.            Alabadle cielos, tierra y mar,\nToda su Iglesia, sus mensajeros;\nAlabanzas, cantos de loor, hoy unidos elevaremos.\nJuez majestuoso y reverendo,\nFuego y vida eres, Señor.\n3.         Rey de siglos, solo eterno Dios,\nVeraz y justo, incomprensible;\nInmortal, Autor de todo bien, eres tú el Anciano de D’as.\nY para siempre entonaremos\nEl canto eterno de redención."},{"n":4,"t":"Santo, Santo, Santo","c":"Santo, santo, santo... la tierra está llena de su gloria. Isa’as 6:3\n1.          ¡Santo! ¡Santo! ¡Santo! Señor omnipotente,\nSiempre el labio m’o loores te dará.\n¡Santo! ¡Santo! ¡Santo! te adoro reverente,\nDios en tres personas, bendita Trinidad.\n2.           ¡Santo! ¡Santo! ¡Santo! en numeroso coro,\nSantos escogidos te adoran sin cesar,\nDe alegr’a llenos, y sus coronas de oro\nRinden ante el trono y el cristalino mar.\n3.   ¡Santo! ¡Santo! ¡Santo! la inmensa muchedumbre\nDe ángeles que cumplen tu santa voluntad,\nAnte ti se postra, bañada de tu lumbre,\nAnte ti, que has sido, que eres y serás.\n4.     ¡Santo! ¡Santo! ¡Santo! por más que estés velado,\nE imposible sea tu gloria contemplar;\nSanto tú eres solo, y nada hay a tu lado\nEn poder perfecto, pureza y caridad.\n5.     ¡Santo! ¡Santo! ¡Santo! la gloria de tu nombre\nVemos en tus obras en cielo, tierra y mar;\n¡Santo! ¡Santo! ¡Santo! te adorará todo hombre,\nDios en tres personas, bendita Trinidad."},{"n":5,"t":"Cantad alegres al Señor","c":"Cantad alegres a Dios. Salmo 100:1\n1.                  Cantad alegres al Señor,\nMortales todos por doquier,\nServidle siempre con fervor,\nObedecedle con placer.\n2.                 Con gratitud canción alzad\nAl Hacedor que el ser nos dio;\nAl Dios excelso adorad,\nQue como Padre nos amó.\n# 3 y 4 Comité de Celebremos, 1991. MUSICA: John Hatton, 1773. Estr. # 3 y 4\n3.   Reconoced que es Dios y Rey,\nNuestro potente Creador;\nOvejas somos de su grey,\nY pueblo suyo por su amor.\n4.   Con alabanza y gozo entrad\nA la presencia del Señor;\nAl Soberano aclamad,\nY bendecidle con fervor.\nAmén.\n# 3 y 4 Comité de Celebremos, 1991. MUSICA: John Hatton, 1773. Estr. # 3 y 4"},{"n":6,"t":"Celebremos su gloria","c":"Vi yo al Señor sentado sobre un trono alto y sublime;\ny el borde de sus vestiduras llenaba el templo.\nY el que estaba sentado era semejante\na una piedra de jaspe y de cornalina...\nTambién alrededor del trono hab’a veinticuatro tronos,\ny sobre los tronos vi a veinticuatro ancianos sentados,\nvestidos de vestiduras blancas, con coronas de oro sobre\nsus cabezas.\nIsaias 6: 1b; Apocalipsis 4: 3a, 4, 10b-11; 19:1 (RVA)\nY echan sus coronas delante del trono, diciendo:\nÒDigno eres tú, oh Señor y Dios nuestro,\nde recibir la gloria, la honra y el poder;\nporque tú has creado todas las cosas,\ny por tu voluntad tienen ser y fueron creadasÓ.\nDespués de estas cosas, o’ como la gran voz\nde una enorme multitud en el cielo, que dec’a:\nÒ¡Aleluya! La salvación y la gloria\ny el poder pertenecen a nuestro DiosÓ.\nIsaias 6: 1b; Apocalipsis 4: 3a, 4, 10b-11; 19:1 (RVA)"},{"n":7,"t":"Con cánticos, Señor","c":"7.          Con cánticos, Señor\nCantad al Señor cántico nuevo. Salmo 149:1\n1.            Con cánticos, Señor,\nTe adoran con fervor,\nOh Trino, Santo Dios.\nCoro        En tu mansión yo te veré,\nY paz eterna gozaré.\n2.            Tu mano paternal\nMarcó mi senda aqu’;\nMis pasos, cada cual,\nVelados son por ti.\ntrad. M.N. Hutchinson, alt. Musica: John Darwall, 1770.\nCoro   En tu mansión yo te veré,\nY paz eterna gozaré.\n3.        Innumerables son\nTus bienes y sin par;\nY por tu compasión\nLos gozo sin cesar.\n4.       Tú eres ¡oh Señor!\nMil lenguas tu amor\nCantando siempre estén.\ntrad. M.N. Hutchinson, alt. Musica: John Darwall, 1770."},{"n":8,"t":"Maravillosa Gracia","c":"8.            Maravillosa Gracia\nPorque la gracia de Dios se ha manifestado para salvación. Tito 2:11\n1.          Maravillosa gracia vino Jesús a dar,\nMás alta que los cielos, más honda que la mar,\nMás grande que mis culpas clavadas en la cruz\nEs la maravillosa gracia de Jesús.\n2.      Maravillosa gracia, gracia de compasión,\nGracia que sacia el alma con plena salvación,\nGracia que lleva al cielo, gracia de paz y luz\nEs la maravillosa gracia de Jesús.\n3.      Maravillosa gracia llama con dulce voz,\nLlámanos a ser hechos hijos de nuestro Dios;\nColma de su consuelo, nos llena de virtud\nEs la maravillosa gracia de Jesús.\nLETRA y MUSICA: Haldor Lillenas, 1918, trad. W.R. Adell.\n© 1918, ren. 1946 Hope Publishing. Usado con permiso.\nCoro           Inefable es la divina gracia,\n(Inefable es la divina, la divina gracia,)\nEs inmensurable cual la mar,\n(Es inmensurable cual la más profunda mar,)\nFuente preciosa para el pecador, el pecador.\n(Como clara fuente, siempre suficiente\na los pecadores rescatar).\nPerdonando todos mis pecados,\n(Perdonando todos mis pecados, todos,)\nCristo me limpió de mi maldad;\n(Cristo me limpió de mi maldad, de mi maldad;)\nAlabaré su dulce nombre por la eternidad.\nLETRA y MUSICA: Haldor Lillenas, 1918, trad. W.R. Adell.\n© 1918, ren. 1946 Hope Publishing. Usado con permiso."},{"n":9,"t":"Majestad","c":"9.                                       Majestad\nAl único... Dios, nuestro Salvador, sea gloria y majestad. Judas v. 25\nSi b (Capo 1 - La)                                                                           Con amplitud\n1.               ¡Majestad, excelsa majestad!\nTributadle la gloria y el honor;\n¡Majestad! Por siempre ensalzad\nAl Salvador, digno Señor,\nEl Vencedor.\nCoro        Alabad, engrandeced su santo nombre,\nAdorad, magnificad al gran Redentor.\n¡Majestad! La gloria celebrad\nDel Salvador, Cristo Jesús,\nRey y Señor.\nComité de Celebremos. MUSICA: Jack Hayford, 1981, arreg.\nEugene Thomas, alt. © 1981 Trust Music, admin. Galaxia Musical. Usado con permiso.\nCoro    Alabad, engrandeced su santo nombre,\nAdorad, magnificad al gran Redentor.\n¡Majestad! La gloria celebrad\nDel Salvador, Cristo Jesús, Rey y Señor.\n2.           ¡Majestad, divina majestad!\nDios eterno es Jesucristo el Señor;\n¡Majestad! De su poder cantad;\nEl es Creador, Sustentador, Gobernador.\n3.          ¡Majestad, eterna majestad\nAl que era, que es y siempre será!\n¡Majestad! Su triunfo proclamad;\nPronto vendrá, nos llevará y reinará.\nComité de Celebremos. MUSICA: Jack Hayford, 1981, arreg.\nEugene Thomas, alt. © 1981 Trust Music, admin. Galaxia Musical. Usado con permiso."},{"n":10,"t":"Sólo tú eres santo","c":"ÀQuién no te temerá, oh Señor?... pues sólo tú eres santo. Apocalipsis 15:4\nSólo tú eres santo,\nSólo tú eres digno,\nTú eres hermoso\ny maravilloso;\nEn la cruz moriste\ny resucitaste;\nTú me diste vida\nY muy pronto volverás."},{"n":11,"t":"A Dios sea la gloria","c":"A él sea gloria en la iglesia en Cristo Jesús. Efesios 3:21\nSi b ( Capo 3-Sol)                                                                  Con regocijo\nA Dios sea la gloria,\nA Dios sea la gloria;\nA Dios sea la gloria\nPor lo que hizo por m’;\nCon su sangre me ha limpiado,\nsu poder me ha salvado,\nA Dios sea la gloria\npor lo que hizo por m’.\nLETRA y MUSICA: Andraé Crouch, 1974, es trad.\n© 1971 BudJohn Songs, Inc., admin. C.M.I. Usado con permiso.\nQuiero vivir, Señor,\nrendido siempre solo a ti;\npongo a tus pies lo que soy,\nporque diste todo, Señor, por m’.\nCon su sangre me ha limpiado,\nSu poder me ha salvado,\nA Dios sea la gloria\nPor lo que hizo por m’.\nLETRA y MUSICA: Andraé Crouch, 1974, es trad.\n© 1971 BudJohn Songs, Inc., admin. C.M.I. Usado con permiso."},{"n":12,"t":"Canta aleluya al Señor","c":"Te alabarán con arpa, oh Dios, Dios mio, Salmo 43: 4\n1.                     Canta aleluya al Señor,\n(Canta aleluya al Señor,)\nCanta aleluya al Señor;\n(Canta aleluya,)\nCanta aleluya, canta aleluya;\n(Aleluya , )\nCanta aleluya al Señor.\n2.                    Cántale a Dios de corazón,\nCántale a Dios de corazón;\nCanta aleluya, canta aleluya;\nCántale a Dios de corazón.\nes trad. # 2-5 Sonia Andrea Linares M., 1990. MUSICA: Linda Stassen, 1974,\n3.         Ya Cristo obró la redención,\nYa Cristo obró la redención;\nCanta aleluya, canta aleluya;\nYa Cristo obró la redención.\n4.          Venció la muerte el Señor,\nVenció la muerte el Señor;\nCanta aleluya, canta aleluya;\nVenció la muerte el Señor.\n5.           Cristo Jesús nos llevará,\nCristo Jesús nos llevará,\nCanta aleluya, canta aleluya;\nCristo Jesús nos llevará.\nes trad. # 2-5 Sonia Andrea Linares M., 1990. MUSICA: Linda Stassen, 1974,"},{"n":13,"t":"Gloria, Gloria","c":"¡Gloria a Dios en las alturas! Lucas 2:14\nCanon a 4 voces\n¬ Gloria, gloria\n- in excelsis Deo !\n® Gloria, gloria,\n¯           aleluia, aleluia!\n¡Gloria, gloria,\nen lo alto gloria!\n¡Gloria, gloria,\naleluya, aleluya!\n© 1978 Ateliers et Presses de Taizé, Francia. Usado con permiso."},{"n":14,"t":"La grandeza de Dios","c":"¡Bendito seas tú...nuestro Padre desde la eternidad\ny hasta la eternidad!\nTuyos son, oh Señor, la grandeza, el poder,\nporque tuyas son todas las cosas\nque están en los cielos y en la tierra.\nTuyo es el reino, oh Señor,\ny tú te enalteces como cabeza sobre todo.\nY ahora, oh Dios nuestro, nosotros te damos\ngracias y alabamos tu glorioso nombre.\n1 Crónicas 29:10b-11*, 13; Salmo 8:1-4 (RVA); 89:5*, 7; 57:9-11 (RVR)\nSeñor nuestro, ¡cuán grande es tu nombre en toda la tierra!\nHas puesto tu gloria sobre los cielos.\nDe la boca de los pequeños\ny de los que todav’a maman has establecido\npara hacer callar al enemigo y al vengativo.\nCuando contemplo tus cielos, obra de tus dedos,\nDigo: ÀQué es el hombre, para que de él te\nacuerdes; y el hijo de hombre, para que lo visites?\n1 Crónicas 29:10b-11*, 13; Salmo 8:1-4 (RVA); 89:5*, 7; 57:9-11 (RVR)\nCelebrarán los cielos tus maravillas, oh Señor, tu verdad\ntambién en la congregación de los santos.\nDios temible en la gran congregación\nde los santos,\nY formidable sobre todos cuantos están alrededor de él.\nTe alabaré entre los pueblos, oh Señor;\ncantaré de ti entre las naciones.\nPorque grande es hasta los cielos tu misericordia,\ny hasta las nubes tu verdad.\nExaltado seas sobre los cielos, oh Dios; sobre\ntoda la tierra sea tu gloria.\n1 Crónicas 29:10b-11*, 13; Salmo 8:1-4 (RVA); 89:5*, 7; 57:9-11 (RVR)"},{"n":15,"t":"Al Dios de Abraham, loor","c":"15.               Al Dios de Abraham, loor\n[Abraham] se fortaleció en fe, dando gloria a Dios. Romanos 4:20\n1.             ¡Al Dios de Abraham, loor!\nsu nombre celebrad;\n¡Al que era, es, y aún será, magnificad!\nEl solo, eterno Dios, de todo es Creador:\nAl único Supremo Ser cantad loor.\n2.               ¡Cuán libre y sabio es\nsu Esp’ritu al obrar!\nSu voz por el profeta aún nos quiere hablar.\nEn todo corazón su ley escrita está;\nEs inmutable y siempre fiel en tierra y mar.\nen Yigdal de Daniel ben Judah, 1404, trad. G.P. Simmonds, estr. # 4\nComité de Celebremos , 1991. MUSICA: Melod’a hebrea, arreg. Meyer Lyon, 1770\n3.    La vida infundió en cada humano ser.\nSu amor, amparo nos será sin fenecer.\n¡Al vivo Dios, loor!\nsu nombre celebrad;\n¡Al que era, es, y aún será, magnificad!\n4.               Al Padre celestial,\na Cristo el Redentor,\nY al eternal Consolador, cantad loor.\nCristianos, ensalzad\nsu gracia y su bondad;\nAl trino Dios de Abraham\nhoy alabad. Amén.\nen Yigdal de Daniel ben Judah, 1404, trad. G.P. Simmonds, estr. # 4\nComité de Celebremos , 1991. MUSICA: Melod’a hebrea, arreg. Meyer Lyon, 1770"},{"n":16,"t":"Alma, bendice al Señor","c":"16.                      Alma, bendice al Señor\nAlabo, engrandezco y glorifico al Rey del cielo. Daniel 4:37\n¥1.           Alma, bendice al Señor,\nRey potente de gloria;\nDe sus mercedes esté viva en ti la memoria.\n¡Oh, despertad, arpa y salterio!\nEntonad himnos de honor y victoria.\n¥2. Alma, bendice al Señor que los orbes gobierna,\nY te conduce paciente con mano paterna;\nTe perdonó, de todo mal te libró,\nporque su gracia es eterna.\n3.   Alma, bendice al Señor, de tu vida la fuente,\nQue te creó, y en salud te sostiene clemente;\nTu defensor en todo trance y dolor,\nSu diestra es omnipotente.\n4.   Alma, bendice al Señor por su amor infinito;\nCon todo el pueblo de Dios su alabanza repito:\nDios, mi salud, de todo bien plenitud,\n¡Seas por siempre bendito!"},{"n":17,"t":"Bueno es alabarte, oh Jehová","c":"17.      Bueno es alabarte, oh Jehová\nBueno es alabarte, oh Señor, y cantar salmos a tu nombre. Salmo 92:1\n¥Bueno es alabarte, oh Jehová.\nBueno es alabarte, oh Jehová,\nY cantar salmos a tu nombre, oh Alt’simo;\nAnunciar por la mañana\ntu misericordia, tu misericordia\ny tu fidelidad cada noche.\nBueno es alabarte, oh Jehová.\nBueno es alabarte, oh Jehová,\nY cantar salmos a tu nombre, oh Alt’simo."},{"n":18,"t":"Gloria a tu nombre, oh Dios","c":"18.       Gloria a tu nombre, oh Dios\nOh Señor, no a nosotros, sino a tu nombre da gloria. Salmo 115:1\n¥1.             ¡Oh bendito rey divino!\nte adoramos con fervor;\nPoderoso, admirable eres tú, ¡oh Salvador!\nCoro:                                    Gloria, gloria,\n(// ¡Gloria a tu nombre, oh Dios! //)\n¡Gloria a tu nombre, oh Dios!\nGloria, gloria,\n(// ¡Gloria a tu nombre, oh Dios! //)\n¡Gloria a tu nombre, oh Dios!                 (Amén)\nLETRA y MUSICA: B.B. Mckinney, 1942, trad. Salomón Mussiett C.\n© 1942, ren. 1970 , trad. © 1978 Broadman Press. Usado con permiso.\nCoro:                             Gloria, gloria,\n(// ¡Gloria a tu nombre, oh Dios! //)\n¡Gloria a tu nombre, oh Dios!\nGloria, gloria,\n(// ¡Gloria a tu nombre, oh Dios! //)\n¡Gloria a tu nombre, oh Dios!                                                  (Amén)\n¥2.             De tu trono en los cielos\na este mundo pecador,\nHas bajado para darte como nuestro Redentor.\n¥3.            Ven, oh ven, Señor Eterno,\nven con gloria divinal;\nVen y lleva a tu Iglesia a tu reino celestial.\nLETRA y MUSICA: B.B. Mckinney, 1942, trad. Salomón Mussiett C.\n© 1942, ren. 1970 , trad. © 1978 Broadman Press. Usado con permiso."},{"n":19,"t":"Levantaos, Bendecid","c":"Levantaos, bendecid al Señor vuestro Dios. Nehem’as 9:5\nCoro                   Levantaos, bendecid\na Jehová vuestro Dios\nDesde la eternidad\nhasta la eternidad.\nCon serenidad\n1.            Y bend’gase el nombre tuyo,\nGlorioso y alto sobre\ntoda bendición;\nY bend’gase el nombre tuyo,\nGlorioso y alto sobre\ntoda alabanza.\n© 1985 Philip W. Blycker en Cánticos Nuevos de la Biblia. Usado con permiso.\nCon ánimo\nCoro             Levantaos, bendecid\na Jehová vuestro Dios\nDesde la eternidad\nhasta la eternidad.\nCon serenidad\n2.         Tú solo eres Jehová;\nTú hiciste los cielos, la tierra,\nel mar y lo que en ellos hay;\nTú solo eres Jehová;\nTú hiciste los cielos, la tierra,\nel mar y todo te adora.\n© 1985 Philip W. Blycker en Cánticos Nuevos de la Biblia. Usado con permiso."},{"n":20,"t":"Alabad al gran Rey","c":"Aclamad con trompetas... delante del Rey Jehová. Salmo 98:6\n1.           Solemnes resuenen las voces de amor,\nCon gran regocijo tributen loor\nAl Rey Soberano, el buen Salvador;\nDign’simo es él del más alto honor.\nCoro             Alabad, alabad, alabad al gran Rey.\nAdorad, adorad, adoradle su grey.\nEs nuestro escudo, baluarte y sostén\nEl Omnipotente por siglos. Amén.\n2.         Su amor infinito, ÀQué lengua dirá?\nY ÀQuién sus bondades jamás sondeará?\nSu misericordia no puede faltar,\nMil himnos alaben su nombre sin par.\nCoro    Alabad, alabad, alabad al gran Rey.\nAdorad, adorad, adoradle su grey.\nEs nuestro escudo, baluarte y sostén\nEl Omnipotente por siglos. Amén.\n3.     Inmensa la obra de Cristo en la cruz,\nEnorme la culpa se ve por su luz.\nAl mundo él vino, nos iluminó,\nY por nuestras culpas el Justo murió.\n4.     Velad, fieles todos, velad con fervor,\nQue viene muy pronto Jesús, el Señor.\nCon notas alegres vendrá a reinar;\nA su eterna gloria os ha de llevar."},{"n":21,"t":"Te alabaré, Señor","c":"Te alabaré, oh Señor, con todo mi corazón. Salmo 9:1\n1.     Te alabaré, Señor, con todo mi corazón,\ncon todo mi corazón, Te alabaré, Señor.\nContaré todas tus maravillas,\ntodas tus maravillas; te alabaré, Señor.\n2.        Me alegraré en ti y me regocijaré,\ny me regocijaré, Te alabaré, Señor.\nCantaré a tu nombre,\noh, Alt’simo; oh, Alt’simo,\nTe alabaré, Señor.\nUltima vez Te alabaré, Señor; te alabaré, Señor."},{"n":22,"t":"Bendeciré al Señor","c":"Y ellos alabaron con gran alegr’a, y se inclinaron y adoraron. 2 Crónicas 29:30\n¥ Bendeciré al Señor en todo tiempo;\nsu alabanza en mi boca estará.\nEn el Señor se gloriará mi alma;\nlo oirán los mansos y se alegrarán.\nEngrandeced al Señor conmigo,\ny exaltemos a una su nombre.\nBusqué al Señor y él me oyó,\ny de todos mis temores me libró.\nLETRA; Basada en Salmo 34: 1-4.\nMUSICA; Compositor descon., Latinoamérica, s. 20, arreg. F.B.J.                              L.A."},{"n":23,"t":"Santo es el Señor","c":"Toda la tierra sea llena de su gloria. Salmo 72:19\n¥Santo, santo, santo,\npoderoso Dios;\nSanto, santo, santo,\npoderoso Dios.\nSanto es el Señor.\n© 1976 Resource Christian Music. Usado con permiso."},{"n":24,"t":"Bendito es el Señor","c":"Viva Jehová, y bendita sea mi roca. Salmo 18:46\n¥1.                         Bendito es el Señor,\nenaltecido sea Dios.\nBendito es el Señor,\nenaltecido sea Dios.\nCoro          ¡Hosanna! Bendita sea la Roca,\nBendita sea la Roca\nde mi salvación.\n¡Hosanna! Bendita sea la Roca,\nBendita sea la Roca\nde mi salvación.\n1981, arreg. F.B.J. © 1981 Sound III, admin. Tempo Music. Usado con permiso.\nCoro       ¡Hosanna! Bendita sea la Roca,\nBendita sea la Roca de mi salvación.\n¡Hosanna! Bendita sea la Roca,\nBendita sea la Roca de mi salvación.\n¥2.             Yo te amo, oh Señor,\nYo te amo, oh Señor, mi roca y libertador.\n3.                 Yo te confesaré,\ny a tu nombre cantaré.\nYo te confesaré, y a tu nombre cantaré.\n1981, arreg. F.B.J. © 1981 Sound III, admin. Tempo Music. Usado con permiso."},{"n":25,"t":"De Jehová cantaré","c":"Las misericordias del Señor cantaré perpetuamente. Salmo 89:1\n1.   De Jehová cantaré yo las misericordias,\ncantaré, (cantaré,) cantaré. (cantaré.)\nDe Jehová cantaré yo las misericordias,\ngrandes misericordias cantaré.\nCon mi boca anunciaré\ntu gran verdad y fidelidad;\nCon mi boca anunciaré\ntu gran verdad por todos los siglos.\nDe Jehová cantaré yo las misericordias,\ncantaré, (cantaré,) cantaré. (cantaré.)\nDe Jehová cantaré yo las misericordias,\ngrandes misericordias cantaré.\nComité de Celebremos. MUSICA: James H. Fillmore, s. 20 Letra estr. #1\n2.   Con tu pueblo celebraré tus maravillas,\ncantaré, (cantaré,) cantaré. (cantaré.)\nCon tu pueblo celebraré tus maravillas,\ns’, de tus maravillas cantaré.\nTu verdad proclamaré,\npues eres Dios poderoso y fiel;\nTu verdad proclamaré,\npues eres nuestro Rey y escudo.\nCon tu pueblo celebraré tus maravillas,\ncantaré, (cantaré,) cantaré. (cantaré.)\nCon tu pueblo celebraré tus maravillas,\ns’, de tus maravillas cantaré.\nComité de Celebremos. MUSICA: James H. Fillmore, s. 20 Letra estr. #1"},{"n":26,"t":"Yo Celebraré","c":"A ti cantaré cántico nuevo. Salmo 144:9\nYo celebraré, cantaré a él,\nCantaré un nuevo canto.\nYo celebraré, cantaré a él,\nCantaré un nuevo canto.\n// Alabaré a Jehová\nporque él ha vencido con poder. //\nYo celebraré, cantaré a él,\nCantaré un nuevo canto.\nYo celebraré, cantaré a él,\nCantaré un nuevo canto.\n© 1982 Maranatha Music. Usado con permiso."},{"n":27,"t":"Tuya es la gloria","c":"1.                        Tuya es la gloria,\nTuya para siempre,\namén, amén.\n2.                    Tuyos los dominios,\nlos tronos también;\nTuyos para siempre,\namén, amén."},{"n":28,"t":"Himno al Padre","c":"Bendito sea el Dios Alt’simo. Génesis 14:20\n1.     Cantadle a una voz, Omnipotente Dios,\nSu nombre es Elohim, el trino Creador;\nJehová es el gran ÒYO SOYÓ,\ny eterno es El Olam,\nPostraos todos a sus pies,\nes nuestro Redentor.\n2.       Cantadle con amor, alt’simo Señor,\nSu nombre es Adonai, del mundo dueño y rey;\nEl Dios de bendición, nos cuida El Shaddai;\nOh, alabadle sin temor, ovejas de su grey.\nGénesis, Felipe Blycker J., 1977. MUSICA: Felipe Blycker J., 1977.                     GUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\n3.   Cantadle con fervor, supremo y fiel pastor,\nSu nombre es El Elyon, el gran gobernador;\nEl sempiterno Ser, nos gu’a con amor,\nLoad a Jehová Jireh, de Sion sustentador.\n4.    Dad cánticos a Dios el Padre, en alta voz,\nY al Hijo el Salvador mil salmos entonad;\nCon himnos ensalzad al Santo Esp’ritu;\nTres veces santo, el trino Dios,\nservidle con lealtad.\nGénesis, Felipe Blycker J., 1977. MUSICA: Felipe Blycker J., 1977.                 GUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":29,"t":"Bendeciré al Señor","c":"Bendeciré al Señor con toda mi alma.\n¡Cuán grande eres, Señor y Dios mío!\nTe has vestido de gloria y esplendor;\nTe has envuelto en un manto de luz.\nTú extendiste el cielo como un velo.\nConviertes las nubes en tu carro;\nviajas sobre las alas del viento.\nLos vientos son tus mensajeros y\nlas llamas de fuego tus servidores.\nSalmo 104: 1-3b, 4, 24, 31, 33 (DHH)\n¡Cuántas cosas has hecho, Señor!\nTodas las hiciste con sabiduría;\nEl Señor se alegra en su creación.\nMientras yo exista y tenga vida cantaré himnos al\nSeñor mi Dios.\nSalmo 104: 1-3b, 4, 24, 31, 33 (DHH)"},{"n":30,"t":"Mi corazón te adora","c":"30.        Mi corazón te adora\nEn la voz de los raudos huracanes,\nEn el plácido arroyo, en el torrente,\nEn el fuego, en la llama, en los volcanes:\nAllí, gran Dios, mi corazón te siente.\nEn los vergeles del florido mayo,\nEn los dulces acordes de la lira,\nEn la lluvia, en el trueno y en el rayo:\nAllí, gran Dios, mi corazón te admira.\nL.A.\nFaustino Martínez\nEn el aroma que a los cielos sube,\nEn el árbol que erguido se levanta,\nEn la sombra, en el astro y en la nube:\nAllí, gran Dios, mi corazón te canta.\nEn los trémulos rayos de la lumbre,\nEn el ósculo suave de la aurora,\nEn la hondura, en el llano y en la cumbre:\nAllí, gran Dios, mi corazón te adora.\nL.A.\nFaustino Martínez"},{"n":31,"t":"La Creación","c":"En el principio creó Dios los cielos y la tierra. Génesis 1:1\n1.       Dios ha hecho todo lo que el ojo ve,\nCada cosa de este mundo terrenal.\nTodo árbol y las plantas son de él,\nLas estrellas y el manto celestial.\nCoro:       ¡Sea ya la luz!” ordenó Jehová\nCon su fuerte voz, y la luz fue ya.\nHoy el buen Jesús, nuestro Redentor,\nBrinda al mundo luz con excelso amor.\nCoro:        ¡Sea ya la luz!” ordenó Jehová\nCon su fuerte voz, y la luz fue ya.\nHoy el buen Jesús, nuestro Redentor,\nBrinda al mundo luz con excelso amor.\n2.      A su imagen Dios formó al hombre Adán;\nLuego hizo una mujer tomada de él;\nY los colocó en el Jardín de Edén,\nDonde habían de seguirle siempre fiel.\n3.        El perfecto gozo había en el Edén;\nEllos se gozaban al andar con Dios.\nComunión completa había allá también\nAl oír de Jehová la tierna voz."},{"n":32,"t":"Cuán grande es él","c":"¡Cuán grande es tu nombre en toda la tierra! Salmo 8:9\nSi b (Capo 1 - La) / Do                                                                      Con júbilo\n1.      Señor, mi Dios, al contemplar los cielos,\nEl firmamento y las estrellas mil,\nAl oír tu voz en los potentes truenos\nY ver brillar el sol en su cenit,\nCoro:      // Mi corazón entona la canción,\n¡Cuán grande es él! ¡Cuán grande es él! //\n2.          Al recorrer los montes y los valles\nY ver las bellas flores al pasar,\nAl escuchar el canto de las aves\nY el murmurar del claro manantial,\ntrad. A.W. Hotton Rives. MUSICA: Melodía sueca, arreg. Stuart K. Hine,1949.\n© 1953, ren. 1981 Manna Music. Usado con permiso.\nCoro:       // Mi corazón entona la canción,\n¡Cuán grande es él! ¡Cuán grande es él! //\n3.         Cuando recuerdo del amor divino\nQue desde el cielo al Salvador envió,\nAquel Jesús que por salvarme vino\nY en una cruz sufrió por mí y murió,\n4.      Cuando el Señor me llame a su presencia,\nAl dulce hogar, al cielo de esplendor,\nLe adoraré cantando la grandeza\nDe su poder y su infinito amor:\ntrad. A.W. Hotton Rives. MUSICA: Melodía sueca, arreg. Stuart K. Hine,1949.\n© 1953, ren. 1981 Manna Music. Usado con permiso."},{"n":33,"t":"Oh, criaturas del Señor","c":"Alabad al Señor desde los cielos; alabadle en las alturas. Salmo 148:1\n1.            Oh, criaturas del Señor,\nCantad con melodiosa voz: ¡Alabadle! ¡Aleluya!\nArdiente sol con tu fulgor;\nOh, luna de suave esplendor:\nRefrán:                     ¡Alabadle! ¡Alabadle!\n¡Aleluya! ¡Aleluya! ¡Aleluya!                                                          (Amén.)\n2.            Viento veloz, potente alud,\nNubes en claro cielo azul: ¡Alabadle! ¡Aleluya!\nSuave, dorado amanecer;\nTu manto, noche, al extender:\nRefrán:                ¡Alabadle! ¡Alabadle!\n¡Aleluya! ¡Aleluya! ¡Aleluya!                                                       (Amén.)\n3.           Oh, fuentes de agua de cristal,\nA vuestro Creador cantad: ¡Alabadle! ¡Aleluya!\nOh, fuego, eleva tu loor, tú que nos das luz y calor:\n4.              Pródiga tierra maternal,\nQue frutos brindas sin cesar: ¡Alabadle! ¡Aleluya!\nRica cosecha, bella flor, magnificad al Creador:\n5.              Con gratitud y con amor,\nCante la entera creación: ¡Alabadle! ¡Aleluya!\nAl Padre, al Hijo Redentor,\ny al Eternal Consolador:"},{"n":34,"t":"Creo en ti, Señor","c":"Digo: ¿Qué es el hombre . . . para que lo visites? Salmo 8:4\n1. Cuando miro las estrellas en el cielo por doquier,\nCuando veo que destellan y me muestran tu poder,\nCuando veo el sol radiante y la luna en su fulgor,\nTodos a una voz me dicen que tú eres el Creador.\nCoro:\nY creo en ti, en ti, sólo en ti, Señor,\nY creo en ti, en ti como el Creador;\nY creo en ti, en ti, sólo en ti, Señor,\nY creo en ti, en ti como el Creador.\nLETRA y MUSICA: Aracely C. de Alvarez, 1986, alt., arreg. F.B.J.            L.A.\n© 1986 Casa Bautista de Publicaciones. Usado con permiso\nCoro:\nY creo en ti, en ti, sólo en ti, Señor,\nY creo en ti, en ti como el Creador;\nY creo en ti, en ti, sólo en ti, Señor,\nY creo en ti, en ti como el Creador.\nCon sencillez\n2.           Cuando miro las montañas,\nlos arroyos y el mar,\nCuando nace la mañana con el sol al despuntar,\nCuando veo un bebecito y el cuidado maternal,\nCon el corazón repito\nque mi Dios es el Creador.\nLETRA y MUSICA: Aracely C. de Alvarez, 1986, alt., arreg. F.B.J.           L.A.\n© 1986 Casa Bautista de Publicaciones. Usado con permiso"},{"n":35,"t":"El firmamento de esplendor","c":"Los cielos cuentan la gloria de Dios. Salmo 19:1\n1.            El firmamento de esplendor,\nEl sol y luna con placer, de Dios proclaman el poder.\nEl alba con su claridad de él anuncia majestad;\nSus himnos toda la creación\neleva a Dios con profusión.\n2.            El sol cual novio celestial,\nque deja el tálamo nupcial,\nProsigue su celeste andar, loando a Dios con su brillar.\nY en la quietud reverencial de la familia sideral\nEl universo en devoción a Dios tributa bendición.\ntrad. José Pesina G. y Maurilio López L. MUSICA: Franz Joseph Haydn, 1798."},{"n":36,"t":"Oh, Dios mi soberano Rey","c":"Soberano Señor, tú eres el Dios que hiciste el cielo. Hechos 4:24\n•1.     Oh, Dios mi soberano Rey, a ti daré loor;\nTu nombre yo ensalzaré, santísimo Señor.\n•2.    Tus obras evidencia son de infinito amor;\nY cantan con alegre voz tu gloria y honor.\n•3. Tu mano veo por doquier en cielo, tierra y mar;\n4.   Elevo a ti mi corazón en alabanzas hoy;\nPor todo lo que has hecho, Dios, mi adoración te doy."},{"n":37,"t":"Loor a ti","c":"Alabad al Señor de los señores, porque para siempre es su misericordia. Salmo 136:3\n•¡Santo, Santo, Santo,\nSeñor, Jehová!\nCielo y tierra, de tu amor\nLlenos hoy están, Señor;\n¡Loor a ti! Amén.\ntrad. Vicente Mendoza. MUSICA: William F. Sherwin, 1877."},{"n":38,"t":"Alabemos al Señor","c":"Su eterno poder y deidad se hacen claramente visibles. Romanos 1:20\n1.        ¡Alabemos al Señor, Dios de toda creación!\nTodo su amor nos dio, ¡Aleluya!\nCoro:\nGrupo A (mujeres)     Agua fresca el río nos dio,\nY la luz del sol nos alumbró;\nPor la noche el Padre nos cuidó.\n(Todos)              Alabemos al Señor, ¡Aleluya!\nGrupo B (varones) ¡Aleluya! ¡Aleluya! ¡Aleluya! ¡Aleluya!\n(todos)             Alabemos al Señor, ¡Aleluya!\n2.       ¡Alabemos al Señor por la vida que nos da!\nPues al alma trae paz, ¡Aleluya!\nLETRA y MUSICA: Héctor Sambrano, 1971, arreg. Roberto Casino, alt.                  ARG\n© 1971 Asociación Bautista Argentina de Publicaciones. Usado con permiso."},{"n":39,"t":"Cantemos al Señor","c":"Alabad al Señor desde la tierra. Salmo 148:7\n1.         Cantemos al Señor un himno de alegría,\nUn cántico de amor al nacer el nuevo día;\nEl hizo el cielo, el mar, el sol y las estrellas;\nEn ellos vio bondad, pues sus obras eran bellas.\nCoro:         ¡Aleluya! ¡Aleluya! Cantemos al Señor.\n¡Aleluya! ¡Aleluya! ¡Aleluya!\nCantemos al Señor. ¡Aleluya!\n(2nda voz)           ¡Aleluya, aleluya, aleluya, aleluya!\nCantemos al Señor. ¡Aleluya!\n¡Aleluya, aleluya, aleluya, aleluya!\nCantemos al Señor. ¡Aleluya!\nLETRA y MUSICA: Carlos Rosas, 1976, arreg. William Newton.                   MEX\n© 1976 y 1991 Resource Publications. Usado con permiso.\nCoro:        ¡Aleluya! ¡Aleluya! Cantemos al Señor.\n¡Aleluya! ¡Aleluya! ¡Aleluya!\nCantemos al Señor. ¡Aleluya!\n(2nda voz)        ¡Aleluya, aleluya, aleluya, aleluya!\nCantemos al Señor. ¡Aleluya!\n¡Aleluya, aleluya, aleluya, aleluya!\nCantemos al Señor. ¡Aleluya!\n2.           Cantemos al Señor un himno de alabanza\nQue exprese nuestro amor, nuestra fe y\nnuestra esperanza; Hoy toda la creación\npregona su grandeza, así nuestro cantar\nva anunciando su belleza.\nLETRA y MUSICA: Carlos Rosas, 1976, arreg. William Newton.             MEX\n© 1976 y 1991 Resource Publications. Usado con permiso."},{"n":40,"t":"Aleluya, Aleluya","c":"Se postraron y adoraron a Dios...y exclamaban: ¡Amén, aleluya! Apocalipsis 19:4 (NVI)\nCanon a 3 voces\n{                                 Aleluya, aleluya,\naleluya, aleluya.\n|\u0003                                Aleluya, aleluya,\naleluya, aleluya.\n}                                 Aleluya, aleluya.\nLETRA y MUSICA: Wolfgang A. Mozart, 1773,"},{"n":41,"t":"Anunciemos su poder","c":"¿Quién midió las aguas con el hueco de su mano y\nlos cielos con su palmo, con tres dedos juntó el\npolvo de la tierra, y pesó los montes con balanza y\ncon pesas los collados?\nHe aquí que las naciones le son como la gota de\nagua que cae del cubo, y como menudo polvo en\nlas balanzas le son estimadas; he aquí que hace\ndesaparecer las islas como polvo.\nLevantad en alto vuestros ojos, y mirad quién creó\nestas cosas; él saca y cuenta su ejército;\nIsaias 40: 12, 15, 26, 28; Salmo 89: 8, 9, 11, 13 - 15 (RVR)\nA todas llama por sus nombres; ninguna faltará;\ntal es la grandeza de su fuerza, y el poder de su\ndominio.\n¿No has sabido, no has oído que el Dios eterno es\nJehová, el cual creó los confines de la tierra?\nNo desfallece, ni se fatiga con cansancio, y su\nentendimiento no hay quien lo alcance.\nOh Jehová, Dios de los ejércitos, ¿quién como tú?\nPoderoso eres, Jehová, y tu fidelidad te rodea.\nIsaias 40: 12, 15, 26, 28; Salmo 89: 8, 9, 11, 13 - 15 (RVR)\nTú tienes dominio sobre la braveza del mar;\ncuando se levantan sus ondas, tú las sosiegas.\nTuyos son los cielos, tuya también la tierra; el\nmundo y su plenitud, tú lo fundaste.\nTuyo es el brazo potente; fuerte es tu mano,\nexaltada tu diestra.\nJusticia y juicio son el cimiento de tu trono; miseri-\ncordia y verdad van delante de tu rostro.\nBienaventurado el pueblo que sabe aclamarte;\nandará, oh Jehová, a la luz de tu rostro.\nIsaias 40: 12, 15, 26, 28; Salmo 89: 8, 9, 11, 13 - 15 (RVR)"},{"n":42,"t":"Reina Dios","c":"Cuán hermosos son sobre los montes los pies… del que dice: ¡Tu Dios reina! Isaías 52:7\nSi b (Capo 1 - La)                                                                        Con admiración\n•1.     Cuán bellos son los pies de aquel que\nanuncia hoy noticias del Señor;\nPredica paz,\nproclama gozo y salvación:\n¡Reina Dios! ¡Reina Dios!\nCoro:                 ¡Reina Dios! ¡Reina Dios!\n¡Reina Dios, nuestro Dios!\ntrad. Comité de Celebremos. MUSICA: Leonard E. Smith, Jr., 1974,\nCoro:              ¡Reina Dios! ¡Reina Dios!\n¡Reina Dios, nuestro Dios!\n2.       No vimos hermosura ni atractivo en él\ncuando en la cruz murió;\nFue afligido,\nmas su boca no abrió; Redención él obró.\n•3.          Venció la tumba con poder\ny gloria real, resucitó Jesús;\nHoy a la diestra de su Padre él está;\n¡Gloria a Dios, vive hoy!\ntrad. Comité de Celebremos. MUSICA: Leonard E. Smith, Jr., 1974,"},{"n":43,"t":"Nuestra Fortaleza","c":"Confiad en el Señor perpetuamente. Isaías 26:4\nSi b (Capo 3 - Sol)                                                                                   Con firmeza\n•1.               Nuestra fortaleza, nuestra protección,\nNuestro fiel socorro, nuestro paladión,\nNuestro gran refugio, nuestra salvación\nEs el Dios que adora nuestro corazón.\nCoro:              Nuestra fortaleza, nuestra protección\nEs el Dios que adora nuestro corazón.\n•2.                Que la tierra toda cambie de lugar,\nY los montes rueden por el ancho mar;\nNuestra fortaleza firme habrá de estar,\nPorque lo inmutable no podrá mudar.\nMEX\nEsta letra se puede cantar también con la música de #587 (Henos en).\nCoro:       Nuestra fortaleza, nuestra protección\nEs el Dios que adora nuestro corazón.\n3.           A la voz tan sólo de su voluntad\nTúrbanse los mares en su majestad;\nTiembla la montaña, todo es vanidad,\nAl vibrar su acento por la inmensidad.\n4.      Que otros en sus fuerzas quieran descansar,\nO en las que el mundo les promete dar;\nNunca todas ellas se han de comparar\nCon la que pudimos en el cielo hallar.\nEsta letra se puede cantar también con la música de #587 (Henos en)."},{"n":44,"t":"Señor Jehová, omnipotente Dios","c":"Yo soy el Dios omnipotente. Génesis 35:11\n1.    Señor Jehová, omnipotente Dios,\nTú que los astros riges con poder,\nOye clemente nuestra humilde voz,\nNuestra canción hoy dígnate atender.\n2.       Eterno Padre, nuestro corazón\nA ti profesa un inefable amor;\nEntre nosotros tu presencia pon;\nTiéndenos, pues, tu brazo protector.\n3.    A nuestra patria da tu bendición;\nEnséñanos tus leyes a guardar;\nAlumbra la conciencia y la razón;\nDomina siempre tú en todo hogar.\n4.    Defiéndenos del enemigo cruel;\nConcede a nuestras faltas corrección;\nNuestro servicio sea siempre fiel;\nY sénos tú la grande protección.\nAmén, amén."},{"n":45,"t":"Castillo Fuerte","c":"Dios es nuestro amparo y fortaleza. Salmo 46:1\n1.       Castillo fuerte es nuestro Dios, defensa y\nbuen escudo; Con su poder nos librará\nen este trance agudo. Con furia y con afán\nacósanos Satán; Por armas deja ver\nastucia y gran poder; Cual él no hay en la tierra.\n2.    Nuestro valor es nada aquí, con él todo es\nperdido; Mas por nosotros pugnará\nde Dios el Escogido. Es nuestro Rey Jesús,\nel que venció en la cruz, Señor y Salvador,\ny siendo él solo Dios, El triunfa en la batalla.\nLETRA y MUSICA: Martín Lutero, 1529, trad. Juan B. Cabrera.\n3.       Aunque estén demonios mil prontos a\ndevorarnos, no temeremos, porque Dios\nsabrá como ampararnos. Que muestre su vigor\nSatán, y su furor; dañarnos no podrá;\npues condenado es ya por la Palabra Santa.\n4. Esa palabra del Señor, que el mundo no apetece,\nPor el Espíritu de Dios muy firme permanece.\nNos pueden despojar de bienes y hogar,\nEl cuerpo destruir, mas siempre ha de existir\nDe Dios el Reino eterno.\nLETRA y MUSICA: Martín Lutero, 1529, trad. Juan B. Cabrera."},{"n":46,"t":"Canten a Dios","c":"1.      Canten a Dios con alegría con todo el corazón,\n// Porque nos ha librado y nos ha mostrado su salvación; //\n¡Gloria a Dios, gloria a Dios!\n// Porque ha hecho maravillas, Canten alegres al Creador. //\n2. Canten a Dios todos los pueblos, toquen arpa y tambor,\n// Con guitarra y trompeta* canten alegres al Creador; //\n¡Gloria a Dios, gloria a Dios!\n// Porque ha hecho maravillas, Canten alegres al Creador. //\n*orig. = charango\nPER\nAngel Palomino. Usado con permiso."},{"n":47,"t":"Grandes y maravillosas son","c":"Grandes y maravillosas son tus obras, Señor Dios Todopoderoso. Apocalipsis 15:3\n1.   Grandes y maravillosas son tus obras,\nSeñor Dios Todopoderoso;\nJustos y verdaderos\nson tus caminos, Rey de los santos,\nRey de los santos, Rey de los santos.\n2.          ¿Quién no te temerá, oh Señor,\ny glorificará tu nombre?\nPues sólo tú eres santo;\npor lo cual todas las naciones vendrán\ny te adorarán, y te adorarán.\n¡Aleluya, amén! ¡Aleluya, amén!\n3. Temed a Dios y dadle gloria, porque su juicio\nha llegado; Y adorad a aquel que hizo el cielo y\n¡Aleluya, amén! ¡Aleluya, amén!\n¡Aleluya, amén! ¡Aleluya, amén!"},{"n":48,"t":"Al trono majestuoso","c":"1.     Al trono majestuoso del Dios de potestad,\nHumilde vuestra frente, naciones inclinad.\nEl es el ser supremo, de todos el Señor,\nY nada al fin resiste a Dios el Hacedor.\n2.    Del polvo de la tierra su mano nos formó,\nY nos donó la vida su aliento creador;\nDespués, al vernos ciegos, caídos en error,\nCual padre al hijo amado salud nos proveyó.\ntrad. , Juan B. Cabrera, adapt. Alfred Ostrom.\nEsta letra se puede cantar con la música del # 187 (Cabalga) y # 639 (Tú pueblo).\n3.     La gratitud sincera nos dictará el cantar,\nY en tiernos dulces sones al cielo subirá;\nCon los celestes himnos cantados a Jehová,\n4.      Señor, a tu Palabra sujeto el mundo está,\nY del mortal perecen la astucia y la maldad;\nDespués de haber cesado los siglos de correr,\nTu amor, verdad y gloria han de permanecer.\ntrad. , Juan B. Cabrera, adapt. Alfred Ostrom.\nEsta letra se puede cantar con la música del # 187 (Cabalga) y # 639 (Tú pueblo)."},{"n":49,"t":"Oh, que tuviera lenguas mil","c":"1.         ¡Oh, que tuviera lenguas mil\npara poder cantar\nLas glorias de mi Dios y Rey,\ny sus triunfos alabar!\n2.         Su nombre trae consuelo y paz,\nnos libra del temor;\nSalud, aliento y gozo es;\nvida da al pecador.\n3.                  Quebranta el poder del mal,\nal preso libra hoy;\nSu sangre limpia al ser más vil,\n¡Aleluya! limpio estoy.\n4.                   Oh, mudos, de su amor hablad;\ny sordos, oid su voz;\nOh, cojos, de emoción saltad;\nciegos, ved al Salvador.\n5.                        Señor Jesús, ayúdame\ntu nombre a proclamar\nA todo el mundo en derredor,\ntu grandeza ensalzar."},{"n":50,"t":"Te damos gracias, Señor","c":"Has tomado tu gran poder, y has reinado. Apocalipsis 11:17\n// Te damos gracias,\nSeñor Dios Todopoderoso, //\nEl que eres y que eras\nY que has de venir,\n// Porque has tomado tu gran poder,\nY has reinado. //\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":51,"t":"Nuestra esperanza y protección","c":"Señor, tú nos has sido refugio de generación en generación. Salmo 90:1\n1.        Nuestra esperanza y protección\ny nuestro eterno hogar\nHas sido, eres y serás\ntan sólo tú, Señor.\n2.             Aún no habías la creación\nformado con bondad,\nMas desde la eternidad\ntú eras sólo Dios.\n3.                  Delante de tus ojos son\nmil años, al pasar,\nTan sólo un día que fugaz\nfenece con el sol.\n4.                El tiempo corre arrollador\ncomo impetuoso mar;\nY así, cual sueño ves pasar\ncada generación.\n5.          Nuestra esperanza y protección\ny nuestro eterno hogar,\nEn la tormenta o en la paz sé siempre tú, Señor."},{"n":52,"t":"Jehová es mi luz y salvación","c":"Jehová es mi luz y mi salvación; ¿de quién temeré? Salmo 27:1\n// Jehová es mi luz y salvación, //\n// ¿De quién temeré? //\n// Jehová es la fortaleza de mi vida; //\n// ¿De quién he de atemorizarme? //\n// Aguarda a Jehová, //\nEsfuérzate y aliéntese tu corazón;\nSí, espera a Jehová.\n// Jehová es mi luz y salvación, //\n// ¿De quién temeré? //\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":53,"t":"Jehová está en medio de ti","c":"Habitaré... entre ellos, y seré su Dios. 2 Corintios 6:16\nSi b (Capo 1 - La)                                                                              Con entusiasmo\nJehová está en medio de ti, poderoso;\nEl salvará, se gozará sobre ti con alegría;\nCallará de amor,\nse gozará sobre ti con cánticos.\nJehová está en medio de ti,\npoderoso, ¡Poderosísimo!\n© 1972 Scripture in Song, admin. Integrity Music. Usado con permiso."},{"n":54,"t":"Poderoso es él","c":"[Dios] es poderoso para guardaros sin caída. Judas v. 24\nSi b (Capo 1 - La)                                                                         Con vigor\nAquel que es poderoso,\nmuy poderoso,\nPara guardaros sin caída,\n¡Poderoso es él!\nY presentaros sin mancha delante de su gloria\nCon gran alegría, ¡Poderoso es él!\nCon reverencia\nAl único y sabio Dios,\nnuestro Salvador,\nSea gloria y majestad, imperio y potencia,\nAhora y por todos los siglos. Amén.\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCon vigor\nAquel que es poderoso,\nmuy poderoso,\nPara guardaros sin caída, ¡Poderoso es él!\nY presentaros sin mancha delante de su gloria\nCon gran alegría, ¡Poderoso es él!\n© 1985 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":55,"t":"Te alabarán, oh Jehová","c":"Te alabarán, oh Señor, todos los reyes. Salmo 138:4\nTe alabarán, oh Jehová, todos los reyes,\nTodos los reyes de la tierra;\nPorque han oído\nlos dichos de tu boca,\nY cantarán de los caminos de Jehová.\n// Porque la gloria de Jehová es grande,\nPorque Jehová es excelso en sus caminos;\nPorque Jehová atiende al humilde,\nMas mira de lejos al altivo. //"},{"n":56,"t":"El que habita al abrigo de Dios","c":"El que habita al abrigo del Altísimo morará bajo la sombra del Omnipotente. Salmo 91:1\n1.                     El que habita al abrigo de Dios\nMorará bajo sombras de amor;\nSobre él no vendrá ningún mal\nY en sus alas feliz vivirá.\nCoro:       Oh, yo quiero habitar al abrigo de Dios,\nSólo allí encontraré paz y profundo amor.\nY por siempre su nombre alabar.\nCoro:    Oh, yo quiero habitar al abrigo de Dios,\nSólo allí encontraré paz y profundo amor.\nY por siempre su nombre alabar.\n2.          El que habita al abrigo de Dios\nmuy feliz ciertamente será;\nAngeles guardarán su salud\nY sus pies nunca resbalarán.\n3.          El que habita al abrigo de Dios\nPara siempre seguro estará;\nCaerán a su diestra diez mil\nMas a él no vendrá mortandad."},{"n":57,"t":"Cantemos de su amor","c":"Bueno es alabarte, oh Jehová, y\ncantar salmos a tu nombre, oh Altísimo;\nAnunciar por la mañana tu misericordia,\ny tu fidelidad cada noche.       #58\nAlabad a Jehová, naciones todas;\npueblos todos, alabadle.\nPorque ha engrandecido sobre nosotros su\nmisericordia, y la fidelidad de Jehová\nes para siempre. Aleluya.\n#58\nSalmo 92:1-2; 117:1-2; 1 Juan 4:9, 16, 19; Salmo 95:1 (RVR)\nEn esto se mostró el amor de Dios para con\nnosotros, en que Dios envió a su Hijo unigénito\nal mundo, para que vivamos por él.\nY nosotros hemos conocido y creído el amor\nque Dios tiene para con nosotros.\nDios es amor; y el que permanece en amor,\npermanece en Dios, y Dios en él.\n#58\nNosotros le amamos a él, porque él nos amó primero.\nVenid, aclamemos alegremente a Jehová;\ncantemos con júbilo a la roca de nuestra\nsalvación.                        #58\nSalmo 92:1-2; 117:1-2; 1 Juan 4:9, 16, 19; Salmo 95:1 (RVR)"},{"n":58,"t":"Cantad, alabad","c":"(RESPUESTA MUSICAL)\nCantadle cántico nuevo; hacedlo bien, tañendo con júbilo. Salmo 33:3\n¡Cantad, ( cantad,)\nCantad, ( cantad,)\nCantad, alabad a Dios!"},{"n":59,"t":"Grande es tu fidelidad","c":"Nunca decayeron sus misericordias. Nuevas son cada mañana. Lamentaciones 3:22-23\n•1.              Oh, Dios Eterno, tu misericordia\nNi una sombra de duda tendrá;\nTu compasión y bondad nunca fallan\nY por los siglos el mismo serás.\nCoro:            ¡Oh, tu fidelidad! ¡Oh, tu fidelidad!\nCada momento la veo en mí.\nNada me falta, pues todo provees,\n¡Grande, Señor, es tu fidelidad!\nWilliam M. Runyan, 1923. © 1923, ren. 1951 Hope Publishing. Usado con permiso.\nCoro:     ¡Oh, tu fidelidad! ¡Oh, tu fidelidad!\nCada momento la veo en mí.\nNada me falta, pues todo provees,\n¡Grande, Señor, es tu fidelidad!\n•2.         La noche oscura, el sol y la luna,\nLas estaciones del año también,\nUnen su canto cual fieles criaturas,\nPorque eres bueno, por siempre eres fiel.\n3.       Tú me perdonas, me impartes el gozo,\nTierno me guías por sendas de paz;\nEres mi fuerza, mi fe, mi reposo,\nY por los siglos mi Padre serás.\nWilliam M. Runyan, 1923. © 1923, ren. 1951 Hope Publishing. Usado con permiso."},{"n":60,"t":"Nuestro Dios y Padre eterno","c":"[Dios]... será restaurador de tu alma, y sustentará tu vejez. Ruth 4:15\n•1.                   Nuestro Dios y Padre eterno\na sus hijos cuida tierno;\nCon amor los guía siempre,\nen su seno los protege.\n•2.                     En pobreza o abundancia\nsu fiel provisión alcanza;\nAunque pruebas mil asaltan,\nsus cuidados nunca faltan.\ntrad. Esteban Sywulka B. MUSICA: Melodía sueca.\n•3.          Sabe de sus aflicciones;\nsiente sus tribulaciones;\nLes consuela en tristeza,\ny les da su fortaleza.\n4.   De su amor constante y fuerte,\nni la vida ni la muerte\nNunca pueden separarles;\nprotección se goza en darles.\n5.        A sus hijos Dios sustenta,\nbendiciones les aumenta;\nNi avecillas en su nido\ntal cuidado han recibido.\ntrad. Esteban Sywulka B. MUSICA: Melodía sueca."},{"n":61,"t":"El Señor es mi pastor","c":"En lugares de delicados pastos me hará descansar. Salmo 23:2\n•1.     El Señor es mi pastor, y nada, pues, me faltará;\nEntre pastos delicados me hará él descansar;\nJunto a aguas de reposo siempre me pastoreará,\nCoro:                          El Señor es mi pastor,\nNada, pues, me faltará.\n•2.  Fortalecerá mi alma cuando débil yo esté;\nGuiaráme por las sendas de justicia por amor;\nAunque ande entre sombras, mal ninguno temeré,\nCoro:                     El Señor es mi pastor,\nNada, pues, me faltará.\n3. Con tu vara y tu cayado siempre aliento me darás;\nAderezarás mi mesa ante todo angustiador;\nTú ungiste mi cabeza y mi copa llena está,\n4.    Ciertamente sus bondades cada día gozaré,\nY en la casa de mi Padre largos días moraré;\nMientras tanto por su gracia este salmo cantaré:"},{"n":62,"t":"Eres mi protector","c":"Tú eres mi refugio; me guardarás de la angustia. Salmo 32:7\nCanon a 2 voces\n Eres mi protector, llenas mi corazón\nCon cánticos de liberación;\nDe angustia me guardarás.\nConfiaré en ti, \nConfiaré en ti; débil soy,\nmas fuerte seré con poder del Señor.\nEres mi protector, llenas mi corazón\nCon cánticos de liberación;\nDe angustia me guardarás.\nConfiaré en ti.\nLETRA : Basada en el Salmo 32, Michael Ledner, 1981, es trad.\nMUSICA : Michael Ledner, 1981. © 1981, arreg. 1986 Maranatha Music. Usado con permiso."},{"n":63,"t":"Oh amor de Dios","c":"Con amor eterno te he amado. Jeremías 31:3\n1.         ¡Oh amor de Dios! Su inmensidad,\nEl hombre no podría contar, ni comprender\nCuando el pecar entró al hogar de Adán y\nEva en Edén, Dios les sacó, mas prometió\nun Salvador también.\nCoro:       ¡Oh amor de Dios! brotando está,\ninmensurable, eternal;\nPor las edades durará, inagotable raudal.\nen Akdamut Millin del Rabí Meir ben Isaac Nehorai, 1096, trad.\nWilliam R. Adell. MUSICA: Frederick M. Lehman, 1917, arreg. Claudia Lehman Mays.\n© 1917, ren. 1945 Casa Nazarena, admin. Lillenas Publishing Co. Usado con permiso.\nCoro:             ¡Oh amor de Dios! brotando está,\ninmensurable, eternal;\nPor las edades durará, inagotable raudal.\n2.     Si fuera tinta todo el mar, y todo el cielo un\ngran papel, y cada hombre un escritor,\nY cada hoja un pincel,\nNunca podrían describir el gran amor de Dios\nQue al hombre pudo redimir de su pecado atroz.\n3. Y cuando el tiempo pasará con cada reino mundanal,\ny cada reino caerá con cada trama y plan carnal,\nEl gran amor del Redentor por siempre durará;\nUsado con permiso."},{"n":64,"t":"Dios es amor","c":"En su amor y en su clemencia los redimió. Isaías 63:9\n¡Dios es amor! ¡Dios es amor!\nque Dios es amor, ¡Oh sí!\n¡Dios es amor! ¡Dios es amor!\nLos ángeles cantan,\nlos hombres proclaman\nQue ¡Dios es amor!\nLETRA y MUSICA: Brus del Monte, 1970.                           ARG\n© 1970 Bruce W. Woodman. Usado con permiso."},{"n":65,"t":"Qué maravilla es","c":"No hay Dios semejante a ti en el cielo ni en la tierra. 2 Crónicas 6:14\nSi b (Capo 3 - Sol)                                                              Con admiración\n1.          Cuán hermosa es la luz del ocaso,\nY precioso es el amanecer,\nPero más glorioso es el gran amor\nQue el Señor derramó en mi ser.\nCoro:       ¡Qué maravilla es, qué maravilla es\nQue el Señor me ama a mí!\n¡Qué maravilla es, qué maravilla es\nQue el Señor me ama a mí!\nLETRA y MUSICA: George beverly Shea, 1956, trad. Comité de Celebremos.\n© 1957, ren. 1985, Rodeheaver, admin. Word Music. Usado con permiso.\nCoro:    ¡Qué maravilla es, qué maravilla es\nQue el Señor me ama a mí!\n¡Qué maravilla es, qué maravilla es\nQue el Señor me ama a mí!\n2.      Admirable es la siega abundante,\nLas estrellas, la luna y el sol,\nPero más glorioso es el gran amor\nQue me da nueva vida y perdón.\nLETRA y MUSICA: George beverly Shea, 1956, trad. Comité de Celebremos.\n© 1957, ren. 1985, Rodeheaver, admin. Word Music. Usado con permiso."},{"n":66,"t":"REFLEXION:","c":"Dios mío, estoy maravillado ante tu grandeza.\nEres el Creador que esparciste en el espacio vacío\nlos miles de millones de estrellas y que llamas\na cada una por nombre.\nTú formaste nuestro bello mundo con sus\nmajestuosas montañas y vastos mares.\nDiseñaste la fragante rosa y diste melodías\nal ruiseñor. Sostienes las galaxias inmensas,\nasí como los átomos invisibles.\nTú encauzas la historia por tu soberano poder.\nLas grandes naciones te son como el polvo en\nEres el principio y el fin; desde la eternidad\nhasta la eternidad, tú eres Dios.\nEres perfecto en santidad y justicia, pero\ntambién grande en amor y misericordia.\nEnviaste a tu Hijo a morir por mí, un pecador\ncondenado, y me diste nueva vida por fe en él.\nAhora soy tuyo para siempre.\n¡Padre celestial, cuando contemplo la magnitud\nde tu persona y tus obras, un cántico de adoración y\ngratitud brota de mi corazón hacia ti!"},{"n":67,"t":"Padre Eterno","c":"Adoremos y postrémonos... delante del Señor. Salmo 95:6\n1.        Padre eterno, me postro ante ti,\nPadre eterno, me postro ante ti;\nYo te amo, te adoro, te rindo loor;\nPadre eterno, me postro ante ti.\n2.           Jesucristo, te alabaré,\nJesucristo, te alabaré;\nYo te amo, te adoro,\nTe rindo loor; Jesucristo, te alabaré.\n3.        Santo Esp’ritu Consolador,\nSanto Esp’ritu Consolador;\nTú me gu’as, me ayudas, y vives en m’,\nSanto Esp’ritu Consolador.\n4.      Tres personas en un solo Dios,\nTres personas en un solo Dios;\n¡Maravilla sublime, te exaltaré!\nTres personas en un solo Dios."},{"n":68,"t":"A nuestro Padre Dios","c":"Se postraron sobre sus rostros y adoraron al que vive por los siglos de los siglos. Apocalipsis 5:14\n1.     A nuestro Padre Dios alcemos nuestra voz,\n¡Gloria a él! Tal fue su amor que dio\nal Hijo que murió,\nY as’ nos redimió, ¡Gloria a él!\n2.          A nuestro Salvador demos con fe loor;\n¡Gloria a él! Su sangre derramó;\ncon ella nos lavó,\nY el cielo nos abrió, ¡Gloria a él!\n3.       Al fiel Consolador celebre nuestra voz;\n¡Gloria a él! Con celestial fulgor\nnos muestra el amor\nDe Cristo, el Señor; ¡Gloria a él!\n4.        Con gozo y amor, cantemos con fervor\nAl Trino Dios. En la eternidad mora la Trinidad;\n¡Por siempre alabad al Trino Dios!"},{"n":69,"t":"De boca y corazón","c":"Cantad a Jehová con alabanza, cantad con arpa a nuestro Dios. Salmo 147:7\n1.     De boca y corazón load al Dios del cielo;\nPues dionos bendición, salud, paz y consuelo.\nTan sólo a su bondad debemos nuestro ser;\nSu santa voluntad nos gu’a por doquier.\n2.      Oh, Padre celestial, ven, danos este d’a\nUn corazón filial y lleno de alegr’a.\nConsérvenos la paz tu brazo protector;\nDeseamos ver tu faz en comunión, Señor.\n3.   Dios Padre, Creador, con gozo te adoramos.\nDios Hijo, Redentor, tu salvación cantamos.\nDios Santificador, te honramos en verdad.\nTe ensalza nuestra voz, bendita Trinidad."},{"n":70,"t":"Himno a la Trinidad","c":"1.                 ¡Gloria al Todopoderoso,\nel Autor de salvación!\nPadre Santo, te exaltamos con la voz y el corazón,\nPor tu gracia sempiterna, por tu amor y tu bondad,\nPor tu gran misericordia, tu justicia y santidad.\n2.              ¡Gloria al Verbo encarnado,\nJesucristo el Mediador!\nGu’anos, Pastor bendito, en la senda de tu amor;\nRedentor y luz del mundo, muéstranos tu potestad;\nSoberano Rey del cielo, haz aqu’ tu voluntad.\nGUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Bibila. Usado con permiso.\n3.             ¡Gloria al Santo Paracleto,\nnuestro fiel Consolador!\nLlénanos de paz y gozo, danos fuerza y valor;\nIlumina nuestras mentes, gu’anos en tu verdad,\nPara que podamos siempre caminar en santidad.\n4.          ¡Gloria al Trino Dios cantamos,\nquien nos dio la redención!\nNuestros labios toca ahora para hablar con compasión,\nNuestro o’do haz que escuche de las almas el clamor,\nNuestros ojos abre para ver al mundo con tu amor.\nFelipe Blycker J., 1977\nGUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Bibila. Usado con permiso."},{"n":71,"t":"Padre, te adoro","c":"Adorarán al Padre en esp’ritu y en verdad. Juan 4:23\nCanon a 3 voces\n¥1.                ① Padre, te adoro;\n② Doy a ti mi vida;\n③ Cuánto te amo.\n¥2.                       Cristo, te adoro;\nDoy a ti mi vida;\nCuánto te amo.\n¥3.                       Esp’ritu Santo,\nDoy a ti mi vida;\nCuánto te amo\nLETRA y MUSICA: Terrye Coelho, 1972, es trad. © 1972 Maranatha Music. Usado con permiso."},{"n":72,"t":"Oh Padre, eterno Dios","c":"En el nombre del Padre, y del Hijo y del Esp’ritu Santo. Mateo 28:19\n¥1.              ¡Oh Padre, eterno Dios!\nAlzamos nuestra voz en gratitud\nPor lo que tú nos das con sin igual amor,\nHallando nuestra paz en ti, Señor.\n¥2.                ¡Bendito Salvador!\nTe damos con amor el corazón;\nY aqu’ nos puedes ver, que humildes a tu altar\nVenimos a ofrecer precioso don.\n¥3.                ¡Esp’ritu de Dios!\nEscucha nuestra voz, y tu bondad\nDerrame en nuestro ser divina claridad,\nPara poder vivir en santidad."},{"n":73,"t":"Te loamos, oh Dios","c":"Yo me alegraré en Jehová, y me gozaré en el Dios de mi salvación. Habacuc 3:18\n¥1.                     Te loamos ¡Oh Dios!\ncon unánime voz,\nPorque en Cristo tu Hijo\nnos diste perdón.\nCoro:           ¡Aleluya! te alabamos,\n¡Cuán grande es tu amor!\n¡Aleluya! te adoramos, bendito Señor.\nCoro:            ¡Aleluya! te alabamos,\n¡Cuán grande es tu amor!\n¡Aleluya! te adoramos, bendito Señor.\n¥2.              Te loamos, Jesús,\nQuien tu trono de luz\nHas dejado por darnos salud en la cruz.\n¥3.      Te damos loor, Santo Consolador,\nQuien nos llenas de gozo y santo valor.\n¥4.        Unidos load a la gran Trinidad,\nQue es la fuente de gracia,\nvirtud y verdad."},{"n":74,"t":"Loor a tu nombre","c":"Oh Dios, como es tu nombre, as’ es tu alabanza\nhasta los confines de la tierra;\nNo a nosotros, SE„OR, no a nosotros\nSino a tu nombre da gloria,\nPor tu misericordia, por tu verdad.\nSalmo 48:10a; 115:1 (BLA)"},{"n":75,"t":"Cantad al Señor","c":"Cantad al Señor cántico nuevo. Salmo 96:1\n1.   Cantad al Señor un cántico nuevo,\nCantad al Señor un cántico nuevo,\nCantad al Señor un cántico nuevo;\nCantad al Señor, cantad al Señor.\n2.    El es Creador y dueño de todo,\nEl es Creador y dueño de todo,\nEl es Creador y dueño de todo;\nCantad al Señor, cantad al Señor.\nBRA\n3.    Cantad a Jesús, porque él es digno,\nCantad a Jesús, porque él es digno,\nCantad a Jesús, porque él es digno;\nCantad al Señor, cantad al Señor.\n4.   Es él quien nos dio su Esp’ritu Santo,\nEs él quien nos dio su Esp’ritu Santo,\nEs él quien nos dio su Esp’ritu Santo;\nCantad al Señor, cantad al Señor.\n5.    Cantad al Señor, Ò¡Amén,aleluya!Ó\nCantad al Señor, Ò¡Amén, aleluya!Ó\nCantad al Señor, Ò¡Amén, aleluya!Ó\nCantad al Señor, cantad al Señor."},{"n":76,"t":"Santo, Santo","c":"Y no cesaban d’a y noche de decir: Santo, santo, santo es el Señor. Apocalipsis 4:8\n1.           Santo, santo; santo, santo;\nSanto, santo eres tú, Señor amado;\nElevamos nuestra voz en alabanza ante ti;\nSanto, santo; santo, santo.\n2.             Padre eterno, Padre eterno;\nSomos hijos bendecidos, Padre eterno;\nY con cánticos de gozo te rendimos gratitud;\nPadre eterno, Padre eterno.\nLETRA y MUSICA: Jimmy Owens, 1972, trad. Pablo Sywulka B.\n© 1972 BudJohn Songs, Inc., admin. C.M.I. Usado con permiso.\n3.             Jesucristo, Jesucristo;\nSomos salvos por tu sangre, Jesucristo;\nY con notas de alegr’a hoy cantamos tu loor;\nJesucristo, Jesucristo.\n4.        Santo Esp’ritu, Santo Esp’ritu;\nNos enseñas y nos gu’as, Santo Esp’ritu;\nY con gracias te alabamos por tu obra en nuestro ser;\nSanto Esp’ritu, Santo Esp’ritu.\n5.    Aleluya, aleluya; Con amor te adoramos,\nDios bendito; Y ofrecemos nuestra vida\nen señal de gratitud; Aleluya, aleluya.\nLETRA y MUSICA: Jimmy Owens, 1972, trad. Pablo Sywulka B.\n© 1972 BudJohn Songs, Inc., admin. C.M.I. Usado con permiso."},{"n":77,"t":"Honremos a la Trinidad","c":"Bendito sea el Dios y Padre de nuestro\nSeñor Jesucristo, Padre de misericordias\ny Dios de toda consolación,\nEs también quien nos ha sellado\ny ha puesto como garant’a al Esp’ritu\nen nuestros corazones.\nAhora bien, hay diversidad de dones;\npero el Esp’ritu es el mismo.\nHay también diversidad de ministerios,\npero el Señor es el mismo.\n2 Corintios 1:3, 22; 1 Corintios 12:4-6; Efesios 4:4-6 (RVA)\nTambién hay diversidad de actividades,\npero el mismo Dios es el que realiza\ntodas las cosas en todos.\nHay un solo cuerpo y un solo Esp’ritu,\nas’ como habéis sido llamados a una\nsola esperanza de vuestro llamamiento.\nHay un solo Señor, una sola fe,\nun solo bautismo,\nUn solo Dios y Padre de todos,\nquien es sobre todos, a través\nde todos y en todos.\n2 Corintios 1:3, 22; 1 Corintios 12:4-6; Efesios 4:4-6 (RVA)"},{"n":78,"t":"Gloria a tu nombre por doquier","c":"El nombre de nuestro Señor...sea glorificado. 2 Tesalonicenses 1:12\n¥1.     Padre, te amo, te alabo y te adoro;\nGloria a tu nombre por doquier.\nGloria a ti, Señor, Gloria a ti, Señor;\nGloria a tu nombre por doquier.\n¥2.     Cristo, te amo, te alabo y te adoro;\nGloria a tu nombre por doquier.\nGloria a ti, Señor, Gloria a ti, Señor;\nGloria a tu nombre por doquier.\n¥3.     Esp’ritu, te alabo y te adoro;\nGloria a tu nombre por doquier.\nGloria a ti, Señor, Gloria a ti, Señor;\nGloria a tu nombre por doquier.\nLETRA y MUSICA: Donna Adkins, 1976, es. trad.\n© 1976, arreg. 1981 Maranatha Music. Usado con permiso."},{"n":79,"t":"Eterno Padre celestial","c":"Dios es luz, y no hay ningunas tinieblas en él. 1 Juan 1:5\n¥1.            Eterno Padre celestial,\nAutor de toda la creación,\nQ
