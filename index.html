Arreg.             MEX\n© 1989 The United Methodist Publishing House, admin. Maranatha Music. Usado con permiso."},{"n":187,"t":"Cabalga Majestuoso","c":"He aqu’, tu Rey viene... sentado sobre una asna. Mateo 21:5\n¥1.       Cabalga majestuoso tan alto embajador,\nSeguido de sus fieles del Olivar a Sion.\nLas multitudes cantan con gozo y con fervor:\n¡Hosanna al rey que viene en nombre del Señor!\n¥2.              Con palmas y con ramos\nel pueblo marcha en pos;\nAclámanle los niños, rindiendo gloria a Dios.\nLas multitudes cantan con gozo y con fervor:\n¡Hosanna al rey que viene en nombre del Señor!\n¥3.      Cubrid de mirto y flores la senda del Señor,\nCon corazón y labios rendidle adoración.\nCantadle, multitudes, con gozo y con fervor:\n¡Hosanna al rey que viene en nombre del Señor!"},{"n":188,"t":"La entrada triunfal","c":"Al d’a siguiente, cuando oyeron que Jesús\nven’a a Jerusalén,\ntomó ramas de palmera y salió a recibirle,\ny le aclamaban a gritos: Ò¡Hosanna!Ó\nEllos dec’an: Ò¡Bendito el rey que viene en el nombre\ndel Señor! ¡Paz en el cielo, y gloria en las alturas!Ó\nCuando llegó cerca, al ver la ciudad, lloró por ella.\nJuan 12:12-13a; Lucas 19:38, 41 (RVA)"},{"n":189,"t":"Hosanna en el cielo","c":"¡Bendito el que viene... Hosanna en las alturas! Marcos 11:9-10\nSanto, santo,\nsanto es el Señor;\nDios del universo,\nsanto es el Señor.\nSanto, santo, santo, santo es el Señor;\nDios del universo, santo es el Señor.\n// ¡Hosanna en el cielo!\n¡Hosanna en la tierra!\n¡Bendito el que viene en el nombre del Señor! //"},{"n":190,"t":"Jerusalén la hermosa","c":"Jerusalén, que matas a los profetas, y apedreas a los...enviados. Lucas 13:34\nSi b (Capo 1 - La)                                                     Con emoción\n1.       Una noche con la luna, Cristo lloraba,\nY contemplaba la ciudad santa.\n¡Oh, Jerusalén la hermosa! Tú que has matado\nCuantos te ha enviado mi Padre Dios.\nCoro: ¡Oh Jerusalén, Jerusalén, ciudad de Sion!\nLlora por ti hoy mi corazón: Como el ave\nal hijo le da siempre protección, vine yo\na traerte salvación. ¡Oh, Jerusalén\nCuantos te ha enviado mi Padre Dios.\nCoro: ¡Oh Jerusalén, Jerusalén, ciudad de Sion!\nLlora por ti hoy mi corazón: Como el ave\nal hijo le da siempre protección, vine yo\na traerte salvación. ¡Oh, Jerusalén\nCuantos te ha enviado mi Padre Dios.\n2.      Y cuando Jesús mor’a en cruz clavado,\nAl vil malvado él bendec’a. Si tú aceptas\nhoy la sangre que ha derramado,\nSerás llevado a Jerusalén."},{"n":191,"t":"ÀQué quiero mi Jesús?","c":"ÀQué quiero, mi Jesús?... Quiero quererte,\nquiero cuanto hay en m’, del todo darte\nsin tener más placer que el agradarte,\nsin tener más temor que el ofenderte.\nQuiero olvidarlo todo y conocerte,\nquiero dejarlo todo por buscarte,\nquiero perderlo todo por hallarte,\nquiero ignorarlo todo por saberte.\nESP\nPedro Calderón de la Barca, s. 17\nQuiero, amable Jesús, abismarme\nen ese dulce hueco de tu herida,\ny en tus divinas llamas abrasarme.\nQuiero, por fin, en ti transfigurarme,\nmorir a m’, para vivir tu vida,\nperderme en ti, Jesús, y no encontrarme.\nPedro Calderón de la Barca, s. 17       ESP"},{"n":192,"t":"Cristo nuestra ofrenda es","c":"Con una sola ofrenda hizo perfectos para siempre a los santificados. Hebreos 10:14\n1. Cristo nuestra ofrenda es: holocausto excelso;\nAl Cordero alabad; conquistó el Calvario.\nCoro:       // Santos seréis, porque santo soy\nyo Jehová vuestro DiosÓ. //\n2. Cristo nuestra ofrenda es: oblación tan fragante;\nEs olor suave hacia Dios; load al Hijo amante.\n3.      Cristo nuestra ofrenda es, quien logró\npara el hombre, paz y comunión\ncon Dios, ¡gloria dad a su nombre!\nen Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:        // Santos seréis, porque santo soy\nyo Jehová vuestro DiosÓ. //\n4.        Cristo nuestra ofrenda es el que quita\nel pecado; Por su muerte eficaz\nvida ofrece al mundo.\n5.             Cristo nuestra ofrenda es:\nexpiación consumada;\nQueda satisfecho Dios, y el alma limpiada.\nen Cánticos nuevos de la Biblia. Usado con permiso."},{"n":193,"t":"Fue de Dios la santa voluntad","c":"Se despojó a s’ mismo, tomando forma de siervo. Filipenses 2:7\n1.        A solas en Getseman’ el Salvador sufrió;\nA solas en el tribunal las burlas aguantó,\nPues fue de Dios la santa voluntad.\nCoro:     Se despojó del trono y todo su esplendor;\nFue despreciado y desechado el Salvador,\nMas como oveja no abrió su boca mi Señor,\nPues fue de Dios la santa voluntad.\ntrad. Roberto C. Savage. MUSICA: Helen Griggs, 1948.\nCoro:     Se despojó del trono y todo su esplendor;\nFue despreciado y desechado el Salvador,\nMas como oveja no abrió su boca mi Señor,\nPues fue de Dios la santa voluntad.\n2. A solas al Calvario, Cristo el Redentor subió;\nSin murmurar, mis negras penas\nen la cruz sufrió.\nÒDios m’o, Àpor qué me has dejado?Ó\ncon dolor clamó,\nMas fue de Dios la santa voluntad.\ntrad. Roberto C. Savage. MUSICA: Helen Griggs, 1948."},{"n":194,"t":"Los amó hasta el fin","c":"Antes de la fiesta de la Pascua, sabiendo\nJesús que hab’a llegado su hora\npara pasar de este mundo al Padre,\nComo hab’a amado a los suyos que\nestaban en el mundo, los amó hasta el fin.\nAs’ que, después de haberles lavado los pies,\ntomó su manto, se volvió a sentar a la mesa\ny les dijo: Ñ ÀEntendéis lo que os he hecho?\nJuan 13:1, 12, 34; Mateo 26:36-37, 39 (RVA)\nÑUn mandamiento nuevo os doy: que os améis\nlos unos a los otros. Como os he amado,\namaos también vosotros los unos a los otros.\nEntonces llegó Jesús con ellos a un lugar que\nse llama Getseman’, y dijo a los disc’pulos:\nÑSentaos aqu’, hasta que yo vaya allá y ore.\nTomó consigo a Pedro, y a los dos\nhijos de Zebedeo, y comenzó a\nentristecerse y a angustiarse.\nJuan 13:1, 12, 34; Mateo 26:36-37, 39 (RVA)\nPasando un poco más adelante, se postró\nsobre su rostro, orando y diciendo:\nÑPadre m’o, de ser posible, pase de m’ esta copa.\nPero, no sea como yo quiero, sino como tú.\nJuan 13:1, 12, 34; Mateo 26:36-37, 39 (RVA)"},{"n":195,"t":"Rasgóse el velo","c":"El camino nuevo y vivo que él nos abrió através del velo. Hebreos 10:20\n1.    ¡Rasgóse el velo! ya no más distancia mediará;\nAl trono mismo de su Dios el alma llegará.\n2. ¡Rasgóse el velo, sombras id! la luz resplandeció;\n3.   ¡Rasgóse el velo! hecha está eterna redención;\nEl alma pura y limpia ya no teme perdición.\n4. ¡Rasgóse el velo! Dios abrió los brazos de su amor;\nEntrar podemos donde entró Jesús, el Salvador."},{"n":196,"t":"El Varón de gran dolor","c":"Dios m’o, Dios m’o, Àpor qué me has desamparado? Salmo 22:1\nSi b (Capo 1 - La)                                                       Con amplitud\n¥1.     El Varón de gran dolor es el Hijo del Señor;\nVino al mundo por amor, ¡Aleluya! ¡Es mi Cristo!\n¥2. El llevó la cruenta cruz para darnos vida y luz;\nYa mi cuenta él pagó, ¡Aleluya! ¡Es mi Cristo!\n3.     Quiso él por m’ morir; puedo hoy por él vivir.\nQuiero sólo a él servir, ¡Aleluya! ¡Es mi Cristo!\n4. Cuando venga nuestro Rey, Luego yo su faz veré,\nY sus glorias cantaré, ¡Aleluya! ¡Es mi Cristo!\nLETRA y MUSICA: Philip P. Bliss, 1875, trad. H.C. Ball."},{"n":197,"t":"Mirad al Salvador Jesús","c":"El herido fue por nuestras rebeliones. Isa’as 53:5\nSi b (Capo 1 - La)                                                      Con reflexión\n1. Mirad al Salvador Jesús, el Pr’ncipe benigno,\nPor m’ muriendo en la cruz, por m’, tan vil, indigno.\nCoro:\nDe amor la prueba hela aqu’: el Salvador murió por m’.\nPor m’, (por m’,) por m’, (por m’,) Jesús murió por m’.\n¥2.   El sol su rostro encubrió al ver su agon’a;\n¥3. Y yo también al ver la cruz, por ella soy vencido;"},{"n":198,"t":"Mi vida di por ti","c":"Por todos murió, para que los que viven, ya no vivan para s’. 2 Corintios 5:15\nSi b (Capo 1 - La)                                                      Con intensidad\n1.                     Mi vida di por ti,\nPor ti inmolado fui, por gracia te salvé;\n// Por ti, por ti inmolado fui, ÀQué has dado tú por m’? //\n2.                   Mi celestial mansión,\nDejé por rescatar al mundo pecador;\n// S’, todo yo dejé por ti, ÀQué dejas tú por m’? //\n3.                   Reproches, aflicción y\nangustias yo sufr’;\n// Reproches yo por ti sufr’, ÀQué sufres tú por m’? //\n4.                De mi celeste hogar,\nte traigo el rico don\nDel Padre Dios de amor, la plena salvación;\n// Mi don de amor te traigo a ti, ÀQué ofreces tú por m’? //"},{"n":199,"t":"En la vergonzosa cruz","c":"Cristo murió por nuestros pecados, conforme a las Escrituras. 1 Corintios 15:3\nSi b (Capo 1 - La)                                                  Con solemnidad\n1.     En la vergonzosa cruz padeció por m’, Jesús;\nPor la sangre que vertió, mis pecados él expió;\nLavará de todo mal ese rojo manantial,\nEl que abrió por m’, Jesús, en la vergonzosa cruz.\nCoro:          S’, fue por m’, (S’, fue por m’,)\ns’, fue por m’, (S’, fue por m’,)\nFue por m’, murió Jesús en la vergonzosa cruz."},{"n":200,"t":"Crucificado por nosotros","c":"Los principales sacerdotes y los ancianos persuadieron a la\nmultitud que pidiese a Barrabás, y que Jesús fuese muerto.\nPilato les dijo: ÑÀQué, pues, haré de Jesús,\nllamado el Cristo?\nTodos le dijeron: Ñ¡Sea crucificado!\nY Pilato, queriendo satisfacer al pueblo,\nles soltó a Barrabás, y entregó a Jesús,\ndespués de azotarle, para que fuese crucificado.\nMateo 27:20, 22; Marcos 15:15, 22, 25, 27,28, 33, 37 - 39; 1 Pedro 2:21b, 24 (RVR)\nY le llevaron a un lugar llamado Gólgota,\nque traducido es: Lugar de la Calavera.\nEra la hora tercera cuando le crucificaron.\nCrucificaron también con él a dos ladrones, uno a\nsu derecha, y el otro a su izquierda.\nY se cumplió la Escritura que dice:\nY fue contado con los inicuos.\nCuando vino la hora sexta, hubo tinieblas\nsobre toda la tierra hasta la hora novena.\nMateo 27:20, 22; Marcos 15:15, 22, 25, 27,28, 33, 37 - 39; 1 Pedro 2:21b, 24 (RVR)\nMas Jesús, dando una gran voz, expiró.\nEntonces el velo del templo se rasgó en dos, de arriba abajo.\nY el centurión que estaba frente a él, viendo\nque después de clamar hab’a expirado as’, dijo:\nÑVerdaderamente este hombre era hijo de Dios.\nCristo padeció por nosotros,\nQuien llevó el mismo nuestros pecados en su\ncuerpo sobre el madero, para que nosotros,\nestando muertos a los pecados, vivamos a la justicia.\nMateo 27:20, 22; Marcos 15:15, 22, 25, 27,28, 33, 37 - 39; 1 Pedro 2:21b, 24 (RVR)"},{"n":201,"t":"Pies Divinos","c":"¡Cuán hermosos... son los pies del que trae alegres nuevas! Isa’as 52:7\n1.    Pies divinos, pies divinos, pies divinos;\nPies divinos, pies divinos de Jesús,\n// Que en la cumbre del Calvario\nLos clavaron en la cruz. //\n2.    Vedlos fr’os y desnudos por los campos,\nCaminando, caminando sin cesar;\n// Por las cumbres, por los valles,\nPor la orilla de la mar. //\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.\nGUA\n3.        Van llevando por Judea la semilla\nDel bendito Evangelio del amor,\n// Y calmando del enfermo\nLas tristezas y el dolor. //\n4.   ¡Cuán hermosos y cuán santos, cuán benditos,\nDe Jesús el Nazareno son los pies!\n// ¡Oh yo quiero que a la tierra\nVengan pronto otra vez! //\n5.    Pies divinos, pies divinos, pies sangrantes,\nHoradados por mi culpa sin igual,\n// Nos librasteis del pecado\ny del juicio eternal. //\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.\nGUA"},{"n":202,"t":"Cristo Padeció","c":"Cristo padeció una sola vez por los pecados. 1 Pedro 3:18\nPadeció una sola vez mi Cristo,\npadeció una sola vez por m’;\nPor los pecados padeció,\npor los pecados padeció,\nEl justo por los injustos;\nPadeció una sola vez mi Cristo,\npadeció una sola vez por m’;\nPara llevarnos a Dios,\npara llevarnos a Dios;\nPadeció por nosotros Jesús.\nGUA\n© 1972 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso"},{"n":203,"t":"Cabeza Ensangrentada","c":"Y pusieron sobre su cabeza una corona tejida de espinas. Mateo 27:29\n1.       Cabeza ensangrentada, herida por mi bien,\nDe espinas coronada, por fe mis ojos ven;\nDe todos despreciada, mi eterno bien será;\nPor todas las edades mi ser te adorará.\n2.      Pues oprimida tu alma fue por el pecador;\nHoy vengo contristado, merezco tu dolor,\nConcédeme tu gracia; ¡oh! dame tu favor.\n3.        Te doy loor eterno, bendito Salvador,\nPor tu dolor y muerte, por tu divino amor;\nOh Salvador, deseo tu gracia conocer;\nJunto a tu cruz espero, te entrego a ti mi ser.\nTrad. © 1939, ren . 1967 Cánticos Escogidos . Usado con permiso.."},{"n":204,"t":"Alzad la cruz","c":"Y yo, si fuere levantado... a todos atraeré a m’ mismo. Juan 12:32\nCoro:     ¡Alzad la cruz de Cristo el Salvador\nY proclamad su nombre en derredor!\n1.        Venid, unidos el pendón llevad,\nEl Hijo de Dios es nuestro Capitán.\n2.          Es el madero s’mbolo de paz,\nAmor, fe, justicia y de libertad.\n3.         Todo creyente en el Redentor\nOstenta en la frente el sello del perdón.\n4.         Por Jesucristo con fervor luchad,\nY él la victoria os concederá.\ntrad. Skinner Chávez-Melo. MUSICA: Sydney H. Nicholson, 1916.\n© 1974 Hymns Ancient and Modern, admin. Hope. Publishing. Usado con permiso."},{"n":205,"t":"Las siete palabras","c":"1. ÒPadre, perdónalos, porque no\nsaben lo que hacenÓ.                              Lucas 23:34\n2. ÒHoy estarás conmigo en el para’soÓ.               Lucas 23:43\n3. ÒMujer, he all’ tu hijo...He all’ tu madreÓ.      Juan 19:26-27\n4. ÒDios m’o, Dios m’o, Àpor qué\nme has desamparado?Ó                             Marcos 15:34\n5. ÒTengo sedÓ.                                        Juan 19:28\n6. ÒConsumado esÓ.                                     Juan 19:30\n7. ÒPadre, en tus manos encomiendo mi esp’rituÓ. Lucas 23:46"},{"n":206,"t":"La visión de la cruz","c":"Sufrió la cruz, menospreciando el oprobio. Hebreos 12:2\n1.          Ese triste d’a, mi Jesús sufr’a\nEn la cruz clavado por nuestro pecado;\n// Tiernamente dijo a Juan y a la madre:\nÒHe aqu’ tu hijo, he aqu’ tu madreÓ. //\n2.         Cuando le clavaban y le denostaban,\nImploró clemencia, perdón y paciencia\n// En favor de aquellos que en tinieblas yacen,\nÒPues ignoran ellosÓ, dijo, Òlo que hacenÓ. //\nLETRA y MUSICA: Alfredo Colom M., 1954, alt., es arreg.                GUA\n3. En su angustia, llama; Ò¡Sed yo tengo!Ó exclama.\nÀY sabéis qué hicieron? vinagre le dieron.\n// A aquel penitente que buscarle quiso,\nLe ofreció la fuente de su para’so. //\n4.     Con solemne calma encomienda su alma,\nA su Padre amado que ya le ha dejado\n// Por el vil pecado de un mundo errado,\nY clama angustiado: Ò¡Ya es consumado!Ó//\n5.     ¡Cuán felices fuimos desde que cre’mos\nEn el Cristo amado que fuera inmolado!\n// Fue a la tumba fr’a, y resucitado,\nUn hermoso d’a fue glorificado. //\nLETRA y MUSICA: Alfredo Colom M., 1954, alt., es arreg.\nGUA"},{"n":207,"t":"Junto a la cruz de Cristo","c":"Mediante la cruz reconciliar con Dios. Efesios 2:16\n1. Junto a la cruz de Cristo yo quiero siempre estar,\nPues mi alma albergue fuerte\ny fiel all’ puede encontrar.\nEn medio del desierto aqu’, all’ encuentro hogar\nFrederick C. Maker, 1881. Trad. © 1950, ren. 1978 Cánticos Escogidos. Usado con permiso.\n2.         Bendita cruz de Cristo, a veces veo en ti\nHoy mi contrito corazón confiesa la verdad\nDe tu asombrosa redención y de mi indignidad.\n3. Oh, Cristo, en ti he hallado completa y dulce paz;\nNo busco bendición mayor que la de ver tu faz;\nSin atractivo el mundo está, ya que ando por tu luz;\nAvergonzado de mi mal, mi gloria es ya la cruz.\nFrederick C. Maker, 1881. Trad. © 1950, ren. 1978 Cánticos Escogidos. Usado con permiso."},{"n":208,"t":"Un D’a","c":"Cuando vino el cumplimiento del tiempo, Dios envió a su Hijo. Gálatas 4:4\n1.       Un d’a que el cielo sus glorias cantaba,\nUn d’a que el mal imperaba más cruel,\nJesús descendió, y al nacer de una virgen,\nNos dio por su vida ejemplo tan fiel.\nCoro:      Vivo, me amaba; muerto, salvóme;\nY en el sepulcro mi mal enterró;\nResucitado, él es mi justicia;\nUn d’a él viene, pues lo prometió.\n2.        Un d’a lleváronle al monte Calvario,\nUn d’a claváronle sobre una cruz;\nSufriendo dolores y pena de muerte,\nExpiando el pecado, salvóme Jesús.\nTrad. © 1938, ren. 1967 Rodeheaver, admin. Word Music. Usado con permiso\nCoro:     Vivo, me amaba; muerto, salvóme;\nY en el sepulcro mi mal enterró;\nResucitado, él es mi justicia;\nUn d’a él viene, pues lo prometió.\n3.      Un d’a dejaron su cuerpo en el huerto,\nUn d’a Jesús de dolor reposó.\nVelaban los ángeles sobre el sepulcro\nDe quien por nosotros su vida entregó.\n4.         Un d’a la tumba ocultarle no pudo,\nUn d’a el ángel la piedra quitó;\nHabiendo Jesús a la muerte vencido,\nA estar con su Padre en gloria ascendió.\nTrad. © 1938, ren. 1967 Rodeheaver, admin. Word Music. Usado con permiso\nCoro:       Vivo, me amaba; muerto, salvóme;\nY en el sepulcro mi mal enterró;\nResucitado, él es mi justicia;\nUn d’a él viene, pues lo prometió.\n5.          Un d’a él viene con voz de arcángel,\nUn d’a en su gloria el Señor brillará;\n¡Oh d’a admirable, en que unido, su pueblo\nLoores a Cristo por siempre alzará!\nTrad. © 1938, ren. 1967 Rodeheaver, admin. Word Music. Usado con permiso"},{"n":209,"t":"Manos Cariñosas","c":"Y cuando les hubo dicho esto, les mostró las manos. Juan 20:20\n1.      Manos cariñosas, manos de Jesús;\nManos que llevaron la pesada cruz,\nManos que supieron sólo hacer el bien,\n¡Gloria a esas manos! ¡Aleluya, amén!\n2.      Blancas azucenas, lirios de amor,\nFueron esas manos de mi Redentor;\nManos que a los ciegos dieron la visión\nCon el real consuelo de su gran perdón.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage.    GUA\n3.      Manos que supieron calmar el dolor,\n¡Oh, manos divinas de mi Redentor!\nQue multiplicaron los peces y el pan,\nManos milagrosas que la vida dan.\n4.    Manos que sufrieron el clavo y la cruz;\nManos redentoras de mi buen Jesús;\nDe esas manos bellas yo confiado estoy;\nEllas van guiando, pues al cielo voy.\n5.   ¡Oh, Jesús! tus manos yo las vi en visión\nY vert’ mi llanto con el corazón;\nVi sus dos heridas y la sangre vi\nQue tú derramaste por salvarme a m’.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage.            GUA"},{"n":210,"t":"En la cruz","c":"Llevó él nuestras enfermedades, y sufrió nuestros dolores. Isa’as 53:4\n1. Con pena amarga fui a Jesús; mostréle mi dolor;\nPerdido, errante, vi su luz; bend’jome en su amor.\nCoro:       En la cruz, en la cruz, do primero vi la luz,\nY las manchas de mi alma *yo lavé,\n*opt. él lavó,\nFue all’ por fe do vi a Jesús,\n*Y siempre feliz con él seré.\n*opt. Y vivo feliz, pues me salvó.\n2. Sobre una cruz, mi buen Señor su sangre derramó\nPor este pobre pecador, a quien as’ salvó.\nPedro Grado Valdés. MUSICA: Ralph E. Hudson, 1885, coro John H. Hewitt, 1864.\nCoro:       En la cruz, en la cruz, do primero vi la luz,\nY las manchas de mi alma *yo lavé,\n*opt. él lavó,\nFue all’ por fe do vi a Jesús,\n*Y siempre feliz con él seré.\n*opt. Y vivo feliz, pues me salvó.\n3.      Venció la muerte con poder, y al cielo se exaltó;\nConfiar en él es mi placer, morir no temo yo.\n4.         Aunque él se fue, solo no estoy; mandó\nal Consolador, Divino Esp’ritu que hoy\nme da perfecto amor.\nPedro Grado Valdés. MUSICA: Ralph E. Hudson, 1885, coro John H. Hewitt, 1864."},{"n":211,"t":"REFLEXION:","c":"¡ Jesucristo, mi Señor! Me asombra el hecho de que\ntú, el Dios eterno, te hiciste hombre por m’. Dejaste\nel esplendor celestial por el establo de Belén.\nAnduviste por las polvorientas veredas de Palestina,\nenseñando y haciendo el bien. Calmaste el mar\nfurioso; sanaste al enfermo y diste esperanza al\ndesalentado.\nTú, el perfecto Hijo de Dios, tomaste mi pecado y\nllevaste mi castigo. Sufriste el dolor, el rechazo, la\nsoledad...y la muerte. Eres Jesús, mi Salvador.\nResucitaste triunfante del sepulcro. Desde que te\nrecib’ por la fe, vives en m’ y estás transformando\ndel pecado en mi vida. Eres Cristo, mi Libertador.\nHoy ocupas el lugar de honor a la diestra de tu Padre,\ndonde intercedes por m’. Y cuando regreses a este\nmundo en gloria, toda rodilla se doblará y toda lengua\nconfesará que eres el Señor, Dios todopoderoso.\n¡Jesucristo, tú eres mi Señor! Te amo, te adoro\ny te alabo con el canto que surge de mi ser."},{"n":212,"t":"La tumba le encerró","c":"Hallaron removida la piedra... y entrando, no hallaron el cuerpo. Lucas 24:2-3\nSi b (Capo 1 - La)                                                                      Con solemnidad\n1.       La tumba le encerró, Cristo, mi Cristo;\nEl alba all’ esperó Cristo el Señor.\nCon ánimo\nCoro:      Cristo la tumba venció, (la venció,)\nY con gran poder resucitó;\nDe sepulcro y muerte Cristo es vencedor,\nVive para siempre nuestro Salvador;\n¡Gloria a Dios! (¡Gloria a Dios!)\n¡Gloria a Dios! (¡Gloria a Dios!)\nEl Señor resucitó.\nLETRA y MUSICA: Robert Lowry, 1874, trad. G.P. Simmonds.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso.\nCoro:      Cristo la tumba venció, (la venció,)\nY con gran poder resucitó;\nDe sepulcro y muerte Cristo es vencedor,\nVive para siempre nuestro Salvador;\n¡Gloria a Dios! (¡Gloria a Dios!)\n¡Gloria a Dios! (¡Gloria a Dios!)\nEl Señor resucitó.\nCon solemnidad\n2.       De guardas escapó Cristo, mi Cristo;\nEl sello destruyó Cristo el Señor.\n3.       La muerte dominó Cristo, mi Cristo;\ny su poder venció Cristo el Señor.\nLETRA y MUSICA: Robert Lowry, 1874, trad. G.P. Simmonds.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso."},{"n":213,"t":"Resucitó Jesús","c":"Pero cuando miraron, vieron removida la piedra. Marcos 16:4\n1.              Resucitó Jesús,\nCon gran poder se levantó\ny vive ya.\nMerece todo honor,\nalabanza, gratitud y amor;\nCantemos al Señor Jesús,\nel Salvador.\n2.         En gloria celestial\nél reina vencedor;\nCristo el Señor.\nRindamos hoy loor\ncon los ángeles al Redentor;\nCantemos al Señor Jesús,\nel Salvador.\nAmén.\nECU"},{"n":214,"t":"El sepulcro vac’o","c":"Y el primer d’a de la semana, muy de mañana, fueron\nal sepulcro...\nY hallaron removida la piedra del sepulcro;\npero al entrar, no hallaron el cuerpo de Jesús,\nQue fue sepultado y que resucitó al tercer d’a,\nconforme a las Escrituras;\nQue el Cristo hab’a de padecer, y ser el primero\nde la resurrección de los muertos.\nLucas 24:1-3; 1 Corintios 15:4 (RVA); Hechos 26:23a (RVR)"},{"n":215,"t":"El Señor resucitó","c":"Mas ahora Cristo ha resucitado de los muertos. 1 Corintios 15:20\n¥1. El Señor resucitó, ¡Aleluya! (¡Aleluya! ¡aleluya!)\nMuerte y tumba él venció; ¡Aleluya! (¡Aleluya! ¡aleluya!)\nCon su fuerza y su virtud ¡Aleluya! (¡Aleluya! ¡aleluya!)\nCautivó a la esclavitud. ¡Aleluya!\n(¡Aleluya, aleluya, gloria a Dios!)\n¥2.      El que al polvo se humilló, ¡Aleluya!\n(¡Aleluya! ¡aleluya!)\nVencedor se levantó; ¡Aleluya! (¡Aleluya! ¡aleluya!)\nCante hoy la cristiandad ¡Aleluya! (¡Aleluya! ¡aleluya!)\nSu gloriosa majestad. ¡Aleluya!\n(¡Aleluya, aleluya, gloria a Dios!)\nEstr. #4 Charles Wesley, 1745, trad. Juan B. Cabrera, 1869.\n3.           Cristo que la cruz sufrió, ¡Aleluya!\n(¡Aleluya! ¡aleluya!)\nY en desolación se vio, ¡Aleluya! (¡Aleluya! ¡aleluya!)\nHoy en gloria celestial ¡Aleluya! (¡Aleluya! ¡aleluya!)\nReina vivo e inmortal. ¡Aleluya!\n(¡Aleluya, aleluya, gloria a Dios!)\n4.         Cristo nuestro Salvador, ¡Aleluya!\n(¡Aleluya! ¡aleluya!)\nDe la muerte vencedor, ¡Aleluya! (¡Aleluya! ¡aleluya!)\nPronto vamos sin cesar ¡Aleluya! (¡Aleluya! ¡aleluya!)\nTus loores a cantar. ¡Aleluya!\n(¡Aleluya, aleluya, gloria a Dios!)\nEstr. #4 Charles Wesley, 1745, trad. Juan B. Cabrera, 1869."},{"n":216,"t":"Aleluya, gloria a Cristo","c":"Jesucristo el testigo fiel, el primogénito de los muertos. Apocalipsis 1:5\n1.      ¡Aleluya! Gloria a Cristo, poderoso Salvador;\n¡Aleluya! La victoria por s’ solo conquistó.\nEscuchad las alabanzas del gran coro celestial;\nJesucristo, con su sangre, redención al hombre da.\n¥2. ¡Aleluya! No temamos, con nosotros Cristo está;\n¡Aleluya! Su presencia gozo y confianza da.\nRecordemos la promesa que Jesús, al ascender,\nHizo a sus seguidores: ÒCon vosotros estaréÓ.\n¥3. ¡Aleluya! Por su muerte él la muerte conquistó;\n¡Aleluya! Vive ahora, con poder resucitó.\nNuestro Sumo Sacerdote a los cielos ascendió;\nIntercede por nosotros ante el santo Padre Dios.\n4. ¡Aleluya! Rey supremo, Dios eterno, Gran Señor;\n¡Aleluya! El es digno; Dadle gloria y honor.\nCantan seres celestiales; hombres, levantad la voz;\nTodo lo creado cante alabanza a nuestro Dios."},{"n":217,"t":"Gloria, gloria al Vencedor","c":"El Cordero los vencerá, porque él es Señor de señores y Rey de reyes. Apocalipsis 17:14\n¥1. ¡Gloria, gloria al Vencedor! ¡Alelú, aleluya! (¡Aleluya!)\n¡Mil hosannas repetid! ¡Alelú, aleluya! (¡Aleluya!)\nCristo lleno de esplendor ¡Alelú, aleluya! (¡Aleluya!)\nTriunfa en portentosa lid. ¡Alelú, aleluya! (¡Aleluya!)\n2. Roca, sellos, guardias son ¡Alelú, aleluya! (¡Aleluya!)\nVano intento, pues triunfal ¡Alelú, aleluya! (¡Aleluya!)\nDe la fosa el gran Campeón ¡Alelú, aleluya! (¡Aleluya!)\nSurge invicto e inmortal. ¡Alelú, aleluya! (¡Aleluya!)\nbasada en himno lat’n del s.14., alt. MUSICA: Robert Williams, 1817.\nLetra © 1987 Hispanic Episcopal Church Center, N.Y. Usado con permiso.\n3. El averno se hunde ya: ¡Alelú, aleluya! (¡Aleluya!)\nCaen la muerte y la maldad; ¡Alelú, aleluya! (¡Aleluya!)\nEl sepulcro se abre y da ¡Alelú, aleluya! (¡Aleluya!)\nPaso a la inmortalidad. ¡Alelú, aleluya! (¡Aleluya!)\n¥4. ¡Alabanzas cántenle! ¡Alelú, aleluya! (¡Aleluya!)\nCristo en su resurrección ¡Alelú, aleluya! (¡Aleluya!)\nAsegura nuestra fe ¡Alelú, aleluya! (¡Aleluya!)\nY eterna salvación. ¡Alelú, aleluya! (¡Aleluya!)\nbasada en himno lat’n del s.14., alt. MUSICA: Robert Williams, 1817.\nL.A.\nLetra © 1987 Hispanic Episcopal Church Center, N.Y. Usado con permiso."},{"n":218,"t":"¡Resucitó, Resucitó!","c":"ÀDónde está, oh muerte, tu aguijón? 1 Corintios 15:55\nPara un permiso en retroproyector,\nver pie de página\n© 1973 Ediciones Musical PAX, admin. OCP Publications. Usado con permiso."},{"n":219,"t":"Resucitó Jesús el Señor","c":"ÀDónde, oh sepulcro, tu victoria? 1 Corintios 15:55\n¥¡Aleluya! ¡Aleluya! ¡Aleluya!\n¥1.            Resucitó Jesús el Señor,\nde infierno y muerte es vencedor;\nSuenen pues himnos en su loor. ¡Aleluya!\n2.        Huyen las sombras y el dolor;\ndeja la tumba el Salvador;\nDémosle gloria y todo honor. ¡Aleluya!\ntrad. estr. #1 y 5, Juan B. Cabrera,estr. #2-4 es trad.\n¥3.            Por sus heridas el Redentor\nnos libra hoy de pena y temor;\nEl del sepulcro es conquistador. ¡Aleluya!\n¥4.        Nuestro rescate Cristo pagó;\nal cielo entrada él nos abrió;\nSu gracia libre nos concedió. ¡Aleluya!\n¥5.        Suenen pues himnos en su loor,\ny celebremos su gran amor:\n¡Cristo ha triunfado!\n¡Gloria al Señor!\n¡Aleluya! Amén.\ntrad. estr. #1 y 5, Juan B. Cabrera,estr. #2-4 es trad."},{"n":220,"t":"A ti la gloria","c":"Porque tuyo es el reino, y el poder, y la gloria, por todos los siglos. Mateo 6:13\n¥1.       A ti la gloria ¡oh nuestro Señor!\nA ti la victoria, gran Libertador.\nTe alzaste pujante, lleno de poder,\nMás que el sol radiante al amanecer.\nCoro:       A ti la gloria ¡oh nuestro Señor!\nA ti la victoria, gran Libertador.\nCoro:       A ti la gloria ¡oh nuestro Señor!\nA ti la victoria, gran Libertador.\n¥2.       Gozo, alegr’a, reinen por doquier,\nPorque Cristo hoy d’a muestra su poder;\nAngeles cantando himnos al Señor\nVanle aclamando como vencedor.\n3.        Libre de penas, nuestro rey Jesús\nRompe las cadenas de la esclavitud.\n¡Ha resucitado, ya no morirá!\nQuien muera al pecado en Dios vivirá."},{"n":221,"t":"Jesús venció la muerte","c":"Mediante la fe en el poder de Dios que le levantó de los muertos. Colosenses 2:12\n1.    A Jesús crucificado lo llevaron al jard’n;\nA Jesús lo han sepultado entre flores de jazm’n.\nA Jesús lo han sepultado entre flores de jazm’n.\n2.   Vino un ángel al sepulcro y la piedra le quitó;\nY Jesús venció la muerte, el Señor resucitó.\nY Jesús venció la muerte, el Señor resucitó.\nCon regocijo\n3.    Alegres las aves cantan, perfuman las flores ya;\nPorque vive el bien amado, Jesús resucitado ha.\nPorque vive el bien amado, Jesús resucitado ha.\nLETRA y MUSICA: Jaime Red’n, 1958, arreg. Eugenio Jordán.           ECU\nCon solemnidad\n4.      Oh Jesús resucitado, te adoramos con amor;\nPr’ncipe de nuestras almas sé tú, oh buen Salvador.\nPr’ncipe de nuestras almas sé tú, oh buen Salvador.\nCon regocijo\n5. Alegres hoy te cantamos, te amamos, oh buen Señor.\nGloria a Dios por la victoria del poderoso Salvador.\nGloria a Dios por la victoria del poderoso Salvador.\nLETRA y MUSICA: Jaime Red’n, 1958, arreg. Eugenio Jordán.              ECU"},{"n":222,"t":"Porque él vive","c":"Porque yo vivo, vosotros también viviréis. Juan 14:19\n1.         Dios nos envió a su Hijo Cristo;\nEl es amor, paz y perdón.\nPor m’ murió en el Calvario,\nMas de la tumba con poder resucitó.\nCoro:      Porque él vive no temo el mañana;\nPorque él vive seguro estoy,\nPorque yo sé, yo sé que el futuro es suyo\nY que la vida vale, porque él vive hoy.\nLETRA y MUSICA: William y Gloria Gaither, 1971,\ntrad. Comité de Celebremos. © 1971 William J. Gaither. Usado con permiso.\nCoro:      Porque él vive no temo el mañana;\nPorque él vive seguro estoy,\nPorque yo sé, yo sé que el futuro es suyo\nY que la vida vale, porque él vive hoy.\n2.         Grato es tener a un tierno niño,\nPrecioso don que Dios nos da.\nCuánto mejor cuando él recibe\nAl Salvador, y vida eterna gozará.\n3.            Se acabará mi vida un d’a;\nEnfrentaré muerte y dolor.\nMas a Jesús veré en la gloria,\nY reinaré con mi triunfante Salvador.\nLETRA y MUSICA: William y Gloria Gaither, 1971,\ntrad. Comité de Celebremos. © 1971 William J. Gaither. Usado con permiso."},{"n":223,"t":"Glorificaremos al Señor","c":"Al que está sentado en el trono, y al Cordero, sea... la gloria y el poder. Apocalipsis 5:13\n1.                Glorificaremos al Señor,\npor su muerte en la cruz;\nDe la tumba él se levantó,\n¡Gloria al Salvador Jesús!\n2.              Por cuarenta d’as regresó;\na los suyos se mostró.\nA sus seguidores dio la paz\ny en las nubes ascendió.\nLETRA y MUSICA: Twila Paris, 1982, trad. Lynn Anderson.\n3.    Vive victorioso nuestro Rey,\nexaltado Redentor.\nEn el cielo reina en majestad,\nel glorioso Salvador.\n4.    Aleluya a Cristo el Señor,\nal Cordero, nuestra Luz,\nEl Mes’as vive, el ÒYo soyÓ;\nRey de reyes es Jesús.\nLETRA y MUSICA: Twila Paris, 1982, trad. Lynn Anderson."},{"n":224,"t":"Al Cristo vivo sirvo","c":"Yo sé que mi Redentor vive. Job 19:25\n1.      Al Cristo vivo sirvo y él en el mundo está;\nAunque otros lo negaren, yo sé que él vive ya.\nSu mano tierna veo, su voz consuelo da,\nY cuando yo le llamo, muy cerca está.\nCoro:           El vive, (él vive,) él vive, (él vive,)\nHoy vive el Salvador;\nconmigo está y me guardará\nEl vive, (él vive,) él vive, (él vive,)\nMe imparte salvación;\nsé que él viviendo está porque\nvive en mi corazón.\nLETRA y MUSICA: Alfred H. Ackley, 1933, trad. G.P. Simmonds.\n© 1933, ren. 1961, trad. © 1950 Rodeheaver, admin. Word Music. Usado con permiso.\nCoro:          El vive, (él vive,) él vive, (él vive,)\nHoy vive el Salvador;\nconmigo está y me guardará mi amante Redentor.\nEl vive, (él vive,) él vive, (él vive,) me imparte salvación;\nsé que él viviendo está porque vive en mi corazón.\n2.   En todo el mundo entero contemplo yo su amor,\nY al sentirme triste, consuélame el Señor;\nSeguro estoy que Cristo mi vida guiando está,\nY que otra vez al mundo regresará.\n3.      Regocijad, cristianos, hoy himnos entonad;\nEternas aleluyas a Cristo el Rey cantad.\nAyuda y esperanza es del mundo pecador;\nNo hay otro tan amante como el Señor.\nLETRA y MUSICA: Alfred H. Ackley, 1933, trad. G.P. Simmonds.\n© 1933, ren. 1961, trad. © 1950 Rodeheaver, admin. Word Music. Usado con permiso."},{"n":225,"t":"Cristo Resucitado","c":"En la misma hora se levantaron y se volvieron\na Jerusalén. Hallaron reunidos a los once y\na los que estaban con ellos, quienes dec’an:\nÑ¡Verdaderamente el Señor ha resucitado\ny ha aparecido a Simón!\nMientras hablaban estas cosas, Jesús se\npuso en medio de ellos y les dijo:\nÑPaz a vosotros...Mirad mis manos y mis\npies, que yo mismo soy. Palpad y ved, pues\nun esp’ritu no tiene carne ni huesos como\nveis que yo tengo.\nLucas 24:33-34, 36, 39, 45-46, 50-51 (RVA)\nEntonces les abrió el entendimiento para que\ncomprendiesen las Escrituras, y les dijo:\nÑAs’ está escrito, y as’ fue necesario que\nel Cristo padeciese y resucitase\nde los muertos al tercer d’a.\nEntonces él los llevó fuera hasta Betania,\ny alzando sus manos les bendijo.\nAconteció que al bendecirlos, se fue\nde ellos, y era llevado arriba al cielo.\nLucas 24:33-34, 36, 39, 45-46, 50-51 (RVA)"},{"n":226,"t":"Rey Exaltado","c":"Viéndolo ellos, fue alzado. Hechos 1:9\nRey exaltado en gloria\nes Cristo Jesús y le alabo.\nRey exaltado por siempre\nes Cristo y yo le alabaré.\n(alabaré.)\nEl es Señor,\npor siempre él reinará;\nRey exaltado en gloria\nes Cristo Jesús.\nLETRA y MUSICA: Twila Paris, 1985, trad. Comité de Celebremos.\n© 1985 Straight Way Music, admin. William J. Gaither. Usado con permiso."},{"n":227,"t":"¡Victoria, Victoria!","c":"Mas he aqu’ que vivo por los siglos de los siglos, amén. Apocalipsis 1:18\n¥1. ¡Victoria! ¡Victoria! Cantemos la gloria del Rey\npoderoso que resucitó. Quedó abolido\nel poder de la muerte:\nEl fuerte vencido por uno más fuerte;\nSatán derrotado y Jesús vencedor.\n¥2.      El Crucificado, por Dios coronado,\nEs Rey soberano, glorioso Señor;\nDaránle honores, dominio y grandeza;\nReconocerán su eterna realeza,\nPues digno es Cristo de todo loor.\n¥3.      Corona celeste adorna su frente,\nlos ángeles todos le rinden honor.\nYa pronto el cetro terreste empuñando,\nCual rey le veremos en paz dominando,\nEn cielos y tierra triunfante Señor."},{"n":228,"t":"Venid, Adoremos","c":"¥1.             Venid, adoremos,\nvenid, adoremos; venid, adoremos\na Cristo el Señor.\n¥2.              Jesús, tú eres digno,\nJesús, tú eres digno; Jesús, tú eres digno\nde todo honor.\n¥3.             A ti daremos gloria,\na ti daremos gloria; a ti daremos gloria\npor siempre, Señor.\npuede cantar con la música del coro de # 140 (Venid, Fieles Todos)"},{"n":229,"t":"Hoy en gloria celestial","c":"Subiendo a lo alto, llevó cautiva la cautividad. Efesios 4:8\n1.                   Hoy en gloria celestial,\nreina vivo e inmortal\nCristo que la cruz sufrió;\ncon poder se levantó.\nSu gloriosa majestad,\ncante, pues, la cristiandad.\n2.       Muerte y tumba ya venció\nel que al polvo se humilló;\nSu poder y gran virtud\ncautivó la esclavitud.\nSu gloriosa majestad,\ncante, pues, la cristiandad.\n3.          A los cielos ascendió;\npor su amor nos redimió;\nCristo el victorioso Rey\nintercede por su grey.\nSu gloriosa majestad,\ncante, pues, la cristiandad.\nESP"},{"n":230,"t":"Yo vivo, Señor","c":"Con Cristo estoyÉ crucificado, y ya no vivo yo, mas vive Cristo en m’ . Gálatas 2:20\n¥1.        Yo vivo, Señor, porque tú vives;\nPorque tú vives, Señor, es que yo vivo.\n// Me das consuelo, me das abrigo,\nY en la aflicción, mi Señor, estás conmigo. //\n¥2.      Soy salvo, Señor, pues me salvaste,\nPues me salvaste, Señor, eternamente.\n// Yo voy al cielo, voy a la gloria,\nPorque, Señor, tú me diste la victoria. //\nLETRA y MUSICA: Adán A. Calderón, 1954, arreg. Roberto C. Savage.             L.A."},{"n":231,"t":"Alabad a Cristo","c":"Dios m’o, fortaleza m’a, en él confiaré. Salmo 18:2\n¥Alabad a Cristo,\nalabad a Cristo;\nRoca es, mi refugio;\nes mi Libertador,\nEn él confiaré;\nalabad a Cristo.\nRoy Hicks, Jr., 1976. © 1976 Latter Rain Music, admin. Sparrow Corp. Usado con permiso."},{"n":232,"t":"Cordero","c":"Con la sangre preciosa de Cristo, como de un cordero. 1 Pedro 1:19\n¥1.       Cordero, que bajaste del cielo\na morir en la cruz\npara darme la luz y tu gran salvación,\nVertiste sangre inmaculada\ncon la cual mi maldad,\nal morir en la cruz, la borraste, Jesús.\nCoro:           Hoy yo te alabo, Señor,\ncon todo mi corazón,\nCordero, porque eres mi Dios\ny mi buen Salvador que moriste por m’.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J.         L.A.\nCoro:           Hoy yo te alabo, Señor,\ncon todo mi corazón,\nCordero, porque eres mi Dios\ny mi buen Salvador que moriste por m’.\n¥2.           Tú eres el que diste a mi vida\nesa paz sin igual,\nque en el mundo falaz, no la pude encontrar.\nPor eso mi alma alegre te canta,\ndisfrutando el amor\nque en la cruz de dolor me extendiste, Jesús.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s. 20, arreg. F.B.J."},{"n":233,"t":"Digno Eres","c":"Señor, digno eres de recibir la gloria y la honra y el poder. Apocalipsis 4:11\nSi b (Capo 1 - La)                                                                       Con majestuosidad\n1.    Digno eres, digno eres, digno eres, Señor,\nDigno de gloria, gloria y honra,\ngloria y honra y poder.\nPues todas las cosas por ti fueron hechas,\nexisten por tu voluntad; Todo lo creaste\npara tu gloria, ¡Digno eres, Señor!\n2.    Digno eres, digno eres, digno eres, Señor,\nde la riqueza, la fortaleza,\nde alabanza y honor.\nPues fuiste inmolado por nuestro pecado,\nmoriste en nuestro lugar; Y con tu sangre\nnos redimiste, ¡Digno eres, Señor!\nLETRA y MUSICA: Pauline M. Mills, 1963,\ntrad. Comité de Celebremos.. © 1973 Fred Bock. Usado con permiso."},{"n":234,"t":"Digno es el Cordero","c":"El Cordero que fue inmolado es digno de tomar... la alabanza. Apocalipsis 5:12\n¥1.       Digno es el Cordero que inmolado fue\nDe tomar el reino, honra, gloria y prez;\nPara abrir el libro nadie se encontró;\nEl fue sólo digno: ¡Cante nuestra voz!\nCoro:          A Jesús loor, a Jesús loor,\nA Jesús loor, porque él es digno;\nA Jesús loor, a Jesús loor, a Jesús loor,\nporque él es digno.\nCoro:            A Jesús loor, a Jesús loor,\nA Jesús loor, porque él es digno;\nA Jesús loor, a Jesús loor, a Jesús loor,\nporque él es digno.\n2.       Digno es el Cordero que en la cruz murió\nPor llevar el mundo cerca de su Dios;\nY donde reinaba densa oscuridad,\nEl la luz del cielo vino a derramar.\n¥3.         Digno es el Cordero, canten voces mil,\nQue la humana raza vino a redimir;\nDigno es el Cordero: ¡Salvación a él!\nY al que está en el trono, hoy y siempre ¡Amén!"},{"n":235,"t":"A Cristo coronad","c":"Adoran al que vive por los siglos de los siglos. Apocalipsis 4:10\n¥1.         A Cristo coronad, divino Salvador;\nSentado en alta majestad es digno de loor;\nAl Rey de gloria y paz loores tributad,\nY bendecid al Inmortal por toda eternidad.\n¥2.     A Cristo coronad, Señor de nuestro amor;\nAl Rey triunfante celebrad, glorioso vencedor;\nPotente Rey de paz, el triunfo consumó,\nY por su muerte de dolor su grande amor mostró.\n¥3.       A Cristo coronad, Señor de vida y luz;\nCon alabanzas proclamad los triunfos de la cruz;\nA él solo adorad, Señor de salvación;\nLoor eterno tributad de todo corazón.\nGodfrey Thring, 1874, trad. E.A. Strange. MUSICA: George J. Elvey, 1868."},{"n":236,"t":"Cristo, Jesucristo","c":"Y conocerá todo hombre que...soy Salvador tuyo y Redentor tuyo. Isa’as 49:26\n¥Cristo, Jesucristo\nmaravilloso es Jesús,\nSu rostro brilla más que el sol;\nMás hermoso es Cristo\nque el lirio de los valles,\nY dulce, más dulce que la miel.\nCual es la rosa de Sarón,\nas’ tan bello es él,\nY le amo, s’, de corazón.\nMás hermoso es Cristo\nque el lirio de los valles,\nY dulce, más dulce que la miel.\nLETRA y MUSICA: Paul Goodwin, 1962. trad. R.E. Miller.\n© 1962 Gospel Publishing House, admin. Lorenz Publications. Usado con permiso."},{"n":237,"t":"Cariñoso Salvador","c":"Fuiste fortaleza al pobre... refugio contra el turbión. Isa’as 25:4\n1.     Cariñoso Salvador, huyo de la tempestad\nA tu seno protector, fiándome de tu bondad.\nSálvame, Señor Jesús, de las olas del turbión:\nHasta el puerto de salud,\ngu’a tú mi embarcación.\n2.   Otro asilo Àdónde hallar? indefenso acudo a ti;\nSólo pude desmayar, porque mi peligro vi.\nSolamente tú, Señor, puedes dar consuelo y luz;\nVengo lleno de temor a los pies de mi Jesús.\n3.             Cristo, encuentro todo en ti,\ny no necesito más;\nDébil, me pusiste en pie, triste, ánimo me das.\nAl enfermo das salud; gu’as tierno al que no ve;\nCon amor y gratitud tu bondad ensalzaré. Amén."},{"n":238,"t":"Al Señor Jesús loemos","c":"Cantaré y entonaré alabanzas al Señor. Salmo 27:6\n1.              Al Señor Jesús loemos,\nporque tanto le debemos;\nLo que somos y tenemos,\nsólo es nuestro en él.\n2.          Es Jesús su nombre amado;\na su pueblo él ha salvado;\nEs el triunfo asegurado\npor su gran poder.\n3.   ¡Oh, confiad en este amigo!\nnos liberta del peligro,\nNos es hoy un fuerte abrigo\ny hasta el fin será.\n4.   Cumpliráse nuestro anhelo,\nen el d’a en que sin velo\nLe veremos en el cielo\nal Señor Jesús."},{"n":239,"t":"Por los siglos de los siglos","c":"Yo Juan,... estaba en la isla llamada Patmos\npor causa de la palabra de Dios y del testimonio\nde Jesús.\nY..., vi siete candeleros de oro, y en medio\nde los candeleros vi a uno semejante al\nHijo del Hombre,\nVestido con una vestidura que le llegaba hasta\nlos pies y ten’a el pecho ceñido con un cinto de oro.\nSu cabeza y sus cabellos eran blancos como la\nlana blanca, como la nieve, y sus ojos eran\ncomo llama de fuego.\nApocalipsis 1:9, 12b-18a (RVA)\nSus pies eran semejantes al bronce bruñido, ardiente\ncomo en un horno. Su voz era como el estruendo\nde muchas aguas.\nTen’a en su mano derecha siete estrellas, y de su\nboca sal’a una espada aguda de dos filos.\nSu rostro era como el sol cuando resplandece en su\nfuerza.\nCuando le vi, ca’ como muerto a sus pies. Y puso\nsobre m’ su mano derecha, y me dijo:\nÑNo temas. Yo soy el primero y el último, el que vive.\nEstuve muerto, y he aqu’ que vivo por los siglos\nde los siglos.\nApocalipsis 1:9, 12b-18a (RVA)"},{"n":240,"t":"Coronadle","c":"Vemos... a Jesús, coronado de gloria y de honra. Hebreos 2:9\n¥1.        Ved al Cristo, Rey de gloria,\nes del mundo el vencedor;\nDe la guerra vuelve invicto, todos deben dar loor.\nCoro:           Coronadle, santos todos;\ncoronadle Rey de reyes;\nCoronadle, santos todos; coronad al Salvador.\n¥2.               Exaltadle, exaltadle,\nricos triunfos trae Jesús;\nEntronadle en los cielos,en la refulgente luz.\nCoro:          Coronadle, santos todos;\ncoronadle Rey de reyes;\nCoronadle, santos todos; coronad al Salvador.\n3.                Pecadores se burlaron,\ncoronando al Salvador;\nAngeles y santos danle su riqu’simo amor.\n4.              Escuchad las alabanzas\nque se elevan hacia él;\nVictorioso reina el Cristo; adorad a Emanuel."},{"n":241,"t":"Loores dad a Cristo el Rey","c":"Adorad a aquel que hizo el cielo y la tierra . Apocalipsis 14:7\n¥1.            Loores dad a Cristo el Rey,\nsuprema potestad;\nDe su divino amor la ley postrados aceptad;\nDe su divino amor la ley postrados aceptad.\n2.    Vosotros, hijos de Israel, ovejas de la grey;\nLoores dad a Emanuel y proclamadle Rey;\nLoores dad a Emanuel y proclamadle Rey.\ntrad. T.M. Westrup, alt. MUSICA: Oliver Holden, 1792.\n3.           Gentiles que por su perdón\ngozáis de libertad,\nAl que de la condenación os libra, hoy load;\nAl que de la condenación os libra, hoy load.\n4.   Naciones todas, escuchad y obedeced su ley\nDe gracia y de santidad, y proclamadle Rey;\nDe gracia y de santidad, y proclamadle Rey.\n¥5. Con la celeste multitud del trono en derredor,\nAlzad canción de gratitud a Cristo el Salvador;\nAlzad canción de gratitud a Cristo el Salvador.\ntrad. T.M. Westrup, alt. MUSICA: Oliver Holden, 1792."},{"n":242,"t":"Gloria a Cristo","c":"Este es mi Hijo amado, en quien tengo complacencia. Mateo 3:17\n¥ Gloria a Cristo,\ngloria a Emanuel;\nRey de reyes y Señor\nde los señores;\nY por siempre cantaré\ntus alabanzas;\nTe adoraré por la eternidad.\nLETRA y MUSICA: Dave Moody, 1979, trad. Oscar López M.\n© 1981 Tempo Music. Usado con permiso."},{"n":243,"t":"Jesús es mi Rey soberano","c":"El bienaventurado y solo Soberano, Rey de reyes. 1 Timoteo 6:15\n1.         Jesús es mi Rey soberano,\nEs Rey, y me ve cual hermano,\nEs Rey y me imparte su amor.\nDejando su trono de gloria,\nMe vino a sacar de la escoria,\nY yo soy feliz, y yo soy feliz por él.\nMEX\nLETRA y MUSICA: Vicente Mendoza, 1920.\n2.             Jesús es mi amigo anhelado,\nY en sombras o en luz siempre va\nPaciente y humilde a mi lado;\nAyuda y socorro me da. Por eso constante lo sigo,\nPorque él es mi Rey y mi amigo,\nY yo soy feliz, y yo soy feliz por él.\n3.          Señor, Àqué pudiera yo darte\nPor tanta bondad para m’?\nÀMe basta servirte y amarte?\nÀEs todo entregarme yo a ti?\nEntonces, acepta mi vida, que a ti solo queda rendida,\nPues yo soy feliz, pues yo soy feliz por ti.\nLETRA y MUSICA: Vicente Mendoza, 1920."},{"n":244,"t":"Glorioso Cristo","c":"Vimos su gloria, gloria como del unigénito del Padre. Juan 1:14\n1.       Glorioso Cristo, Rey de lo creado,\nHombre y Dios, te doy loor;\nQuiero amarte, mi dulce amigo, corona m’a y Salvador.\n2.       Bello es el campo, más aún los bosques\nEn la estación primaveral; Cristo es más bello,\nCristo es más puro, que al alma triste gozo da.\n3. Bella es la luna, es el sol más bello, y las estrellas,\nsin igual; Pero el Cristo es quien más brilla\nEn todo el Reino celestial.\ntrad. Federico J. Pagura. MUSICA: En Schlesische Volkslieder, 1842,\n4.   Bellas las flores, bello es el hombre\nen su lozana juventud; Más su belleza\npronto perece, sólo es eterna en Jesús.\n5.    De tierra y cielo toda la hermosura\nse muestra en Cristo, mi Señor;\nNadie merece cual Jesucristo\nnuestra alabanza y nuestro amor.\nAmén.\ntrad. Federico J. Pagura. MUSICA: En Schlesische Volkslieder, 1842,"},{"n":245,"t":"¡Oh, cuánto le amo!","c":"Nosotros le amamos a él, porque él nos amó primero. 1 Juan 4:19\n1. Es Cristo quien por m’ murió, mis culpas por borrar;\nDolor y penas él sufrió, mi alma por salvar.\nCoro:    ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!\n¡Oh, cuánto le amo! Porque él murió por m’.\n(Letra optativa)\n¡Oh, cuánto le alabo! ¡Oh, cuánto le adoro!\nY siempre le sigo de todo corazón.\n2.    Jesús el nombre sin igual, precioso es para m’;\nCual grata nota musical resuena en mi o’r.\ntrad. Esteban Sywulka B. MUSICA: Melod’a americana, s. 19.\nCoro:    ¡Oh, cuánto le amo! ¡Oh, cuánto le amo!\n¡Oh, cuánto le amo! Porque él murió por m’.\n(Letra optativa)\n¡Oh, cuánto le alabo! ¡Oh, cuánto le adoro!\nY siempre le sigo de todo corazón.\n3.   Con Cristo yo seguro estoy, me da perfecta paz;\nConmigo va, pues suyo soy; no temeré jamás.\n4.    En horas tristes de dolor consuelo da Jesús;\nMe ofrece fuerzas y valor, me gu’a en su luz.\ntrad. Esteban Sywulka B. MUSICA: Melod’a americana, s. 19."},{"n":246,"t":"Cristo, maravilloso eres tú","c":"El cual, siendo el resplandor de su gloria. Hebreos 1:3\n¥Cristo, maravilloso eres tú;\nEres tan bueno, tan lleno de amor;\nBrillas como brilla el sol;\nCristo, maravilloso eres tú.\nLETRA y MUSICA: David Bolton, 1975, es trad.\n© 1975 KingswayÕs Thankyou Music, admin. IntegrityÕs Hosanna. Usado con permiso."},{"n":247,"t":"En momentos as’","c":"A ti, oh Señor, levantaré mi alma. Salmo 25:1\n¥ En momentos as’ levanto mi voz,\nLevanto mi canto a Cristo;\nEn momentos as’ levanto mi ser,\nLevanto mi alma a él.\nCuánto te amo, Dios, cuánto te amo, Dios;\nCuánto te amo, Dios, te amo.\n(Letra optativa)\nCuánto te amo, Señor; Cuánto te amo, Señor;\nCuánto te amo, Cristo, mi Señor.\nLETRA y MUSICA: David Graham, 1980, es trad. © 1980 C.A. Music. Usado con permiso."},{"n":248,"t":"REFLEXION:","c":"El Esp’ritu Santo, mi Consolador\nEsp’ritu de Dios, ¡cuán maravilloso eres!\nDesde la eternidad existes con el Padre y el Hijo,\ncon quienes creaste el mundo.\nEs por obra tuya también que yo soy una\nnueva creación. Tú me convenciste de mi pecado\ny me llevaste a la fe en Cristo. Me diste nueva\nvida e hiciste tu morada en m’. Eres el sello que\ngarantiza mi redención final.\nHoy eres mi Gu’a y Consolador. Me ayudas\na entender la Biblia, la que tú mismo inspiraste.\nTe entristeces por mi desobediencia; señalas mis\nerrores y me impulsas a confesarlos. Me das poder\npara vencer la tentación y el pecado.\nCultivas en el huerto de mi vida el fruto\nque te agrada. Utilizas para beneficio de tu\niglesia las habilidades con las cuales\nme has capacitado.\n¡Qué privilegio es tenerte como mi Ayudador!\nCuando me someto a tu control, mi corazón rebosa\ncon melod’as de alabanza y gratitud a Dios."},{"n":249,"t":"Himno al Esp’ritu Santo","c":"Y vio al Esp’ritu de Dios que descend’a como paloma. Mateo 3:16\n1.         Santo Esp’ritu, excelsa paloma,\ninmutable ser del trino Dios,\nMensajero de paz que procedes del Padre,\nhoy consuélanos con suave voz.\nTu fragancia y llenura anhelamos;\nembalsama tu templo, tu altar;\nY la sombra feliz de tus alas de gracia\nNos cobije, ¡oh Amigo sin par!\nEsp’ritu Santo, Felipe Blycker J., 1977. MUSICA: Felipe Blycker J., 1977.\nGUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\n2.           Santo Esp’ritu, fuego celeste,\nen el d’a de Pentecostés\nCual la nube de gloria, bajaste a la Iglesia\ncomo al templo de Sion otra vez.\nPara el nuevo cristiano eres sello;\ncada uno de ti tiene un don;\nTodo hijo de Dios elegido es y goza\nya las arras de tu salvación.\n3.           Santo Esp’ritu, aceite bendito,\ncual producto del verde olivar,\nLuminaria y calor en la tienda sagrada\nDonde Aarón se acercaba a adorar;\nAgua viva y regeneradora,\nsantif’canos contra el mal; somos uno en Jesús\nlos creyentes del mundo por tu santa labor bautismal.\nEsp’ritu Santo, Felipe Blycker J., 1977. MUSICA: Felipe Blycker J., 1977.\nGUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\n4.        Santo Esp’ritu, viento potente,\nfuente y fuerza de paz y amor,\nParacleto veraz que consuelo nos brinda\nY aboga a nuestro favor;\nSénos luz que ilumine la Biblia,\nnuestros pies dirigiendo al andar;\nHoy rendimos a ti\nnuestras almas ansiosas;\nSólo ungidos podremos triunfar.\nAmén.\nEsp’ritu Santo, Felipe Blycker J., 1977. MUSICA: Felipe Blycker J., 1977.      GUA\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":250,"t":"El divino Consolador","c":"250.     El divino Consolador\nYo rogaré al Padre, y os dará otro Consolador, para\nque esté con vosotros para siempre:\nEl Esp’ritu de verdad, al cual el mundo no puede\nrecibir, porque no le ve, ni le conoce;\nPero vosotros le conocéis, porque mora con vosotros,\ny estará en vosotros.\nMas el Consolador, el Esp’ritu Santo, a quien\nel Padre enviará en mi nombre, él os enseñará\ntodas las cosas.\nCuando venga el Consolador, a quien yo os enviaré\ndel Padre, el Esp’ritu de verdad, el cual procede del\nPadre, él dará testimonio acerca de m’.\nJuan 14:16-17, 26a; 15:26; Romanos 8:11; 2 Corintios 3:17-18 (RVR)\nY si el Esp’ritu de aquel que levantó de los\nmuertos a Jesús mora en vosotros,\nEl que levantó de los muertos a Cristo Jesús\nvivificará también vuestros cuerpos mortales\npor su Esp’ritu que mora en vosotros.\nPorque el Señor es el Esp’ritu; y donde está el\nEsp’ritu del Señor, all’ hay libertad.\nPor tanto, nosotros todos, mirando a cara descubierta\ncomo en un espejo la gloria del Señor,\nSomos transformados de gloria en gloria\nen la misma imagen, como por el Esp’ritu del\nSeñor.\nJuan 14:16-17, 26a; 15:26; Romanos 8:11; 2 Corintios 3:17-18 (RVR)"},{"n":251,"t":"Lluvias de gracia","c":"Haré descender la lluvia en su tiempo; lluvias de bendición. Ezequiel 34:26\nSib (Capo 1 - La)                                                 Con vigor\n1.           Dios nos ha dado promesa:\nlluvias de gracia enviaré,\nDones que os den fortaleza; gran bendición os daré.\nCoro:          Lluvias (lluvias) de gracia,\nlluvias pedimos, Señor;\nMándanos lluvias copiosas, lluvias del Consolador.\n2.            Cristo nos dio la promesa\ndel Santo Consolador,\nDándonos paz y pureza, para su gloria y honor.\nCoro:          Lluvias (lluvias) de gracia,\nlluvias pedimos, Señor;\nMándanos lluvias copiosas, lluvias del Consolador.\n3.                ¡Oh Dios, a todo creyente\nmuestra tu amor y poder!\nTú eres de gracia la fuente; llena de paz nuestro ser.\n4.            Obra en tus siervos piadosos\ncelo, virtud y valor,\nDándonos dones preciosos,\ndones del Consolador."},{"n":252,"t":"Fuisteis sellados","c":"Habiendo cre’do en él, fuisteis sellados con el Esp’ritu. Efesios 1:13\nHabiendo o’do la palabra de verdad,\nEl evangelio que nos da la salvación;\nTambién habiendo cre’do en Cristo,\nEn Jesucristo que da la redención;\nCon vigor\nFuisteis sellados, sellados\ncon el Esp’ritu,\nCon el Esp’ritu de la promesa;\nFuisteis sellados, sellados\ncon el Esp’ritu,\nCon el Esp’ritu Santo de Dios.\n© 1972 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.     GUA"},{"n":253,"t":"El fiel Consolador","c":"Os dará otro Consolador, para que esté con vosotros para siempre. Juan 14:16\nSi b (Capo 1 - La)                                                 Con ánimo\n1.    Doquier el hombre esté, la nueva proclamad;\nDoquier haya aflicción, miserias y dolor,\nCristianos, anunciad que el Padre nos envió\nAl fiel Consolador.\nCoro:      El fiel Consolador, el fiel Consolador\nQue Dios nos prometió, al mundo descendió.\nDoquier el hombre esté, decid que vino ya\nEl fiel Consolador.\n2.      La noche ya pasó, y al fin brilló la luz\nQue vino a disipar las sombras del terror;\nAs’ del alma fue aurora celestial,\nEl fiel Consolador.\ntrad. Vicente Mendoza. MUSICA: William J. Kirkpatrick, 1890.\nCoro:      El fiel Consolador, el fiel Consolador\nQue Dios nos prometió, al mundo descendió.\nDoquier el hombre esté, decid que vino ya\nEl fiel Consolador.\n3.        El es quien da salud y plena libertad,\nA los que encadenó el fiero tentador;\nLos rotos hierros, hoy dirán que vino ya\nEl fiel Consolador.\n4.   ¡Oh, grande, eterno amor! Mi lengua débil es\nPara poder hablar del don que recib’,\nAl renovar en m’ la imagen celestial,\nEl fiel Consolador.\ntrad. Vicente Mendoza. MUSICA: William J. Kirkpatrick, 1890."},{"n":254,"t":"Sed llenos, hermanos","c":"Antes bien sed llenos del Esp’ritu. Efesios 5:18\nSed llenos, hermanos,\ndel Santo Esp’ritu,\nHablando entre vosotros,\nmandó el Salvador,\nCon salmos e himnos y cánticos,\nCantando y alabando al Señor.\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.   GUA"},{"n":255,"t":"En un aposento alto","c":"Y fueron todos llenos del Esp’ritu Santo. Hechos 2:4\n1.      En un aposento alto, con unánime fervor,\nCiento veinte esperaban\nCoro:          Dios, manda tu gran poder,\nDios, manda tu gran poder,\nDios, manda tu gran poder a cada corazón.\n2.          Con estruendo de los cielos\nDescendió en plenitud;\nTodos fueron bautizados Con el Santo Esp’ritu.\ntrad. H.W.Cragin, #3-4, Lynn Anderson, coro #2 Felipe Blycker J.\nCoro:          // Dios, manda tu gran poder, //\nDios, manda tu gran poder a cada corazón.\n3.             Desde aquel feliz momento\nMora el Consolador\nEn el corazón creyente, Dando dones, paz y amor.\n4.                 El Esp’ritu de Cristo\nHoy nos llena de poder\nPara ser testigos fieles, Predicando por doquier.\n(Ultimo coro:)\nOh, Santo Esp’ritu, bendito celeste don,\nDivino Consolador, reina en mi corazón.\ntrad. H.W.Cragin, #3-4, Lynn Anderson, coro #2 Felipe Blycker J."},{"n":256,"t":"Andad en el Esp’ritu","c":"Mirad, pues, con cuidado, cómo os comportáis;\nno como imprudentes sino como prudentes.\nAndad en el Esp’ritu, y as’ jamás satisfaréis\nlos malos deseos de la carne.\nÀO no sabéis que vuestro cuerpo es templo del\nEsp’ritu Santo, que mora en vosotros, el cual\ntenéis de Dios, y que no sois vuestros?\nPues habéis sido comprados por precio.\nPor tanto, glorificad a Dios en vuestro cuerpo.\nEfesios 5:15; Gálatas 5:16; 1 Corintios 6:19-20 (RVA)"},{"n":257,"t":"Esp’ritu de Cristo","c":"Orando....con toda oración y súplica en el Esp’ritu. Efesios 6:18\n1.          Esp’ritu de Cristo, Lléname de tu amor,\nPara que en m’ se refleje la imagen del Salvador.\nCoro:           Llena, llena, lléname de tu amor;\nEntrego a ti mi vida para servirte, Señor.\n2.           Esp’ritu de Cristo, lléname de tu poder,\nPara que anuncie valiente la salvación por doquier.\n3.         Esp’ritu de Cristo, lléname de santo ardor,\nPara que haga fielmente la obra de mi Señor.\nLETRA y MUSICA: Isaac H. Meredith, 1900, alt., trad. Pablo Sywulka B."},{"n":258,"t":"Santo Consolador","c":"El ocuparse del Esp’ritu es vida y paz. Romanos 8:6\n¥1.       Santo Consolador, aviva tú mi ser;\nQue lo que amas pueda amar, y tu voluntad hacer.\n¥2.      Santo Consolador, puro quisiera ser,\nServirte siempre con fervor, y la tentación vencer.\n¥3.   Santo Consolador, dame tu santa unción;\nMantén el fuego de tu amor ardiendo en mi corazón.\n¥4.       Santo Consolador, lléname de virtud;\nVida del cielo gozaré andando en tu plenitud."},{"n":259,"t":"Esp’ritu del Trino Dios","c":"Esto tocó tus labios, y es quitada tu culpa, y limpio tu pecado. Isa’as 6:7\n¥Esp’ritu del Trino Dios,\nllena mi ser;\nEsp’ritu del Trino Dios,\nllena mi ser.\nQuebrántame, consúmeme,\nTransfórmame y úsame,\nEsp’ritu del Trino Dios,\nllena mi ser.\nLETRA y MUSICA: Daniel Iverson, 1926, es trad.\n© 1935, ren. 1963 Moody Bible Institute, admin, Sparrow Corp. Usado con permiso."},{"n":260,"t":"Transfórmame, Esp’ritu","c":"Somos transformados... por el Esp’ritu del Señor. 2 Corintios 3:18\nSi b (Capo 1 - La)                                                   Con reverencia\n1.    Transfórmame, Esp’ritu de Dios;\nl’brame de la ambición carnal;\nRenueva tú mi débil corazón,\ny haz que te ame como debo amar.\n2.     No pido sueños, celestial visión,\nNi roto el velo del misterio ver,\nni querubines, ni eternal mansión;\nSólo que limpies, oh Señor, mi ser.\nalt., #3-4, Pablo Sywulka B. MUSICA: Frederick Atkinson, 1870.\n3.     Hazme sensible a tu dirección;\nquiero vencer el mal con decisión;\nCalla la duda, la murmuración;\ndame constancia en la oración.\n4.   Quiero amarte, oh Señor, mi Dios;\nVeo la cruz do Cristo padeció,\ny me consagro a tu servicio hoy.\nalt., #3-4, Pablo Sywulka B. MUSICA: Frederick Atkinson, 1870."},{"n":261,"t":"Guiados por el Esp’ritu","c":"Pero cuando venga el Esp’ritu de verdad,\nél os guiará a toda la verdad;\nEl me glorificará; porque tomará\nde lo m’o, y os lo hará saber.\nPorque todos los que son guiados por el\nEsp’ritu de Dios, éstos son hijos de Dios.\nPues no habéis recibido el esp’ritu de\nesclavitud para estar otra vez en temor,\nSino que habéis recibido el esp’ritu de\nadopción, por el cual clamamos: ¡Abba, Padre!\nJuan 16:13a, 14; Romanos 8:14-16; Gálatas 5:18, 22, 23, 25 (RVR)\nEl Esp’ritu mismo da testimonio nuestro\nesp’ritu, de que somos hijos de Dios.\nPero si sois guiados por el Esp’ritu, no estáis\nbajo la ley.\nMas el fruto del Esp’ritu es amor, gozo,\npaz, paciencia, benignidad, bondad, fe,\nMansedumbre, templanza; contra tales cosas no hay ley.\nSi vivimos por el Esp’ritu, andemos\ntambién por el Esp’ritu.\nJuan 16:13a, 14; Romanos 8:14-16; Gálatas 5:18, 22, 23, 25 (RVR)"},{"n":262,"t":"Divino Esp’ritu de Dios","c":"Si vivimos por el Esp’ritu, andemos también por el Esp’ritu. Gálatas 5:25\n¥1.      Divino Esp’ritu de Dios,\nenviado por Jesús,\nDel bien condúcenos en pos\ny alúmbrenos tu luz.\n¥2.         Haz comprender al corazón\ncuán grave es su maldad,\nY danos el precioso don\nde andar en santidad.\n3.        Venza la fuerza de tu luz\nal fiero tentador\nPor Cristo, quien muriendo en cruz\nnuestro dolor sufrió.\n¥4.      Sé nuestro gu’a al transitar\nDanos poder para triunfar,\nSiguiendo de él en pos."},{"n":263,"t":"Santo Esp’ritu, controla","c":"Mirad... cómo andéis, no como necios sino como sabios. Efesios 5:15\n1.                Santo Esp’ritu, controla\nLlena hoy de tu presencia esta humilde habitación.\nCoro:   Llena hoy, llena hoy, lléname con tu poder;\nTu amor y tu presencia llenen hoy mi humilde ser.\n¥2.             Débil soy, oh s’, muy débil;\na tus pies postrado estoy,\nEsperando que tu gracia con poder me llene hoy.\nadapt. Comité de Celebremos. MUSICA: John R. Sweney, 1879.\nCoro:   Llena hoy, llena hoy, lléname con tu poder;\nTu amor y tu presencia llenen hoy mi humilde ser.\n3.                Santo Esp’ritu, tú eres\nese prometido don;\nQuiero siempre obedecerte y gozar tu bendición.\n¥4.              Oh, ayúdame, te pido,\na vivir en santidad;\nGu’ame en tus caminos, haz en m’ tu voluntad.\nadapt. Comité de Celebremos. MUSICA: John R. Sweney, 1879."},{"n":264,"t":"Oh, divino Esp’ritu","c":"1.            Oh, divino Esp’ritu,\ntemplo puro quiero ser;\nGu’a todo mi andar, para no caer.\n2.           Oh, divino Esp’ritu,\ncomprensión tú me darás;\nLos mandatos de mi Dios clarificarás.\n3.          Oh, divino Esp’ritu,\ndon de t’ yo recib’;\nUsame con tu poder, ¡Gloria sea a ti!\n© 1981 Covenant Music, admin. Tempo Music. Usado con permiso."},{"n":265,"t":"El fruto del Esp’ritu","c":"El fruto... es amor, gozo, paz,... contra tales cosas no hay ley. Gálatas 5:22-23\n¥El fruto del Esp’ritu\nes amor, gozo y paz;\nEl fruto es paciencia,\nbenignidad, bondad y fe;\nEl fruto del Esp’ritu\nes mansedumbre y templanza;\nVivamos por el Esp’ritu,\ny andemos siempre en él.\nVivamos por el Esp’ritu,\ny andemos siempre en él.\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":266,"t":"Satúrame, Señor","c":"Andad en el Esp’ritu. Gálatas 5:16\n¥1.      Satúrame, Señor, con tu Esp’ritu;\nSatúrame, Señor, con tu Esp’ritu,\n// Y déjame sentir el fuego de tu amor\nAqu’ en mi corazón, oh Dios. //\n¥2.     Bend’ceme, Señor, con tu Esp’ritu;\nBend’ceme, Señor, con tu Esp’ritu,\n// Y déjame sentir el gozo de tu amor\nMomento tras momento, oh Dios. //\n3.       Env’ame, Señor, con tu Esp’ritu;\nEnv’ame, Señor, con tu Esp’ritu,\n// Y déjame sentir tu corazón de amor\nY al mundo proclamarlo, oh Dios. //"},{"n":267,"t":"Abre mis ojos","c":"El esp’ritu de verdad, él os guiará a toda la verdad. Juan 16:13\n¥1. Abre mis ojos a la luz; tu rostro quiero ver, Jesús;\nPon en mi corazón tu bondad y dame paz y santidad.\nHumildemente acudo a ti, porque tu tierna voz o’;\n¥2. Abre mi o’do a tu verdad; Yo quiero oir con claridad\nBellas palabras de dulce amor,\n¡Oh mi bendito Salvador! Consagro a ti mi frágil ser;\nTu voluntad yo quiero hacer.\nLlena mi ser, Esp’ritu Consolador.\nLETRA y MUSICA: Clara H. Scott, 1895, trad. S.D. Athans\n3.               Abre mis labios para hablar,\nY a todo el mundo proclamar\nQue tú viniste a rescatar al más perdido pecador.\nHeme aqu’, Esp’ritu Consolador.\n¥4. Abre mi mente para ver más de tu amor y gran poder;\nDame tu gracia para triunfar,\ny hazme en la lucha vencedor.\nSé tú mi escondedero fiel, y aumenta mi valor y fe;\nLETRA y MUSICA: Clara H. Scott, 1895, trad. S.D. Athans"},{"n":268,"t":"Lámpara es tu Palabra","c":"Lámpara es a mis pies tu palabra y lumbrera a mi camino. Salmo 119:105\n1.         Lámpara es a mis pies tu palabra,\nLámpara es a mis pies tu palabra,\nLámpara es a mis pies tu palabra,\nY lumbrera a mi camino.\n2.       La exposición de tus dichos alumbra,\nY hace entender a los simples.\n3.           Y para siempre, oh *Señor, permanece,\nY para siempre, oh *Señor, permanece,\nY para siempre, oh *Señor, permanece\n*opt. Jehová         Tu palabra en los cielos.\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":269,"t":"Tu Palabra me habla","c":"Bendito tú, oh SE„OR; enséñame tus estatutos.\nMe he gozado en el camino de tus\ntestimonios, más que en todas las riquezas.\nMe deleitaré en tus estatutos, y no olvidaré tu palabra.\nAbre mis ojos, para que vea las maravillas\nde tu ley.\nHazme entender el camino de tus preceptos,\ny meditaré en tus maravillas.\nSalmo 119:12, 14, 16, 18, 27, 97; Mateo 4:4; 2 Timoteo 3:16, 17 (BLA)\n¡Cuánto amo tu ley! Todo el d’a\nes ella mi meditación.\nEscrito está: ÒNo sólo de pan vivirá el hombre,\nSino de toda palabra que sale de la boca de DiosÓ.\nToda Escritura es inspirada por Dios y útil para\nenseñar, para reprender, para corregir, para instruir\nen justicia,\na fin de que el hombre de Dios sea perfecto,\nequipado para toda buena obra.\nSalmo 119:12, 14, 16, 18, 27, 97; Mateo 4:4; 2 Timoteo 3:16, 17 (BLA)"},{"n":270,"t":"Santa Biblia","c":"En mi corazón he guardado tus dichos para no pecar. Salmo 119:11\n¥1.  Santa Biblia, para m’ eres un tesoro aqu’;\nTú contienes con verdad la divina voluntad;\nTú me dices lo que soy, de quién vine y a quién voy.\n2.     Tú reprendes mi dudar; tú me exhortas sin cesar;\nEres faro que a mi pie va guiando por la fe\nA las fuentes del amor del bendito Salvador.\n3.        Eres infalible voz del Esp’ritu de Dios,\nQue vigor al alma da cuando en aflicción está;\nTú me enseñas a triunfar de la muerte y el pecar.\n¥4.      Por tu santa letra sé que con Cristo reinaré;\nYo que tan indigno soy, por tu luz al cielo voy;\n¡Santa Biblia! para m’ eres un tesoro aqu’.\nESP"},{"n":271,"t":"Los cielos anuncian tus obras","c":"Su eterno poder y deidad se hacen claramente visibles. Romanos 1:20\n1.    Los cielos anuncian tus obras, Señor,\nEl d’a y la noche levantan su voz,\nY en toda la tierra alaban a Dios.\n¥2.   Oh Dios, tu palabra es fiel y veraz;\nA los que la guardan da gozo y paz.\nTus leyes perfectas y l’mpidas son;\nTu sabidur’a dan al corazón.\n¥3.   Tus juicios excelsos son mucho mejor\nQue oro o joyas de grande valor;\nAun miel que destila del rico panal\nNo tiene dulzura que sea igual.\n¥4.   Que cada palabra que expresa mi voz,\nLas meditaciones de mi corazón,\nA ti sean gratas, te imploro, Señor,"},{"n":272,"t":"Cuán firme cimiento","c":"El fundamento de Dios está firme. 2 Timoteo 2:19\n¥1.   ¡Cuán firme cimiento se ha dado a la fe,\nDe Dios en su eterna palabra de amor!\nÀQué más él pudiera en su libro añadir,\nSi todo a sus hijos lo ha dicho el Señor?\n2.      ÒNo temas por nada, contigo yo soy;\nTu Dios yo soy solo, tu ayuda seré;\nTu fuerza y firmeza en mi diestra estarán,\nY en ella sostén y poder te daré.\nSelection of Hymns, 1787, de Rippon, trad. Vicente Mendoza.\n3.       ÒLa llama no puede dañarte jamás,\nSi en medio del fuego te ordeno pasar;\nEl oro de tu alma más puro será,\nPues sólo la escoria se habrá de quemar.\n4.   ÒNo habrán de anegarte las ondas del mar,\nSi en aguas profundas te ordeno salir;\nPues siempre contigo en angustia estaré,\nY todas tus penas podré reducir.\n5.   ÒAl alma que anhele la paz que hay en m’,\nJamás en sus luchas la habré de dejar;\nSi todo el infierno la quiere perder,\n¡Yo nunca, no nunca, la puedo olvidar!Ó\nSelection of Hymns, 1787, de Rippon, trad. Vicente Mendoza."},{"n":273,"t":"Todas las promesas","c":"Nos ha dado preciosas promesas. 2 Pedro 1:4\nSi b (Capo 1 - La)                                                 Con vigor\n1.       Todas las promesas del Señor Jesús\nSon apoyo poderoso de mi fe;\nMientras luche aqu’ buscando yo su luz,\nSiempre en sus promesas confiaré.\nCoro:                 Grandes, fieles,\n(Grandes, grandes, fieles son, grandes, grandes, fieles son,)\nLas promesas que el Señor Jesús ha dado;\nGrandes, fieles,\n(Grandes, grandes, fieles son, grandes, grandes, fieles son,)\nEn ellas para siempre confiaré.\nLETRA y MUSICA: R. Kelso Carter, 1886, trad. Vicente Mendoza.\nCoro:                 Grandes, fieles,\n(Grandes, grandes, fieles son, grandes, grandes, fieles son,)\nLas promesas que el Señor Jesús ha dado;\nGrandes, fieles,\n(Grandes, grandes, fieles son, grandes, grandes, fieles son,)\nEn ellas para siempre confiaré.\n2.      Todas las promesas para el hombre fiel,\nEl Señor en sus bondades cumplirá,\nY confiado sé que para siempre en él,\nPaz eterna mi alma gozará.\n3.       Todas las promesas del Señor serán\nGozo y fuerza en nuestra vida terrenal;\nEllas en la dura lid nos sostendrán,\nY triunfar podremos sobre el mal.\nLETRA y MUSICA: R. Kelso Carter, 1886, trad. Vicente Mendoza."},{"n":274,"t":"Dame de vida el pan","c":"1.     Dame, mi buen Señor, de vida el pan,\nComo lo hiciste un d’a junto al mar;\nY en tu Palabra espero o’r tu voz.\n2.      ÒEl pan de vida soyÓ, dice el Señor;\nVen, alma hambrienta hoy al Salvador.\nÒHambre jamás tendrá quien viene a m’;\nSed nunca más tendrá quien cree en m’Ó.\n#2 y 4 A. Groves, 1913, es trad. MUSICA: William F. Sherwin, 1877.\nTrad. estr. #1 y 3 © 1962 Ediciones La Aurora. Usado con permiso.\n3.   Bendice, oh Salvador, hoy tu verdad,\nCual bendijiste ayer el fresco pan;\nEn ella nos darás la libertad,\nEn ella encuentro gozo y solaz.\n4.      Con tu Esp’ritu toca mi ser,\nY abre mis ojos tu verdad a ver.\nMuestra tu voluntad; dame tu luz;\nQuiero en tu Libro verte a ti, Jesús.\n#2 y 4 A. Groves, 1913, es trad. MUSICA: William F. Sherwin, 1877.\nTrad. estr. #1 y 3 © 1962 Ediciones La Aurora. Usado con permiso."},{"n":275,"t":"Nunca se apartará","c":"Nunca se apartará de tu boca este libro de la ley. Josué 1:8\nNunca se apartará de tu boca\neste libro de la ley,\nSino que de d’a y de noche tú meditarás en él;\nPara que guardes y hagas conforme\nA todo lo que en él está escrito;\nPorque entonces harás\nprosperar tu camino, Y todo te saldrá bien.\nNunca se apartará de tu boca\nEste libro de la ley,\nSino que de d’a y de noche, tú meditarás en él.\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":276,"t":"Padre, tu Palabra","c":"Ordena mis pasos con tu palabra. Salmo 119:133\n1.                 Padre, tu Palabra es\nGu’e siempre aqu’ mis pies, y a mi alma traiga paz.\nCoro:              Es tu ley, Señor, faro celestial,\nQue en perenne resplandor,\nNorte y gu’a da al mortal.\n2.                S’, obediente o’ tu voz,\nEn tu gracia fuerza hallé,\nY con firme pie y veloz por tus sendas caminé.\nESP\nCoro:   Es tu ley, Señor, faro celestial,\nQue en perenne resplandor,\nNorte y gu’a da al mortal.\n3.        Tu verdad es mi sostén\nContra duda y tentación,\nY destila calma y bien\nCuando asalta la aflicción.\n4.        Son tus dichos, para m’,\nPrendas fieles de salud;\nDame, pues, que te oiga a ti,\nCon filial solicitud.\nESP"},{"n":277,"t":"Tu Palabra es mi cántico","c":"Cánticos fueron para m’ tus estatutos. Salmo 119:54\n1.   Tu Palabra es mi cántico; esperanza y gozo da;\nEs espada, arma divinal\nY escudo contra el mal.\nCoro:         Por la Santa Biblia te alabo,\nPadre amante, mi Señor;\nTe adoro, Cristo, Rey eterno; Gracias, oh Consolador.\n2.   Tu Palabra es mi lámpara, luz divina y gu’a fiel;\nMás deseable que oro y plata es,\nY más dulce que la miel.\nPalabra de Dios. Felipe Blycker J., 1980. MUSICA : Felipe Blycker J., 1980.    GUA\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso.\nCoro:         Por la Santa Biblia te alabo,\nPadre amante, mi Señor;\nTe adoro, Cristo, Rey eterno; Gracias, oh Consolador.\n3. Tu Palabra es mi gran mentor; es semilla, eterno don;\nQuiero siempre en ella meditar,\nHallo all’ la salvación.\n4. Tu Palabra trae libertad, me consuela en aflicción;\nCual martillo, y espejo es;\nFuego en el corazón.\n5. Tu Palabra es mi agua y pan; limpia el ser y fuerza da;\nLeche y carne encuentro yo all’\nQue mi alma sostendrá.\nPalabra de Dios. Felipe Blycker J., 1980. MUSICA : Felipe Blycker J., 1980.\n© 1980 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":278,"t":"Gracias damos por la Biblia","c":"1.             Gracias damos por la Biblia,\nTu Palabra es, Señor; Inspiraste al salmista,\nY al santo historiador. El profeta y el apóstol,\nDesde la antigŸedad, por tu Esp’ritu guiados,\nNos legaron tu verdad.\n2.             Gracias damos por la Biblia,\nY por esa multitud de escribas abnegados,\nQue con gran exactitud a través de muchos siglos,\nAun en gran persecución, cada letra preservaron,\nPara nuestra bendición.\n© 1992 Esteban Sywulka B. Usado con permiso.\nEsta letra se puede cantar con la música de #108 (Jubilosos) y #482 (Oh qué amigo).\n3.              Gracias damos por la Biblia,\nY por cada traductor que la ha hecho entendible\nAl oyente y lector. Y por los que la publican,\nY el ejército mundial que trabaja esparciendo\nTu Palabra eternal.\n4.            Gracias damos por la Biblia,\nTu Palabra es, Señor; La tenemos al alcance,\nTu mensaje de amor. Oh ayúdanos, pedimos,\nA leerla con afán, y a cumplirla diariamente;\nSus preceptos vida dan.\nEsteban Sywulka B., 1991\n© 1992 Esteban Sywulka B. Usado con permiso."},{"n":279,"t":"Proclamemos la Palabra","c":"Si alguien habla, hable conforme a las palabras de\nDios.\nPredica la palabra; mantente dispuesto a tiempo\ny fuera de tiempo; convence, reprende y exhorta\ncon toda paciencia y enseñanza.\nPorque la Palabra de Dios es viva y eficaz,\ny más penetrante que toda espada de dos filos.\nPenetra hasta partir el alma y el esp’ritu, las\ncoyunturas y los tuétanos, y discierne los\npensamientos y las intenciones del corazón.\n1 Pedro 4:11a; 2 Timoteo 4:2; Hebreos 4:12; Romanos 10:17; 15:4; 10:15b (RVA)\nPor esto, la fe es por el o’r, y el o’r por la\npalabra de Cristo. Pues lo que fue escrito\nanteriormente fue escrito para nuestra enseñanza,\na fin de que por la perseverancia y la exhortación de\nlas Escrituras tengamos esperanza.\n¡Cuán hermosos son los pies de los que anuncian\nel evangelio de las cosas buenas!\n1 Pedro 4:11a; 2 Timoteo 4:2; Hebreos 4:12; Romanos 10:17; 15:4; 10:15b (RVA)"},{"n":280,"t":"Bellas palabras de vida","c":"Las palabras que yo os he hablado son esp’ritu y son vida. Juan 6:63\n¥1.              ¡Oh! cantádmelas otra vez,\nBellas palabras de vida;\nHallo en ellas mi gozo y luz, Bellas palabras de vida.\nS’, de luz y vida son sostén y gu’a;\nCoro:              ¡Qué bellas son, qué bellas son!\nBellas palabras de vida;\n¡Qué bellas son, qué bellas son!\nBellas palabras de vida.\nLETRA y MUSICA: Philip P. Bliss, 1874, trad. Julia A. Butler, alt.\nCoro:        ¡Qué bellas son, qué bellas son!\nBellas palabras de vida;\n¡Qué bellas son, qué bellas son! Bellas palabras de vida.\n2.                 Jesucristo a todos da\nBellas palabras de vida;\nOye su dulce voz, mortal, bellas palabras de vida.\nBondadoso te salva, y al cielo te llama.\n¥3.             Grato el cántico sonará,\nBellas palabras de vida;\nTus pecados perdonará, bellas palabras de vida.\nSólo Cristo redime, vida nueva te ofrece.\nLETRA y MUSICA: Philip P. Bliss, 1874, trad. Julia A. Butler, alt."},{"n":281,"t":"La Palabra del Señor","c":"Que prediques la palabra; ...redarguye, reprende, exhorta. 2 Timoteo 4:2\n¥1.   La palabra del Señor predicad, predicad;\nCon anhelo y oración, predicad, predicad.\nAnte el mundo burlador\nsed testigos de su amor;\nEl poder del Salvador predicad, predicad.\n2.       El ejemplo del Señor imitad, imitad;\nSu humildad y tierno amor imitad, imitad.\nSu constancia en la oración,\nsu paciencia en la aflicción,\nSu bondad y compasión, imitad, imitad.\n3.     La venida del Señor esperad, esperad;\nEl vendrá, no tardará, esperad, esperad.\nComo siervos del gran Rey,\ntrabajad con celo y fe;\nSi sembráis, recogeréis; esperad, esperad."},{"n":282,"t":"Sembraré la simiente preciosa","c":"Si b (Capo 1 - La)                                                               Con resolución\n¥1.           Sembraré la simiente preciosa\ndel glorioso evangelio de amor.\nSembraré, sembraré, mientras viva;\ndejaré el resultado al Señor.\nCoro: Sembraré, (Sembraré,) Sembraré, (Sembraré,)\nMientras viva, simiente de amor.\nSegaré, (Segaré,) Segaré, (Segaré,)\nAl hallarme en la casa de Dios.\nCoro: Sembraré, (Sembraré,) Sembraré, (Sembraré,)\nMientras viva, simiente de amor.\nSegaré, (Segaré,) Segaré, (Segaré,)\nAl hallarme en la casa de Dios.\n¥2.       Sembraré en corazones sensibles\nSembraré, sembraré, mientras viva;\ndejaré el resultado al Señor.\n¥3.     Sembraré en corazones de mármol\nSembraré, sembraré, mientras viva;\ndejaré el resultado al Señor."},{"n":283,"t":"Esdras preparó su corazón","c":"Esdras hab’a preparado su corazón para inquirir... la ley. Esdras 7:10\n1.              Esdras preparó su corazón\npara inquirir la ley de Jehová;\nEsdras preparó su corazón\nPara inquirir las Escrituras.\n// La buena mano de Dios estaba con Esdras; //\nEsdras preparó su corazón\nPara inquirir las Escrituras.\n© 1985 Philip W. Blycker, en Cánticos nuevos de la Biblia. Usado con permiso.\n2.            Esdras preparó su corazón\npara as’ cumplir la ley de Jehová;\nEsdras preparó su corazón\nPara as’ cumplir las Escrituras.\n// La buena mano de Dios estaba con Esdras; //\nEsdras preparó su corazón para\nas’ cumplir las Escrituras.\n3.           Esdras preparó su corazón\npara enseñar la ley de Jehová;\nEsdras preparó su corazón para enseñar las Escrituras.\n// La buena mano de Dios estaba con Esdras; //\nEsdras preparó su corazón para enseñar las Escrituras.\n© 1985 Philip W. Blycker, en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":284,"t":"Oh, Verbo encarnado","c":"Santos hombres de Dios hablaron siendo inspirados por el Esp’ritu Santo. 2 Pedro 1:21\n1.     Oh, Verbo encarnado, oh, celestial Verdad,\nSabidur’a eterna, luz en la oscuridad,\nTe loamos por tu Libro que luz eterna da;\nCual lámpara divina su luz siempre dará.\n2.     Oh Cristo, a tu Iglesia legaste este don,\nQue cual brillante faro provee dirección.\nEs tu Palabra caja de joyas sin igual;\nPintura que retrata tu imagen celestial.\n3.    Delante de tu pueblo cual estandarte va;\nAl mundo envuelto en nieblas\nsus rayos puros da;\nEs brújula, y carta que en tormentosa mar,\npor todos los peligros a Cristo saben guiar.\n4.   Haz que tu Iglesia sea lumbrera, oh Señor,\nQue brilla en las naciones\ncon santo resplandor;\nEnseña al peregrino a guiarse por tu luz,\nSeguro, hasta verte en gloria, oh Jesús."},{"n":285,"t":"REFLEXION:","c":"Te doy gracias, Señor, por tu Palabra, la Santa\nBiblia. Me deleita leerla, porque por medio de ella te\nhas dado a conocer y me has mostrado el camino de\nTu Palabra me es más preciosa que el oro. Es lám-\npara que ilumina mi senda y pan que alimenta mi\nalma; es agua que refresca y purifica mi esp’ritu. Es\nespejo que me muestra cómo soy y espada en mis\nluchas contra Satanás.\ntú eres. Ella es absolutamente confiable, porque eres\nfiel y no puedes mentir. Permanece para siempre,\nporque tú existes eternamente.\nLas Escrituras me instruyen en tu voluntad y me\ncapacitan para servirte. En ellas escucho tu voz y al\nmeditar en su mensaje encuentro consuelo y paz.\nCon el salmista exclamo, \"¡Oh, cuánto amo yo tu\nley!\". Tus enseñanzas son el tema de mi cántico.\nImpulsado por tu Palabra, elevo mi voz con notas de\nloor a ti."},{"n":286,"t":"Oh, Señor, procuro en vano","c":"No hago el bien que quiero, sino el mal que no quiero, eso hago. Romanos 7:19\n1.      Oh, Señor, procuro en vano mi conducta reformar,\nPues ningún poder humano\nsantidad me puede dar.\nEs mi vida de pecado diaria ofensa para ti;\nPero mi alma ha confiado en tu sangre carmes’.\n2.            En tu reino está el contento;\nnada impuro all’ entrará;\nSin el nuevo nacimiento ninguna alma lo verá.\nMira, pues, mi insuficiencia,\nmuestra en m’ tu gran poder;\nManifiesta tu clemencia y de nuevo hazme nacer.\nL.A.\n3.   Ven, Esp’ritu divino; ven y escucha mi oración;\nAnte ti mi frente inclino\npor mi regeneración.\nNo vacilo en la esperanza; he llegado a creer\nQue la bienaventuranza\nen el cielo he de tener.\nL.A."},{"n":287,"t":"Por fe en Jesús, el Salvador","c":"Cree en el Señor Jesucristo, y serás salvo. Hechos 16:31\n1. Por fe en Jesús, el Salvador, se hace salvo el pecador;\nSin merecer tan rico don, recibe plena salvación.\nCoro:          ¡Oh, excelsa gracia del amor,\nque Dios perdona al pecador!\nSi presto está a confesar\nsus culpas y en Jesús confiar;\nNo hay otro autor de salvación,\npues Cristo obró la redención.\n2.   La vida antigua
