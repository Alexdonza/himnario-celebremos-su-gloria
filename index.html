ue en el espacio sideral\nPusiste astros, luna y sol;\nOh, guárdanos de todo mal, Concédenos tu protección.\n¥2.          Oh, Luz que brota de su luz,\nBrillando siempre en sombra y sol,\nCon inefable magnitud,\nDe Dios eterno resplandor;\nRadiante Sol de plenitud, Oh, llénanos de tu amor.\nTrad. estr. # 2-3 \"Oh luz que brota de su luz\". © 1962Ediciones La Aurora. Usado con permiso.\n¥3.           Tu Santo Esp’ritu aqu’\nDirija siempre nuestra acción;\nGozoso el d’a pase as’,\nPor tu constante dirección;\nAl descansar repose en ti,\nSeguro, nuestro corazón.\nTrad. estr. # 2-3 \"Oh luz que brota de su luz\". © 1962Ediciones La Aurora. Usado con permiso.\n3.             ¡Adoradle, oh Iglesia!\nPor Jesús tu Redentor, rescatada por su gracia,\nLibre por su grande amor.\nUltimo coro: Yo te adoro, yo te adoro,\nYo te adoro, buen Jesús. (mi buen Jesús.)\nYo te adoro reverente,\n¡Oh, Cordero santo de mi Dios!\nLETRA y MUSICA: Margaret Jenkins Harris, 1898, trad. H.C. Ball."},{"n":81,"t":"Lo que respira","c":"Todo lo que respira alabe al SE„OR.¡Aleluya! Salmo 150:6 (BLA)\nAlabad a nuestro Dios en su santuario,\npor la hermosura de su cielo,\npor sus proezas alabadle a él.\nAlabadle por la grandeza de su nombre,\ncon el sonido de bocina,\nsalterio y arpa, a la vez cantad.\nAlabadle con el alegre pandero,\ncon el candor de la danza;\ncantad con gozo al Señor.\nAlabadle con cuerdas,\nflautas y c’mbalos\nde júbilo resonantes.\nEn su lenguaje todo lo que respira\nalabe al Señor.\nLo que respira alabe al Señor.\n¡Amén!"},{"n":82,"t":"Te alabaremos, Señor","c":"Cantad alegres a Dios,\nhabitantes de toda la tierra.\nServid a Jehová con alegr’a;\nvenid ante su presencia con regocijo.\nReconoced que Jehová es Dios;\nél nos hizo, y no nosotros\na nosotros mismos; pueblo suyo somos,\ny ovejas de su prado.\nEntrad por sus puertas con acción\nde gracias, por sus atrios con alabanza;\nalabadle, bendecid su nombre.\nSalmo 100:1-4 (RVR)"},{"n":83,"t":"A Dios cantad","c":"Cantad a Dios, cantad al Señor. Salmo 68:32\nCanon a 3 voces\nÀ Al Padre alabad,\n¡ Al Hijo load,\nÂ A Dios cantad;\nAl Santo Esp’ritu adorad, a Dios celebrad.\n(Letra hebrea)      À ¡Shalom javerim!\n¡ ¡Shalom javerim!\nÂ ¡Shalom! ¡Shalom!\n¡Shalom! ¡Shalom!\nLetra © 1986 Word Music. Usado con permiso."},{"n":84,"t":"Entraré por sus puertas","c":"Entrad por sus puertas con acción de gracias. Salmo 100:4\n¥Entraré por sus puertas con cantos de loor,\nPor sus atrios con alabanza;\nY diré,\nÒEste es el d’a que hizo el Señor;\nMe gozaré y alegraré en élÓ.\nYo le alabaré, yo le alabaré,\nMe gozaré y alegraré en él.\nYo le alabaré, yo le alabaré,\nMe gozaré y alegraré en él.\nLeona Von Brethorst, 1976, arreg. F.B.J. © 1976 Maranatha Music. Usado con permiso."},{"n":85,"t":"Dios está aqu’","c":"ÀNo lleno yo, dice el Señor, el cielo y la tierra? Jerem’as 23:24\n¥Dios está aqu’,\ntan cierto como el aire que respiro,\nTan cierto como la mañana se levanta,\nTan cierto como que le canto y\nme puede o’r.\n© 1979 Raúl Galeano. Usado con permiso\n86                                        Yo te exalto\nExaltado seas sobre los cielos, oh Dios, y sobre toda la tierra. Salmo 108:5\n¥Yo te exalto, Dios mi Padre;\nYo te exalto, Dios mi Rey.\nEres sublime sobre la tierra\nY te adoro, oh mi Dios.\n(Otras posibilidades)               Yo te sirvo... Yo te alabo....\nPete Sánchez, Jr., 1977, arreg. F.B.J. © 1977 Pete Sánchez. Usado con permiso."},{"n":87,"t":"Adoremos a Dios","c":"Dios es esp’ritu; y es necesario\nque los que le adoran, le adoren\nen esp’ritu y en verdad.\nY amarás al Señor tu Dios con todo tu corazón,\ncon toda tu alma y con todas tus fuerzas.\n¡Aleluya! Ciertamente es bueno\ncantar salmos a nuestro Dios;\nCiertamente es agradable y bella la alabanza.\nJuan 4:24; Deuteronomio 6:5; Salmo 147:1 (RVA)"},{"n":88,"t":"Venid, nuestras voces unamos","c":"O’ una gran voz de gran multitud en el cielo, que dec’a: ¡Aleluya! Apocalipsis 19:1\n1.   Venid, nuestras voces con gozo unamos\nCantando alabanzas a Cristo el Señor;\nLas huestes del cielo le están glorificando;\nLoémosle también con sincero amor.\n2.   Los ángeles cantan ÒEs digno el CorderoÓ;\nPues él por nosotros murió en la cruz;\nCon su sacrificio pagó nuestro pecado;\nCon gratitud cantemos a Cristo Jesús.\n3.       Venció a la muerte y resucitado\nSubió exaltado a la diestra de Dios;\nEs digno de honra, poder y alabanza;\nSu nombre bendecimos, con alma y voz.\n4.    Un d’a la entera creación, de rodillas,\nReconocerá que Jesús es Señor;\nPor todos los siglos él reinará triunfante;\nLos salvos cantaremos al gran Redentor."},{"n":89,"t":"Vine a alabar a Dios","c":"Cantaré salmos a mi Dios mientras viva. Salmo 146:2\nVine a alabar a Dios,\nVine a alabar a Dios,\nVine a alabar su nombre,\nVine a alabar a Dios.\nEl vino a mi vida un d’a muy especial,\nCambió mi corazón,\nme enseñó un camino mejor,\nY esa es la razón por la que digo que\n// vine a alabar a Dios. //\n© 1975 Paragon, admin. Benson. Usado con permiso."},{"n":90,"t":"Te exaltaré, mi Dios, mi Rey","c":"Generación a generación celebrará tus obras. Salmo 145:4\n1.           Te exaltaré, mi Dios, mi Rey,\nY bendeciré tu nombre\nEternamente y para siempre;\nCada d’a te bendeciré.\nY alabaré tu nombre\neternamente y para siempre;\nGrande es Jehová\ny digno de suprema alabanza;\nY su grandeza es inescrutable;\nCada d’a te bendeciré.\n2.        Generación a generación\nCelebrará tus obras,\nY anunciará tus poderosos hechos;\nCada d’a te bendeciré.\nY alabaré tu nombre\neternamente y para siempre;\nGrande es Jehová\ny digno de suprema alabanza;\nY su grandeza es inescrutable;\nCada d’a te bendeciré."},{"n":91,"t":"Señor, Àquién entrará?","c":"Señor, Àquién habitará en tu tabernáculo? Salmo 15:1\n1.                   Señor, Àquién entrará\nen tu santuario para adorar?\nSeñor, Àquién entrará en tu santuario para adorar?\n// El limpio de manos, de corazón puro,\nQue no es vanidoso, y sabe amar.//\n2.              Señor, yo quiero entrar\nen tu santuario para adorar.\nSeñor, yo quiero entrar en tu santuario para adorar.\n// Mis manos, oh, limpia, mi ser purifica,\n3.                Señor, ya puedo entrar\nen tu santuario para adorar.\nSeñor, ya puedo entrar\nen tu santuario para adorar.\n// Pues tú me has limpiado, me has perdonado,\nTu Esp’ritu Santo me llena de amor. //"},{"n":92,"t":"El cielo canta alegr’a","c":"Alégrense los cielos, y gócese la tierra. 1 Crónicas 16:31\n1.            ¡El cielo canta alegr’a! ¡Aleluya!\nPorque en tu vida y la m’a brilla la gloria de Dios.\n// ¡Aleluya! ¡Aleluya! //\n2.           ¡El cielo canta alegr’a! ¡Aleluya!\nPorque a tu vida y la m’a vino el amor de Jesús.\n// ¡Aleluya! ¡Aleluya! //\n3.          ¡El cielo canta alegr’a! ¡Aleluya!\nPorque tu vida y la m’a proclamarán al Señor.\n// ¡Aleluya! ¡Aleluya! //\nLETRA y MUSICA: Pablo Sosa, 1978, arreg. Alvin Schutmaat.\n© 1978 Pablo D. Sosa. Usado con permiso."},{"n":93,"t":"Aleluya","c":"Y o’... la voz de una gran multitud... que dec’a: ¡Aleluya! Apocalipsis 19:6\n1.               Aleluya, aleluya, aleluya, aleluya,\nAleluya, aleluya, aleluya, aleluya.\n2.                /// Dios mi Padre, yo te amo, ///\nAleluya, aleluya.\n3.                /// Jesucristo, te alabo,///\nAleluya, aleluya.\n4.                /// Santo Esp’ritu, te adoro, ///\nAleluya, aleluya.\n(Otras posibilidades:)\nCristo viene, pronto viene,...\nEres digno, Rey eterno,...\nTe exalto en mi vida,...\nContaré tus maravillas,...\n© 1972 Manna Music. Usado con permiso."},{"n":94,"t":"Por la mañana","c":"Dios m’o eres tú; de madrugada te buscaré. Salmo 63:1\n1.      Por la mañana yo dirijo mi alabanza\nA Dios que ha sido y es mi única esperanza.\nPor la mañana yo le invoco con el alma\nY le suplico que me dé su dulce calma.\nEl nos escucha, pues nos ama tanto,\nY nos alivia de cualquier quebranto.\nNos da su mano poderosa y fuerte,\nPara librarnos de la misma muerte.\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.                           GUA\n2.     Cuando la noche se aproxima, tenebrosa,\nEn elevarle mi oración mi alma goza;\nSiento su paz inagotable, dulce y grata\nPorque temores y ansiedad, Cristo los mata.\nTambién elevo mi cantar al cielo\nCuando a la tierra baja negro velo.\nEl sol se oculta, pero queda Cristo,\nA quien mis ojos en el sueño han visto.\n3.               Brilla su lumbre\nbienhechora mientras duermo;\nPone su mano sobre m’ si estoy enfermo.\nMe fortalece, me alienta con el sueño,\nPues es mi Dios, mi Redentor y él es mi dueño.\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.                 GUA\nY al despertar por la mañana siento\nQue Dios invade mi alma y pensamiento;\nVeo a Jesús, mi Redentor amado,\nPor mi pecado en una cruz clavado.\n4.   Veo la sangre de sus manos que ha brotado;\nVeo la sangre borbotando en un costado;\nUna corona con espinas en su frente,\nPero, ¡qué dicha cuando al cielo sube,\nLleno de gloria en majestuosa nube!\nPero, ¡qué dicha cuando al cielo sube,\nLleno de gloria en majestuosa nube!\nLETRA y MUSICA: Alfredo Colom M., 1954, es arreg.                 GUA"},{"n":95,"t":"Ante su presencia","c":"Venid ante su presencia con regocijo. Salmo 100:2\nCanon a 4 voces\n1.                     À Ante su presencia canta,\n¡ ÒAleluya,\nÂ           Aleluya,\nÃ           AleluyaÓ.\nOtras posibilidades en vez de ÒAleluyaÓ:\n2. ÒCristo es SeñorÓ.\n3. ÒDios es mi ReyÓ.\n4. ÒGloria al SeñorÓ."},{"n":96,"t":"Las primicias del d’a","c":"Oh Señor, de mañana me presentaré delante de ti, y esperaré. Salmo 5:3\n1.              Me despierto con ganas de verlo;\nLas primicias del d’a le doy.\nComenzar con el Rey me anima;\nConfesarle, ÒSeñor, tuyo soyÓ.\nCoro:         Yo te doy este d’a, Señor;\nYo te doy esta vida, Señor.\nDe tu mano yo quiero seguir, Controlado por ti al vivir.\n2.          Un momento contigo es oro;\nConversar con el Rey es mi honor.\nMe impartes tu sabidur’a;\nMe inspira tu carta de amor.\nLETRA y MUSICA: Brus del Monte, 1980, arreg. F.B.J.\nARG"},{"n":97,"t":"Señor, Señor","c":"Señor, Señor, tú antes, tú después,\ntú en la inmensa hondura del vac’o\ny en la hondura interior:\nTú en la aurora que canta\ny en la noche que piensa;\nTú en la flor de los cardos\ny en los cardos sin flor.\nESP\nAmado Nervo, s. 19"},{"n":99,"t":"Quiero Alabarte","c":"Alabad al Señor, invocad su nombre. 1 Crónicas 16:8\n¥1.       // Quiero alabarte más y más aún; //\nBuscar tu voluntad, Tu gracia conocer, quiero alabarte.\n¥2.       // Quiero amarte más y más aún; //\nBuscar tu voluntad, Tu gracia conocer, quiero amarte.\n¥3.       // Quiero servirte más y más aún; //\nBuscar tu voluntad, Tu gracia conocer, quiero servirte.\n(2nda voz) (DISCANTE)\nLas aves del cielo cantan para ti;\nLas bestias del campo reflejan tu poder; quiero cantar,\nQuiero levantar a ti mi canto.\nLETRA y MUSICA: Samuel Scott y Randy Thomas, 1980, es trad.\n© 1980 BudJohn Songs, Inc., admin. C.M.I. Usado con permiso."},{"n":100,"t":"En mi vida gloria te doy","c":"Para que en todo sea Dios glorificado por Jesucristo. 1 Pedro 4:11\n¥1.    En mi vida gloria te doy, gloria te doy,\nEn mi vida gloria te doy, Señor.\n¥2.   En mi canto gloria te doy, gloria te doy,\nEn mi canto gloria te doy, Señor.\n¥3.   En tu iglesia gloria te doy, gloria te doy,\nEn tu iglesia gloria te doy, Señor.\nLETRA y MUSICA: Bob Kilpatrick, 1978, es trad.\n© 1978 Bob Kilpatrick Music. Usado con permiso."},{"n":101,"t":"Bendice, alma m’a","c":"Bendice, alma m’a, a Jehová. Salmo 103:22\n1.            Bendice, alma m’a,\nbendice al Señor,\nBendiga mi ser su santo nombre.\n2.            Bendice, alma m’a,\nbendice al Señor,\nNo olvides jamás sus beneficios."},{"n":102,"t":"Canta, canta alma m’a","c":"Bendice, alma m’a, a Jehová, y bendiga todo mi ser su santo nombre. Salmo 103:1\nSi b (Capo 1 - La)                                                      Con júbilo\n1.                 Canta, canta, alma m’a,\nA tu Rey y tu Señor;\nReconoce sus bondades;\nTe bendice con favor.\nCanta, canta, alma m’a, canta de su gran amor.\n2.                  Canta su misericordia,\nQue a tus padres protegió;\nEn su amor te dio la vida,\nTe cuidó y perdonó.\nCanta, canta, alma m’a, canta al Dios que te salvó.\n3.                Como padre te conoce,\nSabe tu debilidad,\nCon su brazo te conduce,\nTe protege de maldad.\nCanta, canta, alma m’a, canta su fidelidad.\n4.               Angeles y querubines,\nQue su majestad cantáis,\nOh, estrellas, sol y luna,\nQue los cielos domináis,\nTodos juntos, alabemos, adorando a nuestro Dios."},{"n":103,"t":"Cantaré a tu nombre","c":"A Jehová cantaré en mi vida;\na mi Dios cantaré salmos mientras viva.\ncantaré y entonaré salmos; esta es mi gloria.\nTe alabaré, oh Jehová, entre los pueblos;\na ti cantaré salmos entre las naciones.\nPorque más grande que los cielos es tu\nmisericordia, y hasta los cielos tu verdad.\nSalmo 104:33; 108:1, 3-5; 18:1-3a, 46, 49 (RVR)\nExaltado seas sobre los cielos, oh Dios,\ny sobre toda la tierra sea enaltecida tu gloria.\nTe amo, oh Jehová, fortaleza m’a.\nJehová, roca m’a y castillo m’o, y mi libertador;\nDios m’o, fortaleza m’a, en él confiaré;\nSalmo 104:33; 108:1, 3-5; 18:1-3a, 46, 49 (RVR)\nInvocaré a Jehová, quien es digno\nde ser alabado.\nViva Jehová, y bendita sea mi roca,\ny enaltecido sea el Dios de mi salvación;\nPor tanto yo te confesaré entre las\nnaciones, oh Jehová, y cantaré a tu nombre.\nSalmo 104:33; 108:1, 3-5; 18:1-3a, 46, 49 (RVR)"},{"n":104,"t":"Nunca, Dios m’o","c":"Sin cesar damos gracias a Dios. 1 Tesalonicenses 2:13\n1.        Nunca, Dios m’o, cesará mi labio\nDe bendecirte, de cantar tu gloria,\nPorque conservo de tu amor inmenso grata memoria.\n2.     Cuando perdido en mundanal sendero,\nNo me cercaba sino niebla oscura,\nTú me miraste, y alumbróme un rayo de tu luz pura.\n3.       Cuando inclinaba mi abatida frente\nDel mal obrar el oneroso yugo,\nDulce reposo y eficaz alivio\nDarme te plugo."},{"n":105,"t":"Alabad al Rey del cielo","c":"Jehová es Rey eternamente y para siempre. Salmo 10:16\n1.                 Alabad al Rey del cielo,\nA sus pies rendid loor;\nRedimidos, perdonados,\nAlabadle con amor.\nCoro:              Aleluya, aleluya, aleluya,\nAlabadle sin cesar;\nAlabadle sin cesar.\nCoro:      Aleluya, aleluya, aleluya,\nAlabadle sin cesar;\nAlabadle sin cesar.\n2.      Cual pastor Jesús os cuida;\nYa no habrá debilidad;\nCon sus manos os conduce:\nHoy cantad su gran bondad.\n3.         En la altura le adora\nCon los santos alabemos\nAl Señor con voz triunfal."},{"n":106,"t":"Rey de Reyes","c":"Tiene escrito este nombre: REY DE REYES Y SE„OR DE SE„ORES. Apocalipsis 19:16\nCanon a 2 voces\n// À Rey de reyes,\nSeñor de señores,\n¡Gloria, aleluya! //\n// ¡ Cristo,\nPr’ncipe de Paz,\n¡Gloria, aleluya! //\nMelod’a hebrea. Letra © 1980 Maranatha Music. Usado con permiso."},{"n":107,"t":"Al Rey adorad","c":"Jehová Dios m’o, mucho te has engrandecido. Salmo 104:1\n1.            Al Rey adorad, grandioso Señor,\nY con gratitud cantad de su amor.\nAnciano de D’as, el gran Defensor,\nDe gloria vestido, le damos loor.\n2.            Decid de su amor, su gracia cantad;\nVestido de luz y de majestad.\nSu carro de fuego en las nubes mirad;\nSon negras sus huellas en la tempestad.\nPara una tonalidad más alta (Lab) ver #451 (Iglesia de Cristo)\n3.    ÀQuién puede tu providencia contar?\nPues tu aire me das para respirar.\nEn valles y en montes alumbra tu luz,\nY con gran dulzura me cuida Jesús.\n4.     Muy frágiles son los hombres aqu’,\nMas por tu bondad confiamos en ti.\nTu misericordia ¡Cuán firme! ¡Cuán fiel!\nCreador, Salvador y Amigo es él.\nPara una tonalidad más alta (Lab) ver #451 (Iglesia de Cristo)"},{"n":108,"t":"Jubilosos, te adoramos","c":"Aclamad a Dios con voz de júbilo. Salmo 47:1\n1. Jubilosos, te adoramos, Dios de gloria y Salvador;\nNuestras vidas te entregamos\nComo se abre al sol la flor.\nAhuyenta nuestros males y tristezas, oh Jesús;\nDanos bienes celestiales, llénanos de gozo y luz.\n2. Tierra y cielo están gozosos, reflejando tu amor;\nAngeles y estrellas todos cantan siempre tu loor.\nMonte, valle, r’o y fuente, campo, selva y ancho mar\nNos recuerdan que constante te debemos alabar.\nestr. #3 Esteban Sywulka B. MUSICA: Ludwig van Beethoven, 1824,\n3.             Dios, que libre proporcionas\nbienestar y bendición,\nY en tu gracia nos perdonas, gozo da al corazón.\nTú, de todo amor la fuente,\nhaz que amemos en verdad;\nIlumina nuestra mente con divina claridad.\n4.     Oh, mortales, hoy cantemos con el coro celestial;\nComo hermanos habitemos en amor santo y real.\nAlabando siempre vamos en la lucha a conquistar;\nSi confiando en ti andamos nos ayudas a triunfar.\nestr. #3 Esteban Sywulka B. MUSICA: Ludwig van Beethoven, 1824,"},{"n":109,"t":"El nacimiento de Jesucristo","c":"José subió de Galilea,...a Belén, por cuanto era\nde la casa y familia de David;\npara ser empadronado con María su mujer,\ndesposada con él, la cual estaba encinta.\nY aconteció que estando ellos allí,\nse cumplieron los días de su alumbramiento.\nY dio a luz a su hijo primogénito, y lo envolvió\nen pañales, y lo acostó en un pesebre,\nporque no había lugar para ellos en el mesón.\nLucas 2:4-11 (RVR)\nHabía pastores en la misma región, que velaban y\nguardaban las vigilias de la noche sobre su rebaño.\nY he aquí, se les presentó un ángel del Señor,\ny la gloria del Señor los rodeó de resplandor;\ny tuvieron gran temor.\nPero el ángel les dijo: No temáis; porque he aquí\nos doy nuevas de gran gozo, que será para todo\nel pueblo: Que os ha nacido hoy, en la ciudad\nde David, un Salvador, que es CRISTO el Señor.\nLucas 2:4-11 (RVR)"},{"n":110,"t":"Y tú Belén","c":"Pero tú, Belén...de ti me saldrá el que será Señor. Miqueas 5:2\n1.            // Y tú Belén, tierra de Judá, //\nNo eres pequeñita, pues de ti saldrá el Guiador.\nNo eres pequeñita, pues de ti saldrá el Guiador.\n2.            // Promesa fiel el profeta dio, //\nY al tiempo en tus campos el Señor Jesús nació.\nY al tiempo en tus campos el Señor Jesús nació.\n3.          // Dios ha mostrado su gran amor, //\n¡Cantadle cielo y tierra y adorad al Salvador!\n¡Cantadle cielo y tierra y adorad al Salvador!"},{"n":111,"t":"Oh ven, bendito Emanuel","c":"1.          Oh ven, oh ven, bendito Emanuel,\nDe la maldad rescata a Israel,\nQue llora en triste desolación,\nY espera ansioso su liberación.\nCoro: ¡Cantad! ¡Cantad! Pues vuestro Emanuel\nvendrá a ti muy pronto, Israel.\n2.            Oh ven, Sabiduría Celestial,\nY líbranos del mal a cada cual;\nCorrígenos y haznos saber\nQue con tu ayuda hemos de vencer.\nCoro:                    ¡Cantad! ¡Cantad!\nPues vuestro Emanuel\nvendrá a ti muy pronto, Israel.\n3.      Oh ven, oh ven, glorioso Rey de Sion,\nY ten tu trono en cada corazón;\nDisipa toda la oscuridad,\nY enséñanos tu santa voluntad.\n4.               Oh ven, Mesías victorioso, ven\nde nuevo a este mundo a reinar;\nDestruye para siempre el mal,\nY reina aquí en gloria celestial."},{"n":112,"t":"Emanuel","c":"Y llamarás su nombre Emanuel. Mateo 1:23\n1.        Dios nos amó, a su Hijo dio,\nY lo nombró nuestro Emanuel.\nDios con nosotros, nuestro Emanuel.\n2.        Dios descendió y se encarnó;\nJesús nació, nuestro Emanuel.\nVino a salvarnos, vino a redimirnos;\nDios con nosotros, nuestro Emanuel.\nLETRA y MUSICA: Bob McGee, 1976,\ntrad. Comité de Celebremos. © 1976 C.A. Music. Usado con permiso."},{"n":113,"t":"Despunta el alba","c":"1.    Despunta el alba del nuevo día;\ncantan las aves a su Creador.\nDan alabanza con alegría\na Jesucristo, nuestro Señor.\n2.     Ya nuestro Salvador ha venido;\na este mundo trajo la luz.\nEs nuestro Redentor prometido.\n¡Gloria al Mesías, Cristo Jesús!\nSonia Andrea Linares M., 1991\nEsta letra se puede cantar con la musica de # 123 (Ved al niño)."},{"n":114,"t":"Suenen dulces himnos","c":"Los montes y los collados levantarán canción. Isaías 55:12\n1.      ¡Suenen dulces himnos gratos al Señor,\nY óiganse en concierto universal!\nDesde el alto cielo baja el Salvador\nPara beneficio del mortal.\nCoro:     ¡Gloria! ¡Gloria sea a nuestro Dios!\n¡Gloria! Sí, cantemos a una voz,\nY el cantar de gloria que se oyó en Belén,\nSea nuestro cántico también.\nCoro:     ¡Gloria! ¡Gloria sea a nuestro Dios!\n¡Gloria! Sí, cantemos a una voz,\nY el cantar de gloria que se oyó en Belén,\nSea nuestro cántico también.\n2.         Salte, de alegría lleno el corazón,\nDios se compadece viendo su aflicción,\nY le muestra buena voluntad.\n3.      Sientan nuestras almas noble gratitud\nHacia el que nos brinda redención;\nY a Jesús el Cristo, que nos da salud,\nTributemos nuestra adoración."},{"n":115,"t":"Venid Pastores","c":"Vinieron, pues, apresuradamente, y hallaron... al niño...en el pesebre. Lucas 2:1\n1.                 Venid pastores, venid, oh\nvenid a Belén, oh venid al portal;\nYo no me voy de Belén sin al\nNiño Jesús un momento adorar.\nCoro:    *Y la estrella de Belén os guiará con su luz,\nHasta el humilde portal donde nació Jesús.\n*(opt.) Con la estrella marchad;\n2.             Venid pastores, venid, con gran gozo,\ndejando en el campo la grey;\nOíd a los ángeles quienes\nanuncian que hoy ha nacido el Rey.\nP.R."},{"n":116,"t":"Oh, pueblecito de Belén","c":"1. ¡Oh, pueblecito de Belén, durmiendo en dulce paz!\nLos astros brillan sobre ti con suave claridad;\nMas en tus quietas calles hoy surge eterna luz,\nY la promesa de Emanuel se cumple en Jesús.\n2.    Al niño que ha nacido hoy el coro celestial\nEntona con sonora voz un cántico triunfal.\n¡El santo nacimiento, estrellas, proclamad;\nA Dios el Rey cantad loor; honor y gloria dad!\nadpt. S. A. Linares M., 1986. MUSICA: Lewis H. Redner, 1868.\n3.   Con celestial serenidad, desciende nuestro don;\nAsí concede Dios su amor a cada corazón;\nNo se oye su venida, mas el Señor vendrá\nAl que le quiera recibir; con él habitará.\n4.   El Santo Niño de Belén es nuestro Salvador,\nQuien por su sangre perdonó el mal con tanto amor;\nUnimos nuestras voces al coro angelical\nY proclamamos por doquier su gloria celestial.\nadpt. S. A. Linares M., 1986. MUSICA: Lewis H. Redner, 1868."},{"n":117,"t":"Porque un niño","c":"Porque un niño nos es nacido, hijo nos es dado. Isaías 9:6\nPorque un niño nos es nacido,\nPorque un niño nos es nacido;\nPorque un hijo ya nos es dado,\nY el principado sobre su hombro;\nY se llamará su nombre Admirable,\nConsejero, Dios fuerte;\nY se llamará su nombre\nPadre eterno,\nEl Príncipe de paz.\n© 1977 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":118,"t":"Al mundo paz","c":"Cantad alegres a Jehová, toda la tierra. Salmo 98:4\n1.                ¡Al mundo paz, nació Jesús!\nNació ya nuestro Rey; el corazón ya tiene luz,\n// Y paz su santa grey, // y paz, y paz su santa grey.\n2.                 ¡Al mundo paz, el Salvador\nEn tierra reinará! ya es feliz el pecador,\n// Jesús perdón le da, // Jesús, Jesús perdón le da.\n3. Al mundo él gobernará con gracia y con poder;\nA las naciones mostrará\n// Su amor y su poder, // Su amor, su amor y su poder."},{"n":119,"t":"Gloria a Dios en las alturas","c":"1.       ¡Gloria a Dios en las alturas! Que mostró\nsu gran amor, dándoles a sus criaturas\nun potente Salvador. Con los himnos de los santos\nHagan coro nuestros cantos de alabanza y gratitud,\nPor la divinal salud, y digamos a una voz:\n¡En los cielos gloria a Dios!\n2.           ¡Gloria a Dios! la tierra cante al gozar\nde su bondad, pues le brinda paz constante\nEn su buena voluntad. Toda tribu y lenguas todas\nAl excelso eleven odas, por Jesús, Rey Emanuel,\nQue les vino de Israel, y prorrumpan a una voz:\n¡En los cielos gloria a Dios!\nESP\n3.             ¡Gloria a Dios! la Iglesia entona,\nrota al ver su esclavitud\npor Jesús, que es su corona,\nSu cabeza y plenitud. Vigilante siempre vive\ny a la lucha se apercibe, mientras llega su solaz\nEn la gloria y plena paz, donde exclame a una voz:\n¡En los cielos gloria a Dios!\nESP"},{"n":120,"t":"Oh santísimo, felicísimo","c":"Nos gloriamos en Dios por el Señor nuestro Jesucristo. Romanos 5:11\n1. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!\nAl mundo perdido Cristo le ha nacido;\n¡Alegría, alegría, cristiandad!\n2. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!\nCoros celestiales oyen los mortales;\n¡Alegría, alegría, cristiandad!\n3. ¡Oh santísimo, felicísimo, grato tiempo de Navidad!\nPríncipe del cielo, danos tu consuelo;\n¡Alegría, alegría, cristiandad!"},{"n":121,"t":"Venid, Pastorcillos","c":"Vieron al niño con su madre...y postrándose, lo adoraron. Mateo 2:11\n1.                Venid, pastorcillos,\nvenid a adorar\nAl Rey de los cielos que nace en Judá.\nSin ricas ofrendas podemos llegar,\nQue el Niño prefiere la fe y la bondad.\n2.           Un rústico techo abrigo le da;\nPor cuna un pesebre, por templo un portal;\nEn lecho de pajas incógnito está\nQuien quiso a los astros su gloria prestar.\nESP\n3.               Hermoso lucero\nle vino a anunciar,\nY magos de oriente buscándole van;\nDelante se postran del Rey de Judá,\nDe incienso, oro y mirra tributo le dan.\nESP"},{"n":122,"t":"Angeles, alzad el canto","c":"Las huestes celestiales... alababan a Dios. Lucas 2:13\n1.                Angeles, alzad el canto,\nProclamad al mundo entero\nnuevas de consuelo y paz.\nCoro:                   Adoremos, adoremos\nal recién nacido Rey.\n2.                  Oh, pastores que oísteis\nel gran coro celestial,\nEl mensaje tan sublime\npor doquiera anunciad.\nCoro:            Adoremos, adoremos\nal recién nacido Rey.\n3.      Sabios, contemplad con gozo\nde la estrella el fulgor,\nEse astro portentoso\nque os guía al Salvador.\n4.             Fieles, todos adoradle\ncon humilde gratitud;\nTodo honor y homenaje\ntributad al Rey Jesús."},{"n":123,"t":"Ved al niñito","c":"Hallaréis al niño... acostado en un pesebre. Lucas 2:12\n1.              Ved al niñito en un pesebre,\nEs Jesucristo, Hijo de Dios;\nTodo el mundo canta alegre,\nPues él nos trae la salvación.\n2.           Desde los cielos a este mundo\nVino a nacer en pobre mesón;\nAngeles cantan sus alabanzas;\nReyes le rinden adoración.\n3.           Ya se cumplieron las profecías,\nPues ha nacido el Redentor;\nDémosle gloria y alabanza,\nPorque merece todo honor.\nPablo Sywulka B. MUSICA: Melodía galesa, s. 19, arreg. F.B.J."},{"n":124,"t":"Al rústico pesebre","c":"Jesucristo... por amor a vosotros se hizo pobre. 2 Corintios 8:9\n1.       Al rústico pesebre del niñito Jesús\nLas estrellas del cielo le destellan su luz;\nFue pobre el establo donde Cristo nació,\nY humilde la cuna en que él descansó.\n2.     El niño del pesebre es Jesús mi Señor,\nAdorarle yo quiero con sincero amor;\nY allí Jesucristo bienvenida tendrá."},{"n":125,"t":"Cristianos, hoy cantad a Dios","c":"Os doy nuevas de gran gozo. Lucas 2:10\n1.         Cristianos, hoy cantad a Dios\ncon alma, corazón y voz; Grata nueva proclamad:\n¡Cantad! Jesucristo vino ya.\nVed al Niño sin temor, él es del mundo el Redentor;\nCristo ya nació, Cristo ya nació.\n2.              Cristianos, hoy cantad a Dios\ncon alma, corazón y voz; A la muerte no temáis;\n¡Cantad! Jesucristo nos da paz.\nEl ofrece salvación a los que buscan su perdón;\nCristo nos salvó, Cristo nos salvó.\n3.           Cristianos, hoy cantad a Dios\ncon alma, corazón y voz; Las tinieblas conquistó;\n¡Cantad! Jesucristo luz nos dio.\nHomenaje tributad y gloria al Cordero dad;\nCristo reinará, Cristo reinará."},{"n":126,"t":"Oíd un son en alta esfera","c":"¡Gloria a Dios en las alturas, y en la tierra paz! Lucas 2:14\n1.               Oíd un son en alta esfera:\n“¡En los cielos gloria a Dios!\n¡Y al mortal paz en la tierra!” canta la celeste voz.\nCon los cielos alabemos al eterno Rey; cantemos\nA Jesús que es nuestro bien, con el coro de Belén;\nCanta la celeste voz: “¡En los cielos gloria a Dios!”\n2.     El Señor de los señores, el Ungido celestial,\nPor salvar a pecadores toma forma corporal.\n¡Gloria al Verbo encarnado, en humanidad velado!\n¡Gloria a nuestro Redentor, a Jesús, Rey y Señor!\nCanta la celeste voz: “¡En los cielos gloria a Dios!”\nFederico Fliedner. MUSICA: Felix Mendelssohn, 1840, arreg. William H. Cummings, 1856.\n3.    Príncipe de paz eterna, gloria a ti, Señor Jesús;\nCon tu vida y con tu muerte nos ofreces vida y luz.\nHas tu majestad dejado,\na buscarnos te has dignado;\nPara darnos el vivir, en la cruz fuiste a morir.\nCanta la celeste voz: “¡En los cielos gloria a Dios!”\nFederico Fliedner. MUSICA: Felix Mendelssohn, 1840, arreg. William H. Cummings, 1856."},{"n":127,"t":"En la noche los pastores","c":"Había pastores... que velaban... su rebaño. Lucas 2:8\n1.      En la noche los pastores a sus ovejitas velan;\nAngeles del cielo alaban,\nángeles del cielo cantan:\nPastorcitos, id, pastorcitos, ya\nCoro:        Adorad al Niño, adorad al Niño,\nQue en Belén está, que en Belén está.\nAdorad al Niño, adorad al Niño,\nQue en Belén está, que en Belén está.\nCoro:      Adorad al Niño, adorad al Niño,\nQue en Belén está, que en Belén está.\nAdorad al Niño, adorad al Niño,\nQue en Belén está, que en Belén está.\n2.             Del oriente, Reyes Magos\nsiguen la brillante estrella;\nQuieren ofrecer regalos, traen ricos aguinaldos,\nMagos, oh venid, magos, oh llegad;\n3.               Con alegre reverencia\nen la bella Nochebuena,\nLos cristianos hoy alaban, los cristianos todos cantan:\nPueblos, oh venid, pueblos, oh llegad;"},{"n":128,"t":"Jesús es el Mesías","c":"Dieron a conocer lo que se les había dicho acerca del niño. Lucas 2:17\n1.           ¿Qué niño es el que tierno\nduerme en brazos de María?\nEl ángel a pastores da\nlas nuevas de alegría.\nCoro:           Es Cristo el Señor a quien\nlos cielos dan loor;\n¡Nació el Salvador!\nJesús es el Mesías.\nCoro:           Es Cristo el Señor a quien\nlos cielos dan loor;\n¡Nació el Salvador!\nJesús es el Mesías.\n2.          Con buey y asno en rudo\nestablo duerme el Rey divino;\nDios encarnado ha bajado;\na salvarnos vino.\n3.       Le traen oro, incienso y mirra\nmagos del oriente;\nMas quiere el don de un corazón\nhumilde y penitente."},{"n":129,"t":"Allá en el pesebre","c":"Dio a luz a su hijo primogénito... y lo acostó en un pesebre. Lucas 2:7\n1.       Allá en el pesebre, do nace Jesús,\nEstrellas lejanas del cielo al mirar\nSe inclinan gozosas su lumbre a prestar.\n2.       Pastores del campo, teniendo temor,\nCercados de luz y de gran resplandor,\nAcuden aprisa buscando a Jesús,\nNacido en pesebre, del mundo la luz.\n3.     Oh Cristo, pedimos hoy tu bendición,\nRogamos que atiendas a nuestra oración;\nA todos, oh Cristo, nos muestras amor,\nNosotros te amamos también, Salvador."},{"n":130,"t":"Angeles cantando están","c":"Con el ángel una multitud de las huestes celestiales. Lucas 2:13\n1.     Angeles cantando están tan dulcísima canción;\nLas montañas su eco dan como fiel contestación.\nCoro:            Gloria, en lo alto gloria,\nGloria, en lo alto gloria a Dios.\n(Gloria in excelsis Deo, Gloria in excelsis Deo.)\n2.    Los pastores sin cesar sus loores dan a Dios;\nCuán glorioso es el cantar de su melodiosa voz.\n3. Oh, venid pronto a Belén para contemplar con fe\nA Jesús, autor del bien, al recién nacido Rey."},{"n":131,"t":"Santa la noche","c":"El Santo Ser que nacerá, será llamado Hijo de Dios. Lucas 1:35\n1.       Santa la noche, hermosas las estrellas,\nEl mundo envuelto estuvo en sus querellas\nHasta que Dios nos mandó al Salvador.\nUna esperanza todo el mundo siente,\nCon gratitud postrados adoradle;\nOíd de lo alto la voz angelical;\n¡Oíd, cantad! Nació el Salvador."},{"n":132,"t":"Oh niños, venid","c":"El Padre ha enviado al Hijo, el Salvador del mundo. 1 Juan 4:14\n1.      Oh, niños de todos los pueblos venid;\nLos cantos de ángeles miles oíd.\nEn un pueblecito, llamado Belén,\nEl Hijo de Dios ha nacido recién.\n2.         Mirad sobre el heno al niño Jesús;\nLe adoran pastores que han visto gran luz;\nBrillando en el cielo con gran claridad,\nSeñal fue que Dios ama al mundo en verdad.\n3.   Los magos de oriente le ofrecen loor;\nProclaman los ángeles gloria al Señor.\nJosé y María le adoran también;\nOh niños, cantad a Jesús de Belén.\n4.   Oh, niños de todos los pueblos venid;\nCon huestes celestes la nueva esparcid.\nFelices, unid vuestras voces de amor;\nAlegre anunciad que nació el Salvador."},{"n":133,"t":"Noche de paz","c":"Pastores...guardaban las vigilias de la noche. Lucas 2:8\nSi b (Capo 1 - La)                                                               Con ternura\n1.     ¡Noche de paz, noche de amor!\nTodo duerme en derredor.\nEntre los astros que esparcen su luz,\nBella anunciando al niñito Jesús,\nBrilla la estrella de paz,\nBrilla la estrella de paz.\n2.     ¡Noche de paz, noche de amor!\nOye humilde el fiel pastor\nCoros celestes que anuncian salud,\nGracias y glorias en gran plenitud,\nPor nuestro buen Redentor,\nPor nuestro buen Redentor.\n3.   ¡Noche de paz, noche de amor!\nVed qué bello resplandor\nLuce en el rostro del niño Jesús,\nEn el pesebre, del mundo la luz,\nAstro de eterno fulgor,\nAstro de eterno fulgor."},{"n":134,"t":"Navidad Latina","c":"Y dará a luz un hijo, y llamarás su nombre JESUS. Mateo 1:21\n1.               Nuestra patria canta alegre\nen el tiempo de la Navidad;\nPues ya sabe que en pesebre Jesús trajo la libertad.\nCoro:              Hoy gozosos celebremos\nElevemos nuestro canto al Niñito de Belén.\nA tocar nuestros instrumentos,\nCelebremos la fiesta de amor;\nQué gloriosos son estos momentos:\n¡Cristo Jesús nació!\n«Repetir estrofa»\nGUA\nLETRA y MUSICA: Oscar López M., 1968. © 1991 Oscar López M. Usado con permiso.\nCoro:              Hoy gozosos celebremos\nElevemos nuestro canto al Niñito de Belén.\nA tocar nuestros instrumentos,\nCelebremos la fiesta de amor;\nQué gloriosos son estos momentos:\n¡Cristo Jesús nació!\n«Repetir estrofa»\n2.                      Hay colores y aromas\nque anuncian la gran Navidad;\nEn los valles y las lomas\nJesús nos da felicidad.\nGUA\nLETRA y MUSICA: Oscar López M., 1968. © 1991 Oscar López M. Usado con permiso."},{"n":135,"t":"En Belén nació Jesús","c":"Jesús nació en Belén de Judea. Mateo 2:1\n1.      En Belén nació Jesús, Aleluya;\nA los hombres trajo luz, Aleluya.\nCoro:   En lo alto gloria a Dios, Aleluya;\nEn lo alto gloria a Dios, Aleluya.\n2.       Por nosotros él murió, Aleluya;\nCon poder resucitó, Aleluya.\n3.      Cristo salva al pecador, Aleluya;\nSi confía en su amor, Aleluya.\n4.         A vivir con él iré, Aleluya;\nEn su amor me gozaré, Aleluya.\nMelodía afro-americana, publ. en Conference Hymns, 1835, arreg. F.B.J. Letra © 1978"},{"n":136,"t":"Hoy es Navidad","c":"Os ha nacido hoy... un Salvador, que es Cristo el Señor. Lucas 2:11\n1.    Campanas por doquier resuenan sin cesar;\nProclaman con placer que hoy es Navidad.\nLos niños con canción la grata nueva dan\nDe este día de amor y buena voluntad.\nCoro:   // ¡Navidad! ¡Navidad! ¡Hoy es Navidad!\nEs un día de alegría y felicidad. //\n2.      El Niño de Belén nos trae la salvación;\nCon júbilo sin par se entona la canción.\nYo te amo, mi Jesús; tus glorias cantaré;\nEn este día tan feliz me regocijaré.\nestr. #2 Roberto C. Savage, 1966. MUSICA: James Pierpont, 1857, arreg. F.B.J."},{"n":137,"t":"De tierra lejana venimos","c":"Vinieron del Oriente... unos magos. Mateo 2:1\n1.         De tierra lejana venimos a verle;\nNos sirve de guía la estrella de Oriente.\nCoro:             Oh brillante estrella\nque anuncias la aurora,\nNo nos falte nunca tu luz bienhechora.\n¡Gloria en las alturas al Hijo de Dios!\n¡Gloria en las alturas y en la tierra paz!\n2.      Al recién nacido, quien es Rey de reyes,\nOro le regalo para ornar sus sienes.\nP.R.\nCoro:              Oh brillante estrella\nque anuncias la aurora,\nNo nos falte nunca tu luz bienhechora.\n¡Gloria en las alturas al Hijo de Dios!\n¡Gloria en las alturas y en la tierra paz!\n3.      Como es Dios el Niño, le regalo incienso\nCon aroma dulce que sube hasta el cielo.\n4.       Al Niño del cielo que bajó a la tierra\nLe regalo mirra que inspira tristeza.\nP.R."},{"n":138,"t":"Tras hermoso lucero","c":"Su estrella hemos visto en el oriente , y venimos a adorarle. Mateo 2:2\nSi b (Capo 1 - La                                                          Con sentimiento\n1.    Tras hermoso lucero, los magos viajaban\npensando a palacio llegar.\nY llevaban regalos preciosos al\nRey que deseaban venir a adorar.\nAl llegar a Belén ¡ved qué bella!\nAl llegar a Belén ¡ved la estrella!\nCon su luz alumbraba un establo y allí,\nEn el heno dormía el gran Rey.\n2.     En el campo pastores cuidaban ovejas\ny vieron un gran resplandor.\nLuego el ángel del cielo les dijo:\n“Os doy nuevas que hoy nació el Salvador”.\nMuchos ángeles bellos cantaron\nAl Señor, al Eterno alabaron.\nLos pastores buscaron al Niño y allí,\nEn el heno dormía el gran Rey.\n3.       Ofrecieron los magos al Niño Jesús\nricos dones con gran devoción.\nLos pastores humildes le dieron\ncariño de tierno y de fiel corazón.\nYo también, oh Jesús, hoy me acerco;\nYo también, oh Jesús, hoy te adoro,\nY te ofrezco mi vida, regalo de amor;\n¡Haz en ella tu trono, mi Rey!"},{"n":139,"t":"Tú dejaste tu trono","c":"No había lugar... en el mesón. Lucas 2:7\n1.     Tú dejaste tu trono y corona por mí,\nAl venir a Belén a nacer;\nMas a ti no fue dado el entrar al mesón,\nY en pesebre te hicieron nacer.\n2.     Alabanzas celestes los ángeles dan\nEn que rinden al Verbo loor;\nMas humilde viniste a la tierra, Señor,\nA dar vida al más vil pecador.\n3.   Siempre pueden las zorras sus cuevas tener,\nY las aves sus nidos también;\nMas el Hijo del Hombre no tuvo un lugar\nEn el cual reclinara su sien.\n4.   Tú viniste, Señor, con tu gran bendición\nPara dar libertad y salud;\nMas con odio y desprecio te hicieron morir,\nAunque vieron tu amor y virtud.\n5.      Alabanzas sublimes los cielos darán,\nCuando vengas glorioso de allí,\nY tu voz en las nubes dirá: “Ven a mí,\nQue hay lugar junto a mí para ti”."},{"n":140,"t":"Venid, fieles todos","c":"Pasemos, pues, hasta Belén. Lucas 2:15\n1.        Venid, fieles todos, a Belén marchemos:\nDe gozo triunfantes, henchidos de amor;\nY al Rey de los cielos humilde le veremos:\nCoro:       Venid, adoremos, venid, adoremos.\nVenid, adoremos a Cristo el Señor.\n2.       El que es Hijo eterno del eterno Padre,\nY Dios verdadero que al mundo creó,\nDe seno virgíneo nació de una madre:\nCoro:     Venid, adoremos, venid, adoremos.\nVenid, adoremos a Cristo el Señor.\n3.         En pobre pesebre yace reclinado,\nAl hombre ofreciendo eternal salvación,\nEl santo Mesías, el Verbo humanado:\n4.        Cantad jubilosas, célicas criaturas;\nResuenen los cielos con vuestra canción:\n¡Al Dios bondadoso dad gloria en las alturas!\n5.       Jesús, celebremos tu bendito nombre\nCon himnos solemnes de grato loor;\nPor siglos eternos adórete el hombre:"},{"n":141,"t":"Oveja Perdida","c":"Oveja perdida, ven\nsobre mis hombros; que hoy,\nno sólo tu pastor soy,\nsino tu pasto también.\nPor descubrirte mejor\ncuando balabas perdida,\ndejé en un árbol la vida,\ndonde me subió tu amor;\nsi prenda quieres mayor,\nmis obras hoy te la den.\nESP\nLuis de Góngora y Argote, s. 16\nPasto al fin tuyo hecho,\nÀCuál dará mayor asombro,\nel traerte yo en el hombro,\no traerme tú en el pecho?\nPrendas son de amor estrecho,\nque aún los más ciegos las ven.\nOveja perdida, ven\nsobre mis hombros; que hoy,\nno sólo tu pastor soy,\nsino tu pasto también.\nESP\nLuis de Góngora y Argote, s. 16"},{"n":142,"t":"Maravilloso Es","c":"Dios...le exaltó...y le dio un nombre que es sobre todo nombre. Filipenses 2:9\nMaravilloso es,\nmaravilloso es,\nMaravilloso es Cristo el Señor.\nRey soberano es,\nAutor de todo bien;\nMaravilloso es Cristo el Señor.\nEl buen Pastor es,\nel Rey de los siglos,\nOmnipotente Dios.\nGloria le damos, y le adoramos;\nMaravilloso es Cristo el Señor.\nLETRA y MUSICA: Audrey Mieir, 1959, es trad. © 1959 Manna Music. Usado con permiso."},{"n":143,"t":"Jesús el buen Pastor","c":"El buen Pastor su vida da por las ovejas. Juan 10:11\n1.    Jesús, el buen Pastor, mostrando su tierno amor,\ndel vil abismo me sacó; Su mano me extendió,\ndel lodo me levantó, mis pasos él enderezó.\nCoro:                  Querido Salvador,\nCanto hoy de tu inmenso amor;\nArde mi corazón de gratitud.\nSolo, no puedo andar, a tu lado yo quiero estar;\nLlévame, oh Salvador, a la celestial mansión.\nCoro:                  Querido Salvador,\nCanto hoy de tu inmenso amor;\nArde mi corazón de gratitud.\nSolo, no puedo andar, a tu lado yo quiero estar;\nLlévame, oh Salvador, a la celestial mansión.\n2.     Andando con Jesús, por sendas de gozo y luz,\nel mundo pierde su atracción; Ya pertenezco a él,\ny anhelo servirle fiel; el mundo es vana ilusión.\n3.        Con Cristo moraré y siempre le cantaré\npor toda la eternidad; De reyes es el Rey,\ntributo le brindaré, pues tiene toda potestad."},{"n":144,"t":"Cordero de gloria","c":"He aqu’ el Cordero de Dios, que quita el pecado del mundo. Juan 1:29\n1.                 Cristo tanto me amó\nque en la cruz por m’ murió;\nPor su sangre me limpió\nde mi pecado y transgresión.\nCoro: Al Cordero gloria, oh, qué excelsa historia;\nEl nos salva por su amor, ¡Dad al Cordero gloria!\n2.                  Dios al mundo descendió;\nPena y muerte él sufrió,\nmas con poder resucitó.\ntrad. Esteban Sywulka B. MUSICA: Greg Nelson y\nPhil McHugh, 1982, arreg. F.B.J. © 1982 y 1989 River Oaks/Tree,\nadmin. Meadowgreen y Shepherd's Fold Music, admin. Gaither. Usado con permiso."},{"n":145,"t":"Gloria por siempre","c":"[Para que] toda lengua confiese que Jesucristo es el Señor. Filipenses 2:11\n¥Gloria por siempre al Cordero de Dios,\nA Jesús el Señor, al León de Judá,\ny el Libro abrirá. Amén.\nLos cielos, la tierra y el mar,\ny todo lo que en ellos hay,\nLe adorarán y proclamarán:\nÒJesucristo es el SeñorÓ.\nLETRA y MUSICA: Andrés Torres, c. 1969, arreg. F.B.J."},{"n":146,"t":"El es Señor","c":"Y era magnificado el nombre del Señor Jesús. Hechos 19:17\n¥ El es Señor, (Jesucristo es Señor,)\nél es Señor; (Jesucristo es Señor,)\nResucitado de entre los muertos,\nél es Señor. (Jesucristo es Señor.)\nToda rodilla se doblará,\ntoda lengua confesará:\nJesucristo es el Señor,\nJesucristo es el Señor."},{"n":147,"t":"Gloria a tu nombre","c":"Grande eres tú, y grande tu nombre en poder’o. Jerem’as 10:6\n1.        Yo sé que Cristo salvó mi alma,\nyo sé que Cristo me redimió.\nMe dio la vida, me dio la calma,\ny del infierno me rescató.\nCoro:   ¡Gloria a tu nombre, Cristo bendito!\n¡Gloria a tu nombre, mi buen Jesús!\nCon mis dolores fuiste cargado\ncuando moriste por m’ en la cruz.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage, alt.\nCoro:   ¡Gloria a tu nombre, Cristo bendito!\n¡Gloria a tu nombre, mi buen Jesús!\nCon mis dolores fuiste cargado\ncuando moriste por m’ en la cruz.\n2.      Y cuando al cielo llegue algún d’a,\ncon tus amados te alabaré.\nPorque salvaste el alma m’a,\nsé que en la gloria te cantaré.\n3.        Me diste vida por mis dolores,\nme diste gozo por mi pesar.\nCambiaste en gloria mis sinsabores;\npor eso ahora puedo cantar.\nLETRA y MUSICA: Alfredo Colom M., 1954, arreg. Roberto C. Savage, alt."},{"n":148,"t":"Algunos nombres de Cristo","c":"Dios Todopoderoso Gn. 17:1 Hijo de Dios        Jn. 1:34\nRedentor          Job 19:25 Mes’as             Jn. 1:41\nAdmirable Consejero Is. 9:6 Rab’               Jn. 3:2\nPr’ncipe de Paz       Is. 9:6 Hijo Unigénito   Jn. 3:16\nDios Fuerte           Is. 9:6 Pan de Vida      Jn. 6:35\nVarón de Dolores    Is. 53:3 La Luz del Mundo Jn. 8:12\nSanto de Israel     Is. 60:9 Yo Soy            Jn. 8:58\nJesús              Mt. 1:21      y la Vida    Jn. 11:25\nEmanuel            Mt. 1:23 Maestro           Jn. 13:13\nHijo del Hombre Mt. 13:37 El Camino            Jn. 14:6\nCordero de Dios     Jn. 1:29 La Verdad         Jn. 14:6\nSeñor de todos Hch. 10:36 Verbo de Vida          1 Jn. 1:1\nCristo             Hch. 17:3 Abogado             1 Jn. 2:1\nRoca              1 Co. 10:4 El Salvador        Jud. v. 25\nde la Iglesia   Ef. 1:22 León de Judá         Ap. 5:5\nPrincipal Piedra              Rey de reyes      Ap. 19:16\ndel ángulo      Ef. 2:20 Señor de señores        19:16\nJuez Justo          2 Ti. 4:8 La Estrella\nAutor y Consumador               de la Mañana        22:16\nde la Fe       Heb. 12:2"},{"n":149,"t":"En el nombre de Jesús","c":"Para que en el nombre de Jesús se doble toda rodilla. Filipenses 2:10\nEn el nombre de Jesús se doble,\ndoble toda rodilla\nDe los que están en los cielos,\ny en la tierra,\ny debajo de la tierra;\nY toda lengua confiese que\nJesucristo es el Señor,\npara gloria del Padre.\nY tú, amigo, confiesa que\nJesucristo es el Señor,\n// para gloria del Padre. //\n© 1972 Philip W. Blycker en Cánticos nuevos de la Biblia. Usado con permiso."},{"n":150,"t":"Cristo es la peña de Horeb","c":"Beb’an de la roca espiritual que los segu’a, y la roca era Cristo. 1 Corintios 10:4\n1.             Cristo es la peña de Horeb\nque está brotando\nAgua de vida saludable para ti.\nCristo es la peña de Horeb\nque está brotando\nAgua de vida saludable para ti.\nVen a tomarla que es más dulce que la miel;\nRefresca el alma, refresca todo tu ser.\nCristo es la peña de Horeb\nque está brotando\nAgua de vida saludable para ti.\n2.   Cristo es el lirio del valle de las flores;\nEl es la rosa blanca y pura de Sarón.\nCristo es la vida y amor de los amores;\nEl es la eterna fuente de la salvación.\nVen a buscarla en tu triste condición;\nRefresca el alma, refresca todo tu ser.\nCristo es el lirio del valle de las flores;\nEl es la rosa blanca y pura de Sarón."},{"n":151,"t":"Cristo, nombre glorioso","c":"¡Cuán glorioso es tu nombre! Salmo 8:1\n1.       Cristo, nombre glorioso,\nSalvador bello, precioso Señor;\n(glorioso)\nEmanuel, Dios con nosotros;\nPan de la vida, Cordero de Dios.\n2.         Cristo, nombre glorioso,\nAlfa y Omega, eterno Yo Soy;\n(glorioso)\nCreador omnipotente,\nRey de los siglos, el gran Vencedor.\nestr. #2 Comité de Celebremos, 1990. MUSICA: Naida Hearn, 1974.\n© 1974, arreg. 1978 Scripture in Song, admin. IntegrityÕs Hosanna. Usado con permiso."},{"n":152,"t":"Jesús es la Roca","c":"El es la Roca, cuya obra es perfecta. Deuteronomio 32:4\n1.        Jesús es la roca de mi salvación;\nEl es quien me libra de condenación.\nJesús es mi fuerte, mi gran protector;\n// Yo sé que soy hijo de todo su amor. //\n2.       Jesús me defiende de negra traición;\nEl lava las manchas de mi corazón.\nJesús me rescata del mundo falaz;\n// Me lleva a su seno, su seno de paz. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. John W. Peterson y\n3.   Por eso en mis horas de negro dolor,\nYo busco el consuelo de mi Redentor.\nVenid, si por Cristo ser salvos queréis,\n// Al lado de Cristo lugar hallaréis. //\n4.       Su paz os ofrece, su paz él os da;\nAquel que le busca, ser salvo podrá.\nYo fui mucho tiempo esclavo del mal,\n// Mas hoy Jesucristo me dio libertad. //\n5.     Jesús es la fuente de la redención;\nEl sana las llagas de mi corazón.\nEl sana al leproso, al ciego da luz;\n// Por eso conf’o tan sólo en Jesús. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. John W. Peterson y"},{"n":153,"t":"Oh Cristo, nuestra Roca aqu’","c":"Será... como sombra de gran peñasco en tierra calurosa. Isa’as 32:2\n1.       ¡Oh Cristo! nuestra Roca aqu’\ny abrigo de la tempestad;\nDichoso quien se esconda en ti,\nAbrigo de la tempestad.\nCoro:   En tierra de cansancio Jesús roca es,\nJesús roca es, Jesús roca es;\nEn tierra de cansancio Jesús roca es,\ny abrigo de la tempestad.\ntrad. G.P. Simmonds. MUSICA: Ira D. Sankey, 1885.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso.\nCoro:   En tierra de cansancio Jesús roca es,\nJesús roca es, Jesús roca es;\nEn tierra de cansancio Jesús roca es,\ny abrigo de la tempestad.\n2.         Sombra eres tú y escudo fiel,\ny abrigo de la tempestad;\nÀPor qué temer con tal broquel\ny abrigo de la tempestad?\n3.          Refugio tú eres, Salvador,\ny abrigo de la tempestad;\nSé nuestro gran auxiliador\ny abrigo de la tempestad.\ntrad. G.P. Simmonds. MUSICA: Ira D. Sankey, 1885.\nTrad. © 1939, ren. 1967 Cánticos Escogidos. Usado con permiso."},{"n":154,"t":"Cristo cual pastor","c":"A sus ovejas llama por nombre. Juan 10:3\n1.              Cristo, cual pastor, oh gu’a\nnuestros pasos en tu amor;\nNuestras almas siempre cuida,\nguárdalas, oh Salvador.\nOh, bendito Jesucristo, nos compraste por tu amor;\nOh, bendito Jesucristo, somos tuyos ya, Señor.\n2.              Tuyos somos, fiel Amigo,\nsé tú nuestro Defensor;\nDa al rebaño tuyo abrigo de este mundo pecador.\n// Oh, bendito Jesucristo, oye nuestra petición. //\nG.P. Simmonds, alt. MUSICA: William B. Bradbury, 1859.\nTrad. © 1939, ren. 1967 Lillenas Publishing Co. Usado con permiso.\n3.               Aunque somos tan indignos\nnos prometes recibir;\nTú ofreces bendecirnos, del pecado redimir.\n// Oh, bendito Jesucristo, te buscamos hoy, Señor. //\n4.             ¡Oh Pastor! Hoy te buscamos,\nte pedimos tu favor;\nLlénanos de amor, rogamos; óyenos, buen Salvador.\nOh, bendito Jesucristo, sin cesar tu amor nos das;\nOh, bendito Jesucristo, hasta el fin nos amarás.\nG.P. Simmonds, alt. MUSICA: William B. Bradbury, 1859.\nTrad. © 1939, ren. 1967 Lillenas Publishing Co. Usado con permiso."},{"n":155,"t":"El es la imagen","c":"El es la imagen del Dios invisible. Colosenses 1:15\n1.       El es la imagen del Dios invisible,\nEl Hijo amado y nuestro Redentor;\nEl es el primogénito de la creación:\nTe adoro, Jesucristo, mi Dios y Salvador.\n2.     El hizo las cosas que hay en el cielo,\nTambién de la tierra él es el Creador,\nY todo lo que hay subsiste sólo en él:\nTe adoro, Jesucristo, mi Dios y Salvador.\nFelipe Blycker J., 1980. © 1980 Philip W. Blycker en Cánticos nuevos de la Biblia.\nUsado con permiso.\n3.    El es la cabeza del cuerpo, la Iglesia,\nDe entre los muertos, supremo Vencedor;\nEn el Señor habita toda plenitud:\nTe adoro, Jesucristo, mi Dios y Salvador.\n4.     El hizo la paz por su sangre preciosa,\nY el Padre lo ha puesto por Reconciliador;\nSin mancha ante Dios él nos presentará:\nTe adoro, Jesucristo, mi Dios y Salvador.\nFelipe Blycker J., 1980. © 1980 Philip W. Blycker en Cánticos nuevos de la Biblia.\nUsado con permiso."},{"n":156,"t":"Hay un canto nuevo en mi ser","c":"Cantadle salmos; hablad de todas sus maravillas. 1 Crónicas 16:9\n1.             Hay un canto nuevo en mi ser,\nEs la voz de mi Jesús,\nQue me dice: ÒVen a descansar;\nTu paz conquisté en la cruzÓ.\nCoro:     Cristo, Cristo, Cristo, nombre sin igual,\nLlena siempre mi alma de esa nota celestial.\n2.                  Tengo de su gracia celestial,\nGozo en su santo amor;\nY riquezas fluyen a raudal,\nDesde el trono del Señor.\nLETRA y MUSICA: Luther B. Bridgers, 1910, trad. H. Cotto Reyes.\nCoro:     Cristo, Cristo, Cristo, nombre sin igual,\nLlena siempre mi alma de esa nota celestial.\n3.            Por las aguas hondas me llevó;\nPruebas en mi senda hallé;\nMas sus huellas seguiré.\n4.             Cristo en las nubes volverá,\nBajo el bello cielo azul;\nA su lado él me llevará\nA vivir en gloria y luz.\nLETRA y MUSICA: Luther B. Bridgers, 1910, trad. H. Cotto Reyes."},{"n":157,"t":"Jesús es la luz del mundo","c":"Despiértate, tú que duermes...y te alumbrará Cristo. Efesios 5:14\n1.        El mundo perdido en pecado se vio,\n¡Jesús es la luz del mundo!\nMas en las tinieblas la gloria brilló,\n¡Jesús es la luz del mundo!\nCoro:           ¡Ven a la luz; no quieres perder\nGozo perfecto al amanecer!\nYo ciego fui, mas ya puedo ver,\n¡Jesús es la luz del mundo!\n2.      Si ciego te encuentras en la oscuridad,\n¡Jesús es la luz del mundo!\nTe manda lavarte y verás su verdad,\n¡Jesús es la luz del mundo!\nLETRA y MUSICA: Philip P. Bliss, 1875, trad. H. C. Thompson, alt.\nCoro:    ¡Ven a la luz; no quieres perder\nGozo perfecto al amanecer!\nYo ciego fui, mas ya puedo ver,\n¡Jesús es la luz del mundo!\n3.        En d’a la noche se cambia con él,\n¡Jesús es la luz del mundo!\nIrás en la luz si a su ley eres fiel,\n¡Jesús es la luz del mundo!\n4.      Ni soles ni lunas el cielo tendrá,\n¡Jesús es la luz del mundo!\n¡Jesús es la luz del mundo!\nLETRA y MUSICA: Philip P. Bliss, 1875, trad. H. C. Thompson, alt."},{"n":158,"t":"Yo soy la luz del mundo","c":"Soy la luz del mundo; el que me sigue, no andará en tinieblas. Juan 8:12\nÀ.               Yo soy la luz del mundo,\nEl que me siga tendrá la luz que le da la vida,\nY nunca andará en la oscuridad.\n(En la oscuridad).\n¡.              // Dios es luz, paz y amor; //\n(Soy la luz del mundo).\nÂ. Dios es la luz, Dios es la paz, Dios es amor, oh, s’;\nDios es la luz, Dios es la paz, Dios es amor.\n(Soy la luz del mundo).\n¯.            // Dios es luz, paz y amor; //\n(Soy la luz del mundo)."},{"n":159,"t":"Fruto del amor divino","c":"Yo soy el Alfa y la Omega, el principio y el fin. Apocalipsis 22:13\n1.           Fruto del amor divino,\ngénesis de la creación;\nEl es Alfa y Omega,\nes principio y conclusión\nDe lo que es, de lo que ha sido,\nde lo nuevo en formación;\nY as’ será por siempre.\ntrad. Federico J. Pagura MUSICA: Canto llano, s. 11,arreg. F.B.J.,\nbas. en C. Winfred Douglas, 1916. Trad. © 1962 Ediciones La Aurora. Usado con permiso.\n2.              Es el mismo que el profeta\nvislumbrara en su visión\nY encendiera en el salmista\nAhora brilla y es corona\nde la antigua expectación. Y as’ será por siempre.\n3.               Las legiones celestiales\nahora canten su loor;\nLos dominios hoy le adoren\ncomo Rey y Redentor;\nY los pueblos de la tierra\nle proclamen su Señor. Y as’ será por siempre.\ntrad. Federico J. Pagura MUSICA: Canto llano, s. 11,arreg. F.B.J.,\nbas. en C. Winfred Douglas, 1916. Trad. © 1962 Ediciones La Aurora. Usado con permiso."},{"n":160,"t":"Grande amor, sublime, eterno","c":"Las doce puertas eran doce perlas. Apocalipsis 21:21\n1.        Grande amor, sublime, eterno,\nMás profundo es que la mar,\nY más alto que los cielos;\nInsondable es y sin par.\nCoro:         El me abrirá la puerta\ny as’ entrar podré;\nRedención me ha comprado,\ny perdón me da por fe.\nRoberto C. Savage. alt. MUSICA: Alfred D. Olsen, c. 1906, arreg.\nEl me abrirá la puerta\ny as’ entrar podré;\nRedención me ha comprado,\ny perdón me da por fe.\n2.   Grande amor, sublime, eterno;\nEn la cruenta cruz murió\n3.   Grande amor, sublime, eterno;\nSoy indigno pecador,\nMas el Hijo incomparable\nDio su vida en mi favor.\nRoberto C. Savage. alt. MUSICA: Alfred D. Olsen, c. 1906, arreg."},{"n":161,"t":"Cuán grande amor","c":"Pero Dios... por su gran amor... nos dio vida Efesios 2:4-5\n1. Que Cristo me haya salvado, tan malo como yo fui,\nMe deja maravillado, pues él se entregó por m’.\nCoro:\n¡Cuán grande amor! (¡Oh cuán grande amor!)\n¡Tan grande amor! (¡Oh cuán grande amor!)\nel de Cristo para m’;\n¡Cuán grande amor! (¡Oh cuán grande amor!)\n¡Tan grande amor! (¡Oh cuán grande amor!)\npues por él salvado fui.\nLETRA y MUSICA: Charles H. Gabriel, 1905, trad. Honorato T. Reza.\nCoro: ¡Cuán grande amor! (¡Oh cuán grande amor!)\n¡Tan grande amor! (¡Oh cuán grande amor!)\nel de Cristo para m’;\n¡Cuán grande amor! (¡Oh cuán grande amor!)\n¡Tan grande amor! (¡Oh cuán grande amor!)\npues por él salvado fui.\n2. Oró por m’ en el huerto: ÒNo se haga mi voluntadÓ.\nY todo aquel sufrimiento causado fue por mi mal.\n3. Por m’ se hizo pecado; mis culpas su amor llevó.\nEn cruenta cruz fue clavado, mas mi alma él rescató.\n4. Cuando al final con los santos su gloria contemplaré,\nCon gratitud y con cantos por siempre le alabaré.\nLETRA y MUSICA: Charles H. Gabriel, 1905, trad. Honorato T. Reza."},{"n":162,"t":"El amor de Cristo","c":"ÀQuién nos separará del amor de Cristo?\nÀTribulación, o angustia, o persecución,\no hambre, o desnudez, o peligro, o espada?\nAntes, en todas estas cosas somos más que\nvencedores por medio de aquel que nos amó.\nPor lo cual estoy seguro de que ni la\nmuerte, ni la vida, ni ángeles, ni principados,\nni potestades, ni lo presente, ni lo por venir,\nNi lo alto, ni lo profundo, ni ninguna otra\ncosa creada nos podrá separar del amor de Dios,\nque es en Cristo Jesús Señor nuestro.\nRomanos 8:35, 37-39; Efesios 3:17-19 (RVR)\nPara que habite Cristo por la fe en\nvuestros corazones, a fin de que,\narraigados y cimentados en amor,\nSeáis plenamente capaces de comprender\ncon todos los santos cuál sea la anchura,\nY de conocer el amor de Cristo, que\nexcede a todo conocimiento, para que\nseáis llenos de toda la plenitud de Dios.\nRomanos 8:35, 37-39; Efesios 3:17-19 (RVR)"},{"n":163,"t":"Yo cantaré de mi Jesucristo","c":"Se postran... y adoran al que vive por los siglos de los siglos. Apocalipsis 4:10\n1.                Yo cantaré de mi Jesucristo,\ny de su grande y tierno amor,\ndel que sufrió en la cruz del Calvario\npara librar al vil pecador.\nCoro:           Yo cantaré de mi Jesucristo,\npues con su sangre me redimió;\nY en la cruz me dio el indulto; de mi pecado me libró.\n(2nda voz)\n(Yo cantaré de mi Jesús, yo cantaré de mi Jesús,\nPues con su sangre me compró, me redimió, me redimió;\n// Y en la cruz me dio el indulto, //\nDe mi pecado, del pecado me libró, él me libró.)\nCoro:           Yo cantaré de mi Jesucristo,\npues con su sangre me redimió;\nY en la cruz me dio el indulto; de mi pecado me libró.\n(2nda voz)\n(Yo cantaré de mi Jesús, yo cantaré de mi Jesús,\nPues con su sangre me compró, me redimió, me redimió;\n// Y en la cruz me dio el indulto, //\nDe mi pecado, del pecado me libró, él me libró.)\n2.               Yo cantaré la excelsa historia\nde su gloriosa y gran redención;\nAl que decide hoy recibirle\nEl le da vida y salvación.\nCoro:           Yo cantaré de mi Jesucristo,\npues con su sangre me redimió;\nY en la cruz me dio el indulto; de mi pecado me libró.\n(2nda voz)\n(Yo cantaré de mi Jesús, yo cantaré de mi Jesús,\nPues con su sangre me compró, me redimió, me redimió;\n// Y en la cruz me dio el indulto, //\nDe mi pecado, del pecado me libró, él me libró.)\n3.             Yo cantaré loor a mi Cristo,\nporque triunfó con su gran poder;\nY al pecado, infierno y muerte,\nEl me ayudará a vencer.\nCoro:           Yo cantaré de mi Jesucristo,\npues con su sangre me redimió;\nY en la cruz me dio el indulto; de mi pecado me libró.\n(2nda voz)\n(Yo cantaré de mi Jesús, yo cantaré de mi Jesús,\nPues con su sangre me compró, me redimió, me redimió;\n// Y en la cruz me dio el indulto, //\nDe mi pecado, del pecado me libró, él me libró.)\n4.              Yo cantaré de mi Jesucristo,\nde su eterno y tierno amor;\nHijo de Dios yo soy por su gracia,\nGracia de Cristo mi Salvador."},{"n":164,"t":"Oh qué inmenso amor","c":"En esto se mostró el amor de Dios...en que ...envió a su Hijo. 1 Juan 4:9\n¡Oh qué amor!\n¡Qué inmenso amor!\nel de mi Salvador. ¡Oh qué amor!\n¡Qué inmenso amor! el de mi Salvador.\nDios desde el cielo al Salvador\nmandó a morir por m’.\nPor ti murió, por m’ murió;\ndio sangre carmes’.\n¡Oh qué amor!\n¡Qué inmenso amor! el de mi Salvador.\nLETRA y MUSICA: Jaime Red’n, 1960, arreg. Eugenio Jordán."},{"n":165,"t":"Gracia Admirable","c":"Siendo justificados gratuitamente por su gracia. Romanos 3:24\n1.        ¡Gracia admirable del Dios de amor\nQue excede a todo nuestro pecar!\nCristo en la cruz por el pecador\nSu vida ha dado. ¡Qué amor sin par!\nCoro:\n¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)\n¡Gracia de Dios que nos da perdón!\n¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)\n¡Gracia que limpia el corazón!\n2.           Negras las olas de la maldad\nMe amenazaron con perdición;\nPudo en la gracia de Dios hallar\nDulce refugio mi corazón.\nCoro:\n¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)\n¡Gracia de Dios que nos da perdón!\n¡Gracia! (¡Gracia de Dios!) ¡Gracia! (¡Gracia sin par!)\n¡Gracia que limpia el corazón!\n3.         Nunca tu mancha podrás limpiar\nSino en la sangre del buen Jesús;\nEn ella, s’, la podrás lavar,\nHoy sin cesar fluye de la cruz.\n4.             Gracia infinita recibirá\nTodo el que cree en Cristo el Señor;\nSi del pecado cansado estás,\nVen, gracia ofrece tu Salvador."},{"n":166,"t":"Maravilloso es el gran amor","c":"Para mostrar en los siglos venideros... su gracia en su bondad. Efesios 2:7\n1. Maravilloso es el gran amor que Cristo el Salvador\nderramó en m’; Siendo rebelde y pecador,\nyo de su muerte causa fui. ¡Grande, sublime,\ninmensurable amor! Por m’ murió el Salvador.\nCoro:          ¡Oh, maravilla de su amor,\npor m’ murió el Salvador!\n2. El su celeste hogar abandonó, dejando posición,\ngloria y honor; De todo ello se despojó\npor rescatar al pecador. Misericordia inmensa\nél mostró; su gran amor me alcanzó.\nCoro: ¡Oh, maravilla de su amor, por m’ murió el Salvador!\n3. ¡Grande misterio! Dios el inmortal muriendo en la\ncruz entregó su ser; ni mente humana ni angelical\njamás lo puede comprender. Inexplicable\nes el infinito amor que demostró mi Salvador.\n4. En vil prisión mi alma padeció, atada en pecado\ny oscuridad; pronto en mi celda resplandeció\ncadenas destruyó; Quedé ya libre, ¡Gloria a Dios!\n5.     Hoy ya no temo la condenación; Jesús\nes mi Señor, y yo suyo soy. Vivo en él\nque es mi salvación, vestido en su justicia voy.\nLibre acceso al Padre gozo ya y entrada al trono celestial."},{"n":167,"t":"En tu presencia","c":"En tu presencia hay consuelo;\nEn tu presencia hay amor;\nAl buscar tu corazón\nencontramos paz y gozo\nEn tu presencia, oh Señor.\nLETRA y MUSICA: Dick y Melodie Tunney, 1988,\ntrad. Oscar López M. © 1988 B.M.G. Songs. Usado con permiso."},{"n":168,"t":"De su trono a un pesebre","c":"Se humilló... haciéndose obediente hasta la muerte. Filipenses 2:8\nSi b (Capo 1- La)                                                         Con sentimiento\n1.    De su trono a un pesebre, de riqueza y honor,\nA buscarnos Cristo descendió;\nDe las calles celestiales a la cruz de cruel dolor,\nVino y por la humanidad su vida dio.\nCoro:     ¡Cuán grande amor! ¡Jesús me ha redimido!\n¡Cuán grande amor, sublime y eternal!\nYo cantaré por siempre su alabanza,\nCon gozo unido al coro celestial.\n© 1963 William J. Gaither. Usado con permiso.\nCoro:     ¡Cuán grande amor! ¡Jesús me ha redimido!\n¡Cuán grande amor, sublime y eternal!\nYo cantaré por siempre su alabanza,\nCon gozo unido al coro celestial.\n2.      De la diestra de su Padre a su creación bajó,\nMas rechazo y odio él sufrió;\nYo fui pecador perdido más su amor me encontró;\nPor su sangre paz y vida me compró.\n3.        El sufrió nuestros dolores, el quebranto,\nAzotado y herido fue por nuestra rebelión,\nY el pecado nuestro, Dios en él cargó.\n© 1963 William J. Gaither. Usado con permiso."},{"n":169,"t":"Demos gracias al Señor","c":"Dando siempre gracias por todo al... Padre, en el nombre de nuestro Señor. Efesios 5:20\nPara un permiso en retroproyector,\nver pie de página\nLETRA y MUSICA: Cesáreo Gabara’n, 1973.                                  L.A.\n© 1973 Cesáreo Gabara’n y Ediciones Paulinas , admin. OCP Publications, Usado con permiso."},{"n":170,"t":"Yo quisiera hablarte","c":"Dios... es rico en misericordia, por su gran amor con que nos amó. Efesios 2:4\n1.       Yo quisiera hablarte del amor de Cristo,\nPues en él hallé un amigo fuerte y fiel.\nPor su gracia transformó mi vida entera;\nLo que en esta vida soy lo debo a él.\nCoro:       Nadie pudo amarme como Cristo,\nEs incomparable su amistad;\nSólo él pudo redimirme del pecado\nPor su amor y su bondad.\nLETRA y MUSICA: Charles F. Weigle, 1932,trad. S. D. Athans.\nCoro:        Nadie pudo amarme como Cristo,\nEs incomparable su amistad;\nSólo él pudo redimirme del pecado\nPor su amor y su bondad.\n2.      Mi alma estaba llena de ayes y tristezas,\nLlena estaba de miserias y dolor;\nCon ternura Cristo me tendió la mano,\nY me guió por el sendero del amor.\n3.       Cada d’a viene a darme nuevo aliento;\nA mi corazón infunde dulce paz;\nNo comprenderé por qué vino a salvarme,\nHasta que en el cielo pueda ver su faz.\nLETRA y MUSICA: Charles F. Weigle, 1932,trad. S. D. Athans."},{"n":171,"t":"ÀCon qué pagaremos?","c":"ÀQué pagaré a Jehová por todos sus beneficios? Salmo 116:12\n1.    ÀCon qué pagaremos amor tan inmenso?\nQue diste tu vida por el pecador;\nEn cambio recibes la ofrenda humilde,\nde mi corazón. La ofrenda humilde,\nSeñor Jesucristo, de mi corazón.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s.20,\nL.A.\n2.   Y cuando la noche extiende su manto,\nMis ojos en llanto en ti fijaré;\nAlzando mis ojos veré las estrellas;\nYo sé que tras ellas cual Padre amoroso\ntú velas por m’. Yo sé que tras ellas\ncual Padre amoroso tú velas por m’.\n3.      No puedo pagarte con oro ni plata\nel gran sacrificio que hiciste por m’;\nNo tengo qué darte por tanto amarme;\nRecibe este canto mezclado con llanto,\ny mi corazón. Recibe este canto mezclado\ncon llanto, y mi corazón.\nLETRA y MUSICA: Autor y compositor descon., Latinoamérica, s.20,"},{"n":172,"t":"Gracias dad a Jesucristo","c":"Dad gracias en todo, porque esta es la voluntad de Dios. 1 Tesalonicenses 5:18\nSi b (Capo 1 - La)                                                     Con ánimo\n1. Gracias dad a Jesucristo por su sempiterno amor;\nAlabadle, santos todos, él es nuestro Salvador.\nQue sus siervos por doquiera canten su benignidad;\nLos que temen a su nombre hablen de su libertad.\n2.    De cadenas de amargura le ped’ liberación;\nEscuchó mi voz, y mi alma la salvó de la prisión.\nSi me asalta el enemigo nada tengo que temer;\nEn la lucha tenebrosa con Jesús podré vencer.\nMEX\n3.    Quien conf’a en Jesucristo la victoria llevará,\nMas si espera en el hombre siempre éste fallará.\nOh Señor, tu santo nombre alabamos sin cesar,\nPor tu amor incomparable\ngracias te queremos dar.\nMEX"},{"n":173,"t":"Dime la historia de Cristo","c":"Felipe, abriendo su boca... anunció el evangelio de Jesús. Hechos 8:35\n1. Dime la historia de Cristo; grábala en mi corazón;\nDime la historia preciosa, ¡cuán melodioso es su son!\nDi cómo cuando nac’a, ángeles con dulce voz\nÒPaz en la tierraÓ, cantaron,\nÒy en las alturas gloria a DiosÓ.\nCoro:\nDime la historia de Cristo; grábala en mi corazón;\nDime la historia preciosa, ¡cuán melodioso es su son!\nCoro:\nDime la historia de Cristo; grábala en mi corazón;\nDime la historia preciosa, ¡cuán melodioso es su son!\n2. Dime del tiempo en que a solas en el desierto se halló;\nDe Satanás fue tentado, mas con poder le venció.\nDime de todas sus obras, de su tristeza y dolor,\nPues sin hogar, despreciado anduvo nuestro Salvador.\n3.     Di cuando crucificado él por nosotros murió;\nDi del sepulcro sellado; di cómo resucitó.\nEn esa historia tan tierna miro las pruebas de amor;"},{"n":174,"t":"Qué bella historia","c":"Pero nosotros predicamos a Cristo. 1 Corintios 1:23\n1.      ¡Qué bella historia! de su excelsa gloria\nBajó el Salvador, Jesús, mi Redentor.\nNació en pesebre, despreciado y pobre,\nVarón de lágrimas y de dolor.\nCoro:       ¡Oh cuánto le amo! y fiel le adoro;\nEl es mi vida, mi Redentor;\nEl Rey de gloria vino a salvarme,\nY a revelarme al Dios de amor.\nCoro:       ¡Oh cuánto le amo! y fiel le adoro;\nEl es mi vida, mi Redentor;\nEl Rey de gloria vino a salvarme,\nY a revelarme al Dios de amor.\n2.       ¡Qué gran misterio, tan incomprensible!\nEl Verbo se encarnó y al mundo descendió.\nEl plan oculto revelóse al hombre,\nY por su tierno amor me levantó.\n3.        ¡Don admirable, tan incomparable!\nDe plena salvación, y eterna redención.\nEl sol divino brilla en mi camino;\nSu luz alumbrará mi corazón."},{"n":175,"t":"Oh profundo, inmenso amor","c":"Se manifestó la bondad de Dios nuestro Salvador, y su amor. Tito 3:4\nSi b (Capo 1 - La)                                                    Con intensidad\n1.    ¡Oh amor, profundo, inmenso amor!\nde gozo llena el corazón\nQue el Dios eterno, en su bondad,\ntomara forma corporal.\n2.           Fue por nosotros su oración,\nsu enseñanza y su labor:\nJamás buscó su propio bien;\nse hizo siervo, siendo rey.\ntrad. Nicolás Mart’nez, alt. MUSICA: Thomas M. Hastings, 1840.\n3.       El por nosotros padeció\nblasfemias, burlas y dolor;\nY para darnos vida y luz\nhalló la muerte en una cruz.\n4.   Mas en su triunfo el nuestro está,\ny junto al Padre, nuestro hogar;\nNos da su Esp’ritu, y en él\nhallamos gozo, paz, poder.\ntrad. Nicolás Mart’nez, alt. MUSICA: Thomas M. Hastings, 1840."},{"n":176,"t":"Vida Abundante","c":"Yo he venido para que tengan vida... en abundancia. Juan 10:10\nCoro:     Vida abundante Jesús ofrece,\nvida triunfante de d’a en d’a;\nEl es la fuente de vida eterna\nque brota siempre en mi corazón.\n1.          En la cruz murió mi Jesús;\ncon su muerte vida me dio;\nPor su gracia me transformó\ny la vida abundante me concedió.\nLETRA y MUSICA: Rafael Enrique Urdaneta M., 1978.                      URU\n© 1978 Casa Bautista de Publicaciones. Usado con permiso\nCoro:       Vida abundante Jesús ofrece,\nvida triunfante de d’a en d’a;\nEl es la fuente de vida eterna\nque brota siempre en mi corazón.\n2.             La mujer que fue y tocó\nel vestido de mi Señor;\nPor su fe salud recibió\ny la vida abundante Jesús le dio.\n3.         En la cruz pidió el malhechor\nde su alma la salvación;\nVida eterna pudo alcanzar,\npues la vida abundante Jesús le dio.\nLETRA y MUSICA: Rafael Enrique Urdaneta M., 1978.\n© 1978 Casa Bautista de Publicaciones. Usado con permiso"},{"n":177,"t":"Es Jesús ¡Qué bella historia!","c":"Jesús de Nazaret... anduvo haciendo bien... porque Dios estaba con él. Hechos 10:38\n1.          ÀQuién es el que en Belén\nreyes y pastores ven?\nÀQuién a solas ayunó, y la tentación venció?\nCon vigor\nCoro:           Es Jesús, ¡Qué bella historia!\nA sus pies le adoraré,\n¡Aleluya! cantaré.\nCon reflexión\n2.    ÀQuién tres años enseñó y al enfermo levantó?\nÀQuién a niños recibió, con amor los abrazó?\nLETRA : Benjamin R. Hanby, 1866, trad. Comité de Celebremos.\nCon vigor\nCoro:          Es Jesús, ¡Qué bella historia!\nA sus pies le adoraré,\n¡Aleluya! cantaré.\n3.          ÀQuién al Padre siempre oró\ny su voluntad buscó?\nÀQuién por m’ en la cruz murió, y mi pena all’ pagó?\n4.              ÀQuién la tumba conquistó,\ncon poder resucitó?\nÀQuién al cielo ascendió, junto al Padre se sentó?\nLETRA : Benjamin R. Hanby, 1866, trad. Comité de Celebremos."},{"n":178,"t":"Sea la paz","c":"Levantándose, reprendió al viento y dijo al mar: Calla, enmudece. Marcos 4:39\nSi b (Capo 1 - La)                                         Con emoción\n1.           ¡Maestro, se encrespan las aguas\ny ruge la tempestad! Los grandes abismos\ndel cielo se llenan de oscuridad.\nÀNo ves que aqu’ perecemos? ÀPuedes dormir as’,\nCuando el mar agitado nos abre profundo sepulcro aqu’?\nCoro:      Los vientos, las ondas oirán tu voz,\nÒ¡Sea la paz!Ó (Ò¡Sea la paz, sea la paz!Ó)\nCalmas las iras del negro mar,\nLas luchas del alma las haces cesar,\nY as’ la barquilla do va el Señor,\nHundirse no puede en el mar traidor.\nDoquier se cumple tu voluntad,\nÒ¡Sea la paz!Ó Ò¡Sea la paz!Ó\nTu voz resuena en la inmensidad, Ò¡Sea la paz!Ó\ntrad. Vicente Mendoza. MUSICA: Horatio R. Palmer, 1874.\nCoro:      Los vientos, las ondas oirán tu voz,\nÒ¡Sea la paz!Ó (Ò¡Sea la paz, sea la paz!Ó)\nCalmas las iras del negro mar,\nLas luchas del alma las haces cesar,\nY as’ la barquilla do va el Señor,\nHundirse no puede en el mar traidor.\nDoquier se cumple tu voluntad,\nÒ¡Sea la paz!Ó Ò¡Sea la paz!Ó\nTu voz resuena en la inmensidad, Ò¡Sea la paz!Ó\n2.             Maestro, mi ser angustiado\nte busca con ansiedad;\nDe mi alma en los antros profundos\nse libra cruel tempestad.\nAsalta el pecado a torrentes sobre mi frágil ser.\n¡Y perezco, perezco, Maestro! ¡Oh, quiéreme socorrer!\ntrad. Vicente Mendoza. MUSICA: Horatio R. Palmer, 1874.\nCoro:    Los vientos, las ondas oirán tu voz,\nÒ¡Sea la paz!Ó (Ò¡Sea la paz, sea la paz!Ó)\nCalmas las iras del negro mar,\nLas luchas del alma las haces cesar,\nY as’ la barquilla do va el Señor,\nHundirse no puede en el mar traidor.\nDoquier se cumple tu voluntad,\nÒ¡Sea la paz!Ó Ò¡Sea la paz!Ó\nTu voz resuena en la inmensidad, Ò¡Sea la paz!Ó\n3. Maestro, pasó la tormenta,\nlos vientos no rugen ya,\nY sobre el cristal de las aguas\nel sol resplandecerá.\nMaestro, prolonga esta calma,\nno me abandones más;\nCruzaré los abismos contigo, gozando bendita paz.\ntrad. Vicente Mendoza. MUSICA: Horatio R. Palmer, 1874."},{"n":179,"t":"A la casa de Jairo","c":"No temas; cree solamente, y será salva. Lucas 8:50\n1.        A la casa de Jairo iba Jesús;\nuna gran multitud iba tras él.\nY una pobre mujer llena de fe,\nno miró la multitud, mas le tocó.\nCoro:   Haz tú cual la mujer que le tocó\nel borde del vestido del Señor.\nVirtud salió de él, y ella sanó;\nsi crees tú en él, salvo serás.\nLETRA y MUSICA: Santiago J. Stevenson O., 1964.                 PAN\n© 1964 Santiago J. Stevenson. Usado con permiso.\nCoro:     Haz tú cual la mujer que le tocó\nel borde del vestido del Señor.\nVirtud salió de él, y ella sanó;\nsi crees tú en él, salvo serás.\n2.      Aquel pueblo inmenso le escuchó;\nuna parte cre’a al Señor,\nPero el resto furioso rechazó\na este Mensajero del excelso amor.\n3.         Jesucristo, fui yo quien te tocó;\nMas tu mano potente me sanó;\nya mi alma y cuerpo traigo a tu altar.\nLETRA y MUSICA: Santiago J. Stevenson O., 1964.       PAN\n© 1964 Santiago J. Stevenson. Usado con permiso."},{"n":180,"t":"La mujer samaritana","c":"Vino una mujer de Samaria... y Jesús le dijo: Dame de beber. Juan 4:7\n1.     ÒDe tu cántaro dame, dame tú de beberÓ,\nA la Samaritana, dijo un d’a Jesús.\nÒÀPor qué, siendo jud’o me diriges la voz?Ó\n// Respondió con vehemencia\n2.    Ò¡Oh! si tú conocieses este don que es de Dios\nY quien viene a rogarte que le des de beber,\nQuizá tú pedir’as y él podr’ate dar\n// Agua más deleitosa, que en los pozos\nterrenos no podrás encontrar. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. Roberto C. Savage.      GUA\n3.   Quien bebiere de esta agua volverá a tener sed,\nMas aquel que bebiere de la que le daré,\nPara siempre, declaro que más sed no tendrá;\n// En su alma una fuente para vida\neterna con poder saltaráÓ. //\nLETRA y MUSICA: Alfredo Colom M., 1953, arreg. Roberto C. Savage.     GUA"},{"n":181,"t":"El ciego Bartimeo","c":"Bartimeo el ciego... estaba sentado junto al camino. Marcos 10:46\n1.      Cuando el ciego escuchó que Jesús iba a ir,\nCaminó a Jericó, lo salió a recibir;\nLe gritaba, Ò¡Señor, ten piedad tú de m’!\nPorque ciego soy yo y no puedo vivirÓ.\n// Cristo le preguntó: ÒÀQué podré por ti hacer?Ó\nY con fe respondió: ÒHaz que yo pueda verÓ. //\n2.         Al salir de all’ daba gracias a Dios\nPorque ya pudo ver, pues Jesús lo sanó;\nEl Señor le mostró su amor y poder\nCuando al ciego sanó, permitiéndole ver.\n// El también lo sacó de otra noche sin luz,\nPues su pena pagó Cristo all’ en la cruz.//\nL.A.\n3.        Este mismo Jesús poderoso de ayer\nEs el mismo que hoy te dará su poder;\nComo escrito está, todo puede el Señor,\nComo ayer, también hoy y por la eternidad.\n// Si tú vienes a él, salvación tú tendrás;\nDale tu corazón; libre y salvo serás. //\nL.A."},{"n":182,"t":"El ministerio terrenal de Jesús","c":"Al comenzar su ministerio, Jesús ten’a como treinta\naños. Fue a Nazaret, donde se hab’a criado,\ny conforme a su costumbre, el d’a sábado entró\nen la sinagoga, y se levantó para leer.\nSe le entregó el rollo del profeta Isa’as;\ny cuando abrió el rollo, encontró el lugar\ndonde estaba escrito:\nEl Esp’ritu del Señor está sobre m’, porque me ha ungido\npara anunciar buenas nuevas a los pobres;\nLucas 3:23a; 4:16-21, 32, 43; 5:15-16 (RVA)\nMe ha enviado para proclamar libertad a los\ncautivos y vista a los ciegos, para poner en\nlibertad a los oprimidos y para\nproclamar el año agradable del Señor.\nDespués de enrollar el libro y devolverlo al ayudante, se\nsentó. Y los ojos de todos en la sinagoga estaban fijos en él.\nEntonces comenzó a decirles: ÒHoy se ha\ncumplido esta Escritura en vuestros o’dosÓ.\nLucas 3:23a; 4:16-21, 32, 43; 5:15-16 (RVA)\nY se asombraban de su enseñanza, porque su\npalabra era con autoridad.\nPero él les dijo: ÒMe es necesario anunciar el\nevangelio del reino de Dios a otras ciudades\ntambién, porque para esto he sido enviadoÓ.\nSu fama se extend’a cada vez más, y se juntaban a él\nmuchas multitudes para o’rle y para ser sanadas de\nsus enfermedades.\nPero él se apartaba a los lugares desiertos y oraba.\nLucas 3:23a; 4:16-21, 32, 43; 5:15-16 (RVA)"},{"n":183,"t":"Tierra de la Palestina","c":"De ti saldrá un guiador, que apacentará a mi pueblo Israel. Mateo 2:6\n1.        Tierra bendita y divina es la de Palestina,\ndonde nació Jesús; Eres, de las naciones,\ncumbre bañada por la lumbre\nque derramó su luz.\nCoro:            Eres la historia inolvidable,\nporque en tu seno se derramó\ndel unigénito Hijo de Dios;\ndel unigénito Hijo de Dios.\nCoro:         Eres la historia inolvidable,\nporque en tu seno se derramó\n2.            Cuenta la historia del pasado\nque en tu seno sagrado vivió\nel Salvador, y en tus hermosos olivares,\nhabló a los millares la palabra de amor.\n3.            Quedan en ti testigos mudos,\nque son los viejos muros de la Jerusalén;\nViejas paredes destruidas, que si tuvieran vida,\nnos hablar’an también."},{"n":184,"t":"Las Palmas","c":"Decid a la hija de Sion: He aqu’, tu Rey viene. Mateo 21:5\n1.          Palmas y flores que se ven brotar,\nHoy d’a sus perfumes ricos dan,\nPues viene Cristo el llanto a enjugar\nY revelarnos el divino plan.\nCoro:               A Cristo dad hosannas,\n(¡Gloria! ¡Hosanna!)\nHimnos cantad a Cristo con\ntriunfo y grande aclamación;\n¡Gloria al Señor! ¡Hosanna!\n(¡Hosanna! ¡Gloria al Señor!)\n¡Gloria al que viene trayéndonos salvación!\nLETRA y MUSICA: Jean-Baptiste Faure, 1864, trad. G.P. Simmonds.\nCoro: A Cristo dad hosannas, (¡Gloria! ¡Hosanna!)\nHimnos cantad a Cristo con triunfo y grande aclamación;\n¡Gloria al Señor! ¡Hosanna!\n(¡Hosanna! ¡Gloria al Señor!)\n¡Gloria al que viene trayéndonos salvación!\n2.         Los pueblos, al o’r su regia voz,\nDel mal que oprime alcanzan libertad.\nContemplan otra vez la luz de Dios,\nRegocijada está la humanidad.\n3.          Hoy d’a alégrate, Jerusalén;\nViene a librarte tu divino Rey,\nPues el amor del Cristo de Belén\nTrae esperanza, paz y eterna fe.\nLETRA y MUSICA: Jean-Baptiste Faure, 1864, trad. G.P. Simmonds."},{"n":185,"t":"En el nombre de Dios","c":"Sobre todo nombre...no sólo en este siglo, sino también en el venidero. Efesios 1:21\nHay poder, esperanza y amor\nEn el nombre de nuestro Señor;\nAclamemos a Cristo el Rey,\n¡Bendito el que viene en el\nnombre de Dios!\nLETRA y MUSICA: Phill McHugh,\nGloria Gaither, Sandi Patti H., 1986, trad. Lynn Anderson.\n© 1986 Gaither Music, SandiÕs Songs Music y River Oaks Music. Usado con permiso."},{"n":186,"t":"¡Hosanna!                              (Mantos y palmas)","c":"¡Hosanna! ¡Bendito el que viene en el nombre del Señor! Juan 12:13\n¥1.        Mantos y palmas esparciendo va\nEl pueblo alegre de Jerusalén,\nY a lo lejos ya se puede ver\nEn un pollino a Jesús el Rey;\nCoro:       Mientras mil voces resuenan\npor doquier, ÒHosanna al que viene\nen el nombre del SeñorÓ; Con un estruendo\nde gran exclamación prorrumpen con voz triunfal:\nÒ¡Hosanna, hosanna al Rey!\n¡Hosanna! ¡Hosanna al Rey!Ó\nLETRA y MUSICA: Rubén Ruiz A., 1972, arreg. Alvin Schutmaat, 1983.\nLetra © 1972 asig. a The United Methodist Publishing House. Arreg.             MEX\n© 1989 The United Methodist Publishing House, admin. Maranatha Music. Usado con permiso.\nCoro:          Mientras mil voces resuenan\npor doquier, ÒHosanna al que viene\nen el nombre del SeñorÓ; Con un estruendo\nde gran exclamación prorrumpen con voz triunfal:\nÒ¡Hosanna, hosanna al Rey!\n¡Hosanna! ¡Hosanna al Rey!Ó\n2.          Como en la entrada de Jerusalén,\nUn d’a todos vamos a cantar,\nCuando regrese Cristo otra vez\nPara llevarnos al eterno hogar;\nLETRA y MUSICA: Rubén Ruiz A., 1972, arreg. Alvin Schutmaat, 1983.\nLetra © 1972 asig. a The United Methodist Publishing House.
