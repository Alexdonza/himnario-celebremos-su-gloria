n// ¡Danos un bello hogar! //\n4.         Danos un bello hogar:\ndonde los hijos con decisión\nSigan a Cristo de corazón,\n// ¡Danos un bello hogar! //\nAmén.\nLETRA y MUSICA: B. B. McKinney, 1949, trad. Guillermo Blair, alt.\nTrad. © 1978 Broadman Press. Usado con permiso."},{"n":600,"t":"Dios el Creador y Dueño","c":"Ahora pues, Jehová, tú eres nuestro padre. Isa’as 64:8\n1. Dios, el Creador y Dueño de cuanto en el mundo está,\nNos ha honrado al llamarse nuestro Padre Celestial.\nTiernamente él nos gu’a; suple en necesidad;\nFiel es en la disciplina, generoso en su bondad.\n2.  La familia ha formado para nuestro gozo y bien;\nPadre humano le ha dado como l’der y sostén.\nA los padres hoy honramos, son de Dios precioso don;\nCon amor agradezcamos lo que hacen, lo que son.\n3. Dios, concede en tu gracia que los padres hoy aqu’\nCumplan con tus enseñanzas, imitándote a ti.\nDales gran sabidur’a, dales fuerzas y amor;\nQue ejemplo y gu’a sean; Oh, bend’celes, Señor. Amén."},{"n":601,"t":"Familia Feliz","c":"Y Jesús crec’a en sabidur’a y en estatura, y en gracia. Lucas 2:52\nSi b (Capo 1 - La)                                                              Con dulzura\nHay un lugar que Dios me dio,\npara crecer y para vivir;\nEs el hogar lugar de Dios,\ndonde el amor puedo sentir.\nFamilia feliz es donde reina Dios;\nFamilia feliz, gran bendición de Dios.\nHay un lugar que Dios me dio,\npara crecer y para vivir;\nEs el hogar lugar de Dios,\ndonde el amor puedo sentir.\nLETRA y MUSICA: Rafael Enrique Urdaneta, 1986, arreg. Mildred              L.A.\ny Manolo Padilla. © 1986 Casa Bautista de Publicaciones. Usado con permiso."},{"n":602,"t":"El primer matrimonio","c":"Dar quiso Dios al hombre compañ’a\nIgual en dignidad y hermosura,\nY para componer tan gran figura,\nSueño y saber a un tiempo le infund’a:\nDe su costilla la mujer hac’a\nSabia, linda y honesta criatura;\nY el hombre arrebatado en su dulzura,\nÒMi carne eres y huesoÓ, le dec’a.\nLuis de Ribera, s. 16\nESP"},{"n":603,"t":"Honor a las madres","c":"1.     Ante tu presencia, Dios, reunidos, a una voz,\nHoy rendimos todo honor a las madres, oh Señor,\nPor su amor y comprensión, y su tierna compasión.\n2. Con profunda gratitud, por su leal solicitud,\nSu constante y fiel labor, te alabamos, Salvador;\nSon inmensa bendición al hogar y la nación.\n3. Oye, pues, la petición de esta fiel congregación;\nTe rogamos con fervor por las madres, Dios de amor;\nQue con tu divino bien coronadas hoy estén.\nESP"},{"n":604,"t":"Honor a los padres","c":"1. Ante nuestro Padre Dios le alabamos con la voz\nPor su Hijo único quien al mundo él mandó;\nHoy brindamos todo honor a los padres con amor.\n2.     Dios al padre Adán creó y la vida en él sopló;\nA su imagen lo formó y su comunión buscó;\nHoy brindamos todo honor a los padres con amor.\n3. Del hogar, cabeza es él, a su esposa siempre es fiel;\nPor su ejemplo y dirección, por su amor y provisión,\nHoy brindamos todo honor a los padres con amor.\nGUA\nEsta letra se puede cantar con la música del #603 (Honor a las madres).\n4.                Sabio l’der familiar,\ndigno y fuerte para guiar;\nLoor al Padre celestial por el padre terrenal;\nHoy brindamos todo honor a los padres con amor.\nFelipe Blycker J. y Pablo Sywulka B., 1989.\nEsta letra se puede cantar con la música del #603 (Honor a las madres)."},{"n":605,"t":"Bienaventurada","c":"Se levantan sus hijos y la llaman bienaventurada. Proverbios 31:28\n*1.               Hoy reconocemos con amor y alegr’a\nTodo lo que hace la madre en su hogar,\nCómo sus palabras y su sabidur’a\nDan a la familia consuelo y bienestar.\n* Después de la primera estrofa se puede leer\nProverbios 31:10-16.\n*2.            Madres compasivas dan al necesitado;\nValen más que perlas, son joyas del Señor.\nMadres tan activas, siempre a nuestro lado,\nCon sus mil labores nos muestran su amor.\n* Después de la segunda estrofa se puede leer\nProverbios 31:17-24.\nAndrea Linares M. MUSICA: Joseph Barlowe, 1986. © 1986 Word Music. Usado con permiso.\n*3.           Bienaventuradas son las madres virtuosas\nQue conf’an siempre, temiendo al Señor;\nCuidadosas madres y dignas de honor.\n* Después de la tercera estrofa se puede leer\nProverbios 31:25-31.\nAndrea Linares M. MUSICA: Joseph Barlowe, 1986. © 1986 Word Music. Usado con permiso."},{"n":606,"t":"Tú honraste a las madres                                                          GUA","c":"Su estima sobrepasa largamente a la de las piedras preciosas. Proverbios 31:10\n1. Tú honraste a las madres, oh bendito Salvador,\nAl nacer en este mundo como hijo de mujer;\nHaz, Señor, que cada madre cumpla siempre su deber,\nQue te honre en todo tiempo y te sirva con amor.\n2.    Tú, Señor, que disfrutaste del cuidado maternal,\nHoy bendice a las madres, te venimos a pedir;\nQue enseñen a sus hijos tus caminos a seguir,\nCólmales de paz y gozo con tu mano divinal.\n3. Tú, Jesús, que el trabajo con José lo hiciste bien,\nHaz que fieles te sigamos con paciencia y humildad;\nQue la vida hogareña muestre siempre tu bondad,\nQue las madres sean ejemplo de constancia\ny fe también.\n4. Tú, oh Cristo, que buscaste a las almas con amor,\nTú, que a todos atrajiste con ternura y compasión,\nHaz que sea nuestra vida un canal de bendición;\nQue las madres traigan gloria a tu nombre,\noh Señor."},{"n":607,"t":"A mi madre","c":"Muchas mujeres hicieron el bien; mas tú sobrepasas a todas. Proverbios 31:29\n1.       A mi madre tan querida\nyo jamás podré olvidar\nMientras dure aqu’ mi vida,\nmientras mi alma pueda amar.\nCoro:         A mi madre tan querida,\nSu bondad fue sin medida;\ngracias, Dios, por su amor.\nBendición, 1947, alt. MUSICA: Richard Hainsworth, 1919.\nCoro:            A mi madre tan querida,\nSu bondad fue sin medida;\ngracias, Dios, por su amor.\n2.                 La bendita madre m’a\nen la infancia me instruyó;\nElla fue luz y alegr’a que mis penas mitigó.\n3.                Su mirada de ternura,\nbello obsequio del Señor,\nSu cariño y dulzura, los recuerdo con amor.\nBendición, 1947, alt. MUSICA: Richard Hainsworth, 1919."},{"n":608,"t":"Un año más","c":"608.                              Un año más\nTú coronas el año con tus bienes. Salmo 65:11\n1.         ¡Un año más nos da el Salvador,\nun año más de gracia y amor,\nPara servirle de corazón,\npara servir a Cristo!\nCoro:        Quiero servir a mi Jesús,\nQuiero esparcir doquier su luz;\nQuiero anunciar su amor y su cruz.\n¡Quiero servir a Cristo!\nGUA\nCoro:       Quiero servir a mi Jesús,\nQuiero esparcir doquier su luz;\nQuiero anunciar su amor y su cruz.\n¡Quiero servir a Cristo!\n2.        Un año más; yo quiero ser fiel,\ny dar mi vida sólo por él.\n¡Qué privilegio es vivir as’,\npara servir a Cristo!\n3.         Un año más, ¡qué dicha será!\ntal vez muy pronto Cristo vendrá.\n¡Qué poco tiempo nos queda ya\npara servir a Cristo!"},{"n":609,"t":"Dad a Dios inmortal alabanza","c":"609.      Dad a Dios inmortal alabanza\n1.        Dad a Dios inmortal alabanza, su merced,\nsu verdad nos inunda;\nEs su gracia en prodigios fecunda,\nsus mercedes, humildes, cantad.\n¡Al Señor de señores\ndad gloria, Rey de reyes, poder sin segundo!\nMorirán los señores del mundo,\nmas su reino no acaba jamás.\nESP\nEsta letra se puede cantar con la música de #503 (Despertad).\n2.          Vio los pueblos en vicios sumidos\ny sintió compasión en su seno; De prodigios de gracia\nestá lleno, sus mercedes, humildes, cantad.\nA su pueblo llevó por la mano\na la tierra por él prometida.\nPor los siglos sin fin le da vida;\ny el pecado y la muerte caerán.\n3.             A su Hijo envió por salvarnos\ndel pecado y la muerte eterna;\nDe prodigios de gracia es torrente, sus mercedes,\nhumildes, cantad. Por el mundo su mano nos lleva\ny al celeste descanso nos gu’a; Su bondad vivirá eterno d’a,\ncuando el mundo no exista ya más.\nJosé J. de Mora, 1874\nEsta letra se puede cantar con la música de #503 (Despertad).     ESP"},{"n":610,"t":"Principia un año nuevo","c":"610.             Principia un año nuevo\nNinguna palabra de todas sus promesas...ha faltado. 1 Reyes 8:56\n1.    Principia un año nuevo; que sea, oh Señor,\nUn año en que nos muestres de nuevo tu amor;\nUn año de progreso y de prosperidad,\nUn año en que gocemos tu gran fidelidad.\n2. Principia un año nuevo; en ti hemos de confiar;\nSeguros en tu mano podemos descansar.\nTu gran misericordia, tu gracia y bondad\nEn este nuevo año queremos disfrutar.\nEsteban Sywulka B. MUSICA: Samuel S. Wesley, 1864.\n3.   Principia un año nuevo; ayúdanos, oh Dios,\nA ser más consagrados, más prestos a tu voz;\nY sea allá contigo, o en la tierra aqu’,\nQue todo lo que hagamos te glorifique a t’.\nAmén.\nEsteban Sywulka B. MUSICA: Samuel S. Wesley, 1864."},{"n":611,"t":"Con alegres corazones","c":"611.            Con alegres corazones\nEl corazón alegre constituye buen remedio. Proverbios 17:22\n1.     Con alegres corazones alabamos al Señor;\nCelebrando tu cumpleaños, hoy cantamos con fervor;\nTe deseamos muchos años de completa bendición;\nQue tu vida sea en Cristo, tu delicia y tu porción.\n*Coro: Cantad, cantad, (s’, cantad,) felicidad (s’, cantad,)\ndeseamos hoy de corazón; su nombre alabad, (alabad,)\nSu nombre alabad, (alabad,) que Dios te dé su protección.\nEl buen Pastor (el Pastor) te guiará (te guiará)\nen sendas de paz y amor; pues que contigo Cristo\nsiempre está, ¡cantad, cantad, cantad!\nGUA\n2.    El Señor te dio la vida; con su imagen te dotó,\nPara gloria de su nombre, ricos dones te legó.\nDios que vela tus pisadas y a tu lado siempre va,\nPor su gracia te sustenta con el célico maná.\n*Coro: (Opt.)\nA Dios loor (si loor), porque en su amor (su amor)\nun año más te concedió; Dio bendición (bendición)\ny protección (protección) y con sus alas te cubrió\nTe cuidará (cuidará) y guiará (guiará)\ny en todo te prosperará,\nPues a tu lado ha prometido estar;\n¡A Dios todo loor!\nGUA"},{"n":612,"t":"Feliz, feliz cumpleaños","c":"612.           Feliz, feliz cumpleaños\nEnséñanos... a contar nuestros d’as, que traigamos al corazón sabidur’a. Salmo 90:12\n1.      Feliz, feliz cumpleaños deseamos para ti;\nQue el Dios omnipotente te quiera bendecir.\nCoro: ¡Feliz, feliz cumpleaños! Que Dios en su bondad\nTe dé muy larga vida, salud, felicidad.\n2.   A Dios le damos gracias que con amor sin par,\nAl fin de otro año hermoso te permitió llegar.\n3.   Oremos pues, unidos, que te bendiga aún más,\nTe colme en lo futuro de bien, prosperidad.\n(Letra optativa para aniversarios)\nFeliz aniversario, queremos hoy decir;\nQue el Dios omnipotente les quiera bendecir.\n¡Feliz aniversario! que Dios en su bondad\nLes dé muy larga vida, salud, felicidad."},{"n":613,"t":"Nuestra Patria","c":"613.                       Nuestra Patria\nY sucederá que todo aquel que invocare el nombre del Señor será salvo. Joel 2:32\nNuestra patria será para Cristo,\nsi unidos luchamos por él;\nUna tierra que honre al Bendito\ny que muestre de Dios el poder.\nA luchar, pues, con santo entusiasmo;\nprediquemos de Cristo doquier.\n¡Oh Cristianos, luchad! Vuestra patria salvad,\nque Jesús pronto vendrá. ¡Oh Cristianos, luchad!\nVuestra patria salvad, que Jesús pronto vendrá.\nLETRA y MUSICA: Juan M. Isáis, 1956, arreg. Roberto C. Savage.            MEX\n© 1956 Juan M. Isáis. Usado con permiso."},{"n":614,"t":"América será para Cristo","c":"614.        América será para Cristo\nHe aqu’ una gran multitud... de todas naciones, y tribus... y lenguas. Apocalipsis 7:9\nSi b (Capo 1 - La)                                                          Con ánimo\n1.             América será para Cristo,\nel único camino hacia Dios;\nVerá lo que sus ojos no han visto,\ncon sólo caminar de él en pos.\nAmérica será para el cielo, el cielo que Jesús preparó,\nEl d’a que tras rápido vuelo, al lado de Jehová se sentó.\n2.          Despierta, pues, América amada;\nal’state en las filas de Dios;\nEscucha del Señor la llamada,\npues es tan cariñosa su voz.\nLETRA y MUSICA: Alfredo Colom M., 1956, arreg. Roberto C. Savage.         COL\nLlamando está a tu puerta el Cordero\nque derramó su sangre en la cruz;\nQue sea el Nuevo Mundo el primero,\nen ir a las mansiones de luz.\n3.    Colombia, Panamá y Venezuela,\nBolivia, Paraguay, Ecuador,\nTendrán la paz de Dios que consuela,\nY Chile, el Perú, la Argentina,\ny Cuba, Uruguay y el Brasil,\nY el grupo de las islas marinas,\ntendrán sus bendiciones a mil.\nLETRA y MUSICA: Alfredo Colom M., 1956, arreg. Roberto C. Savage.     COL\n4.   Los pueblos que han estado dormidos\nsabrán que Dios les ama en verdad:\nJamaica, los Estados Unidos,\ny México y también Canadá.\nLos pueblos que componen el Istmo,\ny todos los del sur lo sabrán;\nSin Cristo nunca habrá cristianismo;\nsin Cristo sólo reina Satán.\nLETRA y MUSICA: Alfredo Colom M., 1956, arreg. Roberto C. Savage.     COL\n5.     La bella Guatemala y Honduras,\nTendrán en las edades futuras\nY Dios bendecirá a Costa Rica;\ny Dios bendecirá a El Salvador,\nNaciones que, aunque sean tan chicas,\nson grandes a la faz del Señor.\nLETRA y MUSICA: Alfredo Colom M., 1956, arreg. Roberto C. Savage.\nCOL"},{"n":615,"t":"Oración por la patria","c":"615.       Oración por la patria\n1.                Te damos gracias, Dios,\npor nuestra amada patria\nQue alumbras con tu sol y\ncon tus mares bañas. La luz primera\naqu’ pudimos contemplar;\nQue en ella brille al fin la luz de tu verdad.\n2.    Oh Padre Celestial, bendice a nuestra patria;\nConcédele tu paz, otórgale tu gracia;\nQue pueda prosperar en rectitud y bien,\nY a Cristo proclamar por Salvador y Rey.\nFidentina Z. de D’az, s. 20\nEn Himnos y cantos para los niños, 1950, México, alt . Permiso solicitado.   MEX\nEsta letra se puede cantar con la música de #69 (De boca y corazón)."},{"n":616,"t":"A Dios, naciones, dad loor","c":"616.   A Dios, naciones, dad loor\nAlabadle, bendecid su nombre. Salmo 100:4\nCanon a 2 o 4 voces\nÀ        ¡\n1.      A Dios, naciones, dad loor,\nÂ        Ã\nporque es el único Señor;\nA él con gozo alabad,\ny sus bondades celebrad.\ntrad. H. G. Jackson. MUSICA: Thomas Tallis, c. 1561.\n2.   Es infinito su poder;\nen él tenemos nuestro ser,\nPues que del polvo nos formó,\ny de la muerte nos salvó.\n3.   Universal es tu bondad;\nserá eterna tu verdad;\nInagotable es tu amor,\n¡Omnipotente Dios, Señor!\ntrad. H. G. Jackson. MUSICA: Thomas Tallis, c. 1561."},{"n":617,"t":"Supremo Dios","c":"617.                 Supremo Dios\nBienaventurada la nación cuyo Dios es el Señor. Salmo 33:12\n1.     Supremo Dios, te ruego por mi patria;\nGobierna con tu mano de justicia.\nSeas honrado y glorificado\nEn toda la nación.\n2.     Hincha los r’os, fecundiza el campo,\nLlena las huertas, el taller visita;\nY a todo hombre dale de tus bienes\nLo que es menester.\nESP\n3.       Para tu reino sea nuestra patria;\nTu voluntad la ley que veneremos;\nQue tremolemos.\n4.    Sobre la tierra que por patria amada\nTe plugo darnos, libertades brillen.\nY no consientas que se forjen nunca\nYugos de esclavitud.\n5.     Caigan las aras de mentidos dioses\nQue al hombre vana salvación le brindan.\nSé tú el Dios nuestro, y el debido culto\nTodos te rindan hoy.\nESP"},{"n":618,"t":"En toda la nación","c":"Exhorto, pues, ante todo que se hagan\nrogativas, oraciones, peticiones y acciones\nde gracias por todos los hombres;...\nPor todos los que están en autoridad,\npara que podamos vivir una vida tranquila\ny sosegada con toda piedad y dignidad.\nPorque esto es bueno y agradable delante\nde Dios nuestro Salvador,\nEl cual quiere que todos los hombres sean salvos y\nvengan al pleno conocimiento de la verdad.\n1 Timoteo 2:1-4 (BLA)"},{"n":619,"t":"Alabad a Jehová","c":"619.                    Alabad a Jehová\nAlabad a Jehová, naciones todas; pueblos todos, alabadle. Salmo 117:1\nAlabad a Jehová,\nnaciones todas;\npueblos todos, alabadle.\nPorque ha engrandecido\nsobre nosotros su misericordia,\nY la verdad de Jehová\nes para siempre, ¡Aleluya, amén!\nY la verdad de Jehová\nes para siempre, ¡Aleluya, amén!"},{"n":620,"t":"Dios os guarde","c":"620.                          Dios os guarde\nJehová...bajo cuyas alas has venido a refugiarte. Rut 2:12\nSi b (Capo 1 - La)                                                          Con tranquilidad\n1.     Dios os guarde siempre en santo amor;\nhasta el d’a en que lleguemos\na la patria do estaremos\npara siempre con el Salvador.\nCoro:         Al venir Jesús nos veremos,\na los pies de nuestro Salvador; Reunidos todos, seremos\nun redil con nuestro buen Pastor.\n2.      Dios os guarde siempre en santo amor;\nen la senda peligrosa\nde esta vida tormentosa,\nos conserve en paz y sin temor.\nCoro:         Al venir Jesús nos veremos,\na los pies de nuestro Salvador; Reunidos todos, seremos\nun redil con nuestro buen Pastor.\n3.      Dios os guarde siempre en santo amor;\nos conduzca su bandera,\ny os esfuerce en gran manera\ncon su Esp’ritu Consolador.\n4.      Dios os guarde siempre en santo amor;\ncon su gracia os sostenga,\nhasta que el Maestro venga\na fundar su reino en esplendor."},{"n":621,"t":"Gracias, Dios","c":"621.                                   Gracias, Dios\nAcordaos de vuestros pastores...considerad...su conducta, e imitad su fe. Hebreos 13:7\n1.             Gracias, Dios, por los pastores*,\nfieles siervos tuyos son;\nY con gran visión y amor,\nsiempre luchan con fervor.\nGracias, Dios, por los pastores*, ¡Gracias, Dios!\n2.              Gracias, Dios, por los pastores*,\npor su ejemplo y su fe;\nInstrumentos son del Rey,\nsiempre velan por la grey.\nGracias, Dios, por los pastores*, ¡Gracias, Dios!\n*opt. maestros, ancianos, obreros, etc."},{"n":622,"t":"Gratitud por el pastor","c":"622.      Gratitud por el pastor\n1.      Hoy damos gracias al Señor por ti,\nPues él te hizo fiel y buen pastor\nQue a sus ovejas sabe conducir\nPor los caminos de su Salvador.\n2.      Hoy damos gracias al Señor por ti,\nPues él te hizo sabio sembrador\nQue la Palabra sale a esparcir;\nDios fruto te dará por tu labor.\n3.      Hoy damos gracias al Señor por ti,\nPues él te hizo edificador;\nCon piedras vivas sabes construir\nAna Mar’a Sywulka de Dahlquist, 1959\nGUA\nEsta letra se puede cantar con la música de #519 (Aqu’ el pan)."},{"n":623,"t":"Este templo dedicamos","c":"623.                  Este templo dedicamos\nY as’ dedicaron la casa de Dios el rey y todo el pueblo. 2 Crónicas 7:5\n1.        Este templo* dedicamos a tu gloria, oh Señor,\nPara el culto de tus hijos que te sirven con amor.\nDe las manos es hechura, expresión de nuestra fe;\nEs tributo que te ofrendan los creyentes, Padre fiel.\n2.      Por tu gracia, Dios eterno, gran art’fice y Señor,\nEsta ofrenda hoy bendice con tu Esp’ritu de amor.\nEste templo* dedicamos a tu gloria, oh Señor,\nPara el culto de tus hijos que te sirven con amor.\n* opt. sitio, aula, órgano, etc.\nURU"},{"n":624,"t":"A Dios el Padre celestial","c":"624.     A Dios el Padre celestial\n(La Doxolog’a)\nBendito sea el Dios y Padre de nuestro Señor Jesucristo. Efesios 1:3\nA Dios el Padre Celestial,\nAl Hijo nuestro Redentor,\nY al Eternal Consolador,\nUnidos todos alabad. Amén."},{"n":625,"t":"Celebremos el amor de Dios","c":"625.    Celebremos el amor de Dios\nCelebremos el amor de Dios\ny la gracia de su Hijo,\nY su comunión,\nEn mi corazón,\ny en tu corazón.\n¡Gloria a Dios! Amén y amén."},{"n":626,"t":"Gloria demos al Padre","c":"626.       Gloria demos al Padre\n(Gloria Patri)\nDad al Señor la honra debida a su nombre. 1 Crónicas 16:29\nGloria demos al Padre,\nAl Hijo y al Santo Esp’ritu;\nComo eran al principio,\nSon hoy y habrán de ser\nEternamente. Amén."},{"n":627,"t":"Alabad al Dios de los cielos","c":"627.   Alabad al Dios de los cielos\nVarones:    Alabad a Jehová, porque él es bueno,\nTodos:      Porque para siempre es su misericordia.\nDamas:      Alabad al Dios de los dioses,\nTodos:      Porque para siempre es su misericordia.\nJóvenes:    Alabad al Señor de los señores,\nTodos:      Porque para siempre es su misericordia.\nNiños:      Al único que hace grandes maravillas,\nTodos:      Porque para siempre es su misericordia.\nVarones:    Al que hizo los cielos con entendimiento,\nTodos:      Porque para siempre es su misericordia.\nDamas:      Al que extendió la tierra sobre las aguas.\nTodos:      Porque para siempre es su misericordia.\no un grupo, en vez de la frase: ÒPorque para siempre es su misericordia\", del #627.\nJóvenes:    Al que hizo las grandes lumbreras,\nTodos:      Porque para siempre es su misericordia.\nNiños:      El sol para que señorease en el d’a,\nTodos:      Porque para siempre es su misericordia.\nVarones:    El que da alimento a todo ser viviente,\nTodos:      Porque para siempre es su misericordia.\nTodos:      Alabad al Dios de los cielos,\nTodos:      Porque para siempre es su misericordia.\nSalmo 136:1-8, 25, 26 (RVR)\no un grupo, en vez de la frase: ÒPorque para siempre es su misericordia\", del #627."},{"n":628,"t":"Para siempre es","c":"(RESPUESTA MUSICAL)\nJehová es bueno; para siempre es su misericordia. Salmo 100:5\nPorque para siempre\nsu misericordia,\nSu misericordia para\nsiempre es.\nVEN\nHugo Filoia, 1986. © 1986 Hugo Filoia. Usado con permiso."},{"n":629,"t":"Eterno Rey","c":"629.                               Eterno Rey\nCantad a nuestro Rey, cantad. Salmo 47:6\n1.       Eterno Rey, celebraremos tu gloria;\nOh Padre Dios, recordaremos la historia\nDe tu amor y bondad; nos salvaste en verdad.\nA ti alabaremos por siempre y siempre.\nAmén.\n2.      Gran Salvador, celebraremos tu gloria;\nBuen Redentor, ensalzaremos la victoria\nQue ganaste, Jesús, al morir en la cruz.\nA ti alabaremos por siempre y siempre.\nAmén.\n3.        Esp’ritu, celebraremos tu gloria;\nConsolador, loamos tu gran misericordia;\nNos das gozo y solaz, nos cobija tu paz.\nA ti alabaremos por siempre y siempre.\nAmén."},{"n":630,"t":"Tu pueblo calla ante ti, Señor","c":"630.   Tu pueblo calla ante ti, Señor\n¡Cuán amables son tus moradas, oh Señor de los ejércitos! Salmo 84:1\nTu pueblo calla ante ti, Señor,\nOmnipotente y soberano Rey;\nReunidos, te adoramos\nAl contemplar tu santidad y gloria.\nTe loamos, te amamos,\noh eterno Dios.\nAmén."},{"n":631,"t":"Te Alabamos","c":"631.              Te Alabamos\n(Te deum del siglo 4)               Nuestra alma en ti conf’a:\nCuerpo y mente ¡oh Señor!\nTe alabamos ¡oh Señor!                 Te ofrendamos con amor.\nTu poder y reino honramos:\nTe adoramos ¡oh Señor!                 Padre nuestro, escúchanos.\nPor tus obras te gloriamos:            Cólmanos de bendiciones:\nDios de fuerza y de bondad,            Muéstranos tu rostro ¡oh\nDesde la eternidad.                    Dios!\nPor tu grande salvación,               Presta, Esp’ritu, tus dones;\nTe alabamos noche y d’a,               ¡Jesucristo, pronto ven!\nTuyo es nuestro corazón,               ¡Gloria a ti, Señor! Amén.\nAtrib. Nicetas de Remesiana"},{"n":632,"t":"Engrandecido sea Dios","c":"632.       Engrandecido sea Dios\nPorque grande es el Señor, y digno de suprema alabanza. 1 Crónicas 16:25\n1.           Engrandecido sea Dios\nen esta reunión, en esta reunión;\nAlegres, juntos a una voz,\nCoro:   Dad gloria, gloria, gloria, gloria,\nDad gloria a nuestro Dios,\nAmén.\n(Dad gloria, gloria, gloria, gloria,\ngloria, gloria, gloria,\ndad gloria a nuestro Dios. Amén.)\nCoro:      Dad gloria, gloria, gloria, gloria,\nDad gloria a nuestro Dios,\nAmén.\n(Dad gloria, gloria, gloria, gloria,\ngloria, gloria, gloria,\n2.            Durante el d’a que pasó\nDe muchos males nos salvó:\n3.           Pues hasta aqu’ nos ayudó,\ny siempre proveerá, y siempre proveerá;\nCon gratitud, placer y amor."},{"n":633,"t":"Ven te invito","c":"633.                              Ven te invito\nAlabadle conforme a la muchedumbre de su grandeza. Salmo 150:2\n(Primera vez - despacio)\nVen, te invito a cantar al Señor,\nven, te invito a deleitarte en él;\nVen, te invito a cantar al Señor\ncon toda tu voz, con todo tu amor.\n(Segunda vez - moderado)\nVen, te invito a cantar al Señor,\nven, te invito a deleitarte en él;\nVen, te invito a cantar al Señor\ncon toda tu voz, con todo tu amor.\n(lento)\n(Mujeres) Suenen violines,\n(Hombres) Toquen trompetas;\n(rápido)\n(Todos) *Alzad las voces, ¡Alabad a Dios!\nHombres y mujeres, niños y ancianos,\nsanos y enfermos ¡Alabad a Dios! ¡Ey!\n(Ultima vez - más rápido)\nVen, te invito a cantar al Señor,\nven, te invito a deleitarte en él;\nVen, te invito a cantar al Señor\ncon toda tu voz, con todo tu amor.\n*orig. Batid las manos"},{"n":634,"t":"Cantad alegres, cantad a Dios","c":"634.               Cantad alegres, cantad a Dios\nAlegraos... y cantad con júbilo todos vosotros. Salmo 32:11\n1.                        Cantad alegres, cantad a Dios,\nhabitantes de toda la tierra.\nServid a Dios con alegr’a;\nservid a Dios con regocijo.\nCoro:             //// Aleluya, gloria aleluya ////                                                   (Amén.)\n2.                    Reconoced que Jehová es Dios.\nEl nos hizo y no nosotros mismos;\nPueblo suyo, suyo somos\ny ovejas de su prado.\ndescon., Latinoamérica, s. 20, arreg. F.B.J. Arreg. © 1992\nCoro:      //// Aleluya, gloria aleluya ////                                                (Amén.)\n3.       Entrad por sus puertas con acción de gracias,\nPor sus atrios con cantos de alabanza;\nAlabadle con canciones, bendecid su santo nombre.\n4.            Porque Jehová, Jehová es bueno,\npara siempre es su misericordia,\nY su verdad permanece\npor todas las generaciones.\ndescon., Latinoamérica, s. 20, arreg. F.B.J. Arreg. © 1992"},{"n":635,"t":"¡Bienvenido!","c":"635.                              ¡Bienvenido!\nDonde están dos o tres congregados en mi nombre, all’ estoy yo. Mateo 18:20\n1.                Con gran gozo y placer\nnos volvemos hoy a ver;\nNuestras manos otra vez estrechamos.\nSe contenta el corazón ensanchándose de amor;\nTodos a una voz a Dios gracias damos.\nCoro:        ¡Bienvenido! ¡Bienvenido!\nLos hermanos hoy aqu’ nos gozamos en decir:\n¡Bienvenido! ¡Bienvenido!\nAl volvernos a reunir, ¡Bienvenido!"},{"n":636,"t":"¡Hola! ÀCómo estás?","c":"636.                ¡Hola! ÀCómo estás?\nMirad cuán bueno y delicioso es habitar los hermanos juntos. Salmo 133:1\n1.                 ¡Hola! ÀCómo estás?\nDoy gracias a Dios\nporque estamos aqu’ alabando su nombre.\nCoro:     // ¡Bienvenido seas! ¡Bienvenido seas,\nalabemos al Señor! //\n2.                   ¡Hola! ÀCómo estás?\nQué hermoso es reunirnos\ny as’ compartir el amor del Señor.\nMEX\n© 1988 Casa Bautista de Publicaciones. Usado con permiso."},{"n":637,"t":"En la escuela dominical","c":"637.         En la escuela dominical\nRetén la forma de las sanas palabras que de m’ o’ste. 2 Timoteo 1:13\n1.               En la escuela dominical\na mi clase gozoso voy;\nFiel alumno de Cristo soy, la Biblia me habla hoy.\n2.               En la escuela dominical\nyo escucharé con amor\n3.              En la escuela dominical\npor mi clase yo oraré;\nGran verdad y luz yo veré, que luego cumpliré.\nMelod’a africana (Angola), arreg. Mario Rolando Gómez M. Letra y                   L.A."},{"n":638,"t":"Por siempre, amén","c":"638.                 Por siempre, amén\nA él sea gloria... por todas las edades, por los siglos de los siglos. Amén. Efesios 3:21\nEngrandecido seas,\nJehová nuestro Dios,\nPor todas las edades,\npor siempre. Amén.\nLETRA y MUSICA: Julio Hidalgo, 1990\n© 1978 Casa Bautista de Publ. Usado con permiso.\nVEN"},{"n":639,"t":"Tu pueblo jubiloso","c":"639.                   Tu pueblo jubiloso\nVenid, aclamemos alegremente al Señor. Salmo 95:1\n1.      Tu pueblo jubiloso se acerca a ti, Señor,\nY con triunfantes voces hoy canta tu loor;\nPor todas tus bondades, que das en plenitud,\nTu pueblo humildemente te expresa gratitud.\n2.      Acceso a ti, oh Padre tenemos por Jesús;\nSin verte en tu gloria gozamos santa luz.\nAunque eres infinito, excelso Creador,\nHabita en nosotros tu Esp’ritu, Señor.\n3.      Oh Cristo, te alabamos de todo corazón;\nen ti tenemos vida y et        1 Pedro 5:10-11 (RVR)\nY a Aquel que es poderoso para guardaros sin\nca’da, y presentaros sin mancha delante de su gloria\ncon gran alegr’a, al único y sabio Dios, nuestro\nSalvador, sea gloria y majestad, imperio y potencia,\nahora y por todos los siglos. Amén.       Judas vv24-25 (RVR)"},{"n":645,"t":"Sagrado es el amor","c":"645.              Sagrado es el amor\nPorque todos vosotros sois uno en Cristo Jesús. Gálatas 3:28\n1.          Sagrado es el amor\nque ha unido aqu’,\nA los que un Dios y Salvador\ngozamos en servir.\n2.          A nuestro Padre Dios,\nrogamos con fervor,\nAlúmbrenos la misma luz,\nnos una el mismo amor.\n3.     Nos vamos a ausentar,\nmas nuestra firme unión\nJamás podráse quebrantar\npor la separación.\n4.      Allá en la eternidad\nnos hemos de reunir,\nY en dulce comunión y paz\npor siempre convivir."},{"n":646,"t":"Después de haber tenido aqu’","c":"646.          Después de haber tenido aqu’\nSed hacedores de la palabra, y no tan solamente oidores. Santiago 1:22\n1.        Después, Señor, de haber tenido aqu’\nDe tu Palabra la bendita luz,\nA nuestro hogar condúcenos y all’\nDe todos cuida, ¡buen Pastor Jesús!\n2.           En nuestras almas graba con poder\nTu fiel Palabra, cada exhortación;\nY que tu ley pudiendo comprender,\nContigo estemos en mayor unión.\n3.        Danos tu paz, la senda al transitar\nDe alegr’as, pruebas o dolor,\nY cuando al fin podamos descansar,\nNos cubra el manto de tu inmenso amor. Amén\nEsta letra se puede cantar también con la música de #260 (Transfórmame), #519 (Aqu’ del) y #521 (Llegamos)."},{"n":647,"t":"El Señor te bendiga","c":"647.                     El Señor te bendiga\nEl SE„OR te bendiga y te guarde. Números 6:24 (BLA)\nEl Señor te bendiga y te guarde;\nEl haga resplandecer su faz sobre ti;\nY tenga de (tenga de ti)\nti misericordia; (misericordia);\nEl Señor alce sobre ti su rostro,\nY te dé paz, (te dé paz,)\ny te dé paz, (te dé paz);\nY te dé paz, y te dé paz, (te dé paz).*\n* Se puede terminar aqu’ o seguir con el Amén (séptulo)."},{"n":648,"t":"Amén (séptuplo)","c":"648.                       Amén (séptuplo)\nBendito sea el Señor, por los siglos de los siglos. Amén y amén. Salmo 41:13\nAmén, amén, amén, amén,\namen, amén, amén.*\nSe puede usar el Amén (séptuplo) separadamente\no con la bendición anterior.\n649.                            Amén (triple)\nAmén, amén, amén."},{"n":650,"t":"Amén (duplo)","c":"650.                   Amén (duplo)\nAmén, amén.\n651.                    Amén (qu’ntuplo)\nAmén, amén, amén, amén, amén."},{"n":652,"t":"Al que está sentado","c":"652.              Al que está sentado\nSe postraron delante del Cordero...y cantaban un nuevo cántico. Apocalipsis 5:8-9\nAl que está sentado\nen el trono y al Cordero,\nSea la alabanza, y la honra,\ny la gloria y el poder\npor los siglos de los siglos.\nAmén.\n© 1988 Asociación Bautista Argentina de Publicaciones. Usado con permiso."}];

// ── STATE ──
let filteredHymns = [...HYMNS];
let selectedIndex = -1;  // index in filteredHymns
let viewerFontSize = 100; // percent
let overlayFontSize = 2.2; // rem
let currentSections = [];
let currentSectionIdx = 0;

// ── DOM ──
const $search = document.getElementById('search');
const $numInput = document.getElementById('num-input');
const $list = document.getElementById('sidebar-list');
const $placeholder = document.getElementById('placeholder');
const $hymnDisplay = document.getElementById('hymn-display');
const $hymnNavNum = document.getElementById('hymn-nav-num');
const $hymnNavTitle = document.getElementById('hymn-nav-title');
const $fontLabel = document.getElementById('font-size-label');
const $overlay = document.getElementById('overlay');
const $overlayText = document.getElementById('overlay-text');
const $overlayVerseLabel = document.getElementById('overlay-verse-label');
const $overlayFooter = document.getElementById('overlay-hymn-footer');
const $overlayTitleBar = document.getElementById('overlay-title-bar');
const $overlayFontLabel = document.getElementById('overlay-font-label');
const $overlaySections = document.getElementById('overlay-sections-scroll');
const $btnPrev = document.getElementById('btn-prev-hymn');
const $btnNext = document.getElementById('btn-next-hymn');
const $btnOverlayPrev = document.getElementById('overlay-big-prev');
const $btnOverlayNext = document.getElementById('overlay-big-next');

// ── PARSE HYMN INTO SECTIONS ──
function parseSections(hymn) {
  const lines = hymn.c.split('\n');
  const sections = [];
  let cur = null;
  let curLines = [];

  function flush() {
    if (curLines.length > 0) {
      const text = curLines.join('\n').trim();
      if (text) sections.push({ label: cur, text, isCoro: cur === 'Coro' });
    }
    curLines = [];
  }

  for (let line of lines) {
    const s = line.trim();
    // Skip header repeat (number + title)
    if (/^\d+\s+[A-Z¡]/.test(s) && sections.length === 0 && curLines.length < 3) {
      // Skip the "4   Santo Santo Santo" repeat lines
      const potentialTitle = s.replace(/^\d+\s+/, '');
      if (potentialTitle.length > 2) continue;
    }
    
    const verseMatch = s.match(/^(\d+)\.\s+(.*)$/);
    const coroMatch = s.match(/^(Coro|Estribillo|Estr\.?):?\s*(.*)$/i);
    
    if (verseMatch) {
      flush();
      cur = 'Estrofa ' + verseMatch[1];
      if (verseMatch[2].trim()) curLines.push(verseMatch[2]);
    } else if (coroMatch) {
      flush();
      cur = 'Coro';
      if (coroMatch[2].trim()) curLines.push(coroMatch[2]);
    } else if (s) {
      curLines.push(s);
    }
  }
  flush();

  // If no sections found, treat whole text as one block
  if (sections.length === 0) {
    const text = hymn.c.replace(/^\d+\s+.+\n?/, '').trim();
    sections.push({ label: '', text, isCoro: false });
  }

  return sections;
}

// ── RENDER SIDEBAR ──
function renderList() {
  if (filteredHymns.length === 0) {
    $list.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  filteredHymns.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'hymn-item' + (i === selectedIndex ? ' selected' : '');
    div.innerHTML = `<span class="hymn-num">${h.n}</span><span class="hymn-title-list">${esc(h.t)}</span>`;
    div.addEventListener('click', () => selectHymn(i));
    frag.appendChild(div);
  });
  $list.innerHTML = '';
  $list.appendChild(frag);
}

// ── SELECT HYMN ──
function selectHymn(idx) {
  if (idx < 0 || idx >= filteredHymns.length) return;
  selectedIndex = idx;
  const hymn = filteredHymns[idx];
  renderList();
  renderViewer(hymn);
  scrollSelectedIntoView();

  // Sync overlay if open
  if ($overlay.classList.contains('active')) {
    openOverlay(hymn);
  }
}

function scrollSelectedIntoView() {
  const items = $list.querySelectorAll('.hymn-item');
  if (items[selectedIndex]) {
    items[selectedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ── VIEWER ──
function renderViewer(hymn) {
  $placeholder.style.display = 'none';
  $hymnDisplay.style.display = 'block';
  $hymnNavNum.textContent = hymn.n;
  $hymnNavTitle.textContent = hymn.t;
  $btnPrev.disabled = selectedIndex <= 0;
  $btnNext.disabled = selectedIndex >= filteredHymns.length - 1;

  const sections = parseSections(hymn);
  let html = `<div class="hymn-header">
    <div class="hymn-number-display">Himno ${hymn.n}</div>
    <div class="hymn-title-display">${esc(hymn.t)}</div>
  </div>`;

  for (const sec of sections) {
    if (sec.isCoro) {
      html += `<div class="coro-section">
        <div class="coro-label">Coro</div>
        <div class="coro-text">${esc(sec.text)}</div>
      </div>`;
    } else if (sec.label) {
      html += `<div class="verse-section">
        <div class="verse-label">${esc(sec.label)}</div>
        <div class="verse-text">${esc(sec.text)}</div>
      </div>`;
    } else {
      html += `<div class="verse-section">
        <div class="verse-text">${esc(sec.text)}</div>
      </div>`;
    }
  }

  $hymnDisplay.innerHTML = html;
  applyViewerFontSize();
}

function applyViewerFontSize() {
  $hymnDisplay.style.fontSize = (viewerFontSize / 100) + 'rem';
  $fontLabel.textContent = viewerFontSize + '%';
}

// ── OVERLAY ──
function openOverlay(hymn) {
  currentSections = parseSections(hymn);
  currentSectionIdx = 0;
  $overlay.classList.add('active');
  $overlayTitleBar.textContent = `${hymn.n}. ${hymn.t}`;
  $overlayFooter.textContent = `${hymn.n}. ${hymn.t}`;
  renderOverlaySectionBtns();
  renderOverlaySection();
}

function renderOverlaySectionBtns() {
  $overlaySections.innerHTML = '';
  currentSections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'overlay-section-btn' + (sec.isCoro ? ' coro-btn' : '') + (i === currentSectionIdx ? ' current' : '');
    btn.textContent = sec.label || (i === 0 ? 'Texto' : `Parte ${i+1}`);
    btn.onclick = () => { currentSectionIdx = i; renderOverlaySectionBtns(); renderOverlaySection(); };
    $overlaySections.appendChild(btn);
  });
  // Scroll current into view
  const cur = $overlaySections.children[currentSectionIdx];
  if (cur) cur.scrollIntoView({ inline: 'nearest', block: 'nearest' });
}

function renderOverlaySection() {
  const sec = currentSections[currentSectionIdx];
  if (!sec) return;
  
  // Fade transition
  $overlayText.classList.add('fade');
  setTimeout(() => {
    $overlayVerseLabel.textContent = sec.label || '';
    $overlayText.textContent = sec.text;
    $overlayText.classList.remove('fade');
  }, 180);

  $btnOverlayPrev.disabled = currentSectionIdx <= 0;
  $btnOverlayNext.disabled = currentSectionIdx >= currentSections.length - 1;
  applyOverlayFontSize();
}

function applyOverlayFontSize() {
  $overlayText.style.fontSize = overlayFontSize + 'rem';
  $overlayFontLabel.textContent = overlayFontSize.toFixed(1) + 'rem';
}

// ── SEARCH ──
function updateSearch() {
  const q = $search.value.trim().toLowerCase();
  if (!q) {
    filteredHymns = [...HYMNS];
  } else {
    const isNum = /^\d+$/.test(q);
    filteredHymns = HYMNS.filter(h => {
      if (isNum) return String(h.n).startsWith(q);
      return h.t.toLowerCase().includes(q) || h.c.toLowerCase().includes(q);
    });
  }
  selectedIndex = -1;
  renderList();
  document.getElementById('count-badge').textContent = filteredHymns.length + ' himnos';
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  // Overlay shortcuts
  if ($overlay.classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      if (currentSectionIdx < currentSections.length - 1) {
        currentSectionIdx++;
        renderOverlaySectionBtns();
        renderOverlaySection();
      }
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (currentSectionIdx > 0) {
        currentSectionIdx--;
        renderOverlaySectionBtns();
        renderOverlaySection();
      }
    } else if (e.key === 'Escape') {
      closeOverlay();
    } else if (e.key === 'f' || e.key === 'F') {
      toggleFullscreen();
    } else if (e.key === 'h' || e.key === 'H') {
      toggleControls();
    } else if (e.key === '+' || e.key === '=') {
      overlayFontSize = Math.min(overlayFontSize + 0.2, 5);
      applyOverlayFontSize();
    } else if (e.key === '-') {
      overlayFontSize = Math.max(overlayFontSize - 0.2, 0.8);
      applyOverlayFontSize();
    }
    return;
  }
  
  // Main view shortcuts
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectHymn(selectedIndex < filteredHymns.length - 1 ? selectedIndex + 1 : selectedIndex);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectHymn(selectedIndex > 0 ? selectedIndex - 1 : 0);
  } else if (e.key === 'Enter' && selectedIndex >= 0) {
    openOverlay(filteredHymns[selectedIndex]);
  } else if (e.key === 'f' || e.key === 'F') {
    toggleFullscreen();
  }
});

function closeOverlay() {
  $overlay.classList.remove('active');
  $overlay.classList.remove('hide-controls');
}

function toggleControls() {
  $overlay.classList.toggle('hide-controls');
  const btn = document.getElementById('overlay-toggle-controls');
  btn.textContent = $overlay.classList.contains('hide-controls') ? '👁 Mostrar' : '👁 Ocultar';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    (document.documentElement || document.body).requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ── SIDEBAR RESIZER ──
const $resizer = document.getElementById('resizer');
const $sidebar = document.getElementById('sidebar');
let isResizing = false;
$resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const newWidth = e.clientX;
  if (newWidth > 160 && newWidth < 500) {
    $sidebar.style.width = newWidth + 'px';
  }
});
document.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── EVENT LISTENERS ──
$search.addEventListener('input', updateSearch);

$numInput.addEventListener('change', () => {
  const n = parseInt($numInput.value);
  if (!n) return;
  const idx = filteredHymns.findIndex(h => h.n === n);
  if (idx >= 0) {
    selectHymn(idx);
    $numInput.value = '';
  } else {
    // Search in all
    const globalIdx = HYMNS.findIndex(h => h.n === n);
    if (globalIdx >= 0) {
      $search.value = '';
      filteredHymns = [...HYMNS];
      renderList();
      const newIdx = filteredHymns.findIndex(h => h.n === n);
      selectHymn(newIdx);
      $numInput.value = '';
    }
  }
});

$numInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $numInput.dispatchEvent(new Event('change'));
});

document.getElementById('btn-prev-hymn').addEventListener('click', () => selectHymn(selectedIndex - 1));
document.getElementById('btn-next-hymn').addEventListener('click', () => selectHymn(selectedIndex + 1));

document.getElementById('fc-up').addEventListener('click', () => { viewerFontSize = Math.min(viewerFontSize + 10, 200); applyViewerFontSize(); });
document.getElementById('fc-down').addEventListener('click', () => { viewerFontSize = Math.max(viewerFontSize - 10, 60); applyViewerFontSize(); });

document.getElementById('btn-overlay').addEventListener('click', () => {
  if (selectedIndex >= 0) openOverlay(filteredHymns[selectedIndex]);
  else alert('Selecciona un himno primero');
});

document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

document.getElementById('btn-close-overlay').addEventListener('click', closeOverlay);
document.getElementById('overlay-fullscreen').addEventListener('click', toggleFullscreen);
document.getElementById('overlay-toggle-controls').addEventListener('click', toggleControls);

document.getElementById('of-up').addEventListener('click', () => { overlayFontSize = Math.min(overlayFontSize + 0.2, 5); applyOverlayFontSize(); });
document.getElementById('of-down').addEventListener('click', () => { overlayFontSize = Math.max(overlayFontSize - 0.2, 0.8); applyOverlayFontSize(); });

$btnOverlayPrev.addEventListener('click', () => {
  if (currentSectionIdx > 0) { currentSectionIdx--; renderOverlaySectionBtns(); renderOverlaySection(); }
});
$btnOverlayNext.addEventListener('click', () => {
  if (currentSectionIdx < currentSections.length - 1) { currentSectionIdx++; renderOverlaySectionBtns(); renderOverlaySection(); }
});

// ── FULLSCREEN CHANGE ──
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('btn-fullscreen').textContent = isFs ? '⛶ Salir pantalla completa' : '⛶ Pantalla completa';
  document.getElementById('overlay-fullscreen').textContent = isFs ? '⛶ Salir' : '⛶ Pantalla completa';
});

// ── HINT ──
setTimeout(() => { document.getElementById('fs-hint').classList.add('gone'); }, 5000);

// ── UTIL ──
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
renderList();
// Select first hymn
if (HYMNS.length > 0) {
  // Select hymn 2 (Celebremos su gloria) as default
  const startIdx = filteredHymns.findIndex(h => h.n === 2);
  if (startIdx >= 0) selectHymn(startIdx);
}
</script>
</body>
</html>
